<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luciano payments — Admin · Popcorn Chez</title>

<!-- DM Sans — matches the rest of the toolkit -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">

<!-- Auth must load BEFORE pc-nav (pc-nav reads pcAuth.getUser()) -->
<script src="/pc-auth.js"></script>
<script src="/pc-nav.js"></script>
<script src="/pc-activity.js"></script>
<script src="/pc-catalog.js"></script>

<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #faf9f6;
    color: #1a1a1a;
    font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Page title row ---- */
  .page-title-row {
    background: #faf9f6;
    border-bottom: 1px solid #e8e8e4;
    padding: 18px 22px 16px;
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
  .page-subtitle { font-size: 13px; color: #888; font-weight: 500; margin-top: 2px; }
  .page-title-meta { font-size: 12px; color: #888; font-weight: 500; }

  .page-body { max-width: 1240px; margin: 0 auto; padding: 18px 22px 80px; }

  /* ---- Filter row ---- */
  .luc-filter-row {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .luc-filter-row .luc-filter-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: #888;
  }
  .luc-filter-row select {
    font-family: inherit; font-size: 13px; padding: 7px 10px;
    border: 1px solid #e0dfd8; border-radius: 6px; background: #fff; color: #1a1a1a;
  }
  .luc-filter-row select:focus { outline: none; border-color: #1a1a1a; }
  .luc-filter-spacer { flex: 1; }
  .btn-print {
    background: #fff; border: 1px solid #e0dfd8; color: #1a1a1a;
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 8px 14px; border-radius: 6px; cursor: pointer;
    transition: background 0.12s ease;
  }
  .btn-print:hover { background: #f1f0eb; }

  /* ---- Null-event warning strip ---- */
  .luc-warn {
    background: #fef6ec; border: 1px solid #f3d9a8; border-radius: 8px;
    padding: 11px 14px; margin-bottom: 16px; font-size: 13px; color: #633806;
  }
  .luc-warn[hidden] { display: none; }
  .luc-warn strong { font-weight: 600; }
  .luc-warn a { color: #633806; font-weight: 500; }

  /* ---- Metric cards ---- */
  .luc-cards {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; margin-bottom: 22px;
  }
  .luc-card {
    background: #fff; border: 0.5px solid #e0dfd8; border-radius: 10px;
    padding: 16px 18px;
  }
  .luc-card .luc-card-label {
    font-size: 12px; font-weight: 500; color: #888; margin-bottom: 6px;
  }
  .luc-card .luc-card-value {
    font-size: 24px; font-weight: 600; font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .luc-card--fees .luc-card-value { color: #791F1F; }
  .luc-card--due {
    background: #e6f1fb; border-color: #b9d6f0;
  }
  .luc-card--due .luc-card-label { color: #0C447C; }
  .luc-card--due .luc-card-value { color: #0C447C; }

  /* ---- Quarter section ---- */
  .luc-quarter { margin-bottom: 22px; }
  .luc-quarter-band {
    background: #f1f0eb; border: 1px solid #e0dfd8; border-radius: 10px 10px 0 0;
    border-bottom: 0;
    padding: 11px 16px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .luc-quarter-band-title { font-size: 14px; font-weight: 600; }
  .luc-quarter-band-title .luc-cal { margin-right: 6px; opacity: 0.55; }
  .luc-quarter-band-meta { font-size: 12px; color: #777; font-variant-numeric: tabular-nums; }
  /* Reserved slot for the §7 sign-off control (built next session). */
  .luc-quarter-signoff { display: flex; align-items: center; gap: 8px; }

  .luc-table-wrap {
    background: #fff; border: 0.5px solid #e0dfd8; border-radius: 0 0 10px 10px;
    overflow: hidden;
  }
  .luc-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .luc-table thead tr { background: #f6f6f3; border-bottom: 1px solid #e0dfd8; }
  .luc-table th {
    padding: 9px 12px; font-weight: 500; color: #555; font-size: 11px;
    letter-spacing: 0.04em; text-transform: uppercase; text-align: right; white-space: nowrap;
  }
  .luc-table th.col-chev { width: 30px; padding: 9px 4px 9px 12px; }
  .luc-table th.col-venue,
  .luc-table th.col-event { text-align: left; }
  .luc-table th.col-due { color: #0C447C; }

  .luc-table tbody tr.luc-event-row {
    border-bottom: 1px solid #f0efe8; cursor: pointer;
    transition: background 0.08s ease;
  }
  .luc-table tbody tr.luc-event-row:hover { background: #fafaf6; }
  .luc-table td {
    padding: 11px 12px; text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .luc-table td.col-chev { padding: 11px 4px 11px 12px; text-align: center; }
  .luc-table td.col-venue, .luc-table td.col-event { text-align: left; }
  .luc-table td.col-event { font-weight: 500; }
  .luc-table td.col-fees { color: #791F1F; }
  .luc-table td.col-due { color: #0C447C; font-weight: 500; }

  .luc-chev {
    display: inline-block; width: 9px; height: 9px;
    border-right: 1.5px solid #999; border-bottom: 1.5px solid #999;
    transform: rotate(-45deg); transition: transform 0.15s ease;
    margin-bottom: 1px;
  }
  .luc-event-row.is-open .luc-chev { transform: rotate(45deg); }

  .luc-venue-badge {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 2px 9px; border-radius: 10px; background: #e6f1fb; color: #0C447C;
  }
  .luc-venue-badge.is-six { background: #f1f0eb; color: #555; }

  /* Quarter total row */
  .luc-table tbody tr.luc-total-row {
    background: #f6f6f3; border-top: 2px solid #1a1a1a;
  }
  .luc-table tbody tr.luc-total-row td { font-weight: 700; }
  .luc-table tbody tr.luc-total-row td.col-fees { color: #791F1F; }
  .luc-table tbody tr.luc-total-row td.col-due { color: #0C447C; }

  /* Stand expand row */
  .luc-stands-row td { padding: 0; }
  .luc-stands-row[hidden] { display: none; }
  .luc-stands-inner { background: #fafaf6; padding: 6px 12px 12px 42px; }
  .luc-stands-head {
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: #999; padding: 8px 0 4px;
  }
  .luc-stands-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .luc-stands-table th {
    text-align: right; font-weight: 500; color: #999; font-size: 10px;
    letter-spacing: 0.04em; text-transform: uppercase; padding: 4px 10px;
  }
  .luc-stands-table th.col-stand, .luc-stands-table th.col-stmt { text-align: left; }
  .luc-stands-table td {
    text-align: right; padding: 6px 10px; font-variant-numeric: tabular-nums;
    border-top: 1px solid #efeee8;
  }
  .luc-stands-table td.col-stand { text-align: left; font-weight: 500; }
  .luc-stands-table td.col-fees { color: #791F1F; }
  .luc-stands-table td.col-stmt { text-align: left; color: #b4b2a9; }
  .luc-stmt-link { color: #0C447C; font-size: 12px; text-decoration: none; }
  .luc-stmt-link:hover { text-decoration: underline; }
  .luc-stmt-upload, .luc-stmt-add {
    background: #fff; border: 1px solid #e0dfd8; color: #555;
    font-family: inherit; font-size: 11px; font-weight: 500;
    padding: 3px 9px; border-radius: 5px; cursor: pointer;
  }
  .luc-stmt-upload:hover, .luc-stmt-add:hover { background: #f1f0eb; color: #1a1a1a; }
  .luc-stmt-add { margin-top: 4px; }

  /* Empty + loading */
  .luc-state {
    background: #fff; border: 1px dashed #d8d8d4; border-radius: 12px;
    padding: 56px 24px; text-align: center; color: #888; font-size: 13px;
  }
  .luc-state[hidden] { display: none; }
  .luc-state h2 { margin: 0 0 6px; font-size: 16px; font-weight: 600; color: #1a1a1a; }

  /* Toast */
  .pc-toast-host {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 2000; pointer-events: none;
  }
  .pc-toast {
    background: #1a1a1a; color: #fff; font-size: 13px; font-weight: 500;
    padding: 11px 18px; border-radius: 24px; box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .pc-toast.is-shown { opacity: 1; transform: translateY(0); }

  /* Sign-off control (in quarter band) */
  .luc-signoff-pill { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 10px; white-space: nowrap; }
  .luc-signoff-pill.is-signed { background: #eaf3de; color: #27500A; }
  .luc-signoff-pill.is-ready { background: #e6f1fb; color: #0C447C; }
  .luc-signoff-pill.is-unsigned { background: #f1f0eb; color: #777; }
  .luc-signoff-meta { font-size: 11px; color: #888; white-space: nowrap; }
  .luc-signoff-changed { font-size: 11px; color: #854F0B; background: #fef6ec; padding: 2px 8px; border-radius: 8px; white-space: nowrap; }
  .luc-ready-btn {
    background: #185FA5; color: #fff; border: 0; font-family: inherit; font-size: 12px;
    font-weight: 500; padding: 5px 12px; border-radius: 6px; cursor: pointer; white-space: nowrap;
  }
  .luc-ready-btn:hover { background: #0C447C; }
  .luc-ready-btn:disabled { background: #b4b2a9; cursor: not-allowed; }
  .luc-ready-undo {
    background: transparent; border: 1px solid #e0dfd8; color: #888; font-family: inherit;
    font-size: 11px; padding: 4px 9px; border-radius: 6px; cursor: pointer; white-space: nowrap;
  }
  .luc-ready-undo:hover { background: #f1f0eb; color: #1a1a1a; }
  .luc-signoff-btn {
    background: #1a1a1a; color: #fff; border: 0; font-family: inherit; font-size: 12px;
    font-weight: 500; padding: 5px 12px; border-radius: 6px; cursor: pointer; white-space: nowrap;
  }
  .luc-signoff-btn:hover { background: #2c2c2a; }
  .luc-signoff-btn:disabled { background: #b4b2a9; cursor: not-allowed; }
  .luc-signoff-btn.is-resign { background: #854F0B; }
  .luc-signoff-btn.is-resign:hover { background: #633806; }

  /* Sign-off modal */
  .luc-modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1500;
    display: flex; align-items: flex-start; justify-content: center; padding: 60px 16px; overflow-y: auto;
  }
  .luc-modal-card {
    background: #fff; border-radius: 14px; max-width: 560px; width: 100%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.18); overflow: hidden;
  }
  .luc-modal-head { padding: 18px 22px 14px; border-bottom: 1px solid #f0efe8; display: flex; align-items: center; justify-content: space-between; }
  .luc-modal-title { font-size: 17px; font-weight: 600; }
  .luc-modal-close { background: transparent; border: 0; font-size: 22px; color: #888; cursor: pointer; line-height: 1; padding: 2px 6px; }
  .luc-modal-close:hover { color: #1a1a1a; }
  .luc-modal-body { padding: 18px 22px; }
  .luc-modal-foot { padding: 14px 22px; border-top: 1px solid #f0efe8; background: #fafaf6; display: flex; justify-content: flex-end; gap: 10px; }
  .luc-sign-figs { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
  .luc-sign-figs td { padding: 7px 0; font-size: 14px; border-bottom: 1px solid #f0efe8; font-variant-numeric: tabular-nums; }
  .luc-sign-figs td:last-child { text-align: right; font-weight: 500; }
  .luc-sign-figs tr.is-strong td { font-weight: 700; color: #0C447C; border-bottom: 0; padding-top: 10px; }
  .luc-sign-coverage { font-size: 12px; color: #27500A; background: #eaf3de; border-radius: 6px; padding: 8px 10px; margin-bottom: 14px; }
  .luc-sign-attest-label { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: #888; margin-bottom: 6px; }
  .luc-sign-attest { font-size: 13px; line-height: 1.6; color: #333; background: #faf9f6; border: 1px solid #e8e8e4; border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; }
  .luc-sign-legal { font-size: 11px; color: #854F0B; font-style: italic; }
  .luc-btn { font-family: inherit; font-size: 13px; font-weight: 500; padding: 9px 16px; border-radius: 6px; cursor: pointer; border: 0; }
  .luc-btn-secondary { background: transparent; border: 1px solid #e0dfd8; color: #555; }
  .luc-btn-secondary:hover { background: #f1f0eb; color: #1a1a1a; }
  .luc-btn-primary { background: #27500A; color: #fff; }
  .luc-btn-primary:hover { background: #173404; }
  .luc-btn-primary:disabled { background: #b4b2a9; cursor: not-allowed; }

  body.pre-auth .page-body, body.pre-auth .page-title-row { display: none; }

  @media (max-width: 820px) {
    .luc-cards { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

<body class="pre-auth">

  <!-- pc-nav.js injects its own <header> -->

  <div class="page-title-row" aria-hidden="true">
    <div>
      <h1 class="page-title">Luciano payments</h1>
      <div class="page-subtitle">Royalty due to KBC · pulled from A/R</div>
    </div>
    <span class="page-title-meta">Mann + FMP 10% · elsewhere 6%</span>
  </div>

  <main class="page-body">

    <!-- Filter row -->
    <div class="luc-filter-row">
      <span class="luc-filter-label">Venue</span>
      <select id="filterVenue" aria-label="Filter by venue">
        <option value="all">All venues</option>
      </select>
      <select id="filterPeriod" aria-label="Filter by quarter"></select>
      <span class="luc-filter-spacer"></span>
      <button type="button" class="btn-print" id="btnPrintQuarter">Print quarter ↗</button>
    </div>

    <!-- Null-event warning -->
    <div class="luc-warn" id="lucWarn" hidden></div>

    <!-- Metric cards -->
    <div class="luc-cards" id="lucCards"></div>

    <!-- Loading / empty states -->
    <div class="luc-state" id="lucLoading">Loading Luciano's sales from A/R…</div>
    <div class="luc-state" id="lucEmpty" hidden>
      <h2>No Luciano's invoices yet</h2>
      <p>Once a Legends Luciano's statement is logged in A/R with the Luciano's Pizza Sales item, it shows up here.</p>
    </div>

    <!-- Quarter sections render here -->
    <div id="lucQuarters"></div>

  </main>

  <div class="pc-toast-host" id="pcToastHost" aria-live="polite" aria-atomic="true"></div>

<script>
(function () {
  'use strict';

  // =====================================================================
  // CONFIG
  // =====================================================================
  var SB_URL  = 'https://aoazlttdjowhlfcksoyl.supabase.co';
  var SB_REST = SB_URL + '/rest/v1/';

  // The two isolated Luciano's items (created already — see spec §2).
  var ITEM_SALES = '12d6a9c5-79cd-4746-959e-2afc18e98311'; // Luciano's Pizza Sales (positive)
  var ITEM_FEES  = '0829c3ed-a6be-4f1c-aee2-9bfe67e5969b'; // Luciano's Credit Card Fees (negative)

  // 10% venues; everything else 6% (spec §11). Compared case-insensitively.
  var RATE_10_VENUES = { 'MANN': true, 'FMP': true };

  // Reserved for the §7 sign-off identity gate — wired next session.
  var CARLO_AUTH_ID = '430b8f09-609b-4f38-8fe7-b33a797bda1f';

  // Admin who marks a quarter ready for sign-off (Keith). RLS enforces this
  // server-side; the constant only governs whether the control is shown.
  var KEITH_AUTH_ID = 'c5b26231-43a6-496b-9c63-e174905a6f89';

  // Statuses that do NOT accrue a royalty (spec §3, §10.1).
  var EXCLUDED_STATUS = { 'voided': true, 'disputed': true };

  // Statement uploads (§8) — private bucket, signed-URL viewing.
  var STMT_BUCKET = 'luciano-statements';
  var ACCEPT_MIME = { 'application/pdf': 1, 'image/jpeg': 1, 'image/png': 1 };
  var ACCEPT_EXT  = { 'pdf': 1, 'jpg': 1, 'jpeg': 1, 'png': 1 };

  var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // =====================================================================
  // STATE
  // =====================================================================
  var state = {
    quarters: [],     // [{year, q, events:[...]}] built from AR data, unfiltered
    unlinked: [],     // qualifying invoices with a null event_id (warning)
    venues: [],       // distinct venue_codes present in data
    eventNames: {},   // event_id -> name, resolved from the events table (NOT stored on ar_invoices)
    statements: {},   // invoice_id -> [luciano_statements rows] (§8 attachments)
    signoffs: {},     // 'year:q:scope' -> latest luciano_royalty_signoffs row (§7)
    ready: {},        // 'year:q:scope' -> active luciano_quarter_ready row (admin gate)
    filters: { venue: 'all', period: '' }  // period = 'YYYY:all' | 'YYYY:1'..':4'
  };

  // =====================================================================
  // UTILITIES
  // =====================================================================
  function round2(n) { return Math.round((Number(n) || 0) * 100) / 100; }

  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  /** $1,755.25 for positives; −$56.87 (minus glyph) for negatives. */
  function fmtMoney(n) {
    if (n == null || isNaN(n)) n = 0;
    var neg = n < 0;
    var abs = Math.abs(n);
    var body = '$' + abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return (neg ? '\u2212' : '') + body;
  }

  /** '6/4/26' from 'YYYY-MM-DD'. */
  function fmtDateShort(iso) {
    if (!iso) return '—';
    var p = iso.split('-');
    if (p.length !== 3) return iso;
    return parseInt(p[1], 10) + '/' + parseInt(p[2], 10) + '/' + p[0].slice(2);
  }

  /** 'Jul 30, 2026' from 'YYYY-MM-DD'. */
  function fmtDateLong(iso) {
    if (!iso) return '—';
    var p = iso.split('-');
    if (p.length !== 3) return iso;
    return MONTHS[parseInt(p[1], 10) - 1] + ' ' + parseInt(p[2], 10) + ', ' + p[0];
  }

  function pad2(n) { n = String(n); return n.length < 2 ? '0' + n : n; }

  /** Calendar quarter (1..4) + year from a 'YYYY-MM-DD' date. NOT pc-fiscal. */
  function quarterOf(iso) {
    var p = iso.split('-');
    var year = parseInt(p[0], 10);
    var month = parseInt(p[1], 10);
    var q = Math.floor((month - 1) / 3) + 1;
    return { year: year, q: q };
  }

  /** Metadata for a quarter: range label, end date, payment-due date. */
  function quarterMeta(year, q) {
    var ends = { 1: [3, 31], 2: [6, 30], 3: [9, 30], 4: [12, 31] };
    var starts = { 1: 'Jan 1', 2: 'Apr 1', 3: 'Jul 1', 4: 'Oct 1' };
    var endMonthName = { 1: 'Mar 31', 2: 'Jun 30', 3: 'Sep 30', 4: 'Dec 31' };
    var em = ends[q];
    var endIso = year + '-' + pad2(em[0]) + '-' + pad2(em[1]);
    // Payment due = quarter end + 30 days.
    var d = new Date(endIso + 'T00:00:00');
    d.setDate(d.getDate() + 30);
    var dueIso = d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    return {
      rangeLabel: starts[q] + ' – ' + endMonthName[q],
      endIso: endIso,
      dueIso: dueIso,
      dueLabel: fmtDateLong(dueIso)
    };
  }

  function rateForVenue(code) {
    return RATE_10_VENUES[(code || '').toUpperCase()] ? 0.10 : 0.06;
  }

  function ratePct(rate) { return Math.round(rate * 100) + '%'; }

  /** Resolve a stand name from the catalog (stand objects use stand_name). */
  function standName(id) {
    if (!id) return '—';
    try {
      if (typeof pcCatalog !== 'undefined' && pcCatalog.getStandById) {
        var s = pcCatalog.getStandById(id);
        if (s && s.stand_name) return s.stand_name;
      }
    } catch (e) {}
    return '—';
  }

  // =====================================================================
  // TOAST
  // =====================================================================
  function showToast(msg, ms) {
    ms = ms || 2400;
    var host = document.getElementById('pcToastHost');
    if (!host) return;
    var el = document.createElement('div');
    el.className = 'pc-toast';
    el.textContent = msg;
    host.appendChild(el);
    requestAnimationFrame(function () { el.classList.add('is-shown'); });
    setTimeout(function () {
      el.classList.remove('is-shown');
      setTimeout(function () { el.remove(); }, 260);
    }, ms);
  }

  // =====================================================================
  // AUTH FETCH (mirrors the AR page pattern)
  // =====================================================================
  function handleAuthFailure() {
    try {
      localStorage.removeItem('sb_access_token');
      localStorage.removeItem('sb_refresh_token');
    } catch (e) {}
    showToast('Session expired. Reloading to sign in again…', 1800);
    setTimeout(function () { window.location.reload(); }, 1800);
  }

  function authFetch(url, options) {
    return fetch(url, options).then(function (r) {
      if (!r.ok) {
        return r.text().then(function (t) {
          if (r.status === 401 || (t && t.indexOf('JWT expired') !== -1)) {
            var ae = new Error('JWT expired'); ae.authFailed = true; throw ae;
          }
          throw new Error(t || ('HTTP ' + r.status));
        });
      }
      return r.text().then(function (t) {
        if (!t) return [];
        try { return JSON.parse(t); } catch (e) { return []; }
      });
    });
  }

  // =====================================================================
  // FETCH — Luciano's lines with parent invoice embedded
  //
  // One query: every ar_invoice_lines row whose item_id is one of the two
  // Luciano's items, with the parent ar_invoices row inner-joined so we get
  // venue/stand/event/date/status in the same shot. Voided + disputed are
  // dropped client-side (belt + suspenders). Explicit LIMIT baked in.
  // =====================================================================
  function fetchLucianoLines() {
    var selectClause = 'select=' + [
      'invoice_id',
      'item_id',
      'amount',
      'ar_invoices!inner(' + [
        'id',
        'venue_code',
        'stand_id',
        'event_id',
        'event_name',
        'period_start',
        'status',
        'internal_invoice_number',
        'client_reference'
      ].join(',') + ')'
    ].join(',');

    var url = SB_REST + 'ar_invoice_lines?' + selectClause +
      '&item_id=in.(' + ITEM_SALES + ',' + ITEM_FEES + ')' +
      '&limit=10000';

    return authFetch(url, { headers: pcAuth.headers() });
  }

  // ---- Event names live in the events table, joined by event_id. The AR
  // form saves event_id but not event_name onto ar_invoices, so we resolve
  // names here in one bounded follow-up query keyed by the distinct ids. ----
  function collectEventIds(lines) {
    var seen = {};
    (lines || []).forEach(function (ln) {
      var inv = ln.ar_invoices;
      if (inv && inv.event_id && !EXCLUDED_STATUS[inv.status]) seen[inv.event_id] = true;
    });
    return Object.keys(seen);
  }

  function fetchEventNames(eventIds) {
    if (!eventIds || !eventIds.length) return Promise.resolve({});
    var inList = eventIds.map(encodeURIComponent).join(',');
    return authFetch(
      SB_REST + 'events?select=id,event_name&id=in.(' + inList + ')&limit=10000',
      { headers: pcAuth.headers() }
    ).then(function (rows) {
      var map = {};
      (rows || []).forEach(function (r) { if (r && r.id) map[r.id] = r.event_name || ''; });
      return map;
    });
  }

  // =====================================================================
  // MODEL BUILD — lines → invoices → events → calendar quarters
  // =====================================================================
  function buildModel(lines) {
    // 1) Group lines into per-invoice (= per-stand-per-event) buckets.
    var byInvoice = {};
    var venueSet = {};

    (lines || []).forEach(function (ln) {
      var inv = ln.ar_invoices;
      if (!inv || !inv.id) return;
      if (EXCLUDED_STATUS[inv.status]) return;       // skip voided / disputed

      var id = inv.id;
      if (!byInvoice[id]) {
        byInvoice[id] = {
          invoice_id: id,
          venue_code: inv.venue_code || '',
          stand_id: inv.stand_id || null,
          event_id: inv.event_id || null,
          event_name: inv.event_name || '',
          period_start: inv.period_start || '',
          internal_invoice_number: inv.internal_invoice_number || '',
          client_reference: inv.client_reference || '',
          sales: 0, fees: 0
        };
      }
      var amt = Number(ln.amount) || 0;
      if (ln.item_id === ITEM_SALES) byInvoice[id].sales += amt;
      else if (ln.item_id === ITEM_FEES) byInvoice[id].fees += amt;  // already negative
    });

    // 2) Split out unlinked invoices (null event_id) for the warning; the
    //    rest fold into events. Round per-invoice figures to cents.
    var unlinked = [];
    var byEvent = {};

    Object.keys(byInvoice).forEach(function (id) {
      var iv = byInvoice[id];
      iv.sales = round2(iv.sales);
      iv.fees = round2(iv.fees);
      iv.base = round2(iv.sales + iv.fees);
      if (iv.venue_code) venueSet[iv.venue_code] = true;

      if (!iv.event_id) { unlinked.push(iv); return; }

      var ek = iv.event_id;
      if (!byEvent[ek]) {
        byEvent[ek] = {
          event_id: ek,
          event_name: state.eventNames[ek] || iv.event_name || '(unnamed event)',
          venue_code: iv.venue_code,
          period_start: iv.period_start,
          invoices: [],
          sales: 0, fees: 0, base: 0
        };
      }
      var ev = byEvent[ek];
      ev.invoices.push(iv);
      ev.sales = round2(ev.sales + iv.sales);
      ev.fees = round2(ev.fees + iv.fees);
      ev.base = round2(ev.base + iv.base);
      // Keep the earliest date / first non-empty name as the event's own.
      if (!ev.period_start || (iv.period_start && iv.period_start < ev.period_start)) {
        ev.period_start = iv.period_start;
      }
      if ((!ev.event_name || ev.event_name === '(unnamed event)') && iv.event_name) {
        ev.event_name = iv.event_name;
      }
    });

    // 3) Per-event rate + due, then group events into calendar quarters.
    var byQuarter = {};
    Object.keys(byEvent).forEach(function (ek) {
      var ev = byEvent[ek];
      ev.rate = rateForVenue(ev.venue_code);
      ev.due = round2(ev.base * ev.rate);

      var qq = quarterOf(ev.period_start);
      var qk = qq.year + ':' + qq.q;
      if (!byQuarter[qk]) byQuarter[qk] = { year: qq.year, q: qq.q, events: [] };
      byQuarter[qk].events.push(ev);
    });

    // 4) Sort: quarters newest first; events within a quarter by date asc.
    var quarters = Object.keys(byQuarter).map(function (k) { return byQuarter[k]; });
    quarters.sort(function (a, b) {
      if (a.year !== b.year) return b.year - a.year;
      return b.q - a.q;
    });
    quarters.forEach(function (qtr) {
      qtr.events.sort(function (a, b) {
        return (a.period_start || '') < (b.period_start || '') ? -1 : 1;
      });
    });

    var venues = Object.keys(venueSet).sort();

    state.quarters = quarters;
    state.unlinked = unlinked;
    state.venues = venues;
  }

  // =====================================================================
  // FILTERING — apply venue + period to produce the visible view
  //
  // Venue filters events; period filters quarters. Aggregates are
  // recomputed from the filtered events so totals always match what's
  // on screen (per spec §5: cards + quarter totals recompute per filter).
  // =====================================================================
  function visibleQuarters() {
    var venue = state.filters.venue;
    var period = state.filters.period;  // 'YYYY:all' | 'YYYY:n'
    var pp = period.split(':');
    var pYear = parseInt(pp[0], 10);
    var pQ = pp[1];  // 'all' or '1'..'4'

    var out = [];
    state.quarters.forEach(function (qtr) {
      if (qtr.year !== pYear) return;
      if (pQ !== 'all' && String(qtr.q) !== pQ) return;

      var events = qtr.events.filter(function (ev) {
        return venue === 'all' || ev.venue_code === venue;
      });
      if (events.length === 0) return;

      var sales = 0, fees = 0, base = 0, due = 0;
      events.forEach(function (ev) {
        sales = round2(sales + ev.sales);
        fees = round2(fees + ev.fees);
        base = round2(base + ev.base);
        due = round2(due + ev.due);   // sum rounded per-event dues (spec §4)
      });

      out.push({
        year: qtr.year, q: qtr.q, events: events,
        sales: sales, fees: fees, base: base, due: due,
        meta: quarterMeta(qtr.year, qtr.q)
      });
    });
    return out;
  }

  // =====================================================================
  // RENDER
  // =====================================================================
  function renderFilters() {
    // Venue dropdown — distinct venues present in data.
    var vSel = document.getElementById('filterVenue');
    if (vSel) {
      vSel.innerHTML = '<option value="all">All venues</option>' +
        state.venues.map(function (c) {
          return '<option value="' + esc(c) + '">' + esc(c) + '</option>';
        }).join('');
      vSel.value = state.filters.venue;
    }

    // Period dropdown — for each year present (desc): "All quarters" then
    // each quarter that has data (asc).
    var pSel = document.getElementById('filterPeriod');
    if (pSel) {
      var years = {};
      state.quarters.forEach(function (qtr) {
        if (!years[qtr.year]) years[qtr.year] = {};
        years[qtr.year][qtr.q] = true;
      });
      var yearList = Object.keys(years).map(Number).sort(function (a, b) { return b - a; });

      var html = '';
      yearList.forEach(function (y) {
        html += '<option value="' + y + ':all">' + y + ' · All quarters</option>';
        [1, 2, 3, 4].forEach(function (q) {
          if (years[y][q]) html += '<option value="' + y + ':' + q + '">' + y + ' · Q' + q + '</option>';
        });
      });
      pSel.innerHTML = html;

      // Default: current year all quarters; else most recent year present.
      if (!state.filters.period) {
        var nowYear = new Date().getFullYear();
        if (years[nowYear]) state.filters.period = nowYear + ':all';
        else if (yearList.length) state.filters.period = yearList[0] + ':all';
      }
      if (state.filters.period) pSel.value = state.filters.period;
    }
  }

  function renderWarning() {
    var el = document.getElementById('lucWarn');
    if (!el) return;
    if (!state.unlinked.length) { el.hidden = true; el.innerHTML = ''; return; }

    var links = state.unlinked.map(function (iv) {
      var label = iv.internal_invoice_number || iv.client_reference || iv.invoice_id;
      return '<a href="/accounts-receivable/?invoice=' + encodeURIComponent(iv.invoice_id) +
        '" target="_blank" rel="noopener">' + esc(label) + '</a>';
    }).join(', ');

    el.hidden = false;
    el.innerHTML = '<strong>⚠ ' + state.unlinked.length + ' Luciano\u2019s ' +
      (state.unlinked.length === 1 ? 'invoice has' : 'invoices have') +
      ' no event linked</strong> and are excluded from the rollup until fixed. ' +
      'Open in A/R to link an event: ' + links + '.';
  }

  function renderCards() {
    var host = document.getElementById('lucCards');
    if (!host) return;

    var qs = visibleQuarters();
    var sales = 0, fees = 0, base = 0, due = 0;
    qs.forEach(function (q) {
      sales = round2(sales + q.sales);
      fees = round2(fees + q.fees);
      base = round2(base + q.base);
      due = round2(due + q.due);
    });

    host.innerHTML =
      card('Luciano sales', fmtMoney(sales), '') +
      card('Less CC fees', fmtMoney(fees), 'luc-card--fees') +
      card('Commissionable', fmtMoney(base), '') +
      card('Payment due', fmtMoney(due), 'luc-card--due');
  }

  function card(label, value, cls) {
    return '<div class="luc-card ' + cls + '">' +
      '<div class="luc-card-label">' + esc(label) + '</div>' +
      '<div class="luc-card-value">' + esc(value) + '</div>' +
    '</div>';
  }

  function renderQuarters() {
    var host = document.getElementById('lucQuarters');
    var loading = document.getElementById('lucLoading');
    var empty = document.getElementById('lucEmpty');
    if (!host) return;

    if (loading) loading.hidden = true;

    var qs = visibleQuarters();

    // Empty state only when there is no data at all (not merely filtered out).
    if (state.quarters.length === 0) {
      host.innerHTML = '';
      if (empty) empty.hidden = false;
      return;
    }
    if (empty) empty.hidden = true;

    if (qs.length === 0) {
      host.innerHTML = '<div class="luc-state" style="display:block;">' +
        '<h2>Nothing in this filter</h2><p>No Luciano\u2019s events match the current venue and quarter.</p></div>';
      return;
    }

    host.innerHTML = qs.map(renderQuarterSection).join('');
  }

  function renderQuarterSection(q) {
    var qkey = q.year + ':' + q.q;
    var rateVenues = {};
    q.events.forEach(function (ev) { rateVenues[ratePct(ev.rate)] = true; });
    var rateNote = Object.keys(rateVenues).join(' / ');

    var bandMeta = 'Due ' + q.meta.dueLabel + ' · ' + q.events.length +
      (q.events.length === 1 ? ' event' : ' events') +
      (rateNote ? ' · ' + rateNote : '');

    var band =
      '<div class="luc-quarter-band">' +
        '<div class="luc-quarter-band-title"><span class="luc-cal">▦</span>Q' + q.q + ' ' + q.year +
          ' · ' + q.meta.rangeLabel + '</div>' +
        '<div class="luc-quarter-band-meta">' + esc(bandMeta) + '</div>' +
        // §7 sign-off control mounts here, scoped to the active venue filter.
        '<div class="luc-quarter-signoff" data-quarter-key="' + esc(qkey) + '">' + renderSignoffSlotHtml(q) + '</div>' +
      '</div>';

    var head =
      '<thead><tr>' +
        '<th class="col-chev"></th>' +
        '<th class="col-venue">Venue</th>' +
        '<th class="col-event">Event</th>' +
        '<th>Date</th>' +
        '<th>Luciano sales</th>' +
        '<th>CC fees</th>' +
        '<th>Commissionable</th>' +
        '<th class="col-due">Due</th>' +
      '</tr></thead>';

    var rows = q.events.map(function (ev) { return renderEventRow(qkey, ev); }).join('');

    var totalRow =
      '<tr class="luc-total-row">' +
        '<td class="col-chev"></td>' +
        '<td class="col-venue"></td>' +
        '<td class="col-event">Q' + q.q + ' total</td>' +
        '<td></td>' +
        '<td>' + fmtMoney(q.sales) + '</td>' +
        '<td class="col-fees">' + fmtMoney(q.fees) + '</td>' +
        '<td>' + fmtMoney(q.base) + '</td>' +
        '<td class="col-due">' + fmtMoney(q.due) + '</td>' +
      '</tr>';

    return '<section class="luc-quarter">' + band +
      '<div class="luc-table-wrap"><table class="luc-table">' + head +
      '<tbody>' + rows + totalRow + '</tbody></table></div></section>';
  }

  function renderEventRow(qkey, ev) {
    var ekey = qkey + '__' + ev.event_id;
    var sixCls = ev.rate === 0.06 ? ' is-six' : '';

    var row =
      '<tr class="luc-event-row" data-event-key="' + esc(ekey) + '">' +
        '<td class="col-chev"><span class="luc-chev"></span></td>' +
        '<td class="col-venue"><span class="luc-venue-badge' + sixCls + '">' + esc(ev.venue_code) + '</span></td>' +
        '<td class="col-event">' + esc(ev.event_name) + '</td>' +
        '<td>' + fmtDateShort(ev.period_start) + '</td>' +
        '<td>' + fmtMoney(ev.sales) + '</td>' +
        '<td class="col-fees">' + fmtMoney(ev.fees) + '</td>' +
        '<td>' + fmtMoney(ev.base) + '</td>' +
        '<td class="col-due">' + fmtMoney(ev.due) + '</td>' +
      '</tr>';

    var standRows = ev.invoices.map(function (iv) {
      return '<tr>' +
        '<td class="col-stand">' + esc(standName(iv.stand_id)) + '</td>' +
        '<td>' + fmtMoney(iv.sales) + '</td>' +
        '<td class="col-fees">' + fmtMoney(iv.fees) + '</td>' +
        '<td>' + fmtMoney(iv.base) + '</td>' +
        '<td class="col-stmt" data-invoice-id="' + esc(iv.invoice_id) + '">' + renderStmtCellHtml(iv.invoice_id) + '</td>' +
      '</tr>';
    }).join('');

    var detail =
      '<tr class="luc-stands-row" data-event-key="' + esc(ekey) + '" hidden>' +
        '<td colspan="8"><div class="luc-stands-inner">' +
          '<div class="luc-stands-head">Stands on this event</div>' +
          '<table class="luc-stands-table"><thead><tr>' +
            '<th class="col-stand">Stand</th>' +
            '<th>Luciano sales</th>' +
            '<th>CC fees</th>' +
            '<th>Commissionable</th>' +
            '<th class="col-stmt">Statement</th>' +
          '</tr></thead><tbody>' + standRows + '</tbody></table>' +
        '</div></td>' +
      '</tr>';

    return row + detail;
  }

  // =====================================================================
  // STATEMENT UPLOADS (§8)
  //
  // Per-stand (= per-invoice) commission-statement attachments. Files live
  // in the private `luciano-statements` bucket; rows in luciano_statements.
  // PDF/JPG/PNG only. HEIC is rejected SILENTLY — plain message, no banner,
  // no iPhone tutorial (single expert uploader, per §8).
  // =====================================================================
  var pendingUploadInvoiceId = null;

  function collectInvoiceIds(lines) {
    var seen = {};
    (lines || []).forEach(function (ln) {
      var inv = ln.ar_invoices;
      if (inv && inv.id && !EXCLUDED_STATUS[inv.status]) seen[inv.id] = true;
    });
    return Object.keys(seen);
  }

  function fetchStatements(invoiceIds) {
    if (!invoiceIds || !invoiceIds.length) return Promise.resolve({});
    var inList = invoiceIds.map(encodeURIComponent).join(',');
    return authFetch(
      SB_REST + 'luciano_statements?select=id,invoice_id,file_path,original_filename,content_type,uploaded_at' +
      '&invoice_id=in.(' + inList + ')&deleted_at=is.null&order=uploaded_at.asc&limit=10000',
      { headers: pcAuth.headers() }
    ).then(function (rows) {
      var map = {};
      (rows || []).forEach(function (r) {
        if (!r || !r.invoice_id) return;
        if (!map[r.invoice_id]) map[r.invoice_id] = [];
        map[r.invoice_id].push(r);
      });
      return map;
    });
  }

  function currentActor() {
    try {
      if (typeof pcAuth !== 'undefined' && pcAuth.getUser) {
        var u = pcAuth.getUser();
        return (u && (u.display_name || u.email)) || 'unknown';
      }
    } catch (e) {}
    return 'unknown';
  }

  function truncate(s, n) {
    s = String(s == null ? '' : s);
    return s.length > n ? s.slice(0, n - 1) + '\u2026' : s;
  }

  function sanitizeName(name) {
    return String(name || 'file').replace(/[^a-zA-Z0-9._-]/g, '_').slice(0, 120);
  }

  /** Inner HTML for a stand's statement cell — view link(s) or upload button. */
  function renderStmtCellHtml(invoiceId) {
    var files = state.statements[invoiceId] || [];
    if (files.length) {
      var links = files.map(function (f) {
        return '<a href="#" class="luc-stmt-link" data-action="view-stmt" ' +
          'data-file-path="' + esc(f.file_path) + '">' + esc(truncate(f.original_filename, 26)) + '</a>';
      }).join('<br>');
      links += '<br><button type="button" class="luc-stmt-add" data-action="upload-stmt" ' +
        'data-invoice-id="' + esc(invoiceId) + '">+ add</button>';
      return links;
    }
    return '<button type="button" class="luc-stmt-upload" data-action="upload-stmt" ' +
      'data-invoice-id="' + esc(invoiceId) + '">upload</button>';
  }

  /** Re-render the one stand cell for an invoice after an upload. */
  function refreshStmtCell(invoiceId) {
    var host = document.getElementById('lucQuarters');
    if (!host) return;
    var cells = host.querySelectorAll('td.col-stmt[data-invoice-id]');
    for (var i = 0; i < cells.length; i++) {
      if (cells[i].getAttribute('data-invoice-id') === invoiceId) {
        cells[i].innerHTML = renderStmtCellHtml(invoiceId);
      }
    }
  }

  // ---- File-type validation: PDF/JPG/PNG only, silent HEIC reject. ----
  function isHeicBytes(b) {
    if (!b || b.length < 12) return false;
    if (!(b[4] === 0x66 && b[5] === 0x74 && b[6] === 0x79 && b[7] === 0x70)) return false; // 'ftyp'
    var brand = String.fromCharCode(b[8], b[9], b[10], b[11]).toLowerCase();
    var heicBrands = { heic:1, heix:1, hevc:1, heim:1, heis:1, hevm:1, hevs:1, mif1:1, msf1:1, heif:1 };
    return !!heicBrands[brand];
  }

  function validateFile(file) {
    return new Promise(function (resolve) {
      var name = (file.name || '').toLowerCase();
      var ext = name.indexOf('.') !== -1 ? name.split('.').pop() : '';
      if (ext === 'heic' || ext === 'heif') { resolve({ ok: false }); return; }

      var reader = new FileReader();
      reader.onload = function () {
        try {
          if (isHeicBytes(new Uint8Array(reader.result))) { resolve({ ok: false }); return; }
        } catch (e) {}
        resolve({ ok: !!(ACCEPT_MIME[file.type] || ACCEPT_EXT[ext]) });
      };
      reader.onerror = function () {
        resolve({ ok: !!(ACCEPT_MIME[file.type] || ACCEPT_EXT[ext]) });
      };
      reader.readAsArrayBuffer(file.slice(0, 16));
    });
  }

  function ensureFileInput() {
    var inp = document.getElementById('lucFileInput');
    if (inp) return inp;
    inp = document.createElement('input');
    inp.type = 'file';
    inp.id = 'lucFileInput';
    inp.accept = 'application/pdf,image/jpeg,image/png,.pdf,.jpg,.jpeg,.png';
    inp.style.display = 'none';
    inp.addEventListener('change', onFilePicked);
    document.body.appendChild(inp);
    return inp;
  }

  function startUpload(invoiceId) {
    if (!invoiceId) return;
    pendingUploadInvoiceId = invoiceId;
    var inp = ensureFileInput();
    inp.value = '';
    inp.click();
  }

  function onFilePicked(ev) {
    var file = ev.target.files && ev.target.files[0];
    if (!file) return;
    var invoiceId = pendingUploadInvoiceId;
    validateFile(file).then(function (res) {
      if (!res.ok) { showToast('PDF, JPG, or PNG only', 2600); return; }
      doUpload(invoiceId, file);
    });
  }

  function doUpload(invoiceId, file) {
    showToast('Uploading\u2026', 1400);
    var path = invoiceId + '/' + Date.now() + '-' + sanitizeName(file.name);

    var upHdrs = Object.assign({}, pcAuth.headers());
    upHdrs['Content-Type'] = file.type || 'application/octet-stream';
    upHdrs['x-upsert'] = 'false';

    authFetch(SB_URL + '/storage/v1/object/' + STMT_BUCKET + '/' + encodeURI(path),
      { method: 'POST', headers: upHdrs, body: file })
    .then(function () {
      var insHdrs = Object.assign({}, pcAuth.headers(), {
        'Content-Type': 'application/json', 'Prefer': 'return=representation'
      });
      return authFetch(SB_REST + 'luciano_statements', {
        method: 'POST', headers: insHdrs,
        body: JSON.stringify({
          invoice_id: invoiceId,
          file_path: path,
          original_filename: file.name,
          content_type: file.type || null,
          uploaded_by: currentActor()
        })
      });
    })
    .then(function (rows) {
      var row = (rows && rows[0]) || {
        invoice_id: invoiceId, file_path: path,
        original_filename: file.name, content_type: file.type || null
      };
      if (!state.statements[invoiceId]) state.statements[invoiceId] = [];
      state.statements[invoiceId].push(row);
      refreshStmtCell(invoiceId);
      showToast('Statement attached', 1800);
    })
    .catch(function (e) {
      if (e && e.authFailed) { handleAuthFailure(); return; }
      console.error('[Luciano] upload failed:', e);
      showToast('Upload failed', 3000);
    });
  }

  /** Open a statement via a short-lived signed URL. `win` is pre-opened in
      the click gesture so the popup blocker doesn't eat it. */
  function viewStatement(filePath, win) {
    if (!filePath) { if (win) win.close(); showToast('No file'); return; }
    var hdrs = Object.assign({}, pcAuth.headers(), { 'Content-Type': 'application/json' });
    authFetch(SB_URL + '/storage/v1/object/sign/' + STMT_BUCKET + '/' + encodeURI(filePath),
      { method: 'POST', headers: hdrs, body: JSON.stringify({ expiresIn: 3600 }) })
    .then(function (data) {
      var signed = data && data.signedURL;
      if (!signed) { if (win) win.close(); showToast('Could not open file'); return; }
      var url = SB_URL + '/storage/v1' + signed;
      if (win) win.location = url; else window.open(url, '_blank');
    })
    .catch(function (e) {
      if (win) win.close();
      if (e && e.authFailed) { handleAuthFailure(); return; }
      console.error('[Luciano] sign failed:', e);
      showToast('Could not open file', 2600);
    });
  }

  // =====================================================================
  // SIGN-OFF / ATTESTATION (§7)
  //
  // Per quarter + venue-scope, KBC (Carlo) reviews figures + attached
  // statements and signs an IMMUTABLE row in luciano_royalty_signoffs.
  // The control is interactive ONLY for Carlo (identity gate); everyone
  // else sees status. Hard gate: cannot sign until every in-scope invoice
  // in the quarter has a statement attached (§8). Server RLS independently
  // enforces that only Carlo's auth_id can INSERT.
  // =====================================================================
  function fetchSignoffs() {
    return authFetch(
      SB_REST + 'luciano_royalty_signoffs?select=*&deleted_at=is.null&order=agreed_at.asc&limit=10000',
      { headers: pcAuth.headers() }
    ).then(function (rows) {
      var map = {};
      (rows || []).forEach(function (r) {
        // asc order → last write wins = the latest sign-off for that key.
        map[signoffKey(r.period_year, r.period_quarter, r.venue_scope)] = r;
      });
      return map;
    });
  }

  function fetchReady() {
    return authFetch(
      SB_REST + 'luciano_quarter_ready?select=*&deleted_at=is.null&order=marked_at.asc&limit=10000',
      { headers: pcAuth.headers() }
    ).then(function (rows) {
      var map = {};
      (rows || []).forEach(function (r) {
        map[signoffKey(r.period_year, r.period_quarter, r.venue_scope)] = r;
      });
      return map;
    });
  }

  function signoffKey(year, q, scope) { return year + ':' + q + ':' + (scope || 'all'); }

  /** Identity gate. Server RLS is the real enforcement; this only governs
      whether the interactive control is shown. */
  function isCarlo() {
    try {
      var u = (pcAuth && pcAuth.getUser) ? pcAuth.getUser() : null;
      if (u) {
        if (u.auth_id && u.auth_id === CARLO_AUTH_ID) return true;
        if (u.email && String(u.email).toLowerCase() === 'carloluciano@camdenco.com') return true;
      }
    } catch (e) {}
    return false;
  }

  /** Admin gate for "mark ready for sign-off" (Keith). RLS is the real
      enforcement; this only governs whether the control is shown. */
  function isKeith() {
    try {
      var u = (pcAuth && pcAuth.getUser) ? pcAuth.getUser() : null;
      if (u) {
        if (u.auth_id && u.auth_id === KEITH_AUTH_ID) return true;
        if (u.email && String(u.email).toLowerCase() === 'keith@camdenco.com') return true;
      }
    } catch (e) {}
    return false;
  }

  /** Coverage for a (venue-filtered) quarter: how many in-scope invoices
      have at least one statement attached. */
  function quarterCoverage(q) {
    var ids = [], covered = 0;
    q.events.forEach(function (ev) {
      ev.invoices.forEach(function (iv) {
        ids.push(iv.invoice_id);
        if ((state.statements[iv.invoice_id] || []).length) covered++;
      });
    });
    return { total: ids.length, covered: covered, ids: ids, complete: ids.length > 0 && covered === ids.length };
  }

  function buildRateNote(events) {
    var has10 = false, has6 = false;
    events.forEach(function (ev) { if (ev.rate === 0.10) has10 = true; else has6 = true; });
    var parts = [];
    if (has10) parts.push('10% Mann/FMP');
    if (has6) parts.push('6% elsewhere');
    return parts.join(' \u00b7 ');
  }

  /** True if the live rollup differs from the frozen sign-off figures. */
  function figuresChanged(so, q) {
    return Math.abs(Number(so.sales_total) - q.sales) > 0.005 ||
           Math.abs(Number(so.fees_total) - q.fees) > 0.005 ||
           Math.abs(Number(so.commissionable) - q.base) > 0.005 ||
           Math.abs(Number(so.royalty_due) - q.due) > 0.005;
  }

  /** A quarter is CURRENTLY ready only if an active ready row exists AND its
      frozen figures still match the live rollup. Any drift auto-un-readies
      it (the gate falls back to "not ready"); the row stays for the record
      until Keith re-marks, which supersedes via soft-delete + new insert. */
  function readyState(q) {
    var row = state.ready[signoffKey(q.year, q.q, state.filters.venue)];
    if (!row) return { row: null, current: false, stale: false };
    var stale = figuresChanged(row, q);   // same fingerprint comparison as sign-off
    return { row: row, current: !stale, stale: stale };
  }

  /** Mark the current quarter+scope ready (Keith only). Gated on coverage. */
  function markReady(q) {
    var scope = state.filters.venue;
    var cov = quarterCoverage(q);
    if (!cov.complete) { showToast('Attach every statement first', 2600); return; }

    var existing = state.ready[signoffKey(q.year, q.q, scope)];
    var body = {
      period_year: q.year,
      period_quarter: q.q,
      venue_scope: scope,
      sales_total: q.sales,
      fees_total: q.fees,
      commissionable: q.base,
      royalty_due: q.due,
      covered_invoice_ids: cov.ids,
      marked_by: currentActor()
    };
    var jsonHdrs = Object.assign({}, pcAuth.headers(), {
      'Content-Type': 'application/json', 'Prefer': 'return=minimal'
    });
    var repHdrs = Object.assign({}, pcAuth.headers(), {
      'Content-Type': 'application/json', 'Prefer': 'return=representation'
    });

    // If a stale ready row exists, soft-delete it first (re-mark = supersede),
    // since the unique index allows only one active row per period+scope.
    var pre = existing
      ? AR_softDeleteReady(existing.id)
      : Promise.resolve();

    pre
      .then(function () {
        return authFetch(SB_REST + 'luciano_quarter_ready', {
          method: 'POST', headers: repHdrs, body: JSON.stringify(body)
        });
      })
      .then(function (rows) {
        var row = (rows && rows[0]) || body;
        state.ready[signoffKey(q.year, q.q, scope)] = row;
        rerender();
        showToast('Marked Q' + q.q + ' ' + q.year + ' ready for sign-off', 2200);
      })
      .catch(function (e) {
        if (e && e.authFailed) { handleAuthFailure(); return; }
        var msg = (e && e.message) ? e.message : '';
        if (msg.indexOf('row-level security') !== -1 || msg.indexOf('42501') !== -1) {
          showToast('Only Keith can mark a quarter ready', 3200);
        } else if (msg.indexOf('duplicate') !== -1 || msg.indexOf('23505') !== -1) {
          showToast('Already marked \u2014 refreshing', 2400);
          fetchReady().then(function (m) { state.ready = m; rerender(); });
        } else {
          showToast('Could not mark ready', 3000);
        }
        console.error('[Luciano] markReady failed:', e);
      });

    void jsonHdrs;
  }

  /** Soft-delete a ready row (un-mark). Returns a promise. */
  function AR_softDeleteReady(rowId) {
    var hdrs = Object.assign({}, pcAuth.headers(), {
      'Content-Type': 'application/json', 'Prefer': 'return=minimal'
    });
    return authFetch(
      SB_REST + 'luciano_quarter_ready?id=eq.' + encodeURIComponent(rowId) + '&deleted_at=is.null',
      {
        method: 'PATCH', headers: hdrs,
        body: JSON.stringify({ deleted_at: new Date().toISOString(), deleted_by: currentActor() })
      }
    );
  }

  /** Un-mark the current quarter+scope (Keith only). */
  function unmarkReady(q) {
    var key = signoffKey(q.year, q.q, state.filters.venue);
    var row = state.ready[key];
    if (!row) return;
    AR_softDeleteReady(row.id)
      .then(function () {
        delete state.ready[key];
        rerender();
        showToast('Un-marked \u2014 back to building', 2000);
      })
      .catch(function (e) {
        if (e && e.authFailed) { handleAuthFailure(); return; }
        var msg = (e && e.message) ? e.message : '';
        if (msg.indexOf('row-level security') !== -1 || msg.indexOf('42501') !== -1) {
          showToast('Only Keith can un-mark', 3000);
        } else {
          showToast('Could not un-mark', 3000);
        }
        console.error('[Luciano] unmarkReady failed:', e);
      });
  }

  /** Verbatim attestation text (§7.2 draft — pending counsel, §9). */
  function buildAttestationText(year, q, scope, figs) {
    var meta = quarterMeta(year, q);
    var period = 'Q' + q + ' ' + year + ' (' + meta.rangeLabel + ')';
    if (scope && scope !== 'all') period += ' \u2014 ' + scope + ' only';
    return 'I, Carlo Luciano, on behalf of KBC Concessions LLC d/b/a Luciano\u2019s Pizza CO, ' +
      'acknowledge that I have received the client commission statements underlying the ' +
      'Luciano\u2019s-branded sales for ' + period + ', and that the figures shown on this page ' +
      'accurately reflect those statements. I agree that the royalty for this period is properly ' +
      'calculated on Gross Sales defined as the net payout actually received by Popcorn Chez LLC ' +
      'from the client for Luciano\u2019s-branded sales, less Luciano\u2019s credit card fees, ' +
      'consistent with the parties\u2019 shared understanding and course of dealing under the ' +
      'License Agreement. I confirm the figures shown \u2014 net payout received ' + fmtMoney(figs.sales) +
      ', Luciano\u2019s credit card fees ' + fmtMoney(figs.fees) + ', commissionable base ' +
      fmtMoney(figs.base) + ', royalty due ' + fmtMoney(figs.due) + ' \u2014 are true and accurate, ' +
      'and that this acknowledgment authorizes remittance of the amount due.';
  }

  /** HTML for the sign-off slot in a quarter band, scoped to current filter.
      Flow: Building → Ready (Keith) → Signed (Carlo). Coverage gates "ready";
      "ready" gates Carlo's sign-off. */
  function renderSignoffSlotHtml(q) {
    var scope = state.filters.venue;
    var so = state.signoffs[signoffKey(q.year, q.q, scope)];
    var carlo = isCarlo();
    var keith = isKeith();

    // ---- Signed state takes precedence ----
    if (so) {
      var when = so.agreed_at ? fmtDateLong(String(so.agreed_at).substring(0, 10)) : '';
      var html = '<span class="luc-signoff-pill is-signed">\u2713 Signed</span>' +
        '<span class="luc-signoff-meta">' + esc(so.agreed_by_name || 'KBC') + ' \u00b7 ' + esc(when) + '</span>';
      if (figuresChanged(so, q)) {
        html += '<span class="luc-signoff-changed">figures changed since sign-off</span>';
        if (carlo) {
          html += '<button type="button" class="luc-signoff-btn is-resign" data-action="resign" ' +
            'data-year="' + q.year + '" data-quarter="' + q.q + '" data-supersede="' + esc(so.id) + '">Re-sign</button>';
        }
      }
      return html;
    }

    var rs = readyState(q);
    var cov = quarterCoverage(q);

    // ---- Ready state (marked by Keith, figures still current) ----
    if (rs.current) {
      var rwhen = rs.row.marked_at ? fmtDateLong(String(rs.row.marked_at).substring(0, 10)) : '';
      var out = '<span class="luc-signoff-pill is-ready">Ready for KBC</span>' +
        '<span class="luc-signoff-meta">marked ' + esc(rwhen) + '</span>';
      if (keith) {
        out += '<button type="button" class="luc-ready-undo" data-action="unmark-ready" ' +
          'data-year="' + q.year + '" data-quarter="' + q.q + '">un-mark</button>';
      }
      if (carlo) {
        out += '<button type="button" class="luc-signoff-btn" data-action="signoff" ' +
          'data-year="' + q.year + '" data-quarter="' + q.q + '">Sign off</button>';
      } else if (!keith) {
        out = '<span class="luc-signoff-pill is-ready">Ready for KBC</span>' +
          '<span class="luc-signoff-meta">awaiting KBC sign-off</span>';
      }
      return out;
    }

    // ---- Building state (not ready, or ready went stale) ----
    var staleNote = rs.stale
      ? '<span class="luc-signoff-changed">figures changed since marked \u2014 re-mark needed</span>'
      : '';

    if (keith) {
      if (cov.complete) {
        return staleNote +
          '<button type="button" class="luc-ready-btn" data-action="mark-ready" ' +
          'data-year="' + q.year + '" data-quarter="' + q.q + '">Mark ready for sign-off</button>';
      }
      return staleNote +
        '<button type="button" class="luc-ready-btn" disabled>Mark ready for sign-off</button>' +
        '<span class="luc-signoff-meta">' + cov.covered + ' of ' + cov.total + ' statements attached</span>';
    }

    // Non-Keith, non-signed, not ready → plain status.
    return '<span class="luc-signoff-pill is-unsigned">Not ready</span>' +
      '<span class="luc-signoff-meta">in progress</span>';
  }

  function findVisibleQuarter(year, q) {
    var qs = visibleQuarters();
    for (var i = 0; i < qs.length; i++) {
      if (qs[i].year === year && qs[i].q === q) return qs[i];
    }
    return null;
  }

  function figRow(label, val, strong) {
    return '<tr' + (strong ? ' class="is-strong"' : '') + '><td>' + esc(label) + '</td><td>' + esc(val) + '</td></tr>';
  }

  function closeSignoffModal() {
    var m = document.getElementById('lucSignoffModal');
    if (m && m.parentNode) m.parentNode.removeChild(m);
  }

  function openSignoffModal(q, supersedeId) {
    var scope = state.filters.venue;
    var cov = quarterCoverage(q);
    if (!cov.complete) { showToast('Attach every statement first', 2600); return; }

    var figs = { sales: q.sales, fees: q.fees, base: q.base, due: q.due };
    var scopeLabel = (scope && scope !== 'all') ? (' \u00b7 ' + esc(scope) + ' only') : '';
    var text = buildAttestationText(q.year, q.q, scope, figs);

    var backdrop = document.createElement('div');
    backdrop.className = 'luc-modal-backdrop';
    backdrop.id = 'lucSignoffModal';
    backdrop.innerHTML =
      '<div class="luc-modal-card" role="dialog" aria-labelledby="lucSignTitle">' +
        '<div class="luc-modal-head">' +
          '<div class="luc-modal-title" id="lucSignTitle">Sign off Q' + q.q + ' ' + q.year + scopeLabel + '</div>' +
          '<button type="button" class="luc-modal-close" data-action="close-signoff" aria-label="Close">\u00d7</button>' +
        '</div>' +
        '<div class="luc-modal-body">' +
          '<table class="luc-sign-figs"><tbody>' +
            figRow('Luciano sales', fmtMoney(figs.sales)) +
            figRow('Less CC fees', fmtMoney(figs.fees)) +
            figRow('Commissionable', fmtMoney(figs.base)) +
            figRow('Royalty due', fmtMoney(figs.due), true) +
          '</tbody></table>' +
          '<div class="luc-sign-coverage">\u2713 All ' + cov.total + ' ' +
            (cov.total === 1 ? 'statement' : 'statements') + ' attached for this quarter.</div>' +
          '<div class="luc-sign-attest-label">Attestation</div>' +
          '<div class="luc-sign-attest">' + esc(text) + '</div>' +
          '<div class="luc-sign-legal">Provisional wording \u2014 pending review by counsel (\u00a79). ' +
            'Signing records your acknowledgment; it is not a substitute for legal advice.</div>' +
        '</div>' +
        '<div class="luc-modal-foot">' +
          '<button type="button" class="luc-btn luc-btn-secondary" data-action="close-signoff">Cancel</button>' +
          '<button type="button" class="luc-btn luc-btn-primary" id="lucSignConfirm">I, Carlo Luciano, confirm &amp; sign</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(backdrop);

    backdrop.addEventListener('click', function (ev) {
      if (ev.target === backdrop) { closeSignoffModal(); return; }
      if (ev.target.closest && ev.target.closest('[data-action="close-signoff"]')) closeSignoffModal();
    });
    var confirmBtn = document.getElementById('lucSignConfirm');
    if (confirmBtn) confirmBtn.addEventListener('click', function () {
      submitSignoff(q, supersedeId, confirmBtn);
    });
  }

  function submitSignoff(q, supersedeId, confirmBtn) {
    var scope = state.filters.venue;
    var cov = quarterCoverage(q);
    if (!cov.complete) { showToast('Attach every statement first', 2600); return; }
    if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.textContent = 'Signing\u2026'; }

    var figs = { sales: q.sales, fees: q.fees, base: q.base, due: q.due };
    var body = {
      period_year: q.year,
      period_quarter: q.q,
      venue_scope: scope,
      agreed_by_auth_id: CARLO_AUTH_ID,
      agreed_by_name: 'Carlo Luciano',
      attestation_text: buildAttestationText(q.year, q.q, scope, figs),
      sales_total: q.sales,
      fees_total: q.fees,
      commissionable: q.base,
      royalty_due: q.due,
      rate_note: buildRateNote(q.events),
      covered_invoice_ids: cov.ids,
      created_by: currentActor()
    };
    if (supersedeId) body.supersedes_id = supersedeId;

    var hdrs = Object.assign({}, pcAuth.headers(), {
      'Content-Type': 'application/json', 'Prefer': 'return=representation'
    });

    authFetch(SB_REST + 'luciano_royalty_signoffs', {
      method: 'POST', headers: hdrs, body: JSON.stringify(body)
    })
    .then(function (rows) {
      var row = (rows && rows[0]) || body;
      state.signoffs[signoffKey(q.year, q.q, scope)] = row;
      closeSignoffModal();
      rerender();
      showToast('Signed off Q' + q.q + ' ' + q.year, 2200);
    })
    .catch(function (e) {
      if (e && e.authFailed) { handleAuthFailure(); return; }
      var msg = (e && e.message) ? e.message : '';
      if (msg.indexOf('duplicate') !== -1 || msg.indexOf('unique') !== -1 || msg.indexOf('23505') !== -1) {
        showToast('Already signed \u2014 refreshing', 2600);
        fetchSignoffs().then(function (m) { state.signoffs = m; closeSignoffModal(); rerender(); });
        return;
      }
      if (msg.indexOf('row-level security') !== -1 || msg.indexOf('42501') !== -1) {
        showToast('Only Carlo Luciano can sign off', 3200);
      } else {
        showToast('Sign-off failed', 3000);
      }
      console.error('[Luciano] signoff failed:', e);
      if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.innerHTML = 'I, Carlo Luciano, confirm &amp; sign'; }
    });
  }

  // =====================================================================
  // WIRING
  // =====================================================================
  function rerender() {
    renderCards();
    renderQuarters();
  }

  function wireFilters() {
    var vSel = document.getElementById('filterVenue');
    var pSel = document.getElementById('filterPeriod');
    if (vSel) vSel.addEventListener('change', function () {
      state.filters.venue = vSel.value; rerender();
    });
    if (pSel) pSel.addEventListener('change', function () {
      state.filters.period = pSel.value; rerender();
    });
  }

  function wirePrint() {
    var btn = document.getElementById('btnPrintQuarter');
    if (btn) btn.addEventListener('click', function () {
      showToast('Per-quarter print lands in the next session', 2600);
    });
  }

  function wireExpand() {
    var host = document.getElementById('lucQuarters');
    if (!host) return;
    host.addEventListener('click', function (ev) {
      var t = ev.target;
      if (!t || !t.closest) return;

      // Statement affordances (upload / view) fire first and stop here.
      var actionEl = t.closest('[data-action]');
      if (actionEl) {
        ev.preventDefault();
        ev.stopPropagation();
        var action = actionEl.getAttribute('data-action');
        if (action === 'upload-stmt') {
          startUpload(actionEl.getAttribute('data-invoice-id'));
        } else if (action === 'view-stmt') {
          var win = window.open('', '_blank');  // opened inside the user gesture
          viewStatement(actionEl.getAttribute('data-file-path'), win);
        } else if (action === 'signoff' || action === 'resign') {
          var year = parseInt(actionEl.getAttribute('data-year'), 10);
          var qn = parseInt(actionEl.getAttribute('data-quarter'), 10);
          var qObj = findVisibleQuarter(year, qn);
          if (qObj) openSignoffModal(qObj, action === 'resign' ? actionEl.getAttribute('data-supersede') : null);
        } else if (action === 'mark-ready' || action === 'unmark-ready') {
          var ry = parseInt(actionEl.getAttribute('data-year'), 10);
          var rq = parseInt(actionEl.getAttribute('data-quarter'), 10);
          var rObj = findVisibleQuarter(ry, rq);
          if (rObj) { if (action === 'mark-ready') markReady(rObj); else unmarkReady(rObj); }
        }
        return;
      }

      // Otherwise: expand / collapse the event's stand breakdown.
      var row = t.closest('.luc-event-row');
      if (!row) return;
      var key = row.getAttribute('data-event-key');
      if (!key) return;
      var detail = host.querySelector('.luc-stands-row[data-event-key="' + key.replace(/"/g, '') + '"]');
      var nowOpen = row.classList.toggle('is-open');
      if (detail) detail.hidden = !nowOpen;
    });
  }

  // =====================================================================
  // BOOT
  // =====================================================================
  function onAuthReady(user) {
    pcActivity.init('luciano-payments');
    document.body.classList.remove('pre-auth');

    wireFilters();
    wirePrint();
    wireExpand();

    var catalogReady = (typeof pcCatalog !== 'undefined' && pcCatalog.ready)
      ? pcCatalog.ready() : Promise.resolve();

    Promise.all([fetchLucianoLines(), catalogReady])
      .then(function (results) {
        var lines = results[0] || [];
        return Promise.all([
          fetchEventNames(collectEventIds(lines)),
          fetchStatements(collectInvoiceIds(lines)),
          fetchSignoffs(),
          fetchReady()
        ]).then(function (r2) {
          state.eventNames = r2[0];
          state.statements = r2[1];
          state.signoffs = r2[2];
          state.ready = r2[3];
          buildModel(lines);
          renderFilters();
          renderWarning();
          rerender();
        });
      })
      .catch(function (e) {
        if (e && e.authFailed) { handleAuthFailure(); return; }
        console.error('[Luciano] load failed:', e);
        var loading = document.getElementById('lucLoading');
        if (loading) { loading.hidden = false; loading.textContent = 'Could not load Luciano\u2019s sales from A/R.'; }
        showToast('Could not load data');
      });

    void user;
  }

  if (typeof pcAuth === 'undefined' || !pcAuth.require) {
    document.body.innerHTML =
      '<div style="padding:60px 22px;font-family:DM Sans,sans-serif;">' +
      '<h1>Authentication unavailable</h1>' +
      '<p>pc-auth.js failed to load. Check that it is reachable at <code>/pc-auth.js</code>.</p></div>';
  } else {
    pcAuth.require({ pageSlug: 'luciano-payments', onReady: onAuthReady });
  }

})();
</script>
