<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popcorn Chez — Hiring Snapshot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0ec; min-height: 100vh; }

header {
  background: #fff; border-bottom: 1px solid #e8e8e4;
  padding: 0 32px; display: flex; align-items: center;
  justify-content: space-between; height: 64px;
  position: sticky; top: 0; z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.back-link { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #999; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
.back-link:hover { color: #1a1a1a; }
.hdivider { width: 1px; height: 20px; background: #e8e8e4; }
.header-title { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
.header-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: #1a1a1a; color: white; padding: 3px 8px; border-radius: 20px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-user { font-size: 12px; color: #999; font-weight: 600; }
.sign-out-btn { font-size: 11px; font-weight: 700; color: #999; background: none; border: 1px solid #e8e8e4; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.sign-out-btn:hover { color: #1a1a1a; border-color: #1a1a1a; }

.page-body { padding: 20px 16px 60px; }

#pcpeek { max-width: 520px; margin: 0 auto; color: #222; }
.page-sub { font-size: 13px; color: #888; margin: 0 0 18px; }
.stat-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.stat-box { flex: 1; min-width: 70px; background: #fff; border-radius: 8px; padding: 8px 12px; text-align: center; border: 1px solid #eee; }
.stat-num { font-size: 20px; font-weight: 600; }
.stat-lbl { font-size: 11px; color: #888; margin-top: 1px; }
#pcpeek input[type=text] { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; background: #fff; color: #222; margin-bottom: 10px; }
#pcpeek input[type=text]:focus { outline: none; border-color: #2d7dd2; }
.filter-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.pill { font-size: 12px; padding: 4px 12px; border-radius: 20px; cursor: pointer; border: 1px solid #ddd; background: #f5f5f5; color: #555; white-space: nowrap; user-select: none; }
.pill.active { background: #2d7dd2; color: #fff; border-color: #2d7dd2; }
.cand-row { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; }
.cand-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 2px; }
.cand-name { font-size: 14px; font-weight: 500; color: #222; }
.cand-meta { font-size: 12px; color: #888; margin-bottom: 7px; }
.badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; margin-left: 4px; vertical-align: middle; }
.badge-applied { background: #e8eaf6; border: 1px solid #9fa8da; color: #283593; }
.badge-contacted { background: #e3f2fd; border: 1px solid #90caf9; color: #0d47a1; }
.badge-interview-scheduled { background: #fff8e1; border: 1px solid #ffe082; color: #7a5c00; }
.badge-onboarding { background: #e8f5e9; border: 1px solid #a5d6a7; color: #1b5e20; }
.badge-active { background: #1D9E75; border: 1px solid #0F6E56; color: #fff; }
.badge-minor { background: #fff3cd; border: 1px solid #ffc107; color: #856404; }
.progress-bar-bg { height: 5px; background: #eee; border-radius: 3px; overflow: hidden; margin-bottom: 3px; }
.progress-bar-fill { height: 100%; border-radius: 3px; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: #888; }
.section-header { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; padding-bottom: 6px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
.section-note { font-size: 10px; font-weight: 400; color: #aaa; text-transform: none; letter-spacing: 0; }
.empty-state { text-align: center; padding: 30px 20px; color: #aaa; font-size: 13px; }
.count-line { font-size: 12px; color: #aaa; margin-top: 8px; }
.spinner-wrap { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

@media (max-width: 600px) {
  header { padding: 0 16px; height: auto; flex-wrap: wrap; padding: 12px 16px; gap: 10px; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="/" class="back-link">&#8592; Toolkit</a>
    <div class="hdivider"></div>
    <span class="header-title">Hiring Snapshot</span>
    <span class="header-badge">Read Only</span>
  </div>
  <div class="header-right" id="header-right"></div>
</header>

<div class="page-body">
  <div id="pcpeek">
    <div id="pcpeek-main"></div>
  </div>
</div>

<script src="/pc-auth.js"></script>
<script>
var SUPABASE_URL = 'https://aoazlttdjowhlfcksoyl.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvYXpsdHRkam93aGxmY2tzb3lsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzU4MjMsImV4cCI6MjA5MDg1MTgyM30.tagP_88g7R3d_p7a4Kp0NirnJgkAR5AQQImCt414SJg';

var ACTIVE_WINDOW_DAYS = 14;
var pcAllCandidates = [];
var pcFilter = 'all';
var pcSearch = '';
var pcLoading = true;

function apiHeaders() {
  try { var h = pcAuth.headers(); if (h) return h; } catch(e) {}
  return { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };
}

function setupHeader() {
  var el = document.getElementById('header-right');
  try {
    var user = pcAuth.getUser();
    if (user) {
      el.innerHTML = '<span class="header-user">' + user.display_name + '</span><button class="sign-out-btn" onclick="pcAuth.signOut()">Sign out</button>';
    }
  } catch(e) {}
}

function sbFetch(path) {
  return fetch(SUPABASE_URL + path, {
    headers: apiHeaders()
  }).then(function(r) { return r.json(); }).catch(function() { return []; });
}

function loadAll() {
  pcLoading = true;
  render();
  sbFetch('/rest/v1/candidates?select=*&order=applied_at.desc').then(function(data) {
    pcAllCandidates = data || [];
    pcLoading = false;
    render();
  });
}

function daysSince(ts) {
  if (!ts) return 9999;
  var diff = new Date() - new Date(ts);
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

function formatDateShort(ts) {
  if (!ts) return '--';
  var d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function calcProgress(c) {
  var stage = c.pipeline_stage;
  if (stage === 'applied') return { pct: 5, label: 'Applied -- pending review', color: '#B4B2A9' };
  if (stage === 'contacted') return { pct: 15, label: 'Contacted', color: '#d97706' };
  if (stage === 'interview_scheduled') return { pct: 25, label: 'Interview scheduled', color: '#d97706' };
  if (stage === 'active') return { pct: 100, label: 'Ready to schedule', color: '#1D9E75' };

  var steps = ['profile_complete','w4_complete','direct_deposit_complete','i9_submitted','i9_verified'];
  var done = 0;
  for (var i = 0; i < steps.length; i++) {
    if (c[steps[i]]) done++;
  }
  var pct = 30 + Math.round((done / 5) * 60);
  var color = done >= 4 ? '#1D9E75' : '#378ADD';
  return { pct: pct, label: done + ' of 5 steps done', color: color };
}

function sourceBadgeHtml(hear) {
  if (!hear) return '';
  var style = 'background:#e3f2fd;border:1px solid #90caf9;color:#0d47a1;';
  if (hear === 'Indeed') style = 'background:#fff8e1;border:1px solid #ffe082;color:#7a5c00;';
  else if (hear === 'Friend or Family') style = 'background:#eaf6ec;border:1px solid #7dc98a;color:#1e6b2e;';
  else if (hear === 'Other') style = 'background:#f3e8ff;border:1px solid #d8b4fe;color:#6b21a8;';
  return '<span class="badge" style="' + style + '">' + hear + '</span>';
}

function stageBadgeHtml(stage) {
  var cls = 'badge-' + stage.replace(/_/g, '-');
  var label = 'Applied';
  if (stage === 'contacted') label = 'Contacted';
  else if (stage === 'interview_scheduled') label = 'Interview';
  else if (stage === 'onboarding') label = 'Onboarding';
  else if (stage === 'active') label = 'Active';
  return '<span class="badge ' + cls + '">' + label + '</span>';
}

function getVisibleCandidates() {
  var visible = [];
  for (var i = 0; i < pcAllCandidates.length; i++) {
    var c = pcAllCandidates[i];
    var stage = c.pipeline_stage;
    if (stage === 'rejected' || stage === 'inactive') continue;
    if (stage === 'active' && daysSince(c.stage_updated_at) > ACTIVE_WINDOW_DAYS) continue;
    visible.push(c);
  }
  return visible;
}

function getFiltered(candidates) {
  var out = [];
  for (var i = 0; i < candidates.length; i++) {
    var c = candidates[i];
    var matchFilter = pcFilter === 'all' || c.pipeline_stage === pcFilter;
    var search = pcSearch.toLowerCase();
    var fullName = (c.first_name + ' ' + c.last_name).toLowerCase();
    var matchSearch = !pcSearch || fullName.indexOf(search) > -1;
    if (matchFilter && matchSearch) out.push(c);
  }
  return out;
}

function countStage(candidates, stage) {
  var n = 0;
  for (var i = 0; i < candidates.length; i++) {
    if (candidates[i].pipeline_stage === stage) n++;
  }
  return n;
}

function renderRow(c) {
  var prog = calcProgress(c);
  var minor = c.is_minor ? '<span class="badge badge-minor">Minor</span>' : '';
  var source = sourceBadgeHtml(c.hear_about_us);
  var stageBadge = stageBadgeHtml(c.pipeline_stage);
  var roleStr = c.roles && c.roles.length > 0 ? c.roles[0] : '';
  var venueStr = c.assigned_venues && c.assigned_venues.length > 0 ? ' &middot; ' + c.assigned_venues[0] : '';
  var dateStr = formatDateShort(c.applied_at);

  return '<div class="cand-row">' +
    '<div class="cand-top">' +
    '<div class="cand-name">' + c.first_name + ' ' + c.last_name + minor + source + '</div>' +
    stageBadge +
    '</div>' +
    '<div class="cand-meta">' + dateStr + (roleStr ? ' &middot; ' + roleStr : '') + venueStr + '</div>' +
    '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + prog.pct + '%;background:' + prog.color + ';"></div></div>' +
    '<div class="progress-label"><span>' + prog.label + '</span><span>' + prog.pct + '%</span></div>' +
    '</div>';
}

function render() {
  var main = document.getElementById('pcpeek-main');
  if (pcLoading) { main.innerHTML = '<div class="spinner-wrap">Loading...</div>'; return; }
  var searchEl = document.getElementById('pcpeek-search');
  if (!searchEl) {
    main.innerHTML = renderMain();
  } else {
    document.getElementById('pcpeek-list').innerHTML = renderCandidateList();
    updatePeekStats();
    updatePeekPills();
  }
}

function renderMain() {
  if (pcLoading) {
    return '<div class="spinner-wrap">Loading...</div>';
  }

  var html = '<p class="page-sub">Read only &middot; Newly active candidates shown for 14 days</p>';
  html += '<div class="stat-row" id="pcpeek-stats"></div>';
  html += '<input type="text" id="pcpeek-search" placeholder="Search by name..." value="' + pcSearch.replace(/"/g, '&quot;') + '" oninput="pcPeekSearch(this.value)" />';
  html += '<div class="filter-pills" id="pcpeek-pills"></div>';
  html += '<div id="pcpeek-list">' + renderCandidateList() + '</div>';
  return html;
}

function updatePeekStats() {
  var el = document.getElementById('pcpeek-stats');
  if (!el) return;
  var visible = getVisibleCandidates();
  var inProgress = countStage(visible, 'contacted') + countStage(visible, 'interview_scheduled');
  var onboarding = countStage(visible, 'onboarding');
  var active = countStage(visible, 'active');
  var applied = countStage(visible, 'applied');
  el.innerHTML =
    '<div class="stat-box"><div class="stat-num">' + visible.length + '</div><div class="stat-lbl">In pipeline</div></div>' +
    '<div class="stat-box"><div class="stat-num" style="color:#1D9E75;">' + active + '</div><div class="stat-lbl">Ready</div></div>' +
    '<div class="stat-box"><div class="stat-num" style="color:#378ADD;">' + onboarding + '</div><div class="stat-lbl">Onboarding</div></div>' +
    '<div class="stat-box"><div class="stat-num" style="color:#d97706;">' + inProgress + '</div><div class="stat-lbl">In progress</div></div>' +
    '<div class="stat-box"><div class="stat-num" style="color:#888;">' + applied + '</div><div class="stat-lbl">Applied</div></div>';
}

function updatePeekPills() {
  var el = document.getElementById('pcpeek-pills');
  if (!el) return;
  el.innerHTML =
    '<span class="pill' + (pcFilter === 'all' ? ' active' : '') + '" onclick="pcPeekFilter(\'all\')">All</span>' +
    '<span class="pill' + (pcFilter === 'active' ? ' active' : '') + '" onclick="pcPeekFilter(\'active\')">Ready</span>' +
    '<span class="pill' + (pcFilter === 'onboarding' ? ' active' : '') + '" onclick="pcPeekFilter(\'onboarding\')">Onboarding</span>' +
    '<span class="pill' + (pcFilter === 'interview_scheduled' ? ' active' : '') + '" onclick="pcPeekFilter(\'interview_scheduled\')">Interview</span>' +
    '<span class="pill' + (pcFilter === 'contacted' ? ' active' : '') + '" onclick="pcPeekFilter(\'contacted\')">Contacted</span>' +
    '<span class="pill' + (pcFilter === 'applied' ? ' active' : '') + '" onclick="pcPeekFilter(\'applied\')">Applied</span>';
}

function renderCandidateList() {
  var visible = getVisibleCandidates();
  var filtered = getFiltered(visible);
  var html = '';

  if (filtered.length === 0) {
    return '<div class="empty-state">No candidates match this filter.</div>';
  }

  var activeList = [];
  var onboardingList = [];
  var inProgressList = [];
  var appliedList = [];

  for (var i = 0; i < filtered.length; i++) {
    var c = filtered[i];
    var s = c.pipeline_stage;
    if (s === 'active') activeList.push(c);
    else if (s === 'onboarding') onboardingList.push(c);
    else if (s === 'contacted' || s === 'interview_scheduled') inProgressList.push(c);
    else if (s === 'applied') appliedList.push(c);
  }

  function sortByDate(arr, field) {
    return arr.sort(function(a, b) {
      var da = a[field] ? new Date(a[field]) : new Date(0);
      var db = b[field] ? new Date(b[field]) : new Date(0);
      return db - da;
    });
  }

  sortByDate(activeList, 'stage_updated_at');
  sortByDate(onboardingList, 'hired_at');
  sortByDate(inProgressList, 'applied_at');
  sortByDate(appliedList, 'applied_at');

  if (pcFilter === 'all') {
    if (activeList.length > 0) {
      html += '<div class="section-header">Ready to schedule <span class="section-note">last 14 days</span></div>';
      for (var a = 0; a < activeList.length; a++) html += renderRow(activeList[a]);
    }
    if (onboardingList.length > 0) {
      html += '<div class="section-header">Onboarding</div>';
      for (var o = 0; o < onboardingList.length; o++) html += renderRow(onboardingList[o]);
    }
    if (inProgressList.length > 0) {
      html += '<div class="section-header">In progress</div>';
      for (var p = 0; p < inProgressList.length; p++) html += renderRow(inProgressList[p]);
    }
    if (appliedList.length > 0) {
      html += '<div class="section-header">Applied -- pending review</div>';
      for (var ap = 0; ap < appliedList.length; ap++) html += renderRow(appliedList[ap]);
    }
  } else {
    for (var f = 0; f < filtered.length; f++) html += renderRow(filtered[f]);
  }

  html += '<div class="count-line">' + filtered.length + ' candidate' + (filtered.length !== 1 ? 's' : '') + '</div>';
  return html;
}

function pcPeekFilter(f) { pcFilter = f; render(); }
function pcPeekSearch(v) { pcSearch = v; var el = document.getElementById('pcpeek-list'); if (el) el.innerHTML = renderCandidateList(); }

pcAuth.init(function() { setupHeader(); });
loadAll();
</script>
</body>
</html>
