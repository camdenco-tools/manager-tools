<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Assistant (Beta) — Position Board</title>
<script src="/pc-auth.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f0f0ec;
  --card: #ffffff;
  --primary: #1a1a1a;
  --label: #666;
  --border: #e8e8e4;
  --border-strong: #d8d8d4;

  --green: #1D9E75;
  --green-light: #e8f7f2;
  --green-mid: #d0ecdf;
  --green-dark: #0F6E56;

  --red: #c0392b;
  --red-light: #fdecea;
  --red-border: #f0c8c4;

  --amber: #d97706;
  --amber-light: #fffbeb;
  --amber-border: #fcd34d;
  --amber-dark: #92400e;

  --blue: #378ADD;
  --blue-light: #E6F1FB;
  --blue-mid: #cfe1f4;
  --blue-dark: #0C447C;

  --purple: #7c3aed;
  --purple-light: #f3edff;
  --purple-mid: #e0d4fb;
  --purple-border: #d4c1fa;
  --purple-dark: #5b21b6;

  --slate: #475569;
  --slate-light: #f1f5f9;

  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
}

body {
  background: var(--bg);
  font-family: var(--font);
  color: var(--primary);
  font-size: 14px;
  line-height: 1.5;
  padding: 16px;
}
.shell { max-width: 1400px; margin: 0 auto; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 4px 16px; flex-wrap: wrap; gap: 12px;
}
.title-block { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.back-link {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--label);
  text-decoration: none; transition: color 0.15s;
}
.back-link:hover { color: var(--primary); }
.hdivider { width: 1px; height: 20px; background: var(--border); }
.title-text-wrap { display: flex; flex-direction: column; }
.title-block h1 {
  font-size: 20px; font-weight: 700; letter-spacing: -0.01em;
  display: inline-flex; align-items: center; gap: 10px;
}
.beta-tag {
  font-size: 9px; font-weight: 800;
  background: var(--primary); color: white;
  padding: 2px 7px; border-radius: 4px;
  letter-spacing: 0.06em;
}
.title-block .sub { font-size: 12px; color: var(--label); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-user { font-size: 12px; color: #999; font-weight: 500; }
.sign-out-btn {
  font-size: 11px; color: var(--red); background: none;
  border: 1px solid var(--red-border); padding: 4px 10px;
  border-radius: 6px; cursor: pointer; font-weight: 600;
}

.view-toggle {
  display: inline-flex; background: var(--card);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 3px; box-shadow: var(--shadow-sm); margin-bottom: 16px;
}
.view-toggle button, .view-toggle a {
  background: transparent; border: none;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  color: var(--label); border-radius: 7px; cursor: pointer;
  font-family: inherit; display: inline-flex; align-items: center;
  gap: 6px; transition: all 0.15s ease; text-decoration: none;
}
.view-toggle button:hover, .view-toggle a:hover { color: var(--primary); }
.view-toggle button.active { background: var(--primary); color: white; }
.view-toggle .pip {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: currentColor; opacity: 0.6;
}
.view-toggle .new-tag {
  font-size: 9px; font-weight: 800; padding: 1px 5px;
  border-radius: 3px; background: var(--purple); color: white;
  letter-spacing: 0.05em; margin-left: 2px;
}

.filter-strip {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px; margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.filter-strip .label {
  font-size: 11px; color: var(--label); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.filter-strip select, .filter-strip input[type=date] {
  font-family: inherit; font-size: 13px; border: 1px solid var(--border);
  border-radius: 7px; padding: 5px 9px; background: white; color: var(--primary);
}
.filter-strip .spacer { flex: 1; }
.role-toggle {
  display: inline-flex; background: var(--slate-light); border-radius: 6px;
  padding: 2px; font-size: 11px; font-weight: 700;
}
.role-toggle button {
  background: transparent; border: none; padding: 4px 10px;
  border-radius: 5px; cursor: pointer; color: var(--label); font-family: inherit;
}
.role-toggle button.active { background: var(--primary); color: white; }
.custom-range { display: none; gap: 6px; align-items: center; }
.custom-range.show { display: inline-flex; }

.day-group {
  border-top: 3px solid var(--primary);
  padding: 14px 4px 8px;
  display: flex; align-items: center; gap: 14px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.day-group h2 {
  font-size: 16px; font-weight: 800; letter-spacing: -0.01em;
}
/* Primary pill — sits right next to the date, bigger and bolder */
.day-pill-primary {
  font-size: 14px; font-weight: 800;
  padding: 6px 14px; border-radius: 8px;
  letter-spacing: -0.01em;
  border: 1.5px solid;
}
.day-pill-primary.green { background: var(--green-light); color: var(--green-dark); border-color: var(--green-mid); }
.day-pill-primary.amber { background: var(--amber-light); color: var(--amber-dark); border-color: var(--amber-border); }
.day-pill-primary.red { background: var(--red-light); color: var(--red); border-color: var(--red-border); }
.day-spacer { flex: 1; min-width: 8px; }
/* Secondary pills — multi-signup warnings sit in the gutter on the right */
.day-pills-secondary { display: flex; gap: 6px; align-items: center; }
.day-pill { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.day-pill.green { background: var(--green-light); color: var(--green-dark); }
.day-pill.amber { background: var(--amber-light); color: var(--amber-dark); }
.day-pill.red { background: var(--red-light); color: var(--red); }
.day-pill.warn {
  background: #fff3e0; color: var(--amber-dark);
  border: 1px dashed var(--amber-border);
}

.event-row {
  background: var(--card); border: 1px solid var(--border);
  border-left-width: 3px; border-radius: 10px;
  margin-bottom: 8px; overflow: hidden; box-shadow: var(--shadow-sm);
  transition: box-shadow 0.15s ease;
}
.event-row:hover { box-shadow: var(--shadow-md); }
.event-row.staffed { background: var(--green-light); border-left-color: var(--green); }
.event-row.submitted { background: var(--amber-light); border-left-color: var(--amber); }
.event-row.not-submitted { background: var(--red-light); border-left-color: var(--red); }
.event-row.expanded { box-shadow: var(--shadow-md); }

.event-head {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; cursor: pointer; flex-wrap: wrap;
}
.venue-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 44px; height: 24px; padding: 0 8px; border-radius: 5px;
  background: white; border: 1px solid var(--border-strong);
  font-size: 10px; font-weight: 800; letter-spacing: 0.04em;
  color: var(--slate); flex-shrink: 0;
}
.event-name { font-weight: 700; font-size: 14px; color: var(--primary); }
.event-row.staffed .event-name {
  text-decoration: line-through; text-decoration-thickness: 1px; color: #6a8b7e;
}
.event-time { font-size: 12px; color: var(--label); }
.status-tag {
  display: inline-block; font-size: 10px; font-weight: 800;
  letter-spacing: 0.05em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 4px;
}
.status-tag.staffed { background: var(--green); color: white; }
.status-tag.submitted { background: var(--amber); color: white; }
.status-tag.not-submitted { background: var(--red); color: white; }
.unresolved-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700;
  padding: 3px 8px; border-radius: 4px;
  background: var(--amber-light); color: var(--amber-dark);
  border: 1px solid var(--amber-border);
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.lock-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 700; color: var(--slate);
  background: var(--slate-light); padding: 3px 8px; border-radius: 4px;
}
.event-spacer { flex: 1; min-width: 12px; }

/* Dual coverage: signups on the left, filled on the right */
.coverage-dual {
  display: flex; gap: 14px; align-items: stretch;
}
.coverage-block {
  text-align: right; min-width: 110px;
  display: flex; flex-direction: column; justify-content: center;
}
.coverage-block.signups .coverage-count { color: var(--blue-dark); }
.coverage-block.signups.short .coverage-count { color: var(--red); }
.coverage-line {
  display: flex; align-items: baseline; gap: 5px; justify-content: flex-end;
}
.coverage-count { font-size: 15px; font-weight: 800; color: var(--primary); }
.coverage-sub {
  font-size: 9px; color: var(--label); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.coverage-bar {
  height: 4px; background: var(--slate-light); border-radius: 2px;
  overflow: hidden; margin-top: 4px; width: 100px; margin-left: auto;
}
.coverage-fill { height: 100%; border-radius: 2px; }
.coverage-fill.green { background: var(--green); }
.coverage-fill.amber { background: var(--amber); }
.coverage-fill.red { background: var(--red); }
.coverage-fill.blue { background: var(--blue); }

.btn {
  font-family: inherit; font-size: 12px; font-weight: 700;
  padding: 6px 12px; border-radius: 6px; cursor: pointer;
  border: 1px solid; white-space: nowrap;
}
.btn-print {
  background: white; border-color: var(--border-strong); color: var(--primary);
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-print:hover { background: #fafaf8; }
.chevron {
  background: none; border: none; cursor: pointer; padding: 4px;
  color: var(--label); font-size: 14px; transition: transform 0.2s ease;
}
.event-row.expanded .chevron { transform: rotate(180deg); }

.event-body {
  border-top: 1px solid var(--border);
  background: rgba(255,255,255,0.6); padding: 14px;
}

.workspace {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 14px;
  align-items: start;
}
@media (max-width: 800px) { .workspace { grid-template-columns: 1fr; } }

.available-panel {
  background: white; border: 1px solid var(--border);
  border-radius: 8px; padding: 12px;
  display: flex; flex-direction: column;
  position: sticky; top: 16px;
}
.panel-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.panel-title {
  font-size: 11px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--label);
}
.panel-count {
  font-size: 11px; font-weight: 700; color: var(--slate);
  background: var(--slate-light); padding: 2px 7px; border-radius: 10px;
}
.panel-search {
  width: 100%; border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 9px; font-size: 12px; font-family: inherit; margin-bottom: 8px;
}
.unplaced-strip {
  background: var(--amber-light); border: 1px solid var(--amber-border);
  border-radius: 6px; padding: 6px 9px;
  font-size: 11px; font-weight: 700; color: var(--amber-dark);
  margin-bottom: 8px;
}
.people-list {
  display: flex; flex-direction: column; gap: 4px;
  max-height: 600px; overflow-y: auto; padding-right: 2px;
}
.person-pill {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 10px; background: var(--blue-light);
  border: 1px solid var(--blue-mid); border-radius: 16px;
  cursor: grab; font-size: 12px; transition: all 0.1s ease;
  color: var(--blue-dark); font-weight: 600;
  user-select: none;
}
.person-pill[draggable=true]:hover { transform: translateX(2px); border-color: var(--blue); }
.person-pill.placed {
  background: var(--green-light); border-color: var(--green-mid);
  color: var(--green-dark); cursor: default;
}
.person-pill.placed:hover { transform: none; }
.person-pill.assigned-away {
  background: var(--slate-light); border-color: var(--border-strong);
  color: #888; cursor: default;
}
.person-pill.assigned-away:hover { transform: none; }
.person-pill.assigned-away .person-name {
  text-decoration: line-through; text-decoration-thickness: 1.5px;
}
.person-pill.multi {
  background: #fff3e0; border-color: var(--amber-border); color: var(--amber-dark);
}
.placed-here-tag {
  font-size: 9px; font-weight: 800;
  color: var(--green-dark); margin-left: auto;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.assigned-away-tag {
  font-size: 10px; font-weight: 700; color: var(--slate);
  background: white; border: 1px solid var(--border-strong);
  padding: 1px 6px; border-radius: 8px; margin-left: auto;
  cursor: pointer;
}
.assigned-away-tag:hover { background: var(--bg); border-color: var(--label); }
.signup-multi {
  font-size: 9px; font-weight: 800;
  background: var(--amber); color: white;
  padding: 1px 5px; border-radius: 8px; margin-left: auto;
}
.person-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.summary-bar {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  padding: 10px 14px; margin-bottom: 12px;
  background: white; border: 1px solid var(--border); border-radius: 8px;
}
.summary-bar .sb-label {
  font-size: 11px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--label);
}
.summary-chip {
  display: inline-flex; align-items: baseline; gap: 5px;
  font-size: 12px; font-weight: 700;
}
.summary-chip .num { font-size: 14px; font-weight: 800; }
.summary-chip.warn .num { color: var(--amber-dark); }
.summary-chip.ok .num { color: var(--green-dark); }
.summary-chip.neutral .num { color: var(--primary); }
.summary-chip .denom { color: var(--label); font-weight: 600; }
.summary-chip-label { font-size: 11px; color: var(--label); font-weight: 600; }
.audit-link {
  font-size: 11px; font-weight: 700;
  color: var(--blue-dark); text-decoration: underline; cursor: pointer;
  background: none; border: none; font-family: inherit;
}

.stands-grid {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
}

.stand-card {
  background: white; border: 1px solid var(--border);
  border-radius: 8px; padding: 12px;
  display: flex; flex-direction: column;
}
.stand-card.drag-over { background: var(--blue-light); border-color: var(--blue); }
.stand-card-head { padding-bottom: 8px; margin-bottom: 8px; border-bottom: 2px solid var(--primary); }
.stand-card-name {
  font-weight: 800; font-size: 13px; letter-spacing: -0.01em; color: var(--primary);
  display: flex; align-items: center; justify-content: space-between;
}
.stand-fill-tag {
  font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px;
}
.stand-fill-tag.full { background: var(--green-light); color: var(--green-dark); }
.stand-fill-tag.partial { background: var(--amber-light); color: var(--amber-dark); }
.stand-fill-tag.empty { background: var(--red-light); color: var(--red); }
.stand-fill-tag.over { background: var(--red-light); color: var(--red); border: 1px solid var(--red-border); }

/* Over-staffing badge on the role header — shown when a manager reduces
   headcount in event planning after people were already placed. */
.role-over-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 9px; font-weight: 800; letter-spacing: 0.04em;
  background: var(--red); color: white;
  padding: 1px 6px; border-radius: 3px;
  margin-left: 6px;
  cursor: help;
}
.role-section.over .role-header { color: var(--red); }
.role-stack.over { background: #fff3f1; border-radius: 6px; padding: 4px; }
.stand-mini-bar {
  height: 3px; background: var(--slate-light); border-radius: 2px;
  margin-top: 5px; overflow: hidden;
}
.stand-mini-fill { height: 100%; }
.stand-mini-fill.full { background: var(--green); }
.stand-mini-fill.partial { background: var(--amber); }
.stand-mini-fill.empty { background: var(--red); }

.role-section { margin-bottom: 10px; }
.role-section:last-child { margin-bottom: 0; }
.role-header {
  font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--label);
  margin-bottom: 5px; display: flex;
  align-items: center; justify-content: space-between;
}
.role-section.role-lead .role-header { color: var(--purple-dark); }
.role-header .role-count { color: var(--slate); font-weight: 700; }
.role-stack {
  display: flex; flex-direction: column; gap: 4px;
  min-height: 30px;
}
.role-stack.drag-over .slot-empty {
  border-color: var(--blue); background: var(--blue-light); color: var(--blue-dark);
}
.slot-filled {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  background: var(--green-light); border: 1px solid var(--green-mid);
  border-radius: 6px; font-size: 12px; font-weight: 600;
  color: var(--green-dark); cursor: grab;
  user-select: none;
}
.slot-filled:hover { background: #d8f0e6; }
.slot-filled .x {
  background: none; border: none; color: inherit;
  cursor: pointer; padding: 0; font-size: 11px;
  opacity: 0.4; margin-left: auto;
}
.slot-filled .x:hover { opacity: 1; }
.slot-filled.manager-typed {
  background: var(--purple-light); border-color: var(--purple-mid);
  color: var(--purple-dark);
}
.manual-tag {
  font-size: 8px; font-weight: 800; letter-spacing: 0.04em;
  background: var(--purple); color: white;
  padding: 1px 4px; border-radius: 3px;
}
.slot-filled.placeholder {
  background: #fff3e0; border-color: var(--amber-border);
  color: var(--amber-dark); border-style: dashed;
}
.placeholder-tag {
  font-size: 8px; font-weight: 800; letter-spacing: 0.04em;
  background: var(--amber); color: white;
  padding: 1px 4px; border-radius: 3px;
}
.slot-filled.conflict {
  background: #fff3e0; border-color: var(--amber-border);
  color: var(--amber-dark);
}
.conflict-icon { color: var(--amber); font-weight: 800; }

.slot-empty {
  display: flex; align-items: center; justify-content: center;
  padding: 5px 10px; min-height: 30px;
  border: 1.5px dashed var(--red-border); background: #fefcfc;
  border-radius: 6px;
  font-size: 11px; font-weight: 600; color: #c08580;
  cursor: pointer;
}
.slot-empty:hover {
  border-color: var(--blue); background: var(--blue-light); color: var(--blue-dark);
}

.slot-typing-wrap { position: relative; }
.slot-input {
  border: 1.5px solid var(--blue); background: white;
  border-radius: 6px; padding: 5px 10px; font-size: 12px;
  font-family: inherit; width: 100%; outline: none;
}
.typeahead-list {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: white; border: 1px solid var(--border-strong);
  border-radius: 6px; box-shadow: var(--shadow-md);
  max-height: 180px; overflow-y: auto;
  z-index: 30; padding: 4px;
}
.typeahead-item {
  padding: 5px 8px; font-size: 12px; border-radius: 4px;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
}
.typeahead-item:hover, .typeahead-item.focused {
  background: var(--blue-light); color: var(--blue-dark);
}
.typeahead-item .ta-name { font-weight: 600; flex: 1; }
.typeahead-item .ta-meta {
  font-size: 9px; color: var(--label); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.typeahead-item.signup-tag .ta-meta { color: var(--green-dark); }
.typeahead-no-match {
  padding: 8px; font-size: 11px; color: var(--amber-dark);
  background: var(--amber-light); border-radius: 5px;
  display: flex; flex-direction: column; gap: 4px;
}
.typeahead-no-match .add-placeholder {
  font-size: 11px; font-weight: 700; padding: 4px 8px;
  background: white; border: 1px solid var(--amber-border);
  color: var(--amber-dark); border-radius: 4px;
  cursor: pointer; text-align: left; font-family: inherit;
}
.typeahead-no-match .add-placeholder:hover { background: var(--amber-light); }

/* Support Staff section — distinct from stand cards */
.support-section {
  margin-top: 16px; padding: 14px;
  background: var(--slate-light);
  border: 1px solid var(--border-strong); border-radius: 8px;
}
.support-section-head {
  font-size: 12px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--slate);
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.support-section-head .support-progress {
  font-size: 11px; font-weight: 700; color: var(--label);
}
.support-roles {
  display: grid; gap: 10px;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
}
.support-role-card {
  background: white; border: 1px solid var(--border);
  border-radius: 6px; padding: 10px;
}

.locked-overlay {
  background: var(--slate-light);
  border-radius: 8px; padding: 10px 14px;
  font-size: 12px; color: var(--slate);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
  border: 1px solid var(--border-strong);
}
.lock-icon { font-size: 14px; }
.unlock-link {
  margin-left: auto; font-size: 11px; font-weight: 700;
  color: var(--blue-dark); cursor: pointer; background: white;
  padding: 4px 10px; border-radius: 5px; border: 1px solid var(--blue-mid);
  font-family: inherit;
}
.unlock-link.disabled {
  color: #aaa; border-color: var(--border); cursor: not-allowed;
}
.slot-filled.locked { cursor: default; opacity: 0.85; }
.slot-filled.locked .x { display: none; }

.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--label); font-size: 13px;
}
.empty-state-title {
  font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 6px;
}
.no-stands-msg {
  padding: 14px; text-align: center;
  font-size: 12px; color: var(--label);
  background: white; border: 1px dashed var(--border-strong);
  border-radius: 8px;
}
.loader {
  display: flex; align-items: center; justify-content: center;
  padding: 40px; color: var(--label); font-size: 13px;
}
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--primary); color: white;
  padding: 10px 18px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  box-shadow: var(--shadow-lg);
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s ease;
}
.toast.show { opacity: 1; }
.toast.error { background: var(--red); }
.toast.success { background: var(--green-dark); }

/* Audit log modal */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-backdrop.show { display: flex; }
.modal {
  background: white; border-radius: 10px; max-width: 720px; width: 100%;
  max-height: 80vh; display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
}
.modal-head {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-head h3 { font-size: 16px; font-weight: 700; }
.modal-close {
  background: none; border: none; cursor: pointer;
  font-size: 18px; color: var(--label); padding: 4px 8px;
}
.modal-body { padding: 14px 18px; overflow-y: auto; }
.log-entry {
  padding: 8px 10px; border-bottom: 1px solid var(--border);
  font-size: 12px; display: grid;
  grid-template-columns: 100px 80px 1fr 120px;
  gap: 10px; align-items: baseline;
}
.log-entry .log-action {
  font-weight: 800; font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.04em;
}
.log-entry .log-action.placed { color: var(--green-dark); }
.log-entry .log-action.removed { color: var(--red); }
.log-entry .log-action.moved { color: var(--blue-dark); }
.log-entry .log-action.locked, .log-entry .log-action.unlocked { color: var(--purple-dark); }
.log-entry .log-time { color: var(--label); font-family: monospace; }
.log-entry .log-actor { color: var(--label); }

/* ===== Multi-signup assign modal ===== */
.assign-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 13px;
  border: 1.5px solid var(--border); border-radius: 10px;
  cursor: pointer; margin-bottom: 7px;
  transition: all 0.12s; background: white;
}
.assign-row:hover { border-color: var(--blue); background: var(--blue-light); }
.assign-row.is-current { border-color: var(--green); background: var(--green-light); }
.assign-row.is-locked {
  cursor: not-allowed; opacity: 0.7;
}
.assign-row.is-locked:hover { border-color: var(--border); background: white; }
.assign-row.is-locked.is-current { background: var(--green-light); border-color: var(--green); opacity: 1; }
.assign-row-info { flex: 1; }
.assign-row-evt { font-size: 13px; font-weight: 700; }
.assign-row-meta { font-size: 11px; color: var(--label); margin-top: 2px; }
.assign-row-current {
  font-size: 10px; font-weight: 700; color: var(--green-dark);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.assign-row-placed {
  font-size: 10px; font-weight: 700; color: var(--blue-dark);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.assign-clear-btn {
  width: 100%; padding: 9px;
  background: var(--slate-light); border: 1.5px solid var(--border);
  border-radius: 10px; cursor: pointer;
  font-size: 12px; font-weight: 700; color: var(--label);
  font-family: inherit; margin-top: 4px;
}
.assign-clear-btn:hover { color: var(--primary); }

/* Make the multi-signup indicators visually clickable */
.signup-multi { cursor: pointer; }
.signup-multi:hover { background: #b35a00; }
.conflict-icon { cursor: pointer; }
.conflict-icon:hover { opacity: 0.7; }

/* ===== Available-to-call list ===== */
.call-row {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 4px; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.call-row:last-child { border-bottom: none; }
.call-row.conflict { background: var(--amber-light); border-radius: 6px; padding: 9px 10px; margin-bottom: 2px; border: 1px solid var(--amber-border); border-bottom-color: var(--amber-border); }
.call-rank { font-size: 11px; font-weight: 700; color: var(--label); min-width: 22px; text-align: right; }
.call-name { font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.call-conflict-tag { font-size: 9px; font-weight: 800; color: var(--amber-dark); background: white; border: 1px solid var(--amber-border); padding: 1px 6px; border-radius: 3px; letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; }
.call-phone { font-size: 12px; color: var(--slate); font-family: monospace; white-space: nowrap; }
.call-history { font-size: 10px; font-weight: 700; color: var(--label); background: var(--slate-light); border: 1px solid var(--border); padding: 1px 7px; border-radius: 10px; white-space: nowrap; }
.call-history.zero { opacity: 0.5; }
.call-empty { padding: 20px; text-align: center; font-size: 13px; color: var(--label); font-style: italic; }
.call-section-head {
  font-size: 10px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--label); margin: 14px 0 6px; padding-top: 10px; border-top: 1px solid var(--border);
}
.call-section-head:first-child { margin-top: 0; padding-top: 0; border-top: none; }
</style>
</head>
