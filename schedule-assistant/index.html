<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Assistant</title>
<script src="/pc-auth.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f0f0ec;
  --card: #ffffff;
  --primary: #1a1a1a;
  --label: #666;
  --border: #e8e8e4;
  --border-strong: #d8d8d4;

  --green: #1D9E75;
  --green-light: #e8f7f2;
  --green-mid: #d0ecdf;
  --green-dark: #0F6E56;

  --red: #c0392b;
  --red-light: #fdecea;
  --red-border: #f0c8c4;

  --amber: #d97706;
  --amber-light: #fffbeb;
  --amber-border: #fcd34d;
  --amber-dark: #92400e;

  --blue: #378ADD;
  --blue-light: #E6F1FB;
  --blue-mid: #cfe1f4;
  --blue-dark: #0C447C;

  --purple: #7c3aed;
  --purple-light: #f3edff;
  --purple-mid: #e0d4fb;
  --purple-border: #d4c1fa;
  --purple-dark: #5b21b6;

  --slate: #475569;
  --slate-light: #f1f5f9;

  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
}

body {
  background: var(--bg);
  font-family: var(--font);
  color: var(--primary);
  font-size: 14px;
  line-height: 1.5;
  padding: 16px;
}
.shell { max-width: 1400px; margin: 0 auto; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 4px 16px; flex-wrap: wrap; gap: 12px;
}
.title-block { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.back-link {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--label);
  text-decoration: none; transition: color 0.15s;
}
.back-link:hover { color: var(--primary); }
.hdivider { width: 1px; height: 20px; background: var(--border); }
.title-text-wrap { display: flex; flex-direction: column; }
.title-block h1 {
  font-size: 20px; font-weight: 700; letter-spacing: -0.01em;
  display: inline-flex; align-items: center; gap: 10px;
}
.beta-tag {
  font-size: 9px; font-weight: 800;
  background: var(--primary); color: white;
  padding: 2px 7px; border-radius: 4px;
  letter-spacing: 0.06em;
}
.title-block .sub { font-size: 12px; color: var(--label); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-user { font-size: 12px; color: #999; font-weight: 500; }
.sign-out-btn {
  font-size: 11px; color: var(--red); background: none;
  border: 1px solid var(--red-border); padding: 4px 10px;
  border-radius: 6px; cursor: pointer; font-weight: 600;
}

.view-toggle {
  display: inline-flex; background: var(--card);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 3px; box-shadow: var(--shadow-sm); margin-bottom: 16px;
}
.view-toggle button, .view-toggle a {
  background: transparent; border: none;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  color: var(--label); border-radius: 7px; cursor: pointer;
  font-family: inherit; display: inline-flex; align-items: center;
  gap: 6px; transition: all 0.15s ease; text-decoration: none;
}
.view-toggle button:hover, .view-toggle a:hover { color: var(--primary); }
.view-toggle button.active { background: var(--primary); color: white; }
.view-toggle .pip {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: currentColor; opacity: 0.6;
}
.view-toggle .new-tag {
  font-size: 9px; font-weight: 800; padding: 1px 5px;
  border-radius: 3px; background: var(--purple); color: white;
  letter-spacing: 0.05em; margin-left: 2px;
}

.filter-strip {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px; margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.filter-strip .label {
  font-size: 11px; color: var(--label); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.filter-strip select, .filter-strip input[type=date] {
  font-family: inherit; font-size: 13px; border: 1px solid var(--border);
  border-radius: 7px; padding: 5px 9px; background: white; color: var(--primary);
}
.filter-strip .spacer { flex: 1; }
.role-toggle {
  display: inline-flex; background: var(--slate-light); border-radius: 6px;
  padding: 2px; font-size: 11px; font-weight: 700;
}
.role-toggle button {
  background: transparent; border: none; padding: 4px 10px;
  border-radius: 5px; cursor: pointer; color: var(--label); font-family: inherit;
}
.role-toggle button.active { background: var(--primary); color: white; }
.custom-range { display: none; gap: 6px; align-items: center; }
.custom-range.show { display: inline-flex; }

.day-group {
  border-top: 3px solid var(--primary);
  padding: 14px 4px 8px;
  display: flex; align-items: center; gap: 14px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.day-group h2 {
  font-size: 16px; font-weight: 800; letter-spacing: -0.01em;
}
/* Primary pill — sits right next to the date, bigger and bolder */
.day-pill-primary {
  font-size: 14px; font-weight: 800;
  padding: 6px 14px; border-radius: 8px;
  letter-spacing: -0.01em;
  border: 1.5px solid;
}
.day-pill-primary.green { background: var(--green-light); color: var(--green-dark); border-color: var(--green-mid); }
.day-pill-primary.amber { background: var(--amber-light); color: var(--amber-dark); border-color: var(--amber-border); }
.day-pill-primary.red { background: var(--red-light); color: var(--red); border-color: var(--red-border); }
.day-spacer { flex: 1; min-width: 8px; }
/* Secondary pills — multi-signup warnings sit in the gutter on the right */
.day-pills-secondary { display: flex; gap: 6px; align-items: center; }
.day-pill { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.day-pill.green { background: var(--green-light); color: var(--green-dark); }
.day-pill.amber { background: var(--amber-light); color: var(--amber-dark); }
.day-pill.red { background: var(--red-light); color: var(--red); }
.day-pill.warn {
  background: #fff3e0; color: var(--amber-dark);
  border: 1px dashed var(--amber-border);
}

.event-row {
  background: var(--card); border: 1px solid var(--border);
  border-left-width: 3px; border-radius: 10px;
  margin-bottom: 8px; overflow: hidden; box-shadow: var(--shadow-sm);
  transition: box-shadow 0.15s ease;
}
.event-row:hover { box-shadow: var(--shadow-md); }
.event-row.staffed { background: var(--green-light); border-left-color: var(--green); }
.event-row.submitted { background: var(--amber-light); border-left-color: var(--amber); }
.event-row.not-submitted { background: var(--red-light); border-left-color: var(--red); }
.event-row.expanded { box-shadow: var(--shadow-md); }

.event-head {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; cursor: pointer; flex-wrap: wrap;
}
.venue-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 44px; height: 24px; padding: 0 8px; border-radius: 5px;
  background: white; border: 1px solid var(--border-strong);
  font-size: 10px; font-weight: 800; letter-spacing: 0.04em;
  color: var(--slate); flex-shrink: 0;
}
.event-name { font-weight: 700; font-size: 14px; color: var(--primary); }
.event-row.staffed .event-name {
  text-decoration: line-through; text-decoration-thickness: 1px; color: #6a8b7e;
}
.event-time { font-size: 12px; color: var(--label); }
.status-tag {
  display: inline-block; font-size: 10px; font-weight: 800;
  letter-spacing: 0.05em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 4px;
}
.status-tag.staffed { background: var(--green); color: white; }
.status-tag.submitted { background: var(--amber); color: white; }
.status-tag.not-submitted { background: var(--red); color: white; }
.unresolved-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700;
  padding: 3px 8px; border-radius: 4px;
  background: var(--amber-light); color: var(--amber-dark);
  border: 1px solid var(--amber-border);
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.lock-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 700; color: var(--slate);
  background: var(--slate-light); padding: 3px 8px; border-radius: 4px;
}
.event-spacer { flex: 1; min-width: 12px; }

/* Dual coverage: signups on the left, filled on the right */
.coverage-dual {
  display: flex; gap: 14px; align-items: stretch;
}
.coverage-block {
  text-align: right; min-width: 110px;
  display: flex; flex-direction: column; justify-content: center;
}
.coverage-block.signups .coverage-count { color: var(--blue-dark); }
.coverage-block.signups.short .coverage-count { color: var(--red); }
.coverage-line {
  display: flex; align-items: baseline; gap: 5px; justify-content: flex-end;
}
.coverage-count { font-size: 15px; font-weight: 800; color: var(--primary); }
.coverage-sub {
  font-size: 9px; color: var(--label); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.coverage-bar {
  height: 4px; background: var(--slate-light); border-radius: 2px;
  overflow: hidden; margin-top: 4px; width: 100px; margin-left: auto;
}
.coverage-fill { height: 100%; border-radius: 2px; }
.coverage-fill.green { background: var(--green); }
.coverage-fill.amber { background: var(--amber); }
.coverage-fill.red { background: var(--red); }
.coverage-fill.blue { background: var(--blue); }

.btn {
  font-family: inherit; font-size: 12px; font-weight: 700;
  padding: 6px 12px; border-radius: 6px; cursor: pointer;
  border: 1px solid; white-space: nowrap;
}
.btn-print {
  background: white; border-color: var(--border-strong); color: var(--primary);
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-print:hover { background: #fafaf8; }
.chevron {
  background: none; border: none; cursor: pointer; padding: 4px;
  color: var(--label); font-size: 14px; transition: transform 0.2s ease;
}
.event-row.expanded .chevron { transform: rotate(180deg); }

.event-body {
  border-top: 1px solid var(--border);
  background: rgba(255,255,255,0.6); padding: 14px;
}

.workspace {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 14px;
  align-items: start;
}
@media (max-width: 800px) { .workspace { grid-template-columns: 1fr; } }

.available-panel {
  background: white; border: 1px solid var(--border);
  border-radius: 8px; padding: 12px;
  display: flex; flex-direction: column;
  position: sticky; top: 16px;
}
.panel-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.panel-title {
  font-size: 11px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--label);
}
.panel-count {
  font-size: 11px; font-weight: 700; color: var(--slate);
  background: var(--slate-light); padding: 2px 7px; border-radius: 10px;
}
.panel-search {
  width: 100%; border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 9px; font-size: 12px; font-family: inherit; margin-bottom: 8px;
}
.unplaced-strip {
  background: var(--amber-light); border: 1px solid var(--amber-border);
  border-radius: 6px; padding: 6px 9px;
  font-size: 11px; font-weight: 700; color: var(--amber-dark);
  margin-bottom: 8px;
}
.people-list {
  display: flex; flex-direction: column; gap: 4px;
  max-height: 600px; overflow-y: auto; padding-right: 2px;
}
.person-pill {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 10px; background: var(--blue-light);
  border: 1px solid var(--blue-mid); border-radius: 16px;
  cursor: grab; font-size: 12px; transition: all 0.1s ease;
  color: var(--blue-dark); font-weight: 600;
  user-select: none;
  flex-wrap: wrap; /* allow note line to wrap below the name row */
}
.person-pill[draggable=true]:hover { transform: translateX(2px); border-color: var(--blue); }
.person-pill.placed {
  background: var(--green-light); border-color: var(--green-mid);
  color: var(--green-dark); cursor: default;
}
.person-pill.placed:hover { transform: none; }
.person-pill.assigned-away {
  background: var(--slate-light); border-color: var(--border-strong);
  color: #888; cursor: default;
}
.person-pill.assigned-away:hover { transform: none; }
.person-pill.assigned-away .person-name {
  text-decoration: line-through; text-decoration-thickness: 1.5px;
}
.person-pill.multi {
  background: #fff3e0; border-color: var(--amber-border); color: var(--amber-dark);
}
/* Manager-removed signup pill — kept on the list, greyed out, struck through.
   Distinguishes "manager said no" from "system says assigned-away". */
.person-pill.removed {
  background: #fafafa; border-color: var(--border-strong); border-style: dashed;
  color: #999; cursor: grab;
}
.person-pill.removed .person-name {
  text-decoration: line-through; text-decoration-thickness: 1.5px;
}
.person-pill.removed:hover { border-color: var(--label); }

/* Inline italic note line beneath the name. Wraps to next line within the pill. */
.person-note {
  flex-basis: 100%;
  font-size: 10.5px; color: var(--blue-dark);
  font-style: italic; font-weight: 500;
  line-height: 1.3; padding-top: 1px; padding-left: 1px;
  word-break: break-word;
}
.person-pill.placed .person-note { color: var(--green-dark); opacity: 0.85; }
.person-pill.assigned-away .person-note,
.person-pill.removed .person-note { color: var(--label); }

/* X button on signup pill (soft-remove) */
.person-pill .signup-x {
  background: none; border: none; color: inherit;
  cursor: pointer; padding: 0; font-size: 12px;
  opacity: 0.35; line-height: 1;
  font-family: inherit;
}
.person-pill .signup-x:hover { opacity: 1; color: var(--red); }

/* Restore button on removed pill */
.person-pill .restore-btn {
  background: white; border: 1px solid var(--blue-mid);
  color: var(--blue-dark);
  font-size: 9px; font-weight: 700; letter-spacing: 0.04em;
  padding: 2px 7px; border-radius: 8px;
  cursor: pointer; font-family: inherit;
  text-transform: uppercase;
  margin-left: auto;
}
.person-pill .restore-btn:hover { background: var(--blue-light); }

/* Removed section toggle and container */
.removed-section {
  margin-top: 10px; padding-top: 8px;
  border-top: 1px dashed var(--border-strong);
}
.removed-toggle {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 5px 8px;
  background: none; border: 1px dashed var(--border-strong);
  border-radius: 6px; cursor: pointer;
  font-size: 11px; font-weight: 700; color: var(--label);
  font-family: inherit;
  letter-spacing: 0.03em;
}
.removed-toggle:hover { border-color: var(--label); color: var(--primary); }
.removed-list {
  display: flex; flex-direction: column; gap: 4px;
  margin-top: 6px;
}
.removed-meta {
  font-size: 9px; color: var(--label);
  flex-basis: 100%;
  font-style: italic;
}
.placed-here-tag {
  font-size: 9px; font-weight: 800;
  color: var(--green-dark); margin-left: auto;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.assigned-away-tag {
  font-size: 10px; font-weight: 700; color: var(--slate);
  background: white; border: 1px solid var(--border-strong);
  padding: 1px 6px; border-radius: 8px; margin-left: auto;
  cursor: pointer;
}
.assigned-away-tag:hover { background: var(--bg); border-color: var(--label); }
.signup-multi {
  font-size: 9px; font-weight: 800;
  background: var(--amber); color: white;
  padding: 1px 5px; border-radius: 8px; margin-left: auto;
}
/* NEW HIRE badge — signals a pipeline-hired employee with fewer than
   NEW_HIRE_THRESHOLD prior placements at this venue (past events only).
   Purple matches the existing TYPED tag's "system is telling you something
   extra about this pill" visual vocabulary. Available panel only. */
.new-hire-tag {
  font-size: 9px; font-weight: 800; letter-spacing: 0.04em;
  background: var(--purple); color: white;
  padding: 1px 5px; border-radius: 3px;
  cursor: help;
}
/* Home-venue badge — shows each person's home component (primary venue).
   Color comes from VENUE_COLORS (set inline because each venue has its
   own brand color). Same size/shape as NEW HIRE so they sit cleanly
   next to each other on a pill. Renders on every pill state — Available,
   placed, assigned-away — because the question "should this person be
   here at all?" is relevant in every context, not just at decision time. */
.home-venue-tag {
  font-size: 9px; font-weight: 800; letter-spacing: 0.04em;
  color: white;
  padding: 1px 5px; border-radius: 3px;
  cursor: help;
}
.person-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.summary-bar {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  padding: 10px 14px; margin-bottom: 12px;
  background: white; border: 1px solid var(--border); border-radius: 8px;
}
.summary-bar .sb-label {
  font-size: 11px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--label);
}
.summary-chip {
  display: inline-flex; align-items: baseline; gap: 5px;
  font-size: 12px; font-weight: 700;
}
.summary-chip .num { font-size: 14px; font-weight: 800; }
.summary-chip.warn .num { color: var(--amber-dark); }
.summary-chip.ok .num { color: var(--green-dark); }
.summary-chip.neutral .num { color: var(--primary); }
.summary-chip .denom { color: var(--label); font-weight: 600; }
.summary-chip-label { font-size: 11px; color: var(--label); font-weight: 600; }
.audit-link {
  font-size: 11px; font-weight: 700;
  color: var(--blue-dark); text-decoration: underline; cursor: pointer;
  background: none; border: none; font-family: inherit;
}

.stands-grid {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
}

.stand-card {
  background: white; border: 1px solid var(--border);
  border-radius: 8px; padding: 12px;
  display: flex; flex-direction: column;
}
.stand-card.drag-over { background: var(--blue-light); border-color: var(--blue); }
.stand-card-head { padding-bottom: 8px; margin-bottom: 8px; border-bottom: 2px solid var(--primary); }
.stand-card-name {
  font-weight: 800; font-size: 13px; letter-spacing: -0.01em; color: var(--primary);
  display: flex; align-items: center; justify-content: space-between;
}
.stand-fill-tag {
  font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px;
}
.stand-fill-tag.full { background: var(--green-light); color: var(--green-dark); }
.stand-fill-tag.partial { background: var(--amber-light); color: var(--amber-dark); }
.stand-fill-tag.empty { background: var(--red-light); color: var(--red); }
.stand-fill-tag.over { background: var(--red-light); color: var(--red); border: 1px solid var(--red-border); }

/* Over-staffing badge on the role header — shown when a manager reduces
   headcount in event planning after people were already placed. */
.role-over-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 9px; font-weight: 800; letter-spacing: 0.04em;
  background: var(--red); color: white;
  padding: 1px 6px; border-radius: 3px;
  margin-left: 6px;
  cursor: help;
}
.role-section.over .role-header { color: var(--red); }
.role-stack.over { background: #fff3f1; border-radius: 6px; padding: 4px; }
.stand-mini-bar {
  height: 3px; background: var(--slate-light); border-radius: 2px;
  margin-top: 5px; overflow: hidden;
}
.stand-mini-fill { height: 100%; }
.stand-mini-fill.full { background: var(--green); }
.stand-mini-fill.partial { background: var(--amber); }
.stand-mini-fill.empty { background: var(--red); }

.role-section { margin-bottom: 10px; }
.role-section:last-child { margin-bottom: 0; }
.role-header {
  font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--label);
  margin-bottom: 5px; display: flex;
  align-items: center; justify-content: space-between;
}
.role-section.role-lead .role-header { color: var(--purple-dark); }
.role-header .role-count { color: var(--slate); font-weight: 700; }
.role-stack {
  display: flex; flex-direction: column; gap: 4px;
  min-height: 30px;
}
.role-stack.drag-over .slot-empty {
  border-color: var(--blue); background: var(--blue-light); color: var(--blue-dark);
}
.slot-filled {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  background: var(--green-light); border: 1px solid var(--green-mid);
  border-radius: 6px; font-size: 12px; font-weight: 600;
  color: var(--green-dark); cursor: grab;
  user-select: none;
  flex-wrap: wrap;
}
.slot-filled:hover { background: #d8f0e6; }
.slot-filled .x {
  background: none; border: none; color: inherit;
  cursor: pointer; padding: 0; font-size: 11px;
  opacity: 0.4; margin-left: auto;
}
.slot-filled .x:hover { opacity: 1; }
.slot-filled.manager-typed {
  background: var(--purple-light); border-color: var(--purple-mid);
  color: var(--purple-dark);
}
.manual-tag {
  font-size: 8px; font-weight: 800; letter-spacing: 0.04em;
  background: var(--purple); color: white;
  padding: 1px 4px; border-radius: 3px;
}
.slot-filled.placeholder {
  background: #fff3e0; border-color: var(--amber-border);
  color: var(--amber-dark); border-style: dashed;
}
.placeholder-tag {
  font-size: 8px; font-weight: 800; letter-spacing: 0.04em;
  background: var(--amber); color: white;
  padding: 1px 4px; border-radius: 3px;
}
.slot-filled.conflict {
  background: #fff3e0; border-color: var(--amber-border);
  color: var(--amber-dark);
}
.conflict-icon { color: var(--amber); font-weight: 800; }

.slot-empty {
  display: flex; align-items: center; justify-content: center;
  padding: 5px 10px; min-height: 30px;
  border: 1.5px dashed var(--red-border); background: #fefcfc;
  border-radius: 6px;
  font-size: 11px; font-weight: 600; color: #c08580;
  cursor: pointer;
}
.slot-empty:hover {
  border-color: var(--blue); background: var(--blue-light); color: var(--blue-dark);
}

.slot-typing-wrap { position: relative; }
.slot-input {
  border: 1.5px solid var(--blue); background: white;
  border-radius: 6px; padding: 5px 10px; font-size: 12px;
  font-family: inherit; width: 100%; outline: none;
}
.typeahead-list {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: white; border: 1px solid var(--border-strong);
  border-radius: 6px; box-shadow: var(--shadow-md);
  max-height: 180px; overflow-y: auto;
  z-index: 30; padding: 4px;
}
.typeahead-item {
  padding: 5px 8px; font-size: 12px; border-radius: 4px;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
}
.typeahead-item:hover, .typeahead-item.focused {
  background: var(--blue-light); color: var(--blue-dark);
}
.typeahead-item .ta-name { font-weight: 600; flex: 1; }
.typeahead-item .ta-meta {
  font-size: 9px; color: var(--label); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.typeahead-item.signup-tag .ta-meta { color: var(--green-dark); }
.typeahead-no-match {
  padding: 8px; font-size: 11px; color: var(--amber-dark);
  background: var(--amber-light); border-radius: 5px;
  display: flex; flex-direction: column; gap: 4px;
}
.typeahead-no-match .add-placeholder {
  font-size: 11px; font-weight: 700; padding: 4px 8px;
  background: white; border: 1px solid var(--amber-border);
  color: var(--amber-dark); border-radius: 4px;
  cursor: pointer; text-align: left; font-family: inherit;
}
.typeahead-no-match .add-placeholder:hover { background: var(--amber-light); }

/* Support Staff section — distinct from stand cards.
   width: fit-content so the gray container hugs the role cards inside it
   instead of stretching to fill the entire workspace. min-width keeps the
   "Support Staff … N / N filled" header readable when there's only one role. */
.support-section {
  margin-top: 16px; padding: 14px;
  background: var(--slate-light);
  border: 1px solid var(--border-strong); border-radius: 8px;
  width: fit-content;
  min-width: 280px;
  max-width: 100%;
}
.support-section-head {
  font-size: 12px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--slate);
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.support-section-head .support-progress {
  font-size: 11px; font-weight: 700; color: var(--label);
}
.support-roles {
  display: grid; gap: 10px;
  /* max 280px on each card so a single Supervisor entry doesn't stretch
     to fill the entire workspace width. With 1fr the inner grid would
     expand each card to consume all available horizontal space, which
     made the section visually overpowering when only one role was needed. */
  grid-template-columns: repeat(auto-fill, minmax(200px, 280px));
}
.support-role-card {
  background: white; border: 1px solid var(--border);
  border-radius: 6px; padding: 10px;
}

.locked-overlay {
  background: var(--slate-light);
  border-radius: 8px; padding: 10px 14px;
  font-size: 12px; color: var(--slate);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
  border: 1px solid var(--border-strong);
}
.lock-icon { font-size: 14px; }
.unlock-link {
  margin-left: auto; font-size: 11px; font-weight: 700;
  color: var(--blue-dark); cursor: pointer; background: white;
  padding: 4px 10px; border-radius: 5px; border: 1px solid var(--blue-mid);
  font-family: inherit;
}
.unlock-link.disabled {
  color: #aaa; border-color: var(--border); cursor: not-allowed;
}
.slot-filled.locked { cursor: default; opacity: 0.85; }
.slot-filled.locked .x { display: none; }

.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--label); font-size: 13px;
}
.empty-state-title {
  font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 6px;
}
.no-stands-msg {
  padding: 14px; text-align: center;
  font-size: 12px; color: var(--label);
  background: white; border: 1px dashed var(--border-strong);
  border-radius: 8px;
}
.loader {
  display: flex; align-items: center; justify-content: center;
  padding: 40px; color: var(--label); font-size: 13px;
}
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--primary); color: white;
  padding: 10px 18px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  box-shadow: var(--shadow-lg);
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s ease;
}
.toast.show { opacity: 1; }
.toast.error { background: var(--red); }
.toast.success { background: var(--green-dark); }

/* Audit log modal */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-backdrop.show { display: flex; }
.modal {
  background: white; border-radius: 10px; max-width: 720px; width: 100%;
  max-height: 80vh; display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
}
.modal-head {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-head h3 { font-size: 16px; font-weight: 700; }
.modal-close {
  background: none; border: none; cursor: pointer;
  font-size: 18px; color: var(--label); padding: 4px 8px;
}
.modal-body { padding: 14px 18px; overflow-y: auto; }
.log-entry {
  padding: 8px 10px; border-bottom: 1px solid var(--border);
  font-size: 12px; display: grid;
  grid-template-columns: 100px 80px 1fr 120px;
  gap: 10px; align-items: baseline;
}
.log-entry .log-action {
  font-weight: 800; font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.04em;
}
.log-entry .log-action.placed { color: var(--green-dark); }
.log-entry .log-action.removed { color: var(--red); }
.log-entry .log-action.moved { color: var(--blue-dark); }
.log-entry .log-action.locked, .log-entry .log-action.unlocked { color: var(--purple-dark); }
.log-entry .log-time { color: var(--label); font-family: monospace; }
.log-entry .log-actor { color: var(--label); }

/* ===== Multi-signup assign modal ===== */
.assign-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 13px;
  border: 1.5px solid var(--border); border-radius: 10px;
  cursor: pointer; margin-bottom: 7px;
  transition: all 0.12s; background: white;
}
.assign-row:hover { border-color: var(--blue); background: var(--blue-light); }
.assign-row.is-current { border-color: var(--green); background: var(--green-light); }
.assign-row.is-locked {
  cursor: not-allowed; opacity: 0.7;
}
.assign-row.is-locked:hover { border-color: var(--border); background: white; }
.assign-row.is-locked.is-current { background: var(--green-light); border-color: var(--green); opacity: 1; }
.assign-row-info { flex: 1; }
.assign-row-evt { font-size: 13px; font-weight: 700; }
.assign-row-meta { font-size: 11px; color: var(--label); margin-top: 2px; }
.assign-row-current {
  font-size: 10px; font-weight: 700; color: var(--green-dark);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.assign-row-placed {
  font-size: 10px; font-weight: 700; color: var(--blue-dark);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.assign-clear-btn {
  width: 100%; padding: 9px;
  background: var(--slate-light); border: 1.5px solid var(--border);
  border-radius: 10px; cursor: pointer;
  font-size: 12px; font-weight: 700; color: var(--label);
  font-family: inherit; margin-top: 4px;
}
.assign-clear-btn:hover { color: var(--primary); }

/* Make the multi-signup indicators visually clickable */
.signup-multi { cursor: pointer; }
.signup-multi:hover { background: #b35a00; }
.conflict-icon { cursor: pointer; }
.conflict-icon:hover { opacity: 0.7; }

/* ===== Home-venue override dialog =====
   Fires when a manager places a non-home-venue person ahead of an unplaced
   home-venue person. Forces a typed reason (>= 15 chars) before the
   placement commits. Cancelling does not place. */
.override-info {
  background: var(--amber-light); border: 1px solid var(--amber-border);
  padding: 10px 12px; border-radius: 8px;
  font-size: 13px; line-height: 1.5; color: var(--amber-dark);
  margin-bottom: 12px;
}
.override-info strong { color: var(--amber-dark); }
.override-list {
  list-style: none; padding: 0; margin: 6px 0 0 0;
}
.override-list li {
  padding: 3px 0; font-size: 12px; font-weight: 600;
}
.override-list li::before {
  content: '• '; color: var(--amber); font-weight: 800;
}
.override-question {
  font-size: 13px; font-weight: 600; margin: 14px 0 8px; color: var(--primary);
}
.override-textarea {
  width: 100%; min-height: 70px; padding: 8px 10px;
  border: 1.5px solid var(--border); border-radius: 7px;
  font-family: inherit; font-size: 13px; resize: vertical;
  color: var(--primary); background: white;
}
.override-textarea:focus { outline: none; border-color: var(--blue); }
.override-counter {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 6px; font-size: 11px; color: var(--label);
}
.override-counter.met { color: var(--green-dark); font-weight: 700; }
.override-actions {
  display: flex; gap: 8px; justify-content: flex-end;
  margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border);
}
.btn-cancel {
  background: white; border: 1px solid var(--border-strong); color: var(--label);
  font-family: inherit; font-size: 13px; font-weight: 700;
  padding: 8px 16px; border-radius: 7px; cursor: pointer;
}
.btn-cancel:hover { background: var(--slate-light); color: var(--primary); }
.btn-confirm {
  background: var(--primary); border: 1px solid var(--primary); color: white;
  font-family: inherit; font-size: 13px; font-weight: 700;
  padding: 8px 16px; border-radius: 7px; cursor: pointer;
}
.btn-confirm:disabled {
  background: #aaa; border-color: #aaa; cursor: not-allowed;
}
.btn-confirm:not(:disabled):hover { background: #000; }
/* Audit log entry — second-line "reason" display for override placements.
   The first line of a log row keeps its existing 4-column grid; the
   reason wraps below in a muted italic block spanning all columns. */
.log-entry .log-reason {
  grid-column: 1 / -1;
  font-size: 11px; font-style: italic; color: var(--amber-dark);
  background: var(--amber-light); border-left: 3px solid var(--amber-border);
  padding: 4px 8px; margin-top: 4px; border-radius: 0 4px 4px 0;
}

/* ===== Available-to-call list ===== */
.call-row {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 4px; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.call-row:last-child { border-bottom: none; }
.call-row.conflict { background: var(--amber-light); border-radius: 6px; padding: 9px 10px; margin-bottom: 2px; border: 1px solid var(--amber-border); border-bottom-color: var(--amber-border); }
.call-rank { font-size: 11px; font-weight: 700; color: var(--label); min-width: 22px; text-align: right; }
.call-name { font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.call-conflict-tag { font-size: 9px; font-weight: 800; color: var(--amber-dark); background: white; border: 1px solid var(--amber-border); padding: 1px 6px; border-radius: 3px; letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; }
.call-phone { font-size: 12px; color: var(--slate); font-family: monospace; white-space: nowrap; }
.call-history { font-size: 10px; font-weight: 700; color: var(--label); background: var(--slate-light); border: 1px solid var(--border); padding: 1px 7px; border-radius: 10px; white-space: nowrap; }
.call-history.zero { opacity: 0.5; }
.call-empty { padding: 20px; text-align: center; font-size: 13px; color: var(--label); font-style: italic; }
.call-section-head {
  font-size: 10px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--label); margin: 14px 0 6px; padding-top: 10px; border-top: 1px solid var(--border);
}
.call-section-head:first-child { margin-top: 0; padding-top: 0; border-top: none; }

/* ===== Recent signups box =====
   Sits at the top of the main content area, between the filter strip and
   the day groups. Shows everything that signed up in the last ~36 hours,
   broken into 12-hour buckets. Respects the venue filter; ignores the
   date range filter. Default expand/collapse state is decided per-render
   based on whether the most-recent bucket is empty. */
.recent-signups {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; box-shadow: var(--shadow-sm);
  margin-bottom: 16px; overflow: hidden;
}
.recent-signups-empty {
  padding: 8px 14px; font-size: 12px; color: var(--label);
  font-style: italic;
}
.recent-signups-head {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; cursor: pointer; user-select: none;
  font-weight: 700;
}
.recent-signups-head:hover { background: var(--bg); }
.recent-signups-head .rs-chevron {
  transition: transform 0.2s ease;
  font-size: 11px; color: var(--label);
}
.recent-signups.expanded .rs-chevron { transform: rotate(180deg); }
.recent-signups-title { font-size: 13px; }
.recent-signups-count {
  font-size: 11px; font-weight: 700;
  background: var(--blue-light); color: var(--blue-dark);
  padding: 2px 8px; border-radius: 10px;
}
.recent-signups-count.zero { background: var(--slate-light); color: var(--label); }
.recent-signups-spacer { flex: 1; }
.recent-signups-hint {
  font-size: 11px; font-weight: 500; color: var(--label);
}
.recent-signups-body {
  border-top: 1px solid var(--border);
  padding: 6px 14px 12px;
}
.rs-bucket { padding-top: 10px; }
.rs-bucket-head {
  font-size: 10px; font-weight: 800; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--label);
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border-lt, var(--border));
}
.rs-bucket-empty {
  padding: 4px 0 2px; font-size: 11px; color: var(--label); font-style: italic;
}
.rs-row {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 0; font-size: 13px;
  border-bottom: 1px solid var(--bg);
}
.rs-row:last-child { border-bottom: none; }
.rs-time {
  font-size: 11px; font-family: monospace; color: var(--label);
  min-width: 70px; flex-shrink: 0;
}
.rs-name {
  font-weight: 600; min-width: 130px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rs-row.removed .rs-name { text-decoration: line-through; color: var(--label); }
/* Recent-signups badges share size/shape with pill badges but inline. */
.rs-row .new-hire-tag,
.rs-row .home-venue-tag {
  flex-shrink: 0;
}
.rs-arrow {
  color: var(--label); font-weight: 700; flex-shrink: 0;
}
.rs-event {
  font-size: 12px; color: var(--slate);
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rs-event-venue {
  font-weight: 700; color: var(--primary);
}
.rs-mismatch {
  font-size: 11px; font-weight: 800; color: var(--amber-dark);
  background: var(--amber-light); border: 1px solid var(--amber-border);
  padding: 1px 6px; border-radius: 3px;
  flex-shrink: 0; cursor: help;
}
@media (max-width: 600px) {
  .rs-row { flex-wrap: wrap; }
  .rs-name { min-width: 0; flex: 1; }
  .rs-event { flex-basis: 100%; padding-left: 80px; }
}
</style>
</head>
<body>

<div class="shell">

  <header>
    <div class="title-block">
      <a href="/" class="back-link">&#8592; Toolkit</a>
      <div class="hdivider"></div>
      <div class="title-text-wrap">
        <h1>Schedule Assistant</h1>
        <div class="sub">Drag people into stand &amp; role positions · midnight day-of lock</div>
      </div>
    </div>
    <div class="header-right" id="header-right"></div>
  </header>

  <div class="filter-strip">
    <span class="label">Venue</span>
    <select id="venue-filter">
      <option value="">All venues</option>
    </select>

    <span class="label">Date Range</span>
    <select id="range-filter">
      <option value="today">Today only</option>
      <option value="this-week">This week</option>
      <option value="next-7">Next 7 days</option>
      <option value="next-14" selected>Next 14 days</option>
      <option value="next-30">Next 30 days</option>
      <option value="next-60">Next 60 days</option>
      <option value="this-month">This month</option>
      <option value="all-upcoming">All upcoming</option>
      <option value="custom">Custom range…</option>
    </select>

    <span class="custom-range" id="custom-range">
      <input type="date" id="custom-from">
      <span style="color:var(--label);font-size:11px">to</span>
      <input type="date" id="custom-to">
    </span>

    <span class="spacer"></span>

    <span class="label">Stands</span>
    <span class="role-toggle">
      <button class="active" data-stands="active">Active only</button>
      <button data-stands="all">Show all</button>
    </span>

    <button class="btn btn-print" id="refresh-btn" title="Refresh data">↻ Refresh</button>
  </div>

  <div id="content"><div class="loader">Loading…</div></div>

</div>

<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="audit-modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="audit-title">Audit Log</h3>
      <button class="modal-close" data-close-modal="audit-modal">✕</button>
    </div>
    <div class="modal-body" id="audit-body"></div>
  </div>
</div>

<div class="modal-backdrop" id="assign-modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="assign-title">Multi-event signup</h3>
      <button class="modal-close" data-close-modal="assign-modal">✕</button>
    </div>
    <div class="modal-body">
      <div id="assign-sub" style="font-size: 12px; color: var(--label); margin-bottom: 12px; line-height: 1.5;"></div>
      <div id="assign-body"></div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="callable-modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="callable-title">Available to call</h3>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-print" id="callable-print-btn">🖨 Print</button>
        <button class="modal-close" data-close-modal="callable-modal">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <div id="callable-sub" style="font-size: 12px; color: var(--label); margin-bottom: 12px; line-height: 1.5;"></div>
      <div id="callable-body"></div>
    </div>
  </div>
</div>

<!-- Home-venue override dialog. Shown when placing a non-home-venue person
     ahead of unplaced home-venue people for the event. Manager must type a
     reason (>= 15 chars) before "Save and place" enables. Cancel = no
     placement. The reason is appended to the position_assignment_log row's
     details JSON under `override_reason` and is rendered on a second line
     in the audit log for that event. -->
<div class="modal-backdrop" id="override-modal">
  <div class="modal">
    <div class="modal-head">
      <h3>Reason needed</h3>
      <button class="modal-close" data-close-modal="override-modal">✕</button>
    </div>
    <div class="modal-body">
      <div class="override-info" id="override-info"></div>
      <div class="override-question">Why is this person being scheduled here over them?</div>
      <textarea class="override-textarea" id="override-reason" placeholder="e.g. requested by venue manager / specific role need / etc."></textarea>
      <div class="override-counter" id="override-counter">
        <span id="override-counter-text">Min 15 characters</span>
        <span id="override-counter-num">0 / 15</span>
      </div>
      <div class="override-actions">
        <button class="btn-cancel" data-close-modal="override-modal">Cancel</button>
        <button class="btn-confirm" id="override-confirm-btn" disabled>Save and place</button>
      </div>
    </div>
  </div>
</div>

<script>
/* =====================================================================
 * SCHEDULE ASSISTANT
 * Reads: events, staffing_requests, availability, availability_assignments,
 *        employees, position_assignments, position_assignment_log,
 *        candidates (phone-only, for NEW HIRE badge lineage detection)
 * Writes: position_assignments, position_assignment_log, availability_assignments
 * ===================================================================== */

const SUPABASE_URL = 'https://aoazlttdjowhlfcksoyl.supabase.co';

const SUPPORT_STAND = 'Support Staff';
const HAWKING_STAND = 'Hawking';
const CLIENT_STAND = 'Client Staffing Needs';
const NONEVENT_STAND = 'Non-Event Labor';

// Stands hidden from the Position Board grid entirely
const HIDDEN_STANDS = [CLIENT_STAND, NONEVENT_STAND];

// NEW HIRE badge config.
// A person pill in the Available panel shows "NEW" if BOTH:
//   (a) the employee is pipeline-hired — i.e. has a candidates row that
//       phone-matches the employees row. This filters out legacy bulk
//       imports from 7Shifts / SQL runs, who have been working events
//       for months but only recently got an employees row.
//   (b) the employee has fewer than NEW_HIRE_THRESHOLD prior placements
//       at THIS specific venue, counted only on past events
//       (event_date < today AND removed_at IS NULL on the placement).
//       Future placements do NOT count — otherwise scheduling someone
//       for 7 future events on Monday would drop the badge Tuesday.
//
// Known imperfection: position_assignments only started recording on
// April 30, 2026. For the first ~60 days of usage some legacy-hired
// pipeline employees (who worked many pre-April-30 shifts) will show
// NEW longer than reality. The badge self-corrects as Brian places them
// in the new system. Acceptable transient — no backfill planned.
//
// Tip-pool (sale_staff_assignments) was considered as the source of
// truth and rejected: it depends on AI sign-in-sheet parsing which has
// confidence variance and async lag. Placement-based count answers
// Brian's actual question ("do I know this person at this venue?")
// more directly.
const NEW_HIRE_THRESHOLD = 6;

  'Pizza Maker',

function roleSortKey(role) {

// ---------- Auth helpers ----------
function apiHeaders() { return pcAuth.headers(); }
function apiHeadersJson() {
  return Object.assign({}, apiHeaders(), {
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  });
}

function handleAuthFailure() {
  try {
    localStorage.removeItem('sb_access_token');
    localStorage.removeItem('sb_refresh_token');
  } catch(e) {}
  showToast('Session expired. Reloading to sign in again...', 'error');
  setTimeout(() => window.location.reload(), 1800);
}

function authFetch(url, options) {
  return fetch(url, options).then(r => {
    if (r.status === 401) {
      const err = new Error('Unauthorized'); err.authFailed = true; throw err;
    }
    if (!r.ok) {
      return r.text().then(t => {
        if (t && t.indexOf('JWT expired') !== -1) {
          const err = new Error('JWT expired'); err.authFailed = true; throw err;
        }
        throw new Error(t || ('HTTP ' + r.status));
      });
    }
    return r.text().then(t => {
      if (!t) return [];
      try { return JSON.parse(t); } catch(e) { return []; }
    });
  });
}

// ---------- Toast ----------
let toastTimer = null;
function showToast(msg, kind) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (kind ? ' ' + kind : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2400);
}

// box this session. null = no manual toggle yet; rely on heuristic default
// (expanded if current bucket has signups, collapsed otherwise). true/false
// = user clicked, persist that choice for the rest of this page session.
// Not persisted across reloads — design doc Item 6.
let _recentSignupsManualState = null;

// ---------- Date helpers ----------
function todayIsoLocal() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function isoFromOffset(daysFromToday) {
  const d = new Date();
  d.setDate(d.getDate() + daysFromToday);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function endOfMonthIso() {
  const d = new Date();
  const last = new Date(d.getFullYear(), d.getMonth()+1, 0);
  return last.getFullYear() + '-' + String(last.getMonth()+1).padStart(2,'0') + '-' + String(last.getDate()).padStart(2,'0');
}
function endOfWeekIso() {
  // Sunday-end week
  const d = new Date();
  const day = d.getDay(); // 0 Sun .. 6 Sat
  const offset = (7 - day) % 7;
  d.setDate(d.getDate() + offset);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function getDateRange(rangeKey) {
  const today = todayIsoLocal();
  switch(rangeKey) {
    case 'today': return { from: today, to: today };
    case 'this-week': return { from: today, to: endOfWeekIso() };
    case 'next-7': return { from: today, to: isoFromOffset(7) };
    case 'next-14': return { from: today, to: isoFromOffset(14) };
    case 'next-30': return { from: today, to: isoFromOffset(30) };
    case 'next-60': return { from: today, to: isoFromOffset(60) };
    case 'this-month': return { from: today, to: endOfMonthIso() };
    case 'all-upcoming': return { from: today, to: '2099-12-31' };
    case 'custom': {
      const from = document.getElementById('custom-from').value || today;
      const to = document.getElementById('custom-to').value || isoFromOffset(14);
      return { from, to };
    }
    default: return { from: today, to: isoFromOffset(14) };
  }
}

function fmtDayHeader(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}
function fmtTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':');
  const hh = parseInt(h, 10);
  const ap = hh >= 12 ? 'PM' : 'AM';
  const h12 = hh % 12 || 12;
  return h12 + ':' + m + ' ' + ap;
}

// Report time = explicit report_time if set, else gates_open minus 1 hour.
// Same logic the legacy schedule-assistant uses, so the two views agree on
// what time managers should communicate to staff.
function getReportTime(ev) {
  if (ev.report_time) return ev.report_time;
  if (ev.gates_open) {
    const parts = ev.gates_open.split(':');
    let h = parseInt(parts[0], 10) - 1;
    if (h < 0) h = 0;
    return String(h).padStart(2, '0') + ':' + parts[1] + ':' + (parts[2] || '00');
  }
  return null;
}
function fmtDateTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}

// Lock = midnight of event_date (i.e. start of event_date in local time)
function isLocked(eventDateIso) {
  const lockTime = new Date(eventDateIso + 'T00:00:00');
  return new Date() >= lockTime;
}

// Initials from name
function initials(name) {
  if (!name) return '?';
  return name.split(/\s+/).map(p => p[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
}

// Normalize a phone number for comparison. Strips everything except digits.
// Used for matching employees.phone against candidates.phone — formatting
// varies between data sources (one might be "(609) 555-1234", the other
// "6095551234"). Last 10 digits avoids US country-code mismatches.
function normalizePhone(p) {
  if (!p) return '';
  const digits = String(p).replace(/\D/g, '');
  return digits.length > 10 ? digits.slice(-10) : digits;
}

// ---------- State ----------
const state = {
  user: null,
  events: [],          // [{id, venue, event_name, event_date, gates_open, show_time, estimated_end_time, expected_attendance, staffing_tier}]
  staffingRequests: [],// [{id, event_id, venue, stand, role, headcount, staff_notes}]
  availability: [],    // [{id, staff_name, event_id, note}]  (active only — removed_at IS NULL)
  removedAvailability: [], // [{id, staff_name, event_id, note, removed_at, removed_by}] (soft-deleted)
  multiSignupCounts: {}, // {staff_name: count of events same date}
  multiSignupByDate: {},  // {date: {staff_name: [event_id, ...]}}
  assignments: {},     // {event_date: {staff_name: assigned_event_id}}
  positions: [],       // [{id, event_id, venue, stand, role, staff_name, source, assigned_by, assigned_at}]
  employees: [],       // [{first_name, last_name, phone}]
  historyCounts: {},   // {staff_name: total historical availability rows} — for reliability sort

  // NEW HIRE badge support — see NEW_HIRE_THRESHOLD comment above for full logic.
  // venueExperience: {"Full Name|VENUE_CODE": count_of_past_placements}
  //   Built from position_assignments rows where event_date < today AND removed_at IS NULL.
  //   Counted via a join through state.events for any rows we already have, plus a
  //   dedicated query that fetches past placements regardless of current date filter.
  venueExperience: {},
  // pipelineNames: Set of "First Last" full names that are pipeline-hired.
  //   Determined by phone-matching employees ↔ candidates (normalized digit-only).
  pipelineNames: new Set(),

  // Recent signups box state — see Item 6 of the home-component design doc.
  // recentSignups: array of availability rows from the last 36 hours, ordered
  //   by submitted_at DESC. Each row: {id, staff_name, event_id, submitted_at, removed_at}.
  // recentSignupEvents: lookup of event_id → {event_name, venue, event_date} for
  //   events that recent signups point at, INCLUDING events outside the current
  //   visible date range (separately fetched). Merged with state.events so the
  //   render can resolve every signup.
  recentSignups: [],
  recentSignupEvents: {},

  filters: {
    venue: '',
    range: 'next-14',
    standsMode: 'active'
  },
  expandedEvents: new Set(),
  expandedRemoved: new Set(),  // event IDs whose "Removed" section is open
  unlockedEvents: new Set(),
  drag: null,         // { staffName, source, fromPositionId? }
  typing: null        // { eventId, venue, stand, role, value, focusedIndex }
};

// Returns true if the person should display a NEW HIRE badge at this venue.
// Pure read on already-loaded state — safe to call inside render loops.
function isNewAtVenue(staffName, venue) {
  if (!staffName || !venue) return false;
  if (!state.pipelineNames.has(staffName)) return false;
  const count = state.venueExperience[staffName + '|' + venue] || 0;
  return count < NEW_HIRE_THRESHOLD;
}

// Returns the actual past-placement count at this venue, for the badge tooltip.
function venuePlacementCount(staffName, venue) {
  return state.venueExperience[staffName + '|' + venue] || 0;
}

// Returns the home venue code for a staff name, or null if unset / NA / unknown.
// Both NULL and 'NA' (Doesn't apply) normalize to null here so the rest of the
// codebase can treat "no home venue" as a single concept. The dropdown and
// override-dialog logic both call this — they share the same semantics.
// Empty/whitespace names also return null.
function homeVenueOf(staffName) {
  if (!staffName) return null;
  const name = staffName.trim();
  if (!name) return null;
  const emp = state.employees.find(e =>
    ((e.first_name || '') + ' ' + (e.last_name || '')).trim() === name
  );
  if (!emp) return null;
  if (!emp.home_venue) return null;
  if (emp.home_venue === HOME_VENUE_NA) return null;
  return emp.home_venue;
}

// ---------- Data loaders ----------
function loadAll() {
  const range = getDateRange(state.filters.range);
  const eventsUrl = SUPABASE_URL + '/rest/v1/events?event_type=neq.adhoc'
    + '&event_date=gte.' + range.from
    + '&event_date=lte.' + range.to
    + '&order=event_date.asc,gates_open.asc';

  // Past placements query — used to compute venueExperience for the NEW HIRE badge.
  // We fetch staff_name + venue for every position_assignments row that:
  //   - has not been soft-deleted (removed_at IS NULL)
  //   - is attached to an event whose date is strictly < today
  // The event_date filter is achieved via the embedded events!inner join with
  // a filter — PostgREST syntax is documented, this is the standard pattern.
  // For simplicity and to dodge nested-filter quirks we do a separate fetch
  // with no event_date filter and trim client-side. The position_assignments
  // table only goes back to April 30, 2026 so this is bounded and small.
  const today = todayIsoLocal();
  const pastPlacementsUrl = SUPABASE_URL + '/rest/v1/position_assignments?select=staff_name,venue,event_id&removed_at=is.null';

  // Candidate phones for pipeline-hire detection. We only need the phone
  // column — we never read names or any sensitive candidate data here.
  // Phones are compared against employees.phone after normalizePhone() on
  // both sides. anon SELECT is allowed on candidates so this works whether
  // the user is admin or not.
  const candidatesUrl = SUPABASE_URL + '/rest/v1/candidates?select=phone';

  // Recent signups query — last 36 hours of availability rows for the
  // recent-signups box at the top of the page. Independent of the page's
  // date-range filter (which controls visible events). Lightweight: bounded
  // by signup volume in a 36-hour window. We fetch removed_at too so the
  // box can render struck-through entries for soft-deleted signups.
  const recentSignupsSince = new Date(Date.now() - 36 * 60 * 60 * 1000).toISOString();
  const recentSignupsUrl = SUPABASE_URL +
    '/rest/v1/availability' +
    '?select=id,staff_name,event_id,submitted_at,removed_at' +
    '&submitted_at=gte.' + recentSignupsSince +
    '&order=submitted_at.desc';

  document.getElementById('content').innerHTML = '<div class="loader">Loading…</div>';

  return Promise.all([
    authFetch(eventsUrl, { headers: apiHeaders() }),
    authFetch(SUPABASE_URL + '/rest/v1/employees?select=first_name,last_name,phone,home_venue,is_active&is_active=eq.true&order=last_name.asc',
      { headers: apiHeaders() }),
    // Historical availability counts for "reliability" sort on the Available-to-call list.
    // We fetch ALL availability rows (including soft-deleted) just to count past activity.
    // Lightweight: only staff_name, no joins.
    authFetch(SUPABASE_URL + '/rest/v1/availability?select=staff_name',
      { headers: apiHeaders() }),
    // NEW HIRE badge — past placements (no date filter, trimmed client-side
    // by joining against state.events / loaded events. See note above.)
    authFetch(pastPlacementsUrl, { headers: apiHeaders() }),
    // NEW HIRE badge — candidate phones for pipeline-hire detection
    authFetch(candidatesUrl, { headers: apiHeaders() }),
    // Recent signups for the box at the top of the page
    authFetch(recentSignupsUrl, { headers: apiHeaders() })
  ]).then(([events, employees, allAvail, pastPlacements, candidatePhones, recentSignups]) => {
    state.events = events || [];
    state.employees = employees || [];
    state.recentSignups = recentSignups || [];

    // Build historical signup counts per staff_name. Used to sort the
    // Available-to-call list — most-reliable employees first.
    state.historyCounts = {};
    (allAvail || []).forEach(r => {
      state.historyCounts[r.staff_name] = (state.historyCounts[r.staff_name] || 0) + 1;
    });

    // ----- NEW HIRE badge state assembly -----

    // Step 1: pipelineNames. Match employees ↔ candidates by normalized phone.
    // An employee with a candidate row sharing the same digit-stripped phone
    // is pipeline-hired. Bulk imports from 7Shifts / SQL runs won't have a
    // matching candidates row (or will phone-match by accident, in which
    // case we're no worse off than other heuristics).
    const candidatePhoneSet = new Set();
    (candidatePhones || []).forEach(c => {
      const norm = normalizePhone(c.phone);
      if (norm) candidatePhoneSet.add(norm);
    });
    state.pipelineNames = new Set();
    state.employees.forEach(e => {
      const empPhone = normalizePhone(e.phone);
      if (empPhone && candidatePhoneSet.has(empPhone)) {
        const fullName = ((e.first_name || '') + ' ' + (e.last_name || '')).trim();
        if (fullName) state.pipelineNames.add(fullName);
      }
    });

    // Step 2: venueExperience. For each past placement (event_date < today,
    // removed_at IS NULL), increment counter for that (staff_name|venue).
    // We need event_date to filter past-only, but pastPlacements only has
    // event_id. So we build a quick eventDate lookup. CAVEAT: this lookup
    // only covers events currently in state.events (the visible date range).
    // For past placements at events outside the visible range, we don't have
    // event_date — so we conservatively count them ALL as past (any placement
    // not in today's-or-future visible window is assumed past). This is
    // correct in practice because: (a) future events are always loaded since
    // they're upcoming, (b) past events are NOT loaded so any unknown event_id
    // is past. Result: matches intent without an extra event_date fetch.
    const visibleEventIds = new Set(state.events.map(e => e.id));
    const visibleEventDate = {};
    state.events.forEach(e => { visibleEventDate[e.id] = e.event_date; });

    state.venueExperience = {};
    (pastPlacements || []).forEach(p => {
      if (!p.staff_name || !p.venue) return;
      // If the placement's event is in our visible set AND its date is in the
      // future (or today), exclude it from "past placements".
      if (visibleEventIds.has(p.event_id)) {
        const ed = visibleEventDate[p.event_id];
        if (ed && ed >= today) return; // future/today placement — skip
      }
      // Otherwise count it as a past placement.
      const key = p.staff_name + '|' + p.venue;
      state.venueExperience[key] = (state.venueExperience[key] || 0) + 1;
    });

    // ----- end NEW HIRE assembly -----

    // ----- Recent-signups event resolution -----
    // Recent signups can reference events outside the current visible date
    // range (e.g. a signup for next month while the user is viewing this
    // week). We need event_name + venue + event_date for every referenced
    // event. Build a lookup primed with state.events, then fetch any
    // missing event_ids in a follow-up query. Volume is bounded — typically
    // a handful of distinct events in a 36-hour window.
    state.recentSignupEvents = {};
    state.events.forEach(e => {
      state.recentSignupEvents[e.id] = {
        id: e.id, event_name: e.event_name, venue: e.venue, event_date: e.event_date
      };
    });
    const missingEventIds = [];
    state.recentSignups.forEach(r => {
      if (r.event_id && !state.recentSignupEvents[r.event_id]) {
        if (missingEventIds.indexOf(r.event_id) === -1) missingEventIds.push(r.event_id);
      }
    });
    let resolveMissingEvents = Promise.resolve();
    if (missingEventIds.length > 0) {
      const missingInList = '(' + missingEventIds.map(id => '"' + id + '"').join(',') + ')';
      resolveMissingEvents = authFetch(
        SUPABASE_URL + '/rest/v1/events?select=id,event_name,venue,event_date&id=in.' + missingInList,
        { headers: apiHeaders() }
      ).then(rows => {
        (rows || []).forEach(e => { state.recentSignupEvents[e.id] = e; });
      }).catch(err => {
        // Non-blocking — if this fetch fails, recent-signups rows for
        // out-of-range events render with "(unknown event)" rather than
        // breaking the whole page.
        console.warn('Recent-signups missing-event lookup failed:', err);
      });
    }
    // ----- end recent-signups resolution -----

    if (!state.events.length) {
      state.staffingRequests = [];
      state.availability = [];
      state.removedAvailability = [];
      state.multiSignupCounts = {};
      state.assignments = {};
      state.positions = [];
      // Wait for the missing-event lookup to finish before resolving so
      // the render call below sees the full lookup populated.
      return resolveMissingEvents;
    }

    const eventIds = state.events.map(e => e.id);
    const inList = '(' + eventIds.map(id => '"' + id + '"').join(',') + ')';
    const eventDates = Array.from(new Set(state.events.map(e => e.event_date)));
    const dateInList = '(' + eventDates.map(d => '"' + d + '"').join(',') + ')';

    return Promise.all([
      authFetch(SUPABASE_URL + '/rest/v1/staffing_requests?event_id=in.' + inList + '&headcount=gt.0',
        { headers: apiHeaders() }),
      // Fetch ALL availability rows for these events (including soft-deleted ones).
      // We split active vs removed client-side so the manager can toggle a "removed"
      // section in the available panel and restore people if needed.
      authFetch(SUPABASE_URL + '/rest/v1/availability?select=id,staff_name,event_id,note,removed_at,removed_by&event_id=in.' + inList,
        { headers: apiHeaders() }),
      authFetch(SUPABASE_URL + '/rest/v1/availability_assignments?event_date=in.' + dateInList,
        { headers: apiHeaders() }),
      authFetch(SUPABASE_URL + '/rest/v1/position_assignments?event_id=in.' + inList + '&removed_at=is.null',
        { headers: apiHeaders() }),
      // Resolve any recent-signup events that aren't in state.events. This
      // doesn't return data into the destructured array — it populates
      // state.recentSignupEvents as a side effect via the lookup primed above.
      resolveMissingEvents
    ]).then(([reqs, availAll, assigns, positions]) => {
      state.staffingRequests = reqs || [];
      // Split availability into active (no removed_at) and removed.
      state.availability = (availAll || []).filter(a => !a.removed_at);
      state.removedAvailability = (availAll || []).filter(a => !!a.removed_at);
      state.positions = positions || [];

      // Build multi-signup index: count signups per (date, person)
      const eventById = {};
      state.events.forEach(e => { eventById[e.id] = e; });
      const byDate = {};
      state.availability.forEach(a => {
        const ev = eventById[a.event_id];
        if (!ev) return;
        const d = ev.event_date;
        if (!byDate[d]) byDate[d] = {};
        if (!byDate[d][a.staff_name]) byDate[d][a.staff_name] = [];
        byDate[d][a.staff_name].push(a.event_id);
      });
      state.multiSignupByDate = byDate;
      state.multiSignupCounts = {};
      Object.keys(byDate).forEach(d => {
        Object.keys(byDate[d]).forEach(name => {
          state.multiSignupCounts[d + '|' + name] = byDate[d][name].length;
        });
      });

      // Build assignment index
      state.assignments = {};
      (assigns || []).forEach(a => {
        if (!state.assignments[a.event_date]) state.assignments[a.event_date] = {};
        state.assignments[a.event_date][a.staff_name] = a.assigned_event_id;
      });
    });
  }).then(() => {
    populateVenueFilter();
    render();
  }).catch(err => {
    if (err.authFailed) { handleAuthFailure(); return; }
    console.error(err);
    document.getElementById('content').innerHTML =
      '<div class="empty-state"><div class="empty-state-title">Could not load data</div>' + (err.message || '') + '</div>';
  });
}

function populateVenueFilter() {
  const sel = document.getElementById('venue-filter');
  const current = sel.value || state.filters.venue;
  const venues = Array.from(new Set(state.events.map(e => e.venue))).sort();
  sel.innerHTML = '<option value="">All venues</option>' +
    venues.map(v => '<option value="' + v + '"' + (v === current ? ' selected' : '') + '>' + v + '</option>').join('');
  state.filters.venue = current;
}

// ---------- Filtering & grouping ----------
function visibleEvents() {
  return state.events.filter(e => !state.filters.venue || e.venue === state.filters.venue);
}

function eventsGroupedByDate() {
  const out = {};
  visibleEvents().forEach(e => {
    if (!out[e.event_date]) out[e.event_date] = [];
    out[e.event_date].push(e);
  });
  return out;
}

// Stand requests for an event (only those with headcount > 0)
function standsForEvent(eventId, venue) {
  const reqs = state.staffingRequests.filter(r => r.event_id === eventId);
  // Group by stand
  const byStand = {};
  reqs.forEach(r => {
    if (HIDDEN_STANDS.indexOf(r.stand) !== -1) return;
    if (!byStand[r.stand]) byStand[r.stand] = [];
    byStand[r.stand].push(r);
  });
  // Return list sorted: revenue stands first (alpha), Hawking second-to-last, Support last
  const standNames = Object.keys(byStand);
  const order = (s) => {
    if (s === SUPPORT_STAND) return 99;
    if (s === HAWKING_STAND) return 90;
    return 1;
  };
  standNames.sort((a, b) => {
    const oa = order(a), ob = order(b);
    if (oa !== ob) return oa - ob;
    return a.localeCompare(b);
  });
  return standNames.map(s => ({
    stand: s,
    requests: byStand[s].sort((a, b) => roleSortKey(a.role) - roleSortKey(b.role))
  }));
}

// ---------- Position helpers ----------
function positionsFor(eventId, stand, role) {
  return state.positions.filter(p =>
    p.event_id === eventId && p.stand === stand && p.role === role);
}
function positionsForEvent(eventId) {
  return state.positions.filter(p => p.event_id === eventId);
}
function eventTotalNeeded(eventId) {
  const reqs = state.staffingRequests.filter(r => r.event_id === eventId);
  return reqs.reduce((s, r) => s + (r.headcount || 0), 0);
}
function eventTotalFilled(eventId) {
  return positionsForEvent(eventId).length;
}

// Effective signed-up count for an event (people minus those assigned elsewhere same date)
function effectiveSignupCount(event) {
  const date = event.event_date;
  const assignedToOther = state.assignments[date] || {};
  const sigs = state.availability.filter(a => a.event_id === event.id);
  return sigs.filter(a => {
    const assigned = assignedToOther[a.staff_name];
    return !assigned || assigned === event.id;
  }).length;
}

// Number of people signed up for THIS event who are also signed up for another event
// the same day AND have not yet been assigned anywhere. These are the "needs-decision"
// folks for this specific event.
function unresolvedForEvent(event) {
  const date = event.event_date;
  const assigned = state.assignments[date] || {};
  const sigs = state.availability.filter(a => a.event_id === event.id);
  let count = 0;
  sigs.forEach(s => {
    const multiCount = state.multiSignupCounts[date + '|' + s.staff_name] || 0;
    if (multiCount > 1 && !assigned[s.staff_name]) count++;
  });
  return count;
}

// ---------- Recent signups box ----------
//
// Builds the "Recent signups" box at the top of the page. Buckets the last
// 36 hours of signup activity into three 12-hour windows (current, prior,
// prior-prior). The current bucket starts at the most recent 8:00 PM local
// time. Respects the venue filter; ignores the date range filter — the box
// is about signup activity, not event coverage.

// Returns a Date set to the most recent 8:00 PM local time at-or-before now.
function mostRecent8pm() {
  const d = new Date();
  if (d.getHours() < 20) {
    // Before 8 PM today → the most recent 8 PM was yesterday at 8 PM.
    d.setDate(d.getDate() - 1);
  }
  d.setHours(20, 0, 0, 0);
  return d;
}

// Returns the three bucket windows as [{start, end, label}, ...] ordered
// most-recent first. Each bucket spans 12 hours. The current bucket's end
// is now (open-ended-ish, but we treat it as "everything since start").
function recentSignupsBuckets() {
  const now = new Date();
  const cur8 = mostRecent8pm();           // boundary: current bucket starts here
  const buckets = [];

  // Current bucket: cur8 → now. Label: "Since 8:00 PM yesterday" or
  // "Since 8:00 PM today" depending on whether cur8 is yesterday or today.
  // (cur8 is yesterday when the local clock is between midnight and 8 PM;
  // it's today when the clock is between 8 PM and midnight.)
  let curLabel;
  if (cur8.toDateString() === now.toDateString()) {
    curLabel = 'Since 8:00 PM today';
  } else {
    curLabel = 'Since 8:00 PM yesterday';
  }
  buckets.push({ start: cur8, end: now, label: curLabel, isCurrent: true });

  // Two prior 12-hour windows, walking backward in 12-hour steps from cur8.
  for (let i = 1; i <= 2; i++) {
    const end = new Date(cur8.getTime() - (i - 1) * 12 * 3600 * 1000);
    const start = new Date(cur8.getTime() - i * 12 * 3600 * 1000);
    // Label: "Wednesday 8:00 AM – Wednesday 8:00 PM" or similar.
    // Boundaries alternate between 8 AM and 8 PM.
    const labelOpts = { weekday: 'long' };
    const startLabel = start.toLocaleDateString('en-US', labelOpts) + ' ' +
      (start.getHours() === 20 ? '8:00 PM' : '8:00 AM');
    const endLabel = end.toLocaleDateString('en-US', labelOpts) + ' ' +
      (end.getHours() === 20 ? '8:00 PM' : '8:00 AM');
    buckets.push({
      start, end, label: startLabel + ' – ' + endLabel, isCurrent: false
    });
  }
  return buckets;
}

// Returns true if a recent-signup row should be visible given the current
// venue filter. Resolves the row's event via state.recentSignupEvents.
function recentSignupVenueMatches(row) {
  if (!state.filters.venue) return true;
  const ev = state.recentSignupEvents[row.event_id];
  if (!ev) return false;
  return ev.venue === state.filters.venue;
}

function fmtSignupTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  let h = d.getHours();
  const m = d.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + String(m).padStart(2, '0') + ' ' + ap;
}

function renderRecentSignupsBox() {
  // Filter to venue-matching rows once
  const allFiltered = state.recentSignups.filter(recentSignupVenueMatches);
  const buckets = recentSignupsBuckets();

  // Distribute filtered rows into buckets. Anything earlier than the
  // earliest bucket's start is dropped (older than 36 hours).
  const earliest = buckets[buckets.length - 1].start;
  const visible = allFiltered.filter(r => {
    const t = new Date(r.submitted_at);
    return t >= earliest;
  });

  // Total count for header
  const totalCount = visible.length;

  // Group visible rows into their bucket
  const byBucket = buckets.map(() => []);
  visible.forEach(r => {
    const t = new Date(r.submitted_at);
    for (let i = 0; i < buckets.length; i++) {
      if (t >= buckets[i].start && t <= buckets[i].end) {
        byBucket[i].push(r);
        break;
      }
    }
  });

  // True empty: zero rows across all buckets. Render quiet single line.
  if (totalCount === 0) {
    return '<div class="recent-signups"><div class="recent-signups-empty">' +
      'No new signups in the last 36 hours.' +
      (state.filters.venue ? ' (Filtered to ' + escapeHtml(state.filters.venue) + ')' : '') +
      '</div></div>';
  }

  // Decide expand/collapse default. If user has explicitly toggled this
  // session, honor that. Otherwise: expanded if current bucket has signups.
  let expanded;
  if (_recentSignupsManualState === null) {
    expanded = byBucket[0].length > 0;
  } else {
    expanded = _recentSignupsManualState;
  }

  let html = '<div class="recent-signups' + (expanded ? ' expanded' : '') + '" id="recent-signups">';
  html += '<div class="recent-signups-head" data-toggle-recent-signups="1">';
  html += '<span class="rs-chevron">▼</span>';
  html += '<span class="recent-signups-title">Recent signups</span>';
  html += '<span class="recent-signups-count' + (totalCount === 0 ? ' zero' : '') + '">' + totalCount + '</span>';
  html += '<span class="recent-signups-spacer"></span>';
  if (state.filters.venue) {
    html += '<span class="recent-signups-hint">filtered to ' + escapeHtml(state.filters.venue) + '</span>';
  } else {
    html += '<span class="recent-signups-hint">last 36 hours</span>';
  }
  html += '</div>';

  if (expanded) {
    html += '<div class="recent-signups-body">';
    buckets.forEach((b, i) => {
      html += '<div class="rs-bucket">';
      html += '<div class="rs-bucket-head">' + escapeHtml(b.label) + '</div>';
      const rows = byBucket[i];
      if (rows.length === 0) {
        html += '<div class="rs-bucket-empty">(no signups)</div>';
      } else {
        rows.forEach(r => { html += renderRecentSignupRow(r); });
      }
      html += '</div>';
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderRecentSignupRow(r) {
  const ev = state.recentSignupEvents[r.event_id];
  const venue = ev ? ev.venue : null;
  const eventName = ev ? ev.event_name : '(unknown event)';
  const isRemoved = !!r.removed_at;
  const homeV = homeVenueOf(r.staff_name);
  const isMismatch = venue && homeV && homeV !== venue;
  const isNew = venue ? isNewAtVenue(r.staff_name, venue) : false;

  let html = '<div class="rs-row' + (isRemoved ? ' removed' : '') + '">';
  html += '<span class="rs-time">' + escapeHtml(fmtSignupTime(r.submitted_at)) + '</span>';
  html += '<span class="rs-name">' + escapeHtml(r.staff_name) + '</span>';
  if (isNew) {
    const placementCount = venue ? venuePlacementCount(r.staff_name, venue) : 0;
    const tooltip = 'Pipeline-hired employee. ' + placementCount +
      ' prior shift' + (placementCount === 1 ? '' : 's') +
      ' at ' + venue + ' (threshold ' + NEW_HIRE_THRESHOLD + ').';
    html += '<span class="new-hire-tag" title="' + escapeAttr(tooltip) + '">NEW</span>';
  }
  if (homeV) {
    const hvColor = VENUE_COLORS[homeV] || '#666';
    const hvTip = 'Home component: ' + homeV + (venue && homeV === venue ? ' (matches event)' : ' (does not match event)');
    html += '<span class="home-venue-tag" style="background:' + hvColor + ';" title="' + escapeAttr(hvTip) + '">' + escapeHtml(homeV) + '</span>';
  }
  html += '<span class="rs-arrow">→</span>';
  html += '<span class="rs-event">' + escapeHtml(eventName);
  if (venue) html += ' <span class="rs-event-venue">(' + escapeHtml(venue) + ')</span>';
  html += '</span>';
  if (isMismatch) {
    html += '<span class="rs-mismatch" title="Home component (' + escapeHtml(homeV) + ') does not match event venue (' + escapeHtml(venue) + ')">⚠</span>';
  }
  html += '</div>';
  return html;
}

// ---------- Rendering ----------
function render() {
  const root = document.getElementById('content');
  const grouped = eventsGroupedByDate();
  const dates = Object.keys(grouped).sort();

  // Recent signups box always renders first (when there's data) — it's
  // independent of the event/date list and uses its own filter logic.
  const recentSignupsHtml = renderRecentSignupsBox();

  if (!dates.length) {
    root.innerHTML = recentSignupsHtml +
      '<div class="empty-state"><div class="empty-state-title">No events in this range</div>Try a wider date range or a different venue.</div>';
    attachRecentSignupsHandlers();
    return;
  }
  let html = recentSignupsHtml;
  dates.forEach(date => {
    const events = grouped[date];
    const totalNeed = events.reduce((s, e) => s + Math.max(eventTotalNeeded(e.id), 0), 0);

    // Count distinct unique humans available across the day, multi-signup people only count once.
    // Same logic as effectiveSignupCount but at day level: every signup name on that date,
    // deduped — that's the actual headcount available across all events combined.
    const uniqueNames = new Set();
    events.forEach(e => {
      const sigs = state.availability.filter(a => a.event_id === e.id);
      sigs.forEach(s => uniqueNames.add(s.staff_name));
    });
    const availableHumans = uniqueNames.size;

    // Color the day pill based on coverage: green if we have enough humans for all positions,
    // amber if we're a little short, red if we're significantly short.
    let pillCls = 'green';
    if (totalNeed > 0) {
      const ratio = availableHumans / totalNeed;
      if (ratio < 0.7) pillCls = 'red';
      else if (ratio < 1.0) pillCls = 'amber';
    }

    // Day-level unresolved = distinct people who signed up for >1 event today and have no assignment.
    // Per-event unresolved (rendered on each row) counts each event's view of the same set, so
    // per-event sums will naturally be larger than this distinct-person total. Both are correct
    // for what they measure.
    const unresolvedNames = new Set();
    events.forEach(e => {
      const sigs = state.availability.filter(a => a.event_id === e.id);
      sigs.forEach(s => {
        if ((state.multiSignupCounts[date + '|' + s.staff_name] || 0) > 1) {
          const assigned = (state.assignments[date] || {})[s.staff_name];
          if (!assigned) unresolvedNames.add(s.staff_name);
        }
      });
    });
    const unresolved = unresolvedNames.size;

    html += '<div class="day-group">';
    html += '<h2>' + fmtDayHeader(date) + '</h2>';
    html += '<span class="day-pill-primary ' + pillCls + '">' +
      availableHumans + ' / ' + totalNeed + ' people available</span>';
    html += '<span class="day-spacer"></span>';
    html += '<div class="day-pills-secondary">';
    if (unresolved > 0) html += '<span class="day-pill warn">⚠ ' + unresolved + ' unresolved multi-signup' + (unresolved === 1 ? '' : 's') + '</span>';
    html += '</div></div>';

    events.forEach(ev => { html += renderEventRow(ev); });
  });
  root.innerHTML = html;
  attachEventHandlers();
  attachRecentSignupsHandlers();
}

function eventStatusClass(ev) {
  const needed = eventTotalNeeded(ev.id);
  const filled = eventTotalFilled(ev.id);
  if (needed === 0) return { cls: 'not-submitted', tag: 'Not Submitted' };
  if (filled >= needed) return { cls: 'staffed', tag: '✓ Staffed' };
  return { cls: 'submitted', tag: 'Submitted' };
}

function renderEventRow(ev) {
  const isExpanded = state.expandedEvents.has(ev.id);
  const status = eventStatusClass(ev);
  const needed = eventTotalNeeded(ev.id);
  const filled = eventTotalFilled(ev.id);
  const pct = needed > 0 ? Math.min(100, Math.round((filled / needed) * 100)) : 0;
  let fillCls = 'red';
  if (pct >= 100) fillCls = 'green';
  else if (pct >= 50) fillCls = 'amber';
  const locked = isLocked(ev.event_date) && !state.unlockedEvents.has(ev.id);

  // Display Report time (gates - 1 hour, or explicit report_time) instead of
  // gates time. This is the time staff are actually told to arrive.
  const reportT = getReportTime(ev);
  const time = reportT ? 'Report ' + fmtTime(reportT) +
