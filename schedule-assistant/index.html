    (ev.estimated_end_time ? ' – ' + fmtTime(ev.estimated_end_time) : '') : '';

  let html = '<div class="event-row ' + status.cls + (isExpanded ? ' expanded' : '') + '" data-event-id="' + ev.id + '">';
  html += '<div class="event-head">';
  html += '<span class="venue-badge">' + ev.venue + '</span>';
  html += '<span class="event-name">' + escapeHtml(ev.event_name || '') + '</span>';
  if (time) html += '<span class="event-time">' + time + '</span>';
  html += '<span class="status-tag ' + status.cls + '">' + status.tag + '</span>';
  const evUnresolved = unresolvedForEvent(ev);
  if (evUnresolved > 0) {
    html += '<span class="unresolved-tag">⚠ ' + evUnresolved + ' unresolved</span>';
  }
  if (locked) html += '<span class="lock-tag">🔒 Locked</span>';
  html += '<span class="event-spacer"></span>';

  // Dual coverage meter: signed-up + filled side by side
  const signedUp = effectiveSignupCount(ev);
  const sigPct = needed > 0 ? Math.min(100, Math.round((signedUp / needed) * 100)) : 0;
  const sigShort = needed > 0 && signedUp < needed;
  let sigBarCls = 'blue';
  if (needed > 0 && signedUp < needed) sigBarCls = 'red';

  if (needed > 0 || filled > 0 || signedUp > 0) {
    html += '<div class="coverage-dual">';
    // Signups (left)
    html += '<div class="coverage-block signups' + (sigShort ? ' short' : '') + '">';
    html += '<div class="coverage-line"><span class="coverage-count">' + signedUp + ' / ' + (needed || '?') + '</span><span class="coverage-sub">signed up</span></div>';
    html += '<div class="coverage-bar"><div class="coverage-fill ' + sigBarCls + '" style="width:' + sigPct + '%"></div></div>';
    html += '</div>';
    // Filled (right)
    html += '<div class="coverage-block">';
    html += '<div class="coverage-line"><span class="coverage-count">' + filled + ' / ' + (needed || '?') + '</span><span class="coverage-sub">filled</span></div>';
    html += '<div class="coverage-bar"><div class="coverage-fill ' + fillCls + '" style="width:' + pct + '%"></div></div>';
    html += '</div>';
    html += '</div>';
  }

  html += '<button class="btn btn-print" data-print-event="' + ev.id + '">🖨 Print</button>';
  html += '<button class="chevron">▼</button>';
  html += '</div>';

  if (isExpanded) html += renderExpanded(ev, locked);
  html += '</div>';
  return html;
}

function renderExpanded(ev, locked) {
  const standGroups = standsForEvent(ev.id, ev.venue);
  const supportGroup = standGroups.find(g => g.stand === SUPPORT_STAND);
  const nonSupportGroups = standGroups.filter(g => g.stand !== SUPPORT_STAND);
  let html = '<div class="event-body">';

  if (locked) {
    const isScheduler = pcAuth.isAdmin();
    html += '<div class="locked-overlay">';
    html += '<span class="lock-icon">🔒</span>';
    html += '<span><strong>This event is locked.</strong> Position changes after midnight day-of require a scheduler. Empty slots can still be filled.</span>';
    html += '<button class="unlock-link' + (isScheduler ? '' : ' disabled') + '" data-unlock-event="' + ev.id + '">' + (isScheduler ? 'Unlock' : 'Unlock (admin only)') + '</button>';
    html += '</div>';
  }

  html += '<div class="workspace">';
  html += renderAvailablePanel(ev);
  html += '<div>';
  html += renderSummaryBar(ev);

  if (!standGroups.length) {
    html += '<div class="no-stands-msg">No staffing requests submitted for this event yet. <a href="/event-planning/">Open Event Planning →</a></div>';
  } else {
    if (nonSupportGroups.length) {
      html += '<div class="stands-grid">';
      nonSupportGroups.forEach(g => { html += renderStandCard(ev, g, locked); });
      html += '</div>';
    }
    if (supportGroup) {
      html += renderSupportSection(ev, supportGroup, locked);
    }
  }

  html += '</div></div></div>';
  return html;
}

function renderSummaryBar(ev) {
  const standGroups = standsForEvent(ev.id, ev.venue);
  const totalNeed = eventTotalNeeded(ev.id);
  const totalFilled = eventTotalFilled(ev.id);
  let standsReady = 0;
  standGroups.forEach(g => {
    let need = 0, fill = 0;
    g.requests.forEach(r => {
      need += r.headcount;
      fill += positionsFor(ev.id, g.stand, r.role).length;
    });
    if (fill >= need && need > 0) standsReady++;
  });
  const fillCls = totalFilled >= totalNeed ? 'ok' : 'warn';

  let html = '<div class="summary-bar">';
  html += '<span class="sb-label">Summary</span>';
  html += '<span class="summary-chip ' + fillCls + '"><span class="summary-chip-label">Filled</span><span class="num">' + totalFilled + '</span><span class="denom">/ ' + totalNeed + '</span></span>';
  html += '<span class="summary-chip neutral"><span class="summary-chip-label">Stands ready</span><span class="num">' + standsReady + '</span><span class="denom">/ ' + standGroups.length + '</span></span>';
  html += '<span class="summary-chip neutral"><span class="summary-chip-label">Locks</span><span class="num">12:01 AM</span><span class="denom">' + fmtDayHeader(ev.event_date).split(',')[0] + '</span></span>';
  html += '<span class="event-spacer"></span>';
  html += '<button class="audit-link" data-callable-event="' + ev.id + '" style="margin-right:14px;">📞 Available to call</button>';
  html += '<button class="audit-link" data-audit-event="' + ev.id + '">Open audit log</button>';
  html += '</div>';
  return html;
}

function renderAvailablePanel(ev) {
  const sigs = state.availability.filter(a => a.event_id === ev.id);
  const removedSigs = state.removedAvailability.filter(a => a.event_id === ev.id);
  const placedNamesHere = new Set(positionsForEvent(ev.id).map(p => p.staff_name));
  const dayAssignments = state.assignments[ev.event_date] || {};

  // Determine state for each signup:
  //   PLACED_HERE  - has a position_assignments row at this event
  //   ASSIGNED_AWAY - has availability_assignments row pointing at a different event
  //   AVAILABLE     - signed up here, neither placed nor assigned-away (may or may not be multi-signup)
  function pillState(staffName) {
    if (placedNamesHere.has(staffName)) return 'PLACED_HERE';
    const assigned = dayAssignments[staffName];
    if (assigned && assigned !== ev.id) return 'ASSIGNED_AWAY';
    return 'AVAILABLE';
  }

  const placedCount = sigs.filter(s => pillState(s.staff_name) === 'PLACED_HERE').length;
  const awayCount = sigs.filter(s => pillState(s.staff_name) === 'ASSIGNED_AWAY').length;
  const unplaced = sigs.length - placedCount - awayCount;

  let html = '<aside class="available-panel">';
  html += '<div class="panel-head">';
  html += '<span class="panel-title">Available</span>';
  html += '<span class="panel-count">' + unplaced + ' left · ' + sigs.length + ' signed up</span>';
  html += '</div>';
  html += '<input class="panel-search" placeholder="Search…" data-event-id="' + ev.id + '">';
  if (unplaced > 0) {
    html += '<div class="unplaced-strip">⚠ Unplaced names will be reported after lock</div>';
  }
  html += '<div class="people-list">';

  // Sort order: AVAILABLE first (alpha), then PLACED_HERE (alpha), then ASSIGNED_AWAY (alpha)
  const stateRank = { AVAILABLE: 0, PLACED_HERE: 1, ASSIGNED_AWAY: 2 };
  const sorted = sigs.slice().sort((a, b) => {
    const sa = stateRank[pillState(a.staff_name)];
    const sb = stateRank[pillState(b.staff_name)];
    if (sa !== sb) return sa - sb;
    return a.staff_name.localeCompare(b.staff_name);
  });

  sorted.forEach(s => {
    const ps = pillState(s.staff_name);
    const multiCount = state.multiSignupCounts[ev.event_date + '|' + s.staff_name] || 1;
    const isMulti = multiCount > 1;

    let cls = 'person-pill';
    let draggable = 'true';

    if (ps === 'PLACED_HERE') {
      cls += ' placed';
      draggable = 'false';
    } else if (ps === 'ASSIGNED_AWAY') {
      cls += ' assigned-away';
      draggable = 'false';
    } else if (isMulti) {
      cls += ' multi';
    }

    html += '<div class="' + cls + '" draggable="' + draggable +
      '" data-staff-name="' + escapeAttr(s.staff_name) + '" data-source="signup" data-event-id="' + ev.id +
      '" data-availability-id="' + escapeAttr(s.id || '') + '">';
    html += '<span class="person-name">' + escapeHtml(s.staff_name) + '</span>';

    // NEW HIRE badge — render before the right-side state indicators so it
    // sits visually next to the name. Only renders on AVAILABLE pills.
    // Decision: not shown on PLACED_HERE or ASSIGNED_AWAY pills — once the
    // person is committed somewhere the "is this person new at this venue"
    // question is no longer the operative one for the manager looking at
    // the available panel.
    if (ps === 'AVAILABLE' && isNewAtVenue(s.staff_name, ev.venue)) {
      const placementCount = venuePlacementCount(s.staff_name, ev.venue);
      const tooltip = 'Pipeline-hired employee. ' + placementCount +
        ' prior shift' + (placementCount === 1 ? '' : 's') +
        ' at ' + ev.venue + ' (threshold ' + NEW_HIRE_THRESHOLD + ').';
      html += '<span class="new-hire-tag" title="' + escapeAttr(tooltip) + '">NEW</span>';
    }

    // Home-venue badge — renders on every pill state (AVAILABLE, PLACED_HERE,
    // ASSIGNED_AWAY) because "should this person be here at all?" is relevant
    // in every context, unlike NEW HIRE which is only meaningful at the
    // pre-placement decision point. NULL and 'NA' both suppress (homeVenueOf
    // normalizes both to null).
    const _hv = homeVenueOf(s.staff_name);
    if (_hv) {
      const hvColor = VENUE_COLORS[_hv] || '#666';
      const hvTip = 'Home component: ' + _hv + (_hv === ev.venue ? ' (matches this event)' : ' (does not match this event)');
      html += '<span class="home-venue-tag" style="background:' + hvColor + ';" title="' + escapeAttr(hvTip) + '">' + escapeHtml(_hv) + '</span>';
    }

    if (ps === 'PLACED_HERE') {
      html += '<span class="placed-here-tag">✓ here</span>';
    } else if (ps === 'ASSIGNED_AWAY') {
      const otherEvId = dayAssignments[s.staff_name];
      const otherEv = state.events.find(x => x.id === otherEvId);
      const otherLabel = otherEv ? otherEv.venue : '?';
      html += '<span class="assigned-away-tag" data-assign-staff="' + escapeAttr(s.staff_name) +
        '" data-assign-event="' + ev.id + '" title="Click to see all events">↗ ' + escapeHtml(otherLabel) + '</span>';
    } else if (isMulti) {
      html += '<span class="signup-multi" data-assign-staff="' + escapeAttr(s.staff_name) +
        '" data-assign-event="' + ev.id + '" title="Click to see all events">' + multiCount + 'x</span>';
    }

    // Soft-remove X — only allowed when person isn't already placed at this event
    // (placed pills get released via the X on the slot pill, not from the available panel).
    if (ps !== 'PLACED_HERE' && s.id) {
      html += '<button class="signup-x" data-soft-remove-id="' + escapeAttr(s.id) +
        '" data-soft-remove-name="' + escapeAttr(s.staff_name) +
        '" title="Remove from list (preserves their signup record)">✕</button>';
    }

    // Note line — italic, beneath the name. Wraps within the pill.
    if (s.note && s.note.trim()) {
      html += '<div class="person-note" title="' + escapeAttr(s.note) + '">📝 ' + escapeHtml(s.note) + '</div>';
    }

    html += '</div>';
  });

  html += '</div>';

  // Removed section — collapsible. Pills remain in the data so historical signup
  // counts include them. Manager can restore explicitly OR drag a removed pill
  // into a slot, which auto-restores and places in one motion.
  if (removedSigs.length > 0) {
    const expanded = state.expandedRemoved && state.expandedRemoved.has(ev.id);
    html += '<div class="removed-section">';
    html += '<button class="removed-toggle" data-toggle-removed="' + ev.id + '">';
    html += '<span>' + (expanded ? '▾' : '▸') + ' Removed (' + removedSigs.length + ')</span>';
    html += '<span style="font-weight:500;font-size:10px;">manager-removed</span>';
    html += '</button>';
    if (expanded) {
      html += '<div class="removed-list">';
      removedSigs.slice().sort((a, b) => a.staff_name.localeCompare(b.staff_name)).forEach(s => {
        html += '<div class="person-pill removed" draggable="true"' +
          ' data-staff-name="' + escapeAttr(s.staff_name) + '"' +
          ' data-source="signup"' +
          ' data-event-id="' + ev.id + '"' +
          ' data-availability-id="' + escapeAttr(s.id || '') + '"' +
          ' data-was-removed="1">';
        html += '<span class="person-name">' + escapeHtml(s.staff_name) + '</span>';
        html += '<button class="restore-btn" data-restore-id="' + escapeAttr(s.id) +
          '" title="Restore signup back to active list">Restore</button>';
        if (s.note && s.note.trim()) {
          html += '<div class="person-note">📝 ' + escapeHtml(s.note) + '</div>';
        }
        if (s.removed_by) {
          html += '<div class="removed-meta">removed by ' + escapeHtml(s.removed_by) + '</div>';
        }
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  }

  html += '</aside>';
  return html;
}

function renderStandCard(ev, group, locked) {
  let need = 0, fill = 0;
  group.requests.forEach(r => {
    need += r.headcount;
    fill += positionsFor(ev.id, group.stand, r.role).length;
  });
  let tagCls = 'empty', barCls = 'empty';
  const pct = need > 0 ? Math.min(100, Math.round((fill / need) * 100)) : 0;
  // Over-staffed: more people placed than the current requirement. Happens when
  // a manager reduces headcount in event planning after pills were placed here.
  // Data is preserved — we just flag it so the manager can release the extras.
  const isOver = need > 0 && fill > need;
  if (isOver) { tagCls = 'over'; barCls = 'full'; }
  else if (fill >= need && need > 0) { tagCls = 'full'; barCls = 'full'; }
  else if (fill > 0) { tagCls = 'partial'; barCls = 'partial'; }

  let html = '<div class="stand-card" data-stand="' + escapeAttr(group.stand) + '">';
  html += '<div class="stand-card-head"><div class="stand-card-name">';
  html += escapeHtml(group.stand);
  html += '<span class="stand-fill-tag ' + tagCls + '"' +
    (isOver ? ' title="Over-staffed by ' + (fill - need) + '. Headcount was reduced after people were placed. Use ✕ to release the extras."' : '') +
    '>' + fill + ' / ' + need + '</span>';
  html += '</div><div class="stand-mini-bar"><div class="stand-mini-fill ' + barCls + '" style="width:' + pct + '%"></div></div></div>';

  group.requests.forEach(req => {
    html += renderRoleSection(ev, group.stand, req, locked);
  });
  html += '</div>';
  return html;
}

function renderRoleSection(ev, stand, req, locked) {
  const isLeadRole = /Lead|Supervisor|Manager/i.test(req.role);
  const filled = positionsFor(ev.id, stand, req.role);
  const slotsToShow = req.headcount;
  // Over-fill at role level: more pills than requested. Same cause as stand-level
  // over-fill — manager reduced headcount after placement. Render all pills (we
  // never auto-remove anyone), and add a visible warning so the manager knows
  // to release the extras with ✕.
  const isOver = filled.length > slotsToShow;
  const overBy = filled.length - slotsToShow;
  let html = '<div class="role-section' + (isLeadRole ? ' role-lead' : '') + (isOver ? ' over' : '') + '">';
  html += '<div class="role-header">' + escapeHtml(req.role) + ' <span class="role-count">' + req.headcount + '</span>';
  if (isOver) {
    html += '<span class="role-over-tag" title="Headcount was reduced from ' + filled.length +
      ' to ' + slotsToShow + ' after people were placed. Use ✕ to release ' + overBy +
      ' person' + (overBy === 1 ? '' : 's') + ' back to the available pool.">⚠ over by ' + overBy + '</span>';
  }
  html += '</div>';
  html += '<div class="role-stack' + (isOver ? ' over' : '') + '" data-event-id="' + ev.id + '" data-stand="' + escapeAttr(stand) + '" data-role="' + escapeAttr(req.role) + '">';

  filled.forEach(p => { html += renderFilledSlot(ev, p, locked); });

  const empties = Math.max(0, slotsToShow - filled.length);
  for (let i = 0; i < empties; i++) {
    const isTyping = state.typing &&
      state.typing.eventId === ev.id &&
      state.typing.stand === stand &&
      state.typing.role === req.role &&
      state.typing.slotIndex === i;
    if (isTyping) {
      html += renderTypingSlot();
    } else {
      html += '<div class="slot-empty' + (locked ? ' locked' : '') + '" data-event-id="' + ev.id +
        '" data-stand="' + escapeAttr(stand) + '" data-role="' + escapeAttr(req.role) + '" data-slot-index="' + i + '">drop here / click to type</div>';
    }
  }
  html += '</div></div>';
  return html;
}

function renderFilledSlot(ev, p, locked) {
  let cls = 'slot-filled';
  if (p.source === 'manual') cls += ' manager-typed';
  if (p.source === 'placeholder') cls += ' placeholder';
  if (locked) cls += ' locked';

  // Conflict check
  const multiCount = state.multiSignupCounts[ev.event_date + '|' + p.staff_name] || 1;
  if (multiCount > 1) cls += ' conflict';

  // Look up the signup note (only meaningful for source='signup' but we
  // include it whenever a signup row exists, in case manager typed someone
  // who had also signed up).
  let signupNote = '';
  if (p.source === 'signup' || p.source === 'manual') {
    const sig = state.availability.find(a =>
      a.event_id === ev.id && a.staff_name === p.staff_name);
    if (sig && sig.note && sig.note.trim()) signupNote = sig.note;
  }

  let html = '<div class="' + cls + '" draggable="' + (locked ? 'false' : 'true') + '" data-position-id="' + p.id + '" data-staff-name="' + escapeAttr(p.staff_name) + '" data-source="' + p.source + '">';
  if (multiCount > 1) html += '<span class="conflict-icon" data-assign-staff="' + escapeAttr(p.staff_name) + '" data-assign-event="' + ev.id + '" title="Click to see all events this person signed up for">⚠</span>';
  html += '<span class="person-name">' + escapeHtml(p.staff_name) + '</span>';
  // NEW HIRE badge on the placed pill — same logic as the Available panel.
  // Lets the manager see crew composition at a glance: 3 NEW pills clustered
  // in one stand vs. evenly distributed across stands tells different stories.
  if (isNewAtVenue(p.staff_name, ev.venue)) {
    const placementCount = venuePlacementCount(p.staff_name, ev.venue);
    const tooltip = 'Pipeline-hired employee. ' + placementCount +
      ' prior shift' + (placementCount === 1 ? '' : 's') +
      ' at ' + ev.venue + ' (threshold ' + NEW_HIRE_THRESHOLD + ').';
    html += '<span class="new-hire-tag" title="' + escapeAttr(tooltip) + '">NEW</span>';
  }
  // Home-venue badge on the placed pill — same logic as the Available panel.
  // Renders on every placed pill so the manager can scan a stand and see
  // home-venue composition at a glance.
  const _hvPlaced = homeVenueOf(p.staff_name);
  if (_hvPlaced) {
    const hvColor = VENUE_COLORS[_hvPlaced] || '#666';
    const hvTip = 'Home component: ' + _hvPlaced + (_hvPlaced === ev.venue ? ' (matches this event)' : ' (does not match this event)');
    html += '<span class="home-venue-tag" style="background:' + hvColor + ';" title="' + escapeAttr(hvTip) + '">' + escapeHtml(_hvPlaced) + '</span>';
  }
  if (p.source === 'manual') html += '<span class="manual-tag">TYPED</span>';
  if (p.source === 'placeholder') html += '<span class="placeholder-tag">PLACEHOLDER</span>';
  if (!locked) html += '<button class="x" data-remove-position="' + p.id + '" title="Remove">✕</button>';
  if (signupNote) {
    html += '<div class="person-note" title="' + escapeAttr(signupNote) + '">📝 ' + escapeHtml(signupNote) + '</div>';
  }
  html += '</div>';
  return html;
}

function renderTypingSlot() {
  const t = state.typing;
  let html = '<div class="slot-typing-wrap">';
  html += '<input class="slot-input" type="text" id="slot-input-active" value="' + escapeAttr(t.value) + '" placeholder="Type a name…">';
  html += '<div class="typeahead-list">' + renderTypeahead() + '</div>';
  html += '</div>';
  return html;
}

function renderTypeahead() {
  const t = state.typing;
  if (!t || !t.value || t.value.length < 1) {
    return '<div style="padding:6px;font-size:11px;color:var(--label)">Start typing…</div>';
  }
  const q = t.value.toLowerCase().trim();
  const ev = state.events.find(e => e.id === t.eventId);
  const dateSignups = ev ? Array.from(new Set(
    state.availability.filter(a => a.event_id === t.eventId).map(a => a.staff_name)
  )) : [];
  const matches = state.employees
    .map(e => ({ name: (e.first_name + ' ' + e.last_name).trim() }))
    .filter(e => e.name.toLowerCase().indexOf(q) !== -1)
    .slice(0, 8);
  if (!matches.length) {
    let html = '<div class="typeahead-no-match">';
    html += '<span>⚠ No employee matches "' + escapeHtml(t.value) + '"</span>';
    html += '<button class="add-placeholder" data-add-placeholder="' + escapeAttr(t.value) + '">+ Add as placeholder (will be flagged)</button>';
    html += '</div>';
    return html;
  }
  return matches.map((m, i) => {
    const isSignedUp = dateSignups.indexOf(m.name) !== -1;
    const cls = 'typeahead-item' + (i === t.focusedIndex ? ' focused' : '') + (isSignedUp ? ' signup-tag' : '');
    return '<div class="' + cls + '" data-pick-name="' + escapeAttr(m.name) + '">' +
      '<span class="ta-name">' + escapeHtml(m.name) + '</span>' +
      '<span class="ta-meta">' + (isSignedUp ? 'Employee · signed up today' : 'Employee') + '</span>' +
      '</div>';
  }).join('');
}

function renderSupportSection(ev, group, locked) {
  let need = 0, fill = 0;
  group.requests.forEach(r => {
    need += r.headcount;
    fill += positionsFor(ev.id, group.stand, r.role).length;
  });
  let html = '<div class="support-section">';
  html += '<div class="support-section-head"><span>Support Staff</span><span class="support-progress">' + fill + ' / ' + need + ' filled</span></div>';
  html += '<div class="support-roles">';
  group.requests.forEach(req => {
    const isLeadRole = /Manager|Supervisor/i.test(req.role);
    const filled = positionsFor(ev.id, group.stand, req.role);
    html += '<div class="support-role-card">';
    html += '<div class="role-section' + (isLeadRole ? ' role-lead' : '') + '" style="margin:0">';
    html += '<div class="role-header">' + escapeHtml(req.role) + ' <span class="role-count">' + req.headcount + '</span></div>';
    html += '<div class="role-stack" data-event-id="' + ev.id + '" data-stand="' + escapeAttr(group.stand) + '" data-role="' + escapeAttr(req.role) + '">';
    filled.forEach(p => { html += renderFilledSlot(ev, p, locked); });
    const empties = Math.max(0, req.headcount - filled.length);
    for (let i = 0; i < empties; i++) {
      const isTyping = state.typing && state.typing.eventId === ev.id && state.typing.stand === group.stand && state.typing.role === req.role && state.typing.slotIndex === i;
      if (isTyping) html += renderTypingSlot();
      else html += '<div class="slot-empty' + (locked ? ' locked' : '') + '" data-event-id="' + ev.id + '" data-stand="' + escapeAttr(group.stand) + '" data-role="' + escapeAttr(req.role) + '" data-slot-index="' + i + '">drop here / click to type</div>';
    }
    html += '</div></div></div>';
  });
  html += '</div></div>';
  return html;
}

// ---------- Escape helpers ----------
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escapeAttr(s) { return escapeHtml(s); }

// ---------- Helper: clear typing state cleanly ----------
// Centralized so every code path that ends a typing session removes
// the document-level outsideTypingClick listener. Without this, a stale
// listener can survive across saves (because the typeahead-item click
// uses stopPropagation, leaving a {once:true} listener queued) and then
// fire on a subsequent slot click — wiping out the freshly-set typing
// state right after it's set, which is what caused the "second name in
// a different slot won't open the input" bug.
function clearTypingState() {
  document.removeEventListener('click', outsideTypingClick);
  state.typing = null;
}

// Wire the Recent signups box click handler. The box is re-rendered on
// every render() call (because the events list also re-renders), so the
// handler is rebound here each time. Keeping it as a separate small
// function isolates it from attachEventHandlers' larger surface.
function attachRecentSignupsHandlers() {
  const head = document.querySelector('[data-toggle-recent-signups]');
  if (!head) return;
  head.addEventListener('click', () => {
    // Compute the next state by inverting the currently-effective state
    // (whether driven by manual choice or the signup-volume heuristic).
    const box = document.getElementById('recent-signups');
    const wasExpanded = box && box.classList.contains('expanded');
    _recentSignupsManualState = !wasExpanded;
    render();
  });
}

// ---------- Event handlers ----------
function attachEventHandlers() {
  document.querySelectorAll('.event-head').forEach(head => {
    head.addEventListener('click', e => {
      if (e.target.closest('.btn') || e.target.closest('.audit-link')) return;
      const row = head.closest('.event-row');
      const id = row.getAttribute('data-event-id');
      if (state.expandedEvents.has(id)) state.expandedEvents.delete(id);
      else state.expandedEvents.add(id);
      render();
    });
  });

  document.querySelectorAll('[data-print-event]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.getAttribute('data-print-event');
      printEvent(id);
    });
  });

  document.querySelectorAll('[data-audit-event]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openAuditLog(btn.getAttribute('data-audit-event'));
    });
  });

  document.querySelectorAll('[data-callable-event]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openCallableModal(btn.getAttribute('data-callable-event'));
    });
  });

  document.querySelectorAll('[data-unlock-event]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (btn.classList.contains('disabled')) return;
      const id = btn.getAttribute('data-unlock-event');
      state.unlockedEvents.add(id);
      logAction(id, null, 'unlocked', { reason: 'manual unlock' });
      render();
      showToast('Event unlocked');
    });
  });

  // Drag start on person pills (left panel)
  document.querySelectorAll('.person-pill[draggable="true"]').forEach(pill => {
    pill.addEventListener('dragstart', e => {
      state.drag = {
        staffName: pill.getAttribute('data-staff-name'),
        source: pill.getAttribute('data-source'),
        eventId: pill.getAttribute('data-event-id'),
        // If the pill was a removed signup, capture the availability id so the
        // drop handler can restore the row before placing.
        availabilityId: pill.getAttribute('data-availability-id') || null,
        wasRemoved: pill.getAttribute('data-was-removed') === '1'
      };
      e.dataTransfer.effectAllowed = 'move';
    });
  });

  // Drag start on filled slots (move within grid)
  document.querySelectorAll('.slot-filled[draggable="true"]').forEach(pill => {
    pill.addEventListener('dragstart', e => {
      e.stopPropagation();
      state.drag = {
        positionId: pill.getAttribute('data-position-id'),
        staffName: pill.getAttribute('data-staff-name'),
        source: pill.getAttribute('data-source')
      };
      e.dataTransfer.effectAllowed = 'move';
    });
  });

  // Click handlers for multi-signup badges and conflict icons → open assign modal
  document.querySelectorAll('[data-assign-staff]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      e.preventDefault();
      const staffName = el.getAttribute('data-assign-staff');
      const eventId = el.getAttribute('data-assign-event');
      const ev = state.events.find(x => x.id === eventId);
      if (ev) openAssignModal(staffName, ev);
    });
    // Block drag from starting when clicking the badge
    el.addEventListener('mousedown', e => e.stopPropagation());
  });

  // Drop targets: empty slots + role-stacks
  document.querySelectorAll('.role-stack').forEach(stack => {
    stack.addEventListener('dragover', e => {
      e.preventDefault();
      stack.classList.add('drag-over');
    });
    stack.addEventListener('dragleave', () => stack.classList.remove('drag-over'));
    stack.addEventListener('drop', e => {
      e.preventDefault();
      stack.classList.remove('drag-over');
      handleDrop(stack);
    });
  });

  // Click on empty slot → start typing.
  // Defensive: any prior typing-state listener is cleared at this point so
  // it can't fire later in the same click cycle and wipe the new state.
  document.querySelectorAll('.slot-empty:not(.locked)').forEach(slot => {
    slot.addEventListener('click', () => {
      document.removeEventListener('click', outsideTypingClick);
      state.typing = {
        eventId: slot.getAttribute('data-event-id'),
        stand: slot.getAttribute('data-stand'),
        role: slot.getAttribute('data-role'),
        slotIndex: parseInt(slot.getAttribute('data-slot-index'), 10),
        value: '',
        focusedIndex: 0
      };
      render();
      const input = document.getElementById('slot-input-active');
      if (input) input.focus();
    });
  });

  // Active typing input
  const activeInput = document.getElementById('slot-input-active');
  if (activeInput) {
    activeInput.addEventListener('input', () => {
      state.typing.value = activeInput.value;
      state.typing.focusedIndex = 0;
      // Re-render only the dropdown
      const list = activeInput.parentElement.querySelector('.typeahead-list');
      if (list) list.innerHTML = renderTypeahead();
      attachTypeaheadHandlers();
    });
    activeInput.addEventListener('keydown', e => {
      if (e.key === 'Escape') { clearTypingState(); render(); return; }
      if (e.key === 'Enter') {
        const focused = document.querySelector('.typeahead-item.focused');
        if (focused) {
          pickName(focused.getAttribute('data-pick-name'));
          return;
        }
        const placeholder = document.querySelector('[data-add-placeholder]');
        if (placeholder) {
          addPlaceholder(placeholder.getAttribute('data-add-placeholder'));
        }
        return;
      }
      if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        const items = document.querySelectorAll('.typeahead-item');
        if (!items.length) return;
        let idx = state.typing.focusedIndex || 0;
        idx += (e.key === 'ArrowDown' ? 1 : -1);
        if (idx < 0) idx = items.length - 1;
        if (idx >= items.length) idx = 0;
        state.typing.focusedIndex = idx;
        items.forEach((it, i) => {
          if (i === idx) it.classList.add('focused');
          else it.classList.remove('focused');
        });
      }
    });
    // Close on outside click. Always remove any existing listener first
    // before re-adding — defensive against stale listeners that survived
    // a save (typeahead clicks stopPropagation, so the previous {once:true}
    // listener could remain queued and fire on the next slot click).
    document.removeEventListener('click', outsideTypingClick);
    setTimeout(() => {
      document.addEventListener('click', outsideTypingClick);
    }, 0);
  }

  attachTypeaheadHandlers();

  // Remove buttons
  document.querySelectorAll('[data-remove-position]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      removePosition(btn.getAttribute('data-remove-position'));
    });
  });

  // Soft-remove signup (✕ on a signup pill in the available panel)
  document.querySelectorAll('[data-soft-remove-id]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      e.preventDefault();
      const availId = btn.getAttribute('data-soft-remove-id');
      const name = btn.getAttribute('data-soft-remove-name');
      softRemoveSignup(availId, name);
    });
    // Block drag-start when clicking the X
    btn.addEventListener('mousedown', e => e.stopPropagation());
  });

  // Restore signup (in removed section)
  document.querySelectorAll('[data-restore-id]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      e.preventDefault();
      restoreSignup(btn.getAttribute('data-restore-id'));
    });
    btn.addEventListener('mousedown', e => e.stopPropagation());
  });

  // Toggle "Removed" section open/closed
  document.querySelectorAll('[data-toggle-removed]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const eventId = btn.getAttribute('data-toggle-removed');
      if (state.expandedRemoved.has(eventId)) state.expandedRemoved.delete(eventId);
      else state.expandedRemoved.add(eventId);
      render();
    });
  });

  // Search filter on available panel
  document.querySelectorAll('.panel-search').forEach(input => {
    input.addEventListener('input', () => {
      const q = input.value.toLowerCase();
      const list = input.parentElement.querySelector('.people-list');
      list.querySelectorAll('.person-pill').forEach(pill => {
        const name = pill.getAttribute('data-staff-name').toLowerCase();
        pill.style.display = name.indexOf(q) !== -1 ? '' : 'none';
      });
    });
  });
}

function attachTypeaheadHandlers() {
  document.querySelectorAll('[data-pick-name]').forEach(item => {
    item.addEventListener('click', e => {
      e.stopPropagation();
      pickName(item.getAttribute('data-pick-name'));
    });
  });
  document.querySelectorAll('[data-add-placeholder]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      addPlaceholder(btn.getAttribute('data-add-placeholder'));
    });
  });
}

// Listener fires when the user clicks anywhere outside the active typing input.
// Bails harmlessly if there's no active typing session OR if the click landed
// on another empty slot (that slot's own handler will set up the new typing
// state — we should not interfere). Also self-removes whenever it actually
// closes typing, so we never have orphan listeners.
function outsideTypingClick(e) {
  if (!state.typing) {
    document.removeEventListener('click', outsideTypingClick);
    return;
  }
  if (e.target.closest('.slot-typing-wrap')) return;
  // If user clicked a different empty slot, let the slot's own click handler
  // take over. That handler will clear our listener and set up new typing.
  if (e.target.closest('.slot-empty')) return;
  // If user clicked a typeahead item or placeholder button, those use
  // stopPropagation in their handlers and we won't see the event. Safe.
  clearTypingState();
  render();
}

// ---------- Mutations ----------
function handleDrop(stack) {
  if (!state.drag) return;
  const eventId = stack.getAttribute('data-event-id');
  const stand = stack.getAttribute('data-stand');
  const role = stack.getAttribute('data-role');
  const drag = state.drag;
  state.drag = null;

  // If moving from existing position, treat as move
  if (drag.positionId) {
    movePosition(drag.positionId, eventId, stand, role);
    return;
  }

  // If this pill was soft-removed, restore the signup row first, then place.
  // Restore is async; we chain place so the manager's "drag-to-restore-and-place"
  // happens in one motion from their POV.
  if (drag.wasRemoved && drag.availabilityId) {
    authFetch(SUPABASE_URL + '/rest/v1/availability?id=eq.' + drag.availabilityId, {
      method: 'PATCH', headers: apiHeadersJson(),
      body: JSON.stringify({ removed_at: null, removed_by: null })
    }).then(() => {
      // Move row from removed back to active in local state
      const idx = state.removedAvailability.findIndex(a => a.id === drag.availabilityId);
      if (idx !== -1) {
        const moved = state.removedAvailability[idx];
        state.removedAvailability.splice(idx, 1);
        moved.removed_at = null;
        moved.removed_by = null;
        state.availability.push(moved);
      }
      rebuildMultiSignupIndex();
      // Now place the pill
      placePosition(eventId, stand, role, drag.staffName, drag.source || 'signup');
    }).catch(err => {
      if (err.authFailed) { handleAuthFailure(); return; }
      console.error(err);
      showToast('Could not restore signup: ' + (err.message || ''), 'error');
    });
    return;
  }

  // Normal path: place a new pill
  placePosition(eventId, stand, role, drag.staffName, drag.source || 'signup');
}

// ===== Home-venue override dialog =====
//
// The dialog fires before a placement commits if all of the following are true:
// 1) The person being placed has a home_venue set, AND it does not match the
//    event's venue (i.e. they're being scheduled outside their home component).
// 2) At least one OTHER signup at this event has home_venue == event.venue
//    AND is currently unplaced (not in a position_assignments row, not
//    assigned-away to a different event the same date).
//
// If both hold, the manager must type a reason (>= 15 chars) before the
// placement commits. Cancel = no placement. Confirm = placement proceeds
// and the reason is appended to the position_assignment_log.details under
// `override_reason` for that specific placement, plus a top-level
// `override = true` flag.
//
// People with home_venue == NULL or 'NA' are invisible to this logic — they
// neither trigger the dialog when being placed, nor count as "home-venue
// signups" for the purpose of triggering it on someone else's placement.

// Returns array of unplaced home-venue signup names for this event, or [] if
// no such people exist (in which case the dialog is unnecessary).
function unplacedHomeVenueSignupsAt(eventId) {
  const ev = state.events.find(e => e.id === eventId);
  if (!ev) return [];
  const sigs = state.availability.filter(a => a.event_id === eventId);
  const placedNames = new Set(positionsForEvent(eventId).map(p => p.staff_name));
  const dayAssign = state.assignments[ev.event_date] || {};
  const out = [];
  sigs.forEach(s => {
    const hv = homeVenueOf(s.staff_name);
    if (hv !== ev.venue) return;
    if (placedNames.has(s.staff_name)) return; // already placed somewhere here
    const assigned = dayAssign[s.staff_name];
    if (assigned && assigned !== eventId) return; // assigned-away
    out.push(s.staff_name);
  });
  return out;
}

// Decides whether a proposed placement should trigger the override dialog.
// Returns the list of unplaced home-venue people if so, or null if the
// placement can proceed normally.
function checkOverrideRequired(eventId, staffName) {
  const ev = state.events.find(e => e.id === eventId);
  if (!ev) return null;
  const personHome = homeVenueOf(staffName);
  if (!personHome) return null; // no home venue (NULL or NA) — no dialog
  if (personHome === ev.venue) return null; // matches event venue — no dialog
  const unplacedHomeFolk = unplacedHomeVenueSignupsAt(eventId);
  if (unplacedHomeFolk.length === 0) return null; // no one being bumped — no dialog
  return unplacedHomeFolk;
}

// In-flight override state. While this is non-null the modal is open and
// holding a queued placement — Confirm calls _commitPlacement(reason),
// Cancel clears state.
let _overrideContext = null;

function openOverrideDialog(eventId, stand, role, staffName, source, unplacedHomeFolk) {
  const ev = state.events.find(e => e.id === eventId);
  const personHome = homeVenueOf(staffName);
  const info = document.getElementById('override-info');
  let html = "You're placing <strong>" + escapeHtml(staffName) + "</strong>";
  if (personHome) html += ' (home: <strong>' + escapeHtml(personHome) + '</strong>)';
  html += ' at a <strong>' + escapeHtml(ev.venue) + '</strong> event. ';
  html += 'The following ' + escapeHtml(ev.venue) + '-home employee' +
    (unplacedHomeFolk.length === 1 ? ' is' : 's are') + ' still unplaced for this event:';
  html += '<ul class="override-list">';
  unplacedHomeFolk.forEach(n => { html += '<li>' + escapeHtml(n) + '</li>'; });
  html += '</ul>';
  info.innerHTML = html;

  const ta = document.getElementById('override-reason');
  ta.value = '';
  updateOverrideCounter();
  document.getElementById('override-modal').classList.add('show');
  setTimeout(() => { ta.focus(); }, 50);

  _overrideContext = { eventId, stand, role, staffName, source };
}

function updateOverrideCounter() {
  const ta = document.getElementById('override-reason');
  const len = (ta.value || '').trim().length;
  const num = document.getElementById('override-counter-num');
  const text = document.getElementById('override-counter-text');
  const counter = document.getElementById('override-counter');
  const btn = document.getElementById('override-confirm-btn');
  num.textContent = len + ' / 15';
  if (len >= 15) {
    counter.classList.add('met');
    text.textContent = '✓ Reason logged';
    btn.disabled = false;
  } else {
    counter.classList.remove('met');
    text.textContent = 'Min 15 characters';
    btn.disabled = true;
  }
}

function confirmOverride() {
  if (!_overrideContext) return;
  const reason = (document.getElementById('override-reason').value || '').trim();
  if (reason.length < 15) return;
  const ctx = _overrideContext;
  _overrideContext = null;
  document.getElementById('override-modal').classList.remove('show');
  _commitPlacement(ctx.eventId, ctx.stand, ctx.role, ctx.staffName, ctx.source, reason);
}

function cancelOverride() {
  _overrideContext = null;
  document.getElementById('override-modal').classList.remove('show');
}

// One-time wiring (modal is reused across placements)
document.getElementById('override-confirm-btn').addEventListener('click', confirmOverride);
document.getElementById('override-reason').addEventListener('input', updateOverrideCounter);
document.querySelectorAll('#override-modal [data-close-modal]').forEach(b => {
  b.addEventListener('click', cancelOverride);
});

function placePosition(eventId, stand, role, staffName, source) {
  // Override-dialog guard. If this placement requires a typed reason
  // (non-home-venue person bumping unplaced home-venue people), show the
  // dialog and bail. The user's confirm-with-reason will re-enter via
  // _commitPlacement which carries the reason through to the log.
  const overrideUnplaced = checkOverrideRequired(eventId, staffName);
  if (overrideUnplaced) {
    openOverrideDialog(eventId, stand, role, staffName, source, overrideUnplaced);
    return;
  }
  // Normal path: no override needed.
  _commitPlacement(eventId, stand, role, staffName, source, null);
}

// The actual placement work, post-guard. Called either directly from
// placePosition (no override needed) or from confirmOverride (after the
// manager typed a reason). When a reason is supplied it's stored on the
// log row's details.override_reason and details.override = true.
function _commitPlacement(eventId, stand, role, staffName, source, overrideReason) {
  // Check capacity (don't overfill)
  const reqs = state.staffingRequests.filter(r => r.event_id === eventId && r.stand === stand && r.role === role);
  const need = reqs.reduce((s, r) => s + r.headcount, 0);
  const have = positionsFor(eventId, stand, role).length;
  if (have >= need) {
    showToast('That role is already full', 'error');
    return;
  }

  // Don't allow same person twice in same event
  const dup = positionsForEvent(eventId).find(p => p.staff_name === staffName);
  if (dup) {
    showToast(staffName + ' is already placed at this event', 'error');
    return;
  }

  const ev = state.events.find(e => e.id === eventId);
  const actor = (state.user && state.user.display_name) || (state.user && state.user.email) || 'unknown';
  const body = {
    event_id: eventId,
    venue: ev.venue,
    stand: stand,
    role: role,
    staff_name: staffName,
    source: source,
    assigned_by: actor
  };

  authFetch(SUPABASE_URL + '/rest/v1/position_assignments', {
    method: 'POST', headers: apiHeadersJson(), body: JSON.stringify(body)
  }).then(rows => {
    const inserted = rows[0];
    state.positions.push(inserted);
    // Build the log details. If this placement came from the override
    // dialog, attach `override:true` and the typed reason so the audit
    // log can render them on a second line.
    const logDetails = { stand, role, staff_name: staffName, source };
    if (overrideReason) {
      logDetails.override = true;
      logDetails.override_reason = overrideReason;
    }
    return logAction(eventId, inserted.id, 'placed', logDetails);
  }).then(() => {
    // Auto-resolve multi-signup
    return autoResolveMultiSignup(staffName, ev.event_date, eventId);
  }).then(() => {
    showToast('Placed ' + staffName, 'success');
    render();
  }).catch(err => {
    if (err.authFailed) { handleAuthFailure(); return; }
    console.error(err);
    showToast('Could not save: ' + (err.message || ''), 'error');
  });
}

function movePosition(positionId, newEventId, newStand, newRole) {
  const pos = state.positions.find(p => p.id === positionId);
  if (!pos) return;

  // Check capacity at destination
  if (pos.event_id === newEventId && pos.stand === newStand && pos.role === newRole) {
    return; // no-op
  }
  const reqs = state.staffingRequests.filter(r => r.event_id === newEventId && r.stand === newStand && r.role === newRole);
  const need = reqs.reduce((s, r) => s + r.headcount, 0);
  const have = positionsFor(newEventId, newStand, newRole).length;
  if (have >= need) {
    showToast('That role is already full', 'error');
    return;
  }

  const actor = (state.user && state.user.display_name) || (state.user && state.user.email) || 'unknown';
  const oldStand = pos.stand, oldRole = pos.role;

  authFetch(SUPABASE_URL + '/rest/v1/position_assignments?id=eq.' + positionId, {
    method: 'PATCH', headers: apiHeadersJson(),
    body: JSON.stringify({ event_id: newEventId, stand: newStand, role: newRole, assigned_by: actor })
  }).then(rows => {
    const updated = rows[0] || pos;
    const idx = state.positions.findIndex(p => p.id === positionId);
    if (idx !== -1) state.positions[idx] = Object.assign({}, pos, updated);
    return logAction(newEventId, positionId, 'moved', {
      from: { stand: oldStand, role: oldRole },
      to: { stand: newStand, role: newRole },
      staff_name: pos.staff_name
    });
  }).then(() => {
    showToast('Moved to ' + newStand + ' / ' + newRole, 'success');
    render();
  }).catch(err => {
    if (err.authFailed) { handleAuthFailure(); return; }
    console.error(err);
    showToast('Could not move: ' + (err.message || ''), 'error');
  });
}

function removePosition(positionId) {
  const pos = state.positions.find(p => p.id === positionId);
  if (!pos) return;
  const actor = (state.user && state.user.display_name) || (state.user && state.user.email) || 'unknown';
  const ev = state.events.find(e => e.id === pos.event_id);
  const eventDate = ev ? ev.event_date : null;

  authFetch(SUPABASE_URL + '/rest/v1/position_assignments?id=eq.' + positionId, {
    method: 'PATCH', headers: apiHeadersJson(),
    body: JSON.stringify({ removed_at: new Date().toISOString(), removed_by: actor })
  }).then(() => {
    state.positions = state.positions.filter(p => p.id !== positionId);
    return logAction(pos.event_id, positionId, 'removed', {
      stand: pos.stand, role: pos.role, staff_name: pos.staff_name
    });
  }).then(() => {
    // Also release any availability_assignments row for this person on this date.
    // This is the "full release" behavior — ✕ on a placed pill returns the person
    // to the unresolved pool across ALL events they signed up for that day.
    if (!eventDate) return;
    return authFetch(
      SUPABASE_URL + '/rest/v1/availability_assignments?staff_name=eq.' +
        encodeURIComponent(pos.staff_name) + '&event_date=eq.' + eventDate,
      { headers: apiHeaders() }
    ).then(rows => {
      if (!rows || !rows.length) return;
      return authFetch(
        SUPABASE_URL + '/rest/v1/availability_assignments?id=eq.' + rows[0].id,
        { method: 'DELETE', headers: apiHeaders() }
      ).then(() => {
        if (state.assignments[eventDate]) {
          delete state.assignments[eventDate][pos.staff_name];
        }
      });
    });
  }).then(() => {
    showToast('Released ' + pos.staff_name);
    render();
  }).catch(err => {
    if (err.authFailed) { handleAuthFailure(); return; }
    console.error(err);
    showToast('Could not remove: ' + (err.message || ''), 'error');
  });
}

// Soft-remove a signup row. Sets removed_at + removed_by on the availability
// row; the row stays in the table so historical signup count is preserved
// (the "N past" badge in Available-to-call still increments).
// Manager can restore via the "Restore" button OR by dragging the removed
// pill into a slot (drag-and-drop path auto-restores in placePosition).
function softRemoveSignup(availabilityId, staffName) {
  const actor = (state.user && state.user.display_name) || (state.user && state.user.email) || 'unknown';
  authFetch(SUPABASE_URL + '/rest/v1/availability?id=eq.' + availabilityId, {
    method: 'PATCH', headers: apiHeadersJson(),
    body: JSON.stringify({ removed_at: new Date().toISOString(), removed_by: actor })
  }).then(rows => {
    // Move the row from active state.availability into state.removedAvailability
    const idx = state.availability.findIndex(a => a.id === availabilityId);
    if (idx !== -1) {
      const moved = state.availability[idx];
      state.availability.splice(idx, 1);
      moved.removed_at = (rows && rows[0] && rows[0].removed_at) || new Date().toISOString();
      moved.removed_by = actor;
      state.removedAvailability.push(moved);
    }
    // Rebuild multi-signup index since this signup is no longer "active"
    rebuildMultiSignupIndex();
    showToast('Removed ' + staffName + ' from list');
    render();
  }).catch(err => {
    if (err.authFailed) { handleAuthFailure(); return; }
    console.error(err);
    showToast('Could not remove: ' + (err.message || ''), 'error');
  });
}

// Restore a soft-removed signup. Clears removed_at/removed_by. Pill returns
// to the active "Available" pool.
function restoreSignup(availabilityId) {
  authFetch(SUPABASE_URL + '/rest/v1/availability?id=eq.' + availabilityId, {
    method: 'PATCH', headers: apiHeadersJson(),
    body: JSON.stringify({ removed_at: null, removed_by: null })
  }).then(() => {
    const idx = state.removedAvailability.findIndex(a => a.id === availabilityId);
    if (idx !== -1) {
      const moved = state.removedAvailability[idx];
      state.removedAvailability.splice(idx, 1);
      moved.removed_at = null;
      moved.removed_by = null;
      state.availability.push(moved);
    }
    rebuildMultiSignupIndex();
    showToast('Signup restored');
    render();
  }).catch(err => {
    if (err.authFailed) { handleAuthFailure(); return; }
    console.error(err);
    showToast('Could not restore: ' + (err.message || ''), 'error');
  });
}

// Re-derive multi-signup index after any change to state.availability.
// Same shape as the build in loadAll.
function rebuildMultiSignupIndex() {
  const eventById = {};
  state.events.forEach(e => { eventById[e.id] = e; });
  const byDate = {};
  state.availability.forEach(a => {
    const ev = eventById[a.event_id];
    if (!ev) return;
    const d = ev.event_date;
    if (!byDate[d]) byDate[d] = {};
    if (!byDate[d][a.staff_name]) byDate[d][a.staff_name] = [];
    byDate[d][a.staff_name].push(a.event_id);
  });
  state.multiSignupByDate = byDate;
  state.multiSignupCounts = {};
  Object.keys(byDate).forEach(d => {
    Object.keys(byDate[d]).forEach(name => {
      state.multiSignupCounts[d + '|' + name] = byDate[d][name].length;
    });
  });
}

function pickName(name) {
  if (!state.typing) return;
  const t = state.typing;
  // Use centralized clear so the document listener is always removed.
  // Otherwise the {once:true}-style listener can survive (typeahead click
  // stopPropagation prevents it firing) and break the next slot click.
  clearTypingState();
  // Determine source: if name is in availability for this event/date → signup, else manual
  const dateSignups = state.availability.filter(a => a.event_id === t.eventId).map(a => a.staff_name);
  const source = dateSignups.indexOf(name) !== -1 ? 'signup' : 'manual';
  placePosition(t.eventId, t.stand, t.role, name, source);
}

function addPlaceholder(name) {
  if (!state.typing) return;
  const t = state.typing;
  clearTypingState();
  placePosition(t.eventId, t.stand, t.role, name, 'placeholder');
}

function autoResolveMultiSignup(staffName, date, eventId) {
  // Only act if person has multi-signups that day
  const count = state.multiSignupCounts[date + '|' + staffName] || 0;
  if (count <= 1) return Promise.resolve();
  const existing = (state.assignments[date] || {})[staffName];
  if (existing === eventId) return Promise.resolve();

  const actor = (state.user && state.user.display_name) || 'unknown';
  // UPSERT into availability_assignments
  return authFetch(SUPABASE_URL + '/rest/v1/availability_assignments?staff_name=eq.' + encodeURIComponent(staffName) + '&event_date=eq.' + date, {
    method: 'GET', headers: apiHeaders()
  }).then(rows => {
    if (rows && rows.length) {
      return authFetch(SUPABASE_URL + '/rest/v1/availability_assignments?id=eq.' + rows[0].id, {
        method: 'PATCH', headers: apiHeadersJson(),
        body: JSON.stringify({ assigned_event_id: eventId, assigned_by: actor, assigned_at: new Date().toISOString() })
      });
    }
    return authFetch(SUPABASE_URL + '/rest/v1/availability_assignments', {
      method: 'POST', headers: apiHeadersJson(),
      body: JSON.stringify({
        staff_name: staffName, event_date: date,
        assigned_event_id: eventId, assigned_by: actor
      })
    });
  }).then(() => {
    if (!state.assignments[date]) state.assignments[date] = {};
    state.assignments[date][staffName] = eventId;
  }).catch(err => {
    console.warn('Auto-resolve failed (non-blocking):', err);
  });
}

function logAction(eventId, positionId, action, details) {
  const actor = (state.user && state.user.display_name) || (state.user && state.user.email) || 'unknown';
  return authFetch(SUPABASE_URL + '/rest/v1/position_assignment_log', {
    method: 'POST', headers: apiHeadersJson(),
    body: JSON.stringify({
      event_id: eventId,
      position_assignment_id: positionId,
      action: action,
      details: details || {},
      actor: actor
    })
  }).catch(err => {
    console.warn('Log write failed (non-blocking):', err);
  });
}

// ---------- Multi-signup Assign Modal ----------
function openAssignModal(staffName, currentEvent) {
  const date = currentEvent.event_date;
  const evtIds = (state.multiSignupByDate[date] || {})[staffName] || [];
  if (evtIds.length === 0) return;

  const assignedTo = (state.assignments[date] || {})[staffName];

  // Find any current placement for this person across all events that day
  const placedAt = state.positions.find(p =>
    p.staff_name === staffName &&
    evtIds.indexOf(p.event_id) !== -1
  );

  document.getElementById('assign-title').textContent = staffName;

  const dateLabel = fmtDayHeader(date);
  let subHtml = '<strong>' + dateLabel + '</strong> &mdash; signed up for ' + evtIds.length + ' events. ';
  if (placedAt) {
    const placedEv = state.events.find(e => e.id === placedAt.event_id);
    const placedVenue = placedEv ? placedEv.venue : '';
    subHtml += 'Currently <strong>placed at ' + escapeHtml(placedVenue) + ' / ' + escapeHtml(placedAt.stand) + ' / ' + escapeHtml(placedAt.role) + '</strong>. ' +
      'To reassign, click the ✕ on their placed pill first to release them, then choose a different event here.';
  } else {
    subHtml += 'Pick which event to schedule them for. The others will strike through and their counts will adjust.';
  }
  document.getElementById('assign-sub').innerHTML = subHtml;

  const body = document.getElementById('assign-body');
  body.innerHTML = '';

  evtIds.forEach(eid => {
    const evt = state.events.find(e => e.id === eid);
    if (!evt) return;
    const isCurrent = assignedTo === eid;
    const isPlacedHere = placedAt && placedAt.event_id === eid;
    const isLocked = !!placedAt;  // any placement anywhere locks all rows

    const row = document.createElement('div');
    row.className = 'assign-row';
    if (isPlacedHere) row.classList.add('is-current');
    if (isLocked) row.classList.add('is-locked');

    const _rt = getReportTime(evt);
    const time = _rt ? 'Report ' + fmtTime(_rt) : '';
    let rightTag = '';
    if (isPlacedHere) {
      rightTag = '<span class="assign-row-placed">✓ Placed at ' + escapeHtml(placedAt.stand) + '</span>';
    } else if (isCurrent) {
      rightTag = '<span class="assign-row-current">Current</span>';
    }

    row.innerHTML =
      '<div class="assign-row-info">' +
        '<div class="assign-row-evt">' + escapeHtml(evt.event_name || '') + '</div>' +
        '<div class="assign-row-meta">' + escapeHtml(evt.venue) + ' · ' + time + '</div>' +
      '</div>' +
      rightTag;

    if (!isLocked) {
      row.addEventListener('click', () => saveAssignment(staffName, date, eid));
    }
    body.appendChild(row);
  });

  // Clear button only shown when person has an assignment but is NOT placed
  // (placed people are released via the ✕ on the pill, which is the single source of truth)
  if (assignedTo && !placedAt) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'assign-clear-btn';
    clearBtn.textContent = 'Clear assignment (mark all as unresolved again)';
    clearBtn.addEventListener('click', () => clearAssignment(staffName, date));
    body.appendChild(clearBtn);
  }

  document.getElementById('assign-modal').classList.add('show');
}

function saveAssignment(staffName, date, eventId) {
  const actor = (state.user && state.user.display_name) || 'unknown';

  const existing = (state.assignments[date] || {})[staffName];

  // Look up if there's already a row for this person/date
  authFetch(SUPABASE_URL + '/rest/v1/availability_assignments?staff_name=eq.' + encodeURIComponent(staffName) + '&event_date=eq.' + date,
    { headers: apiHeaders() }
  ).then(rows => {
    if (rows && rows.length) {
      return authFetch(SUPABASE_URL + '/rest/v1/availability_assignments?id=eq.' + rows[0].id, {
        method: 'PATCH', headers: apiHeadersJson(),
        body: JSON.stringify({
          assigned_event_id: eventId,
          assigned_by: actor,
          assigned_at: new Date().toISOString()
        })
      });
    }
    return authFetch(SUPABASE_URL + '/rest/v1/availability_assignments', {
      method: 'POST', headers: apiHeadersJson(),
      body: JSON.stringify({
        staff_name: staffName,
        event_date: date,
        assigned_event_id: eventId,
        assigned_by: actor
      })
    });
  }).then(() => {
    if (!state.assignments[date]) state.assignments[date] = {};
    state.assignments[date][staffName] = eventId;
    document.getElementById('assign-modal').classList.remove('show');
    showToast(staffName + ' assigned', 'success');
    render();
  }).catch(err => {
    if (err.authFailed) { handleAuthFailure(); return; }
    console.error(err);
    showToast('Could not save assignment: ' + (err.message || ''), 'error');
  });
}

function clearAssignment(staffName, date) {
  // Look up the row id, then delete
  authFetch(SUPABASE_URL + '/rest/v1/availability_assignments?staff_name=eq.' + encodeURIComponent(staffName) + '&event_date=eq.' + date,
    { headers: apiHeaders() }
  ).then(rows => {
    if (!rows || !rows.length) {
      // Nothing to clear
      if (state.assignments[date]) delete state.assignments[date][staffName];
      document.getElementById('assign-modal').classList.remove('show');
      render();
      return;
    }
    return authFetch(SUPABASE_URL + '/rest/v1/availability_assignments?id=eq.' + rows[0].id, {
      method: 'DELETE', headers: apiHeaders()
    }).then(() => {
      if (state.assignments[date]) delete state.assignments[date][staffName];
      document.getElementById('assign-modal').classList.remove('show');
      showToast('Assignment cleared');
      render();
    });
  }).catch(err => {
    if (err.authFailed) { handleAuthFailure(); return; }
    console.error(err);
    showToast('Could not clear: ' + (err.message || ''), 'error');
  });
}

// ---------- Available to call ----------
// Returns list of {emp, status, conflictEvent} where:
//   status: 'free'  - employee has no signups today, callable cleanly
//           'flagged' - employee signed up elsewhere on this date but isn't
//                       assigned anywhere yet (potential poach — show flagged)
// Excludes anyone with an active assignment to another event (committed).
// Excludes anyone signed up for THIS event (they're already in the Available panel).
// Sorted by reliability (historyCounts desc), then alpha.
function getCallableEmployees(ev) {
  const date = ev.event_date;
  const dayAssignments = state.assignments[date] || {};
  // Names with an ACTIVE signup on this date (any event)
  const signupsToday = state.multiSignupByDate[date] || {}; // {name: [eventIds]}
  // Names already signed up for THIS event — skip them, they're in the Available panel
  const signedUpHere = new Set(
    state.availability.filter(a => a.event_id === ev.id).map(a => a.staff_name)
  );

  const results = [];
  state.employees.forEach(e => {
    const fullName = ((e.first_name || '') + ' ' + (e.last_name || '')).trim();
    if (!fullName) return;
    if (signedUpHere.has(fullName)) return;

    const signupsHere = signupsToday[fullName] || [];
    const assignedTo = dayAssignments[fullName];

    // Committed elsewhere — exclude entirely
    if (assignedTo && assignedTo !== ev.id) return;

    // Has signups elsewhere today, no assignment yet — show but flag
    if (signupsHere.length > 0) {
      // signupsHere is the list of event_ids they signed up for on this date.
      // Pick the first one that isn't this event for the flag label.
      const otherEvId = signupsHere.find(eid => eid !== ev.id);
      const otherEv = otherEvId ? state.events.find(x => x.id === otherEvId) : null;
      results.push({
        emp: e,
        fullName: fullName,
        phone: e.phone || '',
        history: state.historyCounts[fullName] || 0,
        status: 'flagged',
        conflictLabel: otherEv ? otherEv.venue : 'another event'
      });
      return;
    }

    // No signups anywhere today — clean candidate
    results.push({
      emp: e,
      fullName: fullName,
      phone: e.phone || '',
      history: state.historyCounts[fullName] || 0,
      status: 'free',
      conflictLabel: null
    });
  });

  // Sort by reliability (history desc), then alpha
  results.sort((a, b) => {
    if (b.history !== a.history) return b.history - a.history;
    return a.fullName.localeCompare(b.fullName);
  });

  return results;
}

let _callableCurrentEventId = null;

function openCallableModal(eventId) {
  _callableCurrentEventId = eventId;
  const ev = state.events.find(e => e.id === eventId);
  if (!ev) return;
  const list = getCallableEmployees(ev);

  document.getElementById('callable-title').textContent = 'Available to call — ' + (ev.event_name || ev.venue);

  const sub = document.getElementById('callable-sub');
  const reportT = getReportTime(ev);
  const timeStr = reportT ? 'Report ' + fmtTime(reportT) : (ev.gates_open ? 'Gates ' + fmtTime(ev.gates_open) : '');
  sub.innerHTML = '<strong>' + fmtDayHeader(ev.event_date) + '</strong>' +
    (timeStr ? ' · ' + escapeHtml(timeStr) : '') +
    ' · ' + list.length + ' employee' + (list.length === 1 ? '' : 's') + ' callable.<br>' +
    '<span style="font-size:11px;">Sorted by past activity (most reliable first). ' +
    '<span style="background:var(--amber-light);border:1px solid var(--amber-border);padding:1px 5px;border-radius:3px;font-weight:700;">flagged</span> = signed up at another event today but unassigned — calling them may pull them away.</span>';

  const body = document.getElementById('callable-body');
  body.innerHTML = '';

  if (list.length === 0) {
    body.innerHTML = '<div class="call-empty">No callable employees — everyone is either signed up here, assigned elsewhere, or inactive.</div>';
  } else {
    // Split into clean vs flagged for visual grouping
    const free = list.filter(r => r.status === 'free');
    const flagged = list.filter(r => r.status === 'flagged');

    let html = '';
    if (free.length) {
      html += '<div class="call-section-head">Uncommitted (' + free.length + ')</div>';
      free.forEach((r, i) => { html += renderCallRow(r, i + 1); });
    }
    if (flagged.length) {
      html += '<div class="call-section-head">Signed up elsewhere — unassigned (' + flagged.length + ')</div>';
      flagged.forEach((r, i) => { html += renderCallRow(r, i + 1); });
    }
    body.innerHTML = html;
  }

  document.getElementById('callable-modal').classList.add('show');
}

function renderCallRow(r, rank) {
  let html = '<div class="call-row' + (r.status === 'flagged' ? ' conflict' : '') + '">';
  html += '<span class="call-rank">' + rank + '</span>';
  html += '<span class="call-name">' + escapeHtml(r.fullName) + '</span>';
  if (r.status === 'flagged' && r.conflictLabel) {
    html += '<span class="call-conflict-tag" title="Signed up here but not yet assigned. Calling them may pull them off another event.">↑ ' + escapeHtml(r.conflictLabel) + '</span>';
  }
  html += '<span class="call-phone">' + escapeHtml(r.phone || '—') + '</span>';
  html += '<span class="call-history' + (r.history === 0 ? ' zero' : '') + '">' + r.history + ' past</span>';
  html += '</div>';
  return html;
}

function printCallableList() {
  if (!_callableCurrentEventId) return;
  const ev = state.events.find(e => e.id === _callableCurrentEventId);
  if (!ev) return;
  const list = getCallableEmployees(ev);
  const reportT = getReportTime(ev);
  const timeStr = reportT
    ? 'Report ' + fmtTime(reportT) + (ev.gates_open ? ' (Gates ' + fmtTime(ev.gates_open) + ')' : '')
    : (ev.gates_open ? 'Gates ' + fmtTime(ev.gates_open) : '');

  const w = window.open('', '_blank');
  let html = '<!DOCTYPE html><html><head><title>' + escapeHtml(ev.event_name || 'Event') + ' — Available to call</title>' +
  '<style>' +
    '@page { size: portrait; margin: 0.5in; }' +
    'body { font-family: Georgia, "Times New Roman", serif; color: black; padding: 0; margin: 0; }' +
    '.ph { border-bottom: 2px solid black; padding-bottom: 8px; margin-bottom: 14px; }' +
    '.ph-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #555; margin-bottom: 4px; font-family: -apple-system, sans-serif; }' +
    '.ph-event { font-size: 20px; font-weight: 800; }' +
    '.ph-meta { font-size: 12px; color: #333; margin-top: 3px; }' +
    '.ph-sub { font-size: 11px; color: #666; margin-top: 4px; font-style: italic; }' +
    '.section-head { font-size: 10px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: #555; margin: 16px 0 4px; padding-bottom: 3px; border-bottom: 1px solid #999; font-family: -apple-system, sans-serif; }' +
    '.row { display: flex; align-items: center; gap: 12px; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 13px; }' +
    '.row.flagged { background: #fffbeb; padding-left: 6px; padding-right: 6px; border-bottom-color: #fcd34d; }' +
    '.rank { font-size: 11px; color: #999; min-width: 22px; text-align: right; font-family: -apple-system, sans-serif; }' +
    '.name { flex: 1; font-weight: 600; }' +
    '.flag { font-size: 9px; font-weight: 800; color: #92400e; background: white; border: 1px solid #fcd34d; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.04em; text-transform: uppercase; font-family: -apple-system, sans-serif; }' +
    '.phone { font-family: monospace; font-size: 13px; color: #444; }' +
    '.hist { font-size: 10px; color: #888; min-width: 60px; text-align: right; font-family: -apple-system, sans-serif; }' +
    '.empty { font-style: italic; color: #888; padding: 10px 0; }' +
    '.footer { margin-top: 22px; padding-top: 8px; border-top: 1px solid #999; font-size: 10px; color: #555; font-family: -apple-system, sans-serif; }' +
  '</style></head><body>';
  html += '<div class="ph">';
  html += '<div class="ph-title">Available to call</div>';
  html += '<div class="ph-event">' + escapeHtml(ev.event_name || ev.venue) + '</div>';
  html += '<div class="ph-meta">' + escapeHtml(ev.venue) + ' · ' + escapeHtml(fmtDayHeader(ev.event_date)) + (timeStr ? ' · ' + escapeHtml(timeStr) : '') + '</div>';
  html += '<div class="ph-sub">Sorted by past activity. Flagged = signed up elsewhere today but unassigned.</div>';
  html += '</div>';

  if (list.length === 0) {
    html += '<div class="empty">No callable employees.</div>';
  } else {
    const free = list.filter(r => r.status === 'free');
    const flagged = list.filter(r => r.status === 'flagged');
    if (free.length) {
      html += '<div class="section-head">Uncommitted (' + free.length + ')</div>';
      free.forEach((r, i) => {
        html += '<div class="row"><span class="rank">' + (i + 1) + '</span>' +
          '<span class="name">' + escapeHtml(r.fullName) + '</span>' +
          '<span class="phone">' + escapeHtml(r.phone || '—') + '</span>' +
          '<span class="hist">' + r.history + ' past</span></div>';
      });
    }
    if (flagged.length) {
      html += '<div class="section-head">Flagged: signed up elsewhere unassigned (' + flagged.length + ')</div>';
      flagged.forEach((r, i) => {
        html += '<div class="row flagged"><span class="rank">' + (i + 1) + '</span>' +
          '<span class="name">' + escapeHtml(r.fullName) + '</span>' +
          (r.conflictLabel ? '<span class="flag">↑ ' + escapeHtml(r.conflictLabel) + '</span>' : '') +
          '<span class="phone">' + escapeHtml(r.phone || '—') + '</span>' +
          '<span class="hist">' + r.history + ' past</span></div>';
      });
    }
  }

  const actor = (state.user && state.user.display_name) || 'manager';
  html += '<div class="footer">Printed by ' + escapeHtml(actor) + ' · ' + new Date().toLocaleString() + '</div>';
  html += '</body></html>';
  w.document.write(html);
  w.document.close();
  setTimeout(() => { try { w.print(); } catch(e) {} }, 300);
}

// Wire up print button (one-time listener; modal is reused)
document.getElementById('callable-print-btn').addEventListener('click', printCallableList);

// ---------- Audit log modal ----------
function openAuditLog(eventId) {
  const ev = state.events.find(e => e.id === eventId);
  document.getElementById('audit-title').textContent = 'Audit Log — ' + (ev ? ev.event_name : eventId);
  document.getElementById('audit-body').innerHTML = '<div class="loader">Loading…</div>';
  document.getElementById('audit-modal').classList.add('show');

  authFetch(SUPABASE_URL + '/rest/v1/position_assignment_log?event_id=eq.' + eventId + '&order=actor_at.desc&limit=200',
    { headers: apiHeaders() })
  .then(rows => {
    if (!rows || !rows.length) {
      document.getElementById('audit-body').innerHTML = '<div class="empty-state">No log entries yet.</div>';
      return;
    }
    let html = '';
    rows.forEach(r => {
      const d = r.details || {};
      let desc = '';
      if (r.action === 'placed') desc = (d.staff_name || '?') + ' → ' + (d.stand || '?') + ' / ' + (d.role || '?') + (d.source ? ' (' + d.source + ')' : '') + (d.override ? ' ⚠ OVERRIDE' : '');
      else if (r.action === 'removed') desc = (d.staff_name || '?') + ' from ' + (d.stand || '?') + ' / ' + (d.role || '?');
      else if (r.action === 'moved') desc = (d.staff_name || '?') + ': ' + (d.from && d.from.stand) + ' / ' + (d.from && d.from.role) + ' → ' + (d.to && d.to.stand) + ' / ' + (d.to && d.to.role);
      else if (r.action === 'unlocked') desc = 'Manually unlocked';
      else desc = JSON.stringify(d);
      html += '<div class="log-entry">';
      html += '<span class="log-time">' + fmtDateTime(r.actor_at) + '</span>';
      html += '<span class="log-action ' + r.action + '">' + r.action + '</span>';
      html += '<span>' + escapeHtml(desc) + '</span>';
      html += '<span class="log-actor">' + escapeHtml(r.actor || '') + '</span>';
      // Override reason shown on a second line in muted amber. Only
      // present for placements that fired the home-venue override dialog.
      if (d.override_reason) {
        html += '<div class="log-reason">Reason: ' + escapeHtml(d.override_reason) + '</div>';
      }
      html += '</div>';
    });
    document.getElementById('audit-body').innerHTML = html;
  })
  .catch(err => {
    if (err.authFailed) { handleAuthFailure(); return; }
    document.getElementById('audit-body').innerHTML = '<div class="empty-state">Could not load log: ' + (err.message || '') + '</div>';
  });
}

document.addEventListener('click', e => {
  const t = e.target.closest('[data-close-modal]');
  if (t) {
    document.getElementById(t.getAttribute('data-close-modal')).classList.remove('show');
  }
});
document.querySelectorAll('.modal-backdrop').forEach(b => {
  b.addEventListener('click', e => {
    if (e.target === b) b.classList.remove('show');
  });
});

// ---------- Print ----------
function printEvent(eventId) {
  const ev = state.events.find(e => e.id === eventId);
  if (!ev) return;
  const standGroups = standsForEvent(ev.id, ev.venue);
  if (!standGroups.length) {
    showToast('Nothing to print yet — no staffing requests for this event', 'error');
    return;
  }

  const w = window.open('', '_blank');
  let html = '<!DOCTYPE html><html><head><title>' + escapeHtml(ev.event_name) + ' — Print</title>' +
  '<style>' +
    '@page { size: landscape; margin: 0.5in; }' +
    'body { font-family: Georgia, "Times New Roman", serif; color: black; padding: 0; margin: 0; }' +
    '.ph { border-bottom: 2px solid black; padding-bottom: 8px; margin-bottom: 14px; display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }' +
    '.ph-event { font-size: 22px; font-weight: 700; }' +
    '.ph-venue { font-size: 13px; font-weight: 700; border: 1.5px solid black; padding: 2px 8px; border-radius: 3px; }' +
    '.ph-meta { font-size: 12px; color: #333; }' +
    '.ph-summary { margin-left: auto; font-size: 13px; font-weight: 700; }' +
    '.pgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }' +
    '.pstand { border: 1px solid black; padding: 8px 10px; break-inside: avoid; }' +
    '.pstand-name { font-size: 13px; font-weight: 700; border-bottom: 1px solid black; padding-bottom: 4px; margin-bottom: 6px; display: flex; justify-content: space-between; }' +
    '.pstand-fill { font-size: 10px; font-weight: 600; color: #555; }' +
    '.prole { margin-bottom: 8px; }' +
    '.prole-h { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #555; margin-bottom: 3px; font-family: -apple-system, sans-serif; }' +
    '.prole.lead .prole-h { color: black; font-weight: 800; }' +
    '.pname { font-size: 12px; padding: 2px 0; }' +
    '.pname.empty { border-bottom: 1px solid black; height: 18px; }' +
    '.pmark { font-size: 9px; color: #777; font-family: -apple-system, sans-serif; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; }' +
    '.pfooter { margin-top: 14px; padding-top: 8px; border-top: 1px solid #999; font-size: 10px; color: #555; display: flex; justify-content: space-between; }' +
  '</style></head><body>';
  html += '<div class="ph">';
  html += '<span class="ph-event">' + escapeHtml(ev.event_name) + '</span>';
  html += '<span class="ph-venue">' + escapeHtml(ev.venue) + '</span>';
  // Print header: lead with Report time (what staff are told to arrive at)
  // and keep Gates as a secondary reference for floor managers cross-checking
  // tickets / venue ops.
  const _printReportT = getReportTime(ev);
  const _printTimeStr = _printReportT
    ? 'Report ' + fmtTime(_printReportT) + (ev.gates_open ? ' (Gates ' + fmtTime(ev.gates_open) + ')' : '')
    : (ev.gates_open ? 'Gates ' + fmtTime(ev.gates_open) : '');
  html += '<span class="ph-meta">' + fmtDayHeader(ev.event_date) + ', ' + new Date(ev.event_date+'T00:00:00').getFullYear() + ' · ' + _printTimeStr + '</span>';
  html += '<span class="ph-summary">' + eventTotalFilled(ev.id) + ' of ' + eventTotalNeeded(ev.id) + ' positions filled</span>';
  html += '</div>';
  html += '<div class="pgrid">';
  standGroups.forEach(g => {
    let need = 0, fill = 0;
    g.requests.forEach(r => { need += r.headcount; fill += positionsFor(ev.id, g.stand, r.role).length; });
    html += '<div class="pstand">';
    html += '<div class="pstand-name">' + escapeHtml(g.stand) + ' <span class="pstand-fill">' + fill + ' / ' + need + '</span></div>';
    g.requests.forEach(req => {
      const isLead = /Lead|Supervisor|Manager/i.test(req.role);
      html += '<div class="prole' + (isLead ? ' lead' : '') + '">';
      html += '<div class="prole-h">' + escapeHtml(req.role) + '</div>';
      const filled = positionsFor(ev.id, g.stand, req.role);
      filled.forEach(p => {
        let mark = '';
        if (p.source === 'manual') mark = '<span class="pmark">typed</span>';
        else if (p.source === 'placeholder') mark = '<span class="pmark">⚠ placeholder</span>';
        const multi = state.multiSignupCounts[ev.event_date + '|' + p.staff_name] || 1;
        if (multi > 1) mark = '<span class="pmark">⚠ also signed up ' + multi + 'x</span>';
        html += '<div class="pname">' + escapeHtml(p.staff_name) + ' ' + mark + '</div>';
      });
      const empties = Math.max(0, req.headcount - filled.length);
      for (let i = 0; i < empties; i++) html += '<div class="pname empty"></div>';
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  const actor = (state.user && state.user.display_name) || 'manager';
  html += '<div class="pfooter"><span>Printed by ' + escapeHtml(actor) + ' · ' + new Date().toLocaleString() + '</span><span>Empty lines for hand-write at venue · TYPED = manager-added · ⚠ = needs follow-up</span></div>';
  html += '</body></html>';
  w.document.write(html);
  w.document.close();
  setTimeout(() => { try { w.print(); } catch(e) {} }, 300);
}

// ---------- Filter handlers ----------
document.getElementById('venue-filter').addEventListener('change', e => {
  state.filters.venue = e.target.value;
  render();
});
document.getElementById('range-filter').addEventListener('change', e => {
  state.filters.range = e.target.value;
  document.getElementById('custom-range').classList.toggle('show', e.target.value === 'custom');
  if (e.target.value !== 'custom') loadAll();
});
document.getElementById('custom-from').addEventListener('change', () => loadAll());
document.getElementById('custom-to').addEventListener('change', () => loadAll());
document.querySelectorAll('[data-stands]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-stands]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.filters.standsMode = btn.getAttribute('data-stands');
    render();
  });
});
document.getElementById('refresh-btn').addEventListener('click', () => loadAll());

// ---------- Init ----------
function startApp(user) {
  state.user = user;
  const el = document.getElementById('header-right');
  if (el && user) {
    el.innerHTML = '<span class="header-user">' + escapeHtml(user.display_name || user.email) + '</span>' +
      '<button class="sign-out-btn" onclick="pcAuth.signOut()">Sign out</button>';
  }
  // Default custom range inputs
  document.getElementById('custom-from').value = todayIsoLocal();
  document.getElementById('custom-to').value = isoFromOffset(14);
  loadAll();
}

pcAuth.require({
  pageSlug: 'schedule-assistant',
  onReady: function(user) { startApp(user); }
});
