<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Components — Popcorn Chez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F3EF;
  --surface: #FFFFFF;
  --text: #1a1a1a;
  --muted: #888;
  --light: #bbb;
  --border: #E8E8E4;
  --border-lt: #F0F0EC;
  --green-50: #EAF3DE;
  --green-600: #3B6D11;
  --green-800: #27500A;
  --amber-50: #fffbeb;
  --amber-100: #fef3c7;
  --amber-400: #BA7517;
  --amber-600: #854F0B;
  --amber-700: #92400e;
  --amber-800: #633806;
  --red-50: #fef2f2;
  --red-600: #c0392b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Top bar — matches landing page */
.top-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
.brand-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; background: var(--text); color: white;
  padding: 3px 8px; border-radius: 20px;
}
.topbar-spacer { flex: 1; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-user { font-size: 12px; color: #999; font-weight: 500; }
.sign-out-btn {
  font-size: 11px; color: var(--red-600); background: none;
  border: 1px solid #f0c0c0; padding: 4px 10px; border-radius: 6px;
  cursor: pointer; font-weight: 600;
}
.sign-out-btn:hover { background: #fdf0ee; }

/* Page header */
.page-head {
  max-width: 920px;
  margin: 0 auto;
  padding: 24px 20px 12px;
}
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  text-decoration: none; margin-bottom: 14px;
}
.back-link:hover { color: var(--text); }
.page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }

/* Main card */
.canvas {
  max-width: 920px;
  margin: 0 auto;
  padding: 0 20px 60px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

/* Toolbar */
.toolbar {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: #fafaf8;
}
.search-wrap { flex: 1; position: relative; }
.search-input {
  width: 100%; padding: 9px 12px 9px 34px;
  font-family: inherit; font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 8px; background: white;
  color: var(--text);
}
.search-input:focus { outline: none; border-color: #999; }
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
}
.counts {
  font-size: 12px; font-weight: 600; color: var(--muted);
  white-space: nowrap;
}
.counts .unset-num { color: var(--amber-700); font-weight: 700; }

/* Group headers */
.group-head {
  padding: 9px 18px 7px;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted);
  background: #fafaf8;
  border-bottom: 1px solid var(--border-lt);
  display: flex; align-items: center; gap: 8px;
}
.group-head.unset { color: var(--amber-700); }
.group-head .grp-count {
  font-size: 10px;
  background: var(--border-lt);
  padding: 2px 7px; border-radius: 10px;
  font-weight: 600; color: var(--muted);
}
.group-head.unset .grp-count { background: var(--amber-100); color: var(--amber-700); }

/* Rows — tightened from original to fit ~30 rows on screen */
.emp-row {
  display: flex; align-items: center;
  padding: 6px 18px;
  border-bottom: 1px solid var(--border-lt);
  gap: 12px;
}
.emp-row:last-child { border-bottom: none; }
.emp-row.unset { background: var(--amber-50); }
.emp-row.unset:hover { background: #fff7e0; }
.emp-row:not(.unset):hover { background: #fafaf8; }
.emp-name {
  font-size: 13px; font-weight: 600;
  flex: 1; min-width: 0;
}
.dropdown-wrap { position: relative; flex-shrink: 0; }
.venue-select {
  appearance: none;
  -webkit-appearance: none;
  font-family: inherit; font-size: 12px; font-weight: 600;
  padding: 6px 26px 6px 11px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: white;
  color: var(--text);
  cursor: pointer;
  min-width: 150px;
}
.venue-select:focus { outline: none; border-color: #999; }
.emp-row.unset .venue-select {
  color: var(--amber-700);
  border-color: var(--amber-400);
  background: white;
  font-weight: 700;
}
.emp-row.na .venue-select {
  color: #888;
  background: #f5f5f3;
  font-weight: 600;
}
.dropdown-arrow {
  position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
  font-size: 9px; color: var(--muted); pointer-events: none;
}
.emp-row.unset .dropdown-arrow { color: var(--amber-600); }
.row-status {
  font-size: 10px; font-weight: 600;
  width: 50px; text-align: right;
  flex-shrink: 0;
  color: var(--muted);
}
.row-status.saving { color: var(--amber-700); }
.row-status.saved { color: var(--green-600); }
.row-status.error { color: var(--red-600); }

/* Scorecard strip — three cards across the top.
   Shows count of employees with this venue as their home component
   AND that count as a percentage of the venue's full-tier par level.
   Scorecard updates live as venues are assigned (no reload). */
.scorecard-strip {
  max-width: 920px;
  margin: 0 auto 16px;
  padding: 0 20px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.scorecard-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left-width: 3px;
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.scorecard-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 8px;
}
.scorecard-venue {
  font-size: 13px; font-weight: 700; letter-spacing: -0.01em;
}
.scorecard-par {
  font-size: 10px; color: var(--muted); font-weight: 500;
  white-space: nowrap;
}
.scorecard-num {
  font-size: 28px; font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--text);
}
.scorecard-num.is-zero { color: var(--muted); opacity: 0.55; }
.scorecard-label {
  font-size: 10px; color: var(--muted);
  font-weight: 500;
}
.scorecard-bar {
  margin-top: 4px;
  height: 4px;
  background: var(--border-lt);
  border-radius: 2px;
  overflow: hidden;
}
.scorecard-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}
.scorecard-pct {
  font-size: 10px; color: var(--muted);
  font-weight: 500;
  margin-top: 2px;
}

/* Empty state */
.empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}

/* Loading state */
.loading {
  padding: 60px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--text); color: white;
  font-size: 13px; font-weight: 600;
  padding: 10px 18px;
  border-radius: 24px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.18);
  z-index: 200;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.success { background: var(--green-800); }
.toast.error { background: var(--red-600); }

/* Mobile */
@media (max-width: 600px) {
  .page-head { padding: 18px 14px 10px; }
  .canvas { padding: 0 14px 40px; }
  .page-title { font-size: 19px; }
  /* Scorecards collapse to a single column with a pill-style layout —
     venue name + small stats on the left, count on the right. */
  .scorecard-strip {
    padding: 0 14px;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .scorecard-card {
    flex-direction: row;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
  }
  .scorecard-head {
    flex: 1;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }
  .scorecard-num {
    font-size: 22px;
    order: 2;
    margin-left: auto;
  }
  .scorecard-label, .scorecard-bar, .scorecard-pct { display: none; }
  .scorecard-par { font-size: 11px; }
  .toolbar {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
    padding: 12px 14px;
  }
  .counts { text-align: left; }
  .emp-row {
    padding: 10px 14px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .emp-name { flex: 1 1 100%; }
  .dropdown-wrap { flex: 1; }
  .venue-select { width: 100%; min-width: 0; }
  .row-status { width: auto; min-width: 50px; }
  .group-head { padding: 11px 14px 7px; }
}
</style>
</head>
<body>

<div class="top-bar">
  <span class="brand-name">Popcorn Chez</span>
  <span class="brand-badge">Manager Toolkit</span>
  <div class="topbar-spacer"></div>
  <div class="header-right" id="header-right"></div>
</div>

<div class="page-head">
  <a class="back-link" href="/">&larr; Toolkit</a>
  <h1 class="page-title">Home Components</h1>
  <p class="page-sub">Set each employee's home component (their primary venue). Employees hired for a specific building have priority for that building's shifts.</p>
</div>

<!-- Scorecard strip — three cards across the top showing how many employees
     have each major venue as their home component, vs. par for a full-tier
     event. Updates live as managers change the dropdowns below. -->
<div class="scorecard-strip" id="scorecardStrip"></div>

<div class="canvas">
  <div class="card">
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search by name…" autocomplete="off">
      </div>
      <div class="counts" id="counts">Loading…</div>
    </div>

    <div id="listArea">
      <div class="loading">Loading employees…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/pc-auth.js"></script>
<script>
(function() {
  'use strict';

  // -------------------------------------------------------------
  // CONFIG
  // -------------------------------------------------------------
  var SUPABASE_URL = 'https://aoazlttdjowhlfcksoyl.supabase.co';

  // Venue codes — same list used everywhere else in the project.
  // Order here = order in the dropdown (alphabetical by label).
  var VENUE_LABELS = {
    ACCC: 'ACCC',
    BWH: 'BWH',
    Cure: 'Cure',
    DE: 'DE',
    FMP: 'FMP',
    Kirkwood: 'Kirkwood',
    Mann: 'Mann',
    Montage: 'Montage',
    SATB: 'SATB',
    Subaru: 'Subaru',
    Villanova: 'Villanova'
  };
  // Build dropdown order (alphabetical by label)
  var VENUE_ORDER = Object.keys(VENUE_LABELS).sort(function(a, b) {
    return VENUE_LABELS[a].localeCompare(VENUE_LABELS[b]);
  });

  // -------------------------------------------------------------
  // SCORECARD CONFIG
  // -------------------------------------------------------------
  // Three venues that get a top-of-page scorecard. Other 8 venues are
  // typically staffed by Mann/FMP home folks (2-4 people per event), so
  // a "home component count" doesn't carry the same planning weight.
  var SCORECARD_VENUES = ['Mann', 'FMP', 'SATB'];

  // Venue brand colors — match VENUE_COLORS used on Schedule Assistant
  // and the venue badges across the app. Used for the left-edge accent
  // and the bar fill on each scorecard card.
  var VENUE_COLORS = {
    FMP: '#c0392b',
    Mann: '#5a9e1a',
    Cure: '#2471a3',
    Subaru: '#7d3fbf',
    Villanova: '#1a237e',
    Montage: '#607d8b',
    DE: '#00796b',
    BWH: '#e67e22',
    ACCC: '#c0620a',
    SATB: '#888780',
    Kirkwood: '#b71c1c'
  };

  // Roles that the par_levels schema treats as "excluded from event total"
  // by default when no explicit excluded_from_total flag is set on the row.
  // Mirrors the DEX object in event-planning so our "par for a full event"
  // computation matches what gets shown on the calendar there.
  var DEFAULT_EXCLUDED_ROLES = {
    'Cleaning Crew': true,
    'Warehouse/Runner': true,
    'Supervisor': true,
    'Venue Manager': true
  };
  var SUPPORT_STAND = 'Support Staff';

  // -------------------------------------------------------------
  // STATE
  // -------------------------------------------------------------
  var state = {
    employees: [],
    filter: '',
    // parTotals: { Mann: 80, FMP: 60, SATB: 30 } — full-tier headcount
    // per scorecard venue, computed once at page load from par_levels.
    parTotals: {}
  };

  // -------------------------------------------------------------
  // AUTH FETCH WRAPPER (matches the project pattern)
  // -------------------------------------------------------------
  function handleAuthFailure() {
    try {
      localStorage.removeItem('sb_access_token');
      localStorage.removeItem('sb_refresh_token');
    } catch(e) {}
    showToast('Session expired. Reloading to sign in again…', 'error');
    setTimeout(function() { window.location.reload(); }, 1800);
  }

  function authFetch(url, options) {
    return fetch(url, options).then(function(r) {
      if (r.status === 401) {
        var err = new Error('Unauthorized');
        err.authFailed = true;
        throw err;
      }
      if (!r.ok) {
        return r.text().then(function(t) {
          if (t && t.indexOf('JWT expired') !== -1) {
            var err = new Error('JWT expired');
            err.authFailed = true;
            throw err;
          }
          throw new Error(t || ('HTTP ' + r.status));
        });
      }
      return r.text().then(function(t) {
        if (!t) return [];
        try { return JSON.parse(t); } catch(e) { return []; }
      });
    });
  }

  // -------------------------------------------------------------
  // TOAST
  // -------------------------------------------------------------
  var toastTimer = null;
  function showToast(msg, kind) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (kind ? ' ' + kind : '');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
      el.className = el.className.replace(' show', '');
    }, 2200);
  }

  // -------------------------------------------------------------
  // DATA
  // -------------------------------------------------------------
  function loadEmployees() {
    var url = SUPABASE_URL +
      '/rest/v1/employees' +
      '?select=id,first_name,last_name,is_active,home_venue' +
      '&is_active=eq.true' +
      '&order=last_name.asc,first_name.asc';
    return authFetch(url, {
      method: 'GET',
      headers: pcAuth.headers()
    });
  }

  function saveHomeVenue(employeeId, newValue) {
    var url = SUPABASE_URL + '/rest/v1/employees?id=eq.' + encodeURIComponent(employeeId);
    var headers = pcAuth.headers();
    headers['Content-Type'] = 'application/json';
    headers['Prefer'] = 'return=minimal';
    return authFetch(url, {
      method: 'PATCH',
      headers: headers,
      body: JSON.stringify({ home_venue: newValue })
    });
  }

  // Fetches par_levels for the scorecard venues, full tier only, and
  // sums default_count per venue while skipping rows that are excluded
  // from the event total. Returns a {venue: total} map.
  //
  // Mirrors the calculation in event-planning's evtStaff() — we want the
  // scorecard's "par 80 · full" to read the same number the calendar
  // would show as the staff total for a tier=full event.
  //
  // Excluded rows: (a) Support Staff stand entirely, (b) any row with
  // excluded_from_total = true, (c) rows where the role is one of the
  // DEFAULT_EXCLUDED_ROLES AND no explicit excluded_from_total flag.
  function loadParTotals() {
    var venueList = SCORECARD_VENUES.map(function(v) { return '"' + v + '"'; }).join(',');
    var url = SUPABASE_URL +
      '/rest/v1/par_levels' +
      '?select=venue,stand,role,default_count,excluded_from_total,tier' +
      '&tier=eq.full' +
      '&venue=in.(' + venueList + ')';
    return authFetch(url, {
      method: 'GET',
      headers: pcAuth.headers()
    }).then(function(rows) {
      var totals = {};
      SCORECARD_VENUES.forEach(function(v) { totals[v] = 0; });
      (rows || []).forEach(function(r) {
        if (!r.venue || totals[r.venue] === undefined) return;
        if (r.stand === SUPPORT_STAND) return;
        // Resolve the excluded flag: explicit value if present, else
        // role-based default. matches event-planning's exTot() logic.
        var excluded;
        if (r.excluded_from_total === true || r.excluded_from_total === false) {
          excluded = r.excluded_from_total;
        } else {
          excluded = DEFAULT_EXCLUDED_ROLES[r.role] === true;
        }
        if (excluded) return;
        totals[r.venue] += (r.default_count || 0);
      });
      return totals;
    });
  }

  // -------------------------------------------------------------
  // RENDER
  // -------------------------------------------------------------
  function fullName(emp) {
    return ((emp.first_name || '') + ' ' + (emp.last_name || '')).trim();
  }

  function passesFilter(emp) {
    if (!state.filter) return true;
    var name = fullName(emp).toLowerCase();
    return name.indexOf(state.filter) !== -1;
  }

  function buildOptions(currentValue) {
    var html = '<option value="">(none)</option>';
    html += '<option value="NA"' + (currentValue === 'NA' ? ' selected' : '') + '>Doesn\'t apply</option>';
    for (var i = 0; i < VENUE_ORDER.length; i++) {
      var code = VENUE_ORDER[i];
      var label = VENUE_LABELS[code];
      var sel = (currentValue === code) ? ' selected' : '';
      html += '<option value="' + code + '"' + sel + '>' + label + '</option>';
    }
    return html;
  }

  function renderRow(emp) {
    var unset = !emp.home_venue;
    var isNA = emp.home_venue === 'NA';
    var classes = 'emp-row' +
      (unset ? ' unset' : '') +
      (isNA ? ' na' : '');
    var name = fullName(emp);
    return '' +
      '<div class="' + classes + '" data-emp-id="' + emp.id + '">' +
        '<div class="emp-name">' + escapeHtml(name) + '</div>' +
        '<div class="dropdown-wrap">' +
          '<select class="venue-select" data-emp-id="' + emp.id + '">' +
            buildOptions(emp.home_venue) +
          '</select>' +
          '<span class="dropdown-arrow">&#9662;</span>' +
        '</div>' +
        '<div class="row-status" data-status-for="' + emp.id + '"></div>' +
      '</div>';
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderList() {
    var visible = state.employees.filter(passesFilter);
    var unset = visible.filter(function(e) { return !e.home_venue; });
    var assigned = visible.filter(function(e) { return !!e.home_venue; });

    var area = document.getElementById('listArea');

    if (state.employees.length === 0) {
      area.innerHTML = '<div class="empty">No employees in the system yet.</div>';
      return;
    }
    if (visible.length === 0) {
      area.innerHTML = '<div class="empty">No employees match "' + escapeHtml(state.filter) + '".</div>';
      return;
    }

    var html = '';
    if (unset.length > 0) {
      html += '<div class="group-head unset">' +
        '<span>&#9888; Unset</span>' +
        '<span class="grp-count">' + unset.length + '</span>' +
      '</div>';
      for (var i = 0; i < unset.length; i++) html += renderRow(unset[i]);
    }
    if (assigned.length > 0) {
      html += '<div class="group-head">' +
        '<span>&#10003; Assigned</span>' +
        '<span class="grp-count">' + assigned.length + '</span>' +
      '</div>';
      for (var j = 0; j < assigned.length; j++) html += renderRow(assigned[j]);
    }
    area.innerHTML = html;

    // Wire up change handlers on every fresh render.
    var selects = area.querySelectorAll('select.venue-select');
    for (var k = 0; k < selects.length; k++) {
      selects[k].addEventListener('change', onVenueChange);
    }
  }

  function renderCounts() {
    var total = state.employees.length;
    var unset = state.employees.filter(function(e) { return !e.home_venue; }).length;
    var na = state.employees.filter(function(e) { return e.home_venue === 'NA'; }).length;
    var el = document.getElementById('counts');
    if (total === 0) { el.textContent = ''; return; }
    var parts = [];
    parts.push('<span class="unset-num">' + unset + '</span> unset');
    if (na > 0) parts.push(na + ' n/a');
    parts.push(total + ' total');
    el.innerHTML = parts.join(' &middot; ');
  }

  // Renders the three scorecard cards. Pure read on state; safe to call
  // any time after loadEmployees + loadParTotals resolve. Re-renders
  // whenever an employee's home venue changes (called from onVenueChange).
  function renderScorecard() {
    var strip = document.getElementById('scorecardStrip');
    if (!strip) return;
    var html = '';
    SCORECARD_VENUES.forEach(function(venue) {
      var color = VENUE_COLORS[venue] || '#666';
      var par = state.parTotals[venue] || 0;
      var count = state.employees.filter(function(e) {
        return e.home_venue === venue;
      }).length;
      var pct = par > 0 ? Math.round((count / par) * 100) : 0;
      var pctCapped = Math.min(100, pct);

      var parLabel = par > 0
        ? 'par ' + par + ' &middot; full tier'
        : 'no par configured';

      var pctLabel = par > 0
        ? pct + '% of par from home staff'
        : '&mdash;';

      html += '<div class="scorecard-card" style="border-left-color:' + color + ';">' +
        '<div class="scorecard-head">' +
          '<span class="scorecard-venue">' + escapeHtml(venue) + '</span>' +
          '<span class="scorecard-par">' + parLabel + '</span>' +
        '</div>' +
        '<div class="scorecard-num' + (count === 0 ? ' is-zero' : '') + '">' + count + '</div>' +
        '<div class="scorecard-label">home component employees</div>' +
        '<div class="scorecard-bar">' +
          '<div class="scorecard-bar-fill" style="width:' + pctCapped + '%;background:' + color + ';"></div>' +
        '</div>' +
        '<div class="scorecard-pct">' + pctLabel + '</div>' +
      '</div>';
    });
    strip.innerHTML = html;
  }

  // -------------------------------------------------------------
  // EVENT HANDLERS
  // -------------------------------------------------------------
  function onVenueChange(e) {
    var select = e.currentTarget;
    var empId = select.getAttribute('data-emp-id');
    var newValue = select.value || null;
    var statusEl = document.querySelector('[data-status-for="' + empId + '"]');

    var emp = state.employees.find(function(x) { return x.id === empId; });
    if (!emp) return;
    var previousValue = emp.home_venue;

    if (statusEl) {
      statusEl.textContent = 'Saving…';
      statusEl.className = 'row-status saving';
    }

    saveHomeVenue(empId, newValue).then(function() {
      // Update local state
      emp.home_venue = newValue;

      // Brief saved indicator
      if (statusEl) {
        statusEl.textContent = 'Saved';
        statusEl.className = 'row-status saved';
        setTimeout(function() {
          if (statusEl) {
            statusEl.textContent = '';
            statusEl.className = 'row-status';
          }
        }, 1400);
      }

      showToast('Saved', 'success');

      // Re-render to move the row between groups + update counts + scorecard
      // (small delay so the user can see the "Saved" indicator first)
      setTimeout(function() {
        renderList();
        renderCounts();
        renderScorecard();
      }, 600);
    }).catch(function(err) {
      if (err && err.authFailed) { handleAuthFailure(); return; }
      console.error('Save failed:', err);
      // Revert dropdown
      select.value = previousValue || '';
      if (statusEl) {
        statusEl.textContent = 'Failed';
        statusEl.className = 'row-status error';
        setTimeout(function() {
          if (statusEl) {
            statusEl.textContent = '';
            statusEl.className = 'row-status';
          }
        }, 2200);
      }
      showToast('Save failed — try again', 'error');
    });
  }

  function onSearchInput(e) {
    state.filter = (e.target.value || '').toLowerCase().trim();
    renderList();
  }

  // -------------------------------------------------------------
  // BOOT
  // -------------------------------------------------------------
  pcAuth.require({
    pageSlug: 'home-components',
    onReady: function(user) {
      // Header user + sign out
      var hr = document.getElementById('header-right');
      if (hr && user) {
        hr.innerHTML =
          '<span class="header-user">' + escapeHtml(user.display_name || user.email || '') + '</span>' +
          '<button class="sign-out-btn" onclick="pcAuth.signOut()">Sign out</button>';
      }

      // Search
      document.getElementById('searchInput').addEventListener('input', onSearchInput);

      // Load data — employees and par totals in parallel so the
      // scorecard can render the moment both resolve.
      Promise.all([
        loadEmployees(),
        loadParTotals().catch(function(err) {
          // Non-blocking: if par_levels fetch fails we still want the
          // employee list to work. Scorecards just fall back to "—".
          console.warn('Par totals fetch failed:', err);
          var fallback = {};
          SCORECARD_VENUES.forEach(function(v) { fallback[v] = 0; });
          return fallback;
        })
      ]).then(function(results) {
        state.employees = results[0] || [];
        state.parTotals = results[1] || {};
        renderCounts();
        renderScorecard();
        renderList();
      }).catch(function(err) {
        if (err && err.authFailed) { handleAuthFailure(); return; }
        console.error('Load failed:', err);
        document.getElementById('listArea').innerHTML =
          '<div class="empty">Couldn\'t load employees. ' + escapeHtml(err.message || '') + '</div>';
        document.getElementById('counts').textContent = 'Error';
      });
    }
  });
})();
</script>
</body>
</html>
