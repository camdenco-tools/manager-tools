  Popcorn Chez — Sales History

    - Replaced hand-rolled header with pc-nav.js shared header + ribbon
    - Default load now scopes to the most recent event day with data (lighter query)
    - Added quick-range chip row: Last event day / Today / This week / Last week /

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popcorn Chez — Sales History</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0ec; min-height: 100vh; }

/* page header (pc-nav.js injects the toolkit header + ribbon above; this is the page-title row) */
.page-title-row { background: #fff; border-bottom: 1px solid #e8e8e4; padding: 12px 22px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.page-title-left { display: flex; align-items: center; gap: 12px; }
.page-title-h { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; color: #1a1a1a; }
.page-title-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: #1a1a1a; color: white; padding: 3px 8px; border-radius: 20px; }

.page-body { padding: 20px 16px 60px; }
.container { max-width: 800px; margin: 0 auto; }
.card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
.card-title { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
.field { margin-bottom: 13px; }
label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 4px; }
select, input[type=text], input[type=number], input[type=date], input[type=password] { width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; color: #1a1a1a; background: #fafafa; appearance: none; -webkit-appearance: none; font-family: inherit; transition: border-color 0.15s; }
select:focus, input:focus { outline: none; border-color: #1a1a1a; background: white; }

/* quick-range chip row */
.qr-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 12px; }
.qr-label { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-right: 4px; }
.qr-chip { font-size: 12px; padding: 6px 11px; border-radius: 18px; background: #f5f5f5; border: 1px solid #e0e0e0; color: #555; cursor: pointer; font-family: inherit; transition: all 0.15s; user-select: none; }
.qr-chip:hover { border-color: #aaa; }
.qr-chip.on { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.qr-chip.disabled { opacity: 0.45; cursor: not-allowed; }
.qr-chip.disabled:hover { border-color: #e0e0e0; }
.qr-showing { font-size: 12px; color: #555; padding: 6px 0; }
.fn-group { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.fn-arrow { font-size: 11px; padding: 5px 9px; border-radius: 18px; background: white; border: 1px solid #e0e0e0; color: #555; cursor: pointer; font-family: inherit; transition: all 0.15s; line-height: 1; }
.fn-arrow:hover:not(:disabled) { border-color: #1a1a1a; color: #1a1a1a; }
.fn-arrow:disabled { opacity: 0.35; cursor: not-allowed; }

.search-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.search-btn { width: 100%; padding: 11px; background: #1a1a1a; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 14px; font-family: inherit; }
.summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.summary-box { background: #f8f8f8; border-radius: 12px; padding: 12px; text-align: center; }
.summary-box .s-label { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.summary-box .s-val { font-size: 20px; font-weight: 700; color: #1a1a1a; }
.summary-box .s-val.dim { color: #ccc; font-weight: 400; }
.summary-box .s-sub { font-size: 10px; color: #bbb; margin-top: 2px; }
.result-venue { border: 1px solid #eee; border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
.result-venue-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: #fafafa; cursor: pointer; }
.result-venue-name { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.result-venue-meta { font-size: 11px; color: #bbb; margin-top: 2px; }
.result-venue-total { font-size: 18px; font-weight: 700; color: #1a1a1a; }
.chevron { font-size: 10px; color: #ccc; margin-left: 6px; }
.result-stand-table { width: 100%; border-collapse: collapse; display: none; }
.result-stand-table th { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 14px; text-align: left; background: #f5f5f5; border-top: 1px solid #eee; }
.result-stand-table td { padding: 8px 14px; font-size: 13px; border-top: 1px solid #f5f5f5; color: #444; vertical-align: middle; }
.result-stand-table tr:hover td { background: #fafafa; }
.amt-cell { font-weight: 700; color: #1a1a1a; text-align: right; }
.photo-link { font-size: 11px; background: #EAF3DE; color: #27500A; padding: 3px 7px; border-radius: 6px; text-decoration: none; font-weight: 600; margin-right: 3px; display: inline-block; }
.no-photo { font-size: 11px; color: #ddd; }
.export-btn { float: right; padding: 6px 12px; background: #f5f5f5; color: #555; border: 1px solid #ddd; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: inherit; }
.edit-btn { font-size: 11px; background: #E6F1FB; color: #0C447C; padding: 3px 8px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; margin-right: 3px; font-family: inherit; }
.edit-btn.locked { background: #f0f0f0; color: #aaa; cursor: default; }
.del-btn { font-size: 11px; background: #FCEBEB; color: #A32D2D; padding: 3px 8px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-family: inherit; }
.empty-state { text-align: center; padding: 24px 0; font-size: 14px; color: #ccc; }
.loading-state { text-align: center; padding: 16px; font-size: 13px; color: #ccc; }

.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 16px; }
.modal-field { margin-bottom: 12px; }
.modal-field label { font-size: 12px; font-weight: 500; color: #666; margin-bottom: 4px; display: block; }
.modal-field select, .modal-field input { width: 100%; padding: 9px 11px; border: 1px solid #ddd; border-radius: 9px; font-size: 14px; color: #1a1a1a; background: #fafafa; appearance: none; -webkit-appearance: none; font-family: inherit; }
.modal-field input[readonly] { background: #f5f5f5; color: #888; cursor: default; }
.modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.photo-action { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #f8f8f8; border-radius: 8px; margin-bottom: 8px; }
.photo-action span { font-size: 12px; color: #666; flex: 1; }
.photo-clear-btn { font-size: 11px; background: #FCEBEB; color: #A32D2D; padding: 2px 8px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-family: inherit; }
.photo-upload-btn { font-size: 11px; background: #E6F1FB; color: #0C447C; padding: 2px 8px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-family: inherit; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-save { flex: 1; padding: 11px; background: #1a1a1a; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.modal-cancel { padding: 11px 16px; background: #f5f5f5; color: #555; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: inherit; }
.modal-error { color: #c0392b; font-size: 12px; margin-top: 8px; display: none; }
.window-notice { background: #FFFBEA; border: 1px solid #F5C400; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #7A5C00; margin-bottom: 12px; }

@media (max-width: 600px) {
  .page-title-row { padding: 10px 16px; }
  .search-grid { grid-template-columns: 1fr; }
  .summary-row { grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .result-stand-table th, .result-stand-table td { padding: 6px 8px; font-size: 12px; }
  .qr-showing { margin-left: 0; width: 100%; padding-top: 0; }
}

/* ============================================================
 * EVENT NOTES + WEATHER RENDERING — added May 29, 2026
 * Notes live on events.manager_notes; weather on events.weather_*.
 * Rendered as expandable row at top of each event group.
 * ============================================================ */
.weather-chip-inline { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: #555; background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 16px; padding: 2px 8px; margin-left: 8px; vertical-align: middle; }
.weather-chip-icon { font-size: 11px; line-height: 1; }
.event-meta-line { font-size: 11px; color: #bbb; margin-top: 2px; }
.notes-row { padding: 8px 14px; border-top: 1px solid #f5f5f5; cursor: pointer; background: #FDFCF7; }
.notes-row:hover { background: #FAF7E8; }
.notes-row-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.notes-row-label { font-size: 12px; font-weight: 600; color: #7A5C00; display: flex; align-items: center; gap: 6px; }
.notes-row-preview { font-size: 11px; color: #999; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.notes-row-chev { font-size: 10px; color: #ccc; flex-shrink: 0; }
.notes-row-expanded { display: none; padding: 12px 14px 14px; border-top: 1px solid #f5f5f5; background: #FDFCF7; }
.notes-row-expanded.open { display: block; }
.notes-text { font-size: 13px; color: #1a1a1a; white-space: pre-wrap; line-height: 1.5; margin-bottom: 10px; }
.notes-weather-detail { font-size: 11px; color: #888; margin-bottom: 8px; padding: 6px 10px; background: white; border-radius: 7px; border: 1px solid #eee; display: inline-block; }
.notes-meta { font-size: 11px; color: #999; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
.notes-edit-btn { font-size: 11px; background: #E6F1FB; color: #0C447C; padding: 4px 11px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-family: inherit; }
.notes-edit-btn.locked { background: #f0f0f0; color: #aaa; cursor: default; }
.notes-add-row { padding: 8px 14px; border-top: 1px dashed #e8e8e0; cursor: pointer; color: #185FA5; font-size: 12px; font-style: italic; display: flex; align-items: center; gap: 7px; }
.notes-add-row:hover { background: #F5F9FD; }
.notes-add-icon { width: 18px; height: 18px; border-radius: 50%; background: #E6F1FB; border: 1px solid #B5D4F4; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #185FA5; flex-shrink: 0; line-height: 1; }

/* Day-of-show sheet row — frozen snapshot, added Jun 7 2026 */
.dos-sheet-row { padding: 8px 14px; border-top: 1px solid #f5f5f5; cursor: pointer; background: #F5F9FD; }
.dos-sheet-row:hover { background: #EAF3FB; }
.dos-sheet-row-label { font-size: 12px; font-weight: 600; color: #0C447C; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.dos-sheet-expanded { display: none; padding: 12px 14px 14px; border-top: 1px solid #f5f5f5; background: #F5F9FD; }
.dos-sheet-expanded.open { display: block; }
.dos-sh-logi { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; }
.dos-sh-logi b { font-weight: 700; }
.dos-sh-sec { margin-bottom: 10px; }
.dos-sh-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 3px; }
.dos-sh-crew { font-size: 13px; color: #1a1a1a; white-space: pre-wrap; line-height: 1.5; border-left: 3px solid #185FA5; padding-left: 10px; }
.dos-sh-text { font-size: 12px; color: #444; white-space: pre-wrap; line-height: 1.45; }
.dos-sh-imglink { font-size: 11px; background: #E6F1FB; color: #0C447C; padding: 3px 8px; border-radius: 6px; text-decoration: none; font-weight: 600; display: inline-block; margin-top: 4px; }
.dos-sh-pop { font-size: 12px; color: #444; line-height: 1.6; }
.dos-sh-pop b { color: #1a1a1a; }
.dos-sh-noplan { font-size: 12px; font-weight: 700; color: #A35200; }
.dos-sh-list { margin: 2px 0 0; padding-left: 18px; }
.dos-sh-list li { font-size: 12px; color: #444; margin: 1px 0; }
.dos-sh-kv { font-size: 12px; color: #444; margin: 1px 0; }
.dos-sh-kv .k { font-weight: 600; color: #777; }
.dos-sh-meta { font-size: 11px; color: #999; margin-top: 8px; }
</style>
</head>

<!-- ============================================================
     EVENT NOTES EDIT MODAL — added May 29, 2026
     Notes belong to the event (events.manager_notes), not to a sale,
     so this is a separate modal from the per-stand sales edit modal
     even though it uses the same visual pattern.
     ============================================================ -->
<div class="modal-overlay" id="notes-edit-modal">
  <div class="modal">
    <h2>Edit event notes</h2>
    <input type="hidden" id="notes-edit-event-id">
    <div id="notes-edit-window-notice" class="window-notice" style="display:none;"></div>
    <div class="modal-field" id="notes-edit-context"></div>
    <div class="modal-field">
      <label>Notes</label>
      <textarea id="notes-edit-textarea" rows="6" style="width:100%;padding:11px 13px;border:1px solid #ddd;border-radius:9px;font-size:14px;color:#1a1a1a;background:#fafafa;font-family:inherit;resize:vertical;line-height:1.5;"></textarea>
    </div>
    <div class="modal-error" id="notes-edit-error"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeNotesEditModal()">Cancel</button>
      <button class="modal-save" id="notes-edit-save-btn" onclick="saveNotesEdit()">Save changes</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h2>Edit submission</h2>
    <input type="hidden" id="edit-id">
    <div id="edit-window-notice" class="window-notice" style="display:none;"></div>
    <div class="modal-row">
      <div class="modal-field"><label>Event date</label><input type="date" id="edit-date" onchange="reloadEditEvents()"></div>
      <div class="modal-field"><label>Amount ($)</label><input type="number" id="edit-amount" step="0.01" min="0"></div>
    </div>
    <div class="modal-field"><label>Event name</label>
      <select id="edit-event"><option value="">Select event...</option></select>
      <div id="edit-event-note" style="font-size:11px;color:#c0392b;margin-top:4px;display:none;"></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>Venue</label>
        <select id="edit-venue" onchange="updateEditStands();reloadEditEvents();">
          <option value="">Select...</option>
        </select>
      </div>
      <div class="modal-field"><label>Stand</label><select id="edit-stand"></select></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>Tips collected ($)</label><input type="number" id="edit-tip" step="0.01" min="0"></div>
      <div class="modal-field"><label>Staff working this stand</label><input type="number" id="edit-staff" min="1" step="1"></div>
    </div>
    <div class="modal-field"><label>Submitted by</label><input type="text" id="edit-submitted-by" readonly></div>
    <div class="modal-field">
      <label>Register photo</label>
      <div class="photo-action">
        <span id="edit-reg-label">No photo</span>
        <button class="photo-upload-btn" onclick="document.getElementById('edit-reg-file').click()">Replace</button>
        <button class="photo-clear-btn" id="edit-reg-clear" onclick="clearPhoto('register')" style="display:none;">Clear</button>
      </div>
      <input type="file" id="edit-reg-file" accept="image/jpeg,image/png" style="display:none;" onchange="handleEditFile(this,'register')">
    </div>
    <div class="modal-field">
      <label>Units sold photo</label>
      <div class="photo-action">
        <span id="edit-units-label">No photo</span>
        <button class="photo-upload-btn" onclick="document.getElementById('edit-units-file').click()">Replace</button>
        <button class="photo-clear-btn" id="edit-units-clear" onclick="clearPhoto('units')" style="display:none;">Clear</button>
      </div>
      <input type="file" id="edit-units-file" accept="image/jpeg,image/png" style="display:none;" onchange="handleEditFile(this,'units')">
    </div>
    <div class="modal-error" id="edit-error"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="modal-save" id="edit-save-btn" onclick="saveEdit()">Save changes</button>
    </div>
  </div>
</div>

<div class="page-title-row">
  <div class="page-title-left">
    <span class="page-title-h">Sales History</span>
    <span class="page-title-badge">Search</span>
  </div>
</div>

<div class="page-body">
  <div class="container">
    <div class="card">
      <div class="card-title">Search past sales</div>

      <div class="qr-row" id="qr-row">
        <span class="qr-label">Quick ranges</span>
        <button class="qr-chip" data-qr="last-event" onclick="applyQuickRange('last-event')">Last event day</button>
        <button class="qr-chip" data-qr="today" onclick="applyQuickRange('today')">Today</button>
        <button class="qr-chip" data-qr="this-week" onclick="applyQuickRange('this-week')">This week</button>
        <button class="qr-chip" data-qr="last-week" onclick="applyQuickRange('last-week')">Last week</button>
        <button class="qr-chip" data-qr="this-fiscal" onclick="applyQuickRange('this-fiscal')">This fiscal month</button>
        <button class="qr-chip" data-qr="last-fiscal" onclick="applyQuickRange('last-fiscal')">Last fiscal month</button>
        <button class="qr-chip" data-qr="all-time" onclick="applyQuickRange('all-time')">All time</button>
        <div class="fn-group">
  <button type="button" class="fn-arrow" id="fn-prev" onclick="navigateFiscal(-1)" title="Prior fiscal period">&#9664;</button>
  <button type="button" class="fn-arrow" id="fn-next" onclick="navigateFiscal(1)" title="Next fiscal period">&#9654;</button>
  <span class="qr-showing" id="qr-showing"></span>
</div>
      </div>

      <div class="search-grid">
        <div class="field" style="margin-bottom:0;">
          <label>From date</label>
          <input type="date" id="s-from" onchange="onManualDateChange()">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>To date</label>
          <input type="date" id="s-to" onchange="onManualDateChange()">
        </div>
      </div>
      <div class="search-grid" style="margin-top:10px;">
        <div class="field" style="margin-bottom:0;">
          <label>Event name</label>
          <input type="text" id="s-event" placeholder="e.g. MMRBQ...">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Venue</label>
          <select id="s-venue">
            <option value="">All venues</option>
          </select>
        </div>
      </div>
      <div style="margin-top:12px;">
        <button class="search-btn" onclick="searchHistory()">Search</button>
      </div>
      <div id="search-results"></div>
    </div>
  </div>
</div>

// or pcFiscal.resolvePeriod(isoDate). Covers CY2026 (preserved verbatim from
// cos-labor) + CY2027 (standard 4-4-5).

var currentSearchData = [];
var currentQuickRange = null; // 'last-event' | 'today' | 'this-week' | 'last-week' | 'this-fiscal' | 'last-fiscal' | 'all-time' | null (custom)
var editRegisterFile = null;
var editUnitsFile = null;
var editRegClear = false;
var editUnitsClear = false;

function apiHeaders() {
  return pcAuth.headers();
}

function todayLocal() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

/* Date math helpers — all work in YYYY-MM-DD strings to avoid TZ drift. */
function addDays(isoDate, days) {
  var parts = isoDate.split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  d.setDate(d.getDate() + days);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function startOfWeekMonday(isoDate) {
  var parts = isoDate.split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  var dow = d.getDay(); // 0=Sun, 1=Mon...
  var offset = (dow === 0) ? -6 : (1 - dow); // shift to Monday
  d.setDate(d.getDate() + offset);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtMonthDay(iso) {
  if (!iso) return '';
  var p = iso.split('-');
  return parseInt(p[1]) + '/' + parseInt(p[2]) + '/' + p[0];
}

/* Fiscal period resolution — thin wrappers around pcFiscal that preserve this
   page's expected {idx, period} return shape so call sites are unchanged. */
function resolveFiscalPeriod(isoDate) {
  var period = pcFiscal.resolvePeriod(isoDate);
  if (!period) return null;
  var periods = pcFiscal.getPeriods();
  for (var i = 0; i < periods.length; i++) {
    if (periods[i].start === period.start) return { idx: i, period: period };
  }
  return null;
}
function getCurrentFiscalPeriod() { return resolveFiscalPeriod(todayLocal()); }
function getPriorFiscalPeriod() {
  var cur = getCurrentFiscalPeriod();
  if (!cur) return null;
  var prior = pcFiscal.getPriorPeriod(cur.period);
  if (!prior) return null;
  return { idx: cur.idx - 1, period: prior };
}

function isWithinEditWindow(eventDate) {
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var evtDate = new Date(eventDate + 'T00:00:00');
  var diffDays = Math.floor((today - evtDate) / (1000 * 60 * 60 * 24));
  return diffDays <= EDIT_WINDOW_DAYS;
}

function canEdit(eventDate) {
  if (pcAuth.isAdmin()) return true;
  return isWithinEditWindow(eventDate);
}

/*
 * Find the most recent event date with at least one sales row, clamped to today
 * so a typo'd future date doesn't hijack the default. Returns null if no rows.
 *
 * Tiny query (1 row), runs on initial page load instead of pulling the full archive.
 */
async function fetchLatestEventDate() {
  var today = todayLocal();
  var url = SUPA_URL + '/rest/v1/sales?select=event_date&event_date=lte.' + today + '&order=event_date.desc&limit=1';
  try {
    var res = await fetch(url, { headers: apiHeaders() });
    if (!res.ok) return null;
    var rows = await res.json();
    if (Array.isArray(rows) && rows.length > 0) return rows[0].event_date;
    return null;
  } catch (e) {
    console.error('[sales-history] fetchLatestEventDate failed:', e);
    return null;
  }
}

/* Quick-range chip behavior */
function setQuickRangeUI(key, showingLabel) {
  currentQuickRange = key;
  var chips = document.querySelectorAll('.qr-chip');
  for (var i = 0; i < chips.length; i++) {
    chips[i].classList.toggle('on', chips[i].getAttribute('data-qr') === key);
  }
  var showing = document.getElementById('qr-showing');
  if (showing) showing.textContent = showingLabel ? 'Showing: ' + showingLabel : '';
  updateFiscalNavState();
}

function clearQuickRangeUI() {
  currentQuickRange = null;
  var chips = document.querySelectorAll('.qr-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('on');
  var showing = document.getElementById('qr-showing');
  if (showing) showing.textContent = 'Showing: custom range';
  updateFiscalNavState();
}

/* Disable fiscal chips if today falls outside the defined fiscal calendar */
function updateFiscalChipAvailability() {
  var cur = getCurrentFiscalPeriod();
  var prior = getPriorFiscalPeriod();
  var thisChip = document.querySelector('.qr-chip[data-qr="this-fiscal"]');
  var lastChip = document.querySelector('.qr-chip[data-qr="last-fiscal"]');
  if (thisChip) {
    if (!cur) { thisChip.classList.add('disabled'); thisChip.title = 'Current date is outside the defined fiscal calendar'; }
    else { thisChip.classList.remove('disabled'); thisChip.title = cur.period.name; }
  }
  if (lastChip) {
    if (!prior) { lastChip.classList.add('disabled'); lastChip.title = 'No prior fiscal period available'; }
    else { lastChip.classList.remove('disabled'); lastChip.title = prior.period.name; }
  }
  updateFiscalNavState();
}

/* Fiscal navigation arrows — step through periods one at a time. Always
   usable as long as the current view resolves to SOME fiscal period and a
   neighbor in the requested direction exists within pcFiscal's coverage. */
function resolveCurrentFiscalAnchor() {
  if (currentQuickRange === 'this-fiscal') return getCurrentFiscalPeriod();
  if (currentQuickRange === 'last-fiscal') return getPriorFiscalPeriod();
  // Otherwise, try to resolve from the From date picker; if it doesn't
  // land in any defined period (custom range, all-time, gap dates), fall
  // back to today's period so the arrows always have something to anchor
  // off of.
  var fromVal = document.getElementById('s-from').value;
  var anchor = fromVal ? resolveFiscalPeriod(fromVal) : null;
  if (!anchor) anchor = getCurrentFiscalPeriod();
  return anchor;
}

function navigateFiscal(direction) {
  var anchor = resolveCurrentFiscalAnchor();
  if (!anchor) {
    alert('Cannot navigate — today\'s date is outside the defined fiscal calendar.\n\nExtend the period list in /pc-fiscal.js to cover this year.');
    return;
  }
  var target = direction < 0
    ? pcFiscal.getPriorPeriod(anchor.period)
    : pcFiscal.getNextPeriod(anchor.period);
  if (!target) return; // edge of coverage — button should already be disabled

  document.getElementById('s-from').value = target.start;
  document.getElementById('s-to').value = target.end;
  clearQuickRangeUI(); // drop chip highlight (we're not on "This"/"Last" anymore)
  var showing = document.getElementById('qr-showing');
  if (showing) showing.textContent = 'Showing: ' + target.name;
  searchHistory();
}

function updateFiscalNavState() {
  var prevBtn = document.getElementById('fn-prev');
  var nextBtn = document.getElementById('fn-next');
  if (!prevBtn || !nextBtn) return;
  var anchor = resolveCurrentFiscalAnchor();
  if (!anchor) {
    prevBtn.disabled = true; nextBtn.disabled = true;
    prevBtn.title = 'No fiscal period defined for navigation';
    nextBtn.title = 'No fiscal period defined for navigation';
    return;
  }
  var prior = pcFiscal.getPriorPeriod(anchor.period);
  var next  = pcFiscal.getNextPeriod(anchor.period);
  prevBtn.disabled = !prior;
  nextBtn.disabled = !next;
  prevBtn.title = prior ? 'Go to ' + prior.name : 'Earliest defined fiscal period reached';
  nextBtn.title = next  ? 'Go to ' + next.name  : 'Latest defined fiscal period reached';
}

async function applyQuickRange(key) {
  var today = todayLocal();
  var fromDate = null;
  var toDate = null;
  var showingLabel = '';

  if (key === 'last-event') {
    var latest = await fetchLatestEventDate();
    if (!latest) {
      // No sales rows at all — fall back to today, surface this in the label.
      fromDate = today; toDate = today; showingLabel = 'today (no past sales found)';
    } else {
      fromDate = latest; toDate = latest;
      showingLabel = (latest === today) ? 'today' : fmtMonthDay(latest);
    }
  } else if (key === 'today') {
    fromDate = today; toDate = today; showingLabel = 'today';
  } else if (key === 'this-week') {
    fromDate = startOfWeekMonday(today); toDate = addDays(fromDate, 6);
    showingLabel = 'this week (' + fmtMonthDay(fromDate) + ' – ' + fmtMonthDay(toDate) + ')';
  } else if (key === 'last-week') {
    var thisMon = startOfWeekMonday(today);
    fromDate = addDays(thisMon, -7); toDate = addDays(thisMon, -1);
    showingLabel = 'last week (' + fmtMonthDay(fromDate) + ' – ' + fmtMonthDay(toDate) + ')';
  } else if (key === 'this-fiscal') {
    var cur = getCurrentFiscalPeriod();
    if (!cur) { alert('Current date is outside the defined fiscal calendar.\n\nExtend the period list in /pc-fiscal.js to cover this year.'); return; }
    fromDate = cur.period.start; toDate = cur.period.end; showingLabel = cur.period.name;
  } else if (key === 'last-fiscal') {
    var prior = getPriorFiscalPeriod();
    if (!prior) { alert('No prior fiscal period defined before the current one.'); return; }
    fromDate = prior.period.start; toDate = prior.period.end; showingLabel = prior.period.name;
  } else if (key === 'all-time') {
    fromDate = ALL_TIME_START; toDate = today; showingLabel = 'all time';
  }

  if (!fromDate || !toDate) return;
  document.getElementById('s-from').value = fromDate;
  document.getElementById('s-to').value = toDate;
  setQuickRangeUI(key, showingLabel);
  await searchHistory();
}

function onManualDateChange() {
  // User edited the date pickers directly — drop the "active chip" highlight.
  clearQuickRangeUI();
}

async function searchHistory() {
  var from = document.getElementById('s-from').value;
  var to = document.getElementById('s-to').value;
  var event = document.getElementById('s-event').value.trim();
  var venue = document.getElementById('s-venue').value;
  var resultsEl = document.getElementById('search-results');
  resultsEl.innerHTML = '<div class="loading-state">Searching...</div>';

  var url = SUPA_URL + '/rest/v1/sales?select=*&order=event_date.asc,submitted_at.asc';
  if (from) url += '&event_date=gte.' + from;
  if (to) url += '&event_date=lte.' + to;
  if (venue) url += '&venue=eq.' + encodeURIComponent(venue);
  if (event) url += '&event_name=ilike.' + encodeURIComponent('%' + event + '%');

  try {
    var res = await fetch(url, {headers: apiHeaders()});
    var rows = await res.json();
    currentSearchData = rows;

    if (!Array.isArray(rows) || !rows.length) {
      resultsEl.innerHTML = '<div class="empty-state" style="padding:16px;">No results found.</div>';
      return;
    }

    // Fetch event-level data (notes + weather) for the date+venue combinations in
    // these sales rows. One query indexed by event_date range, joined to results
    // client-side. Cancelled events excluded (defensive — already filtered in
    // most code paths but doesn't hurt).
    var eventInfoByKey = {}; // "date||venue" → events row
    try {
      var minDate = rows.reduce(function(m, r) { return r.event_date < m ? r.event_date : m; }, rows[0].event_date);
      var maxDate = rows.reduce(function(m, r) { return r.event_date > m ? r.event_date : m; }, rows[0].event_date);
      var evUrl = SUPA_URL + '/rest/v1/events?event_date=gte.' + minDate + '&event_date=lte.' + maxDate +
                  '&cancelled_at=is.null' +
                  '&select=id,venue,event_date,manager_notes,manager_notes_updated_by,' +
                  'manager_notes_updated_at,weather_high_f,weather_low_f,weather_conditions,weather_fetched_at,' +
                  'report_time,gates_open,show_time,estimated_end_time,expected_attendance';
      var evRes = await fetch(evUrl, { headers: apiHeaders() });
      var evRows = await evRes.json();
      if (Array.isArray(evRows)) {
        evRows.forEach(function(ev) {
          eventInfoByKey[ev.event_date + '||' + ev.venue] = ev;
        });
      }
    } catch(e) {
      // Notes/weather are non-critical — if the lookup fails, render sales without them
      console.warn('[sales-history] event info lookup failed:', e);
    }
    // Stash for use by edit-modal handlers
    currentEventInfoByKey = eventInfoByKey;

    // Day-of-show sheets for these events — frozen snapshots, rendered from
    // saved values only (no live weather/prep re-pull).
    dosSheetsByEventId = {}; dosPopcornBySheetId = {}; venueDefaultsByCode = {};
    try {
      var evIds = Object.keys(eventInfoByKey).map(function(k){ return eventInfoByKey[k].id; }).filter(Boolean);
      if (evIds.length) {
        var shUrl = SUPA_URL + '/rest/v1/event_show_sheets?select=*&deleted_at=is.null&event_id=in.(' + evIds.join(',') + ')&limit=500';
        var shRes = await fetch(shUrl, { headers: apiHeaders() });
        var shRows = await shRes.json();
        var sheetIds = [];
        if (Array.isArray(shRows)) shRows.forEach(function(s){ dosSheetsByEventId[s.event_id] = s; sheetIds.push(s.id); });
        if (sheetIds.length) {
          var pcUrl = SUPA_URL + '/rest/v1/event_show_sheet_popcorn?select=boxes,stand_id,sheet_id,stands(stand_name)&is_active=eq.true&sheet_id=in.(' + sheetIds.join(',') + ')&limit=2000';
          var pcRes = await fetch(pcUrl, { headers: apiHeaders() });
          var pcRows = await pcRes.json();
          if (Array.isArray(pcRows)) pcRows.forEach(function(p){
            if (!dosPopcornBySheetId[p.sheet_id]) dosPopcornBySheetId[p.sheet_id] = [];
            dosPopcornBySheetId[p.sheet_id].push(p);
          });
        }
        var vdRes = await fetch(SUPA_URL + '/rest/v1/venue_show_defaults?select=*&is_active=eq.true&limit=100', { headers: apiHeaders() });
        var vdRows = await vdRes.json();
        if (Array.isArray(vdRows)) vdRows.forEach(function(d){ venueDefaultsByCode[d.venue_code] = d; });
      }
    } catch(e) {
      console.warn('[sales-history] day-of-show sheet lookup failed:', e);
    }

    var grandTotal = rows.reduce(function(s,r) { return s+parseFloat(r.amount); }, 0);
    var grandTips = rows.reduce(function(s,r) { return s+(parseFloat(r.tip_amount)||0); }, 0);

    // Sales per person — only count rows with staff_count > 0 (cleanest math).
    var staffedRows = rows.filter(function(r) { return r.staff_count && parseInt(r.staff_count) > 0; });
    var staffedSales = staffedRows.reduce(function(s,r) { return s+parseFloat(r.amount); }, 0);
    var staffedHeadcount = staffedRows.reduce(function(s,r) { return s+parseInt(r.staff_count); }, 0);
    var salesPerPerson = (staffedHeadcount > 0) ? (staffedSales / staffedHeadcount) : null;
    var spExcluded = rows.length - staffedRows.length;

    var html = '<div class="summary-row">';
    html += '<div class="summary-box"><div class="s-label">Total sales</div><div class="s-val">$' + Math.round(grandTotal).toLocaleString() + '</div></div>';
    html += '<div class="summary-box"><div class="s-label">Tips</div><div class="s-val">$' + Math.round(grandTips).toLocaleString() + '</div></div>';
    if (salesPerPerson !== null) {
      html += '<div class="summary-box"><div class="s-label">Sales / person</div><div class="s-val">$' + Math.round(salesPerPerson).toLocaleString() + '</div>';
      if (spExcluded > 0) {
        html += '<div class="s-sub">' + spExcluded + ' row' + (spExcluded !== 1 ? 's' : '') + ' w/o staff count excluded</div>';
      }
      html += '</div>';
    } else {
      html += '<div class="summary-box"><div class="s-label">Sales / person</div><div class="s-val dim">--</div><div class="s-sub">No staff counts entered</div></div>';
    }
    html += '</div>';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">';
    html += '<div style="font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.06em;">By event</div>';
    html += '<button class="export-btn" onclick="exportCSV()">Export CSV</button>';
    html += '</div>';

    var byEvent = {};
    rows.forEach(function(r) {
      var key = r.event_date + '||' + (r.event_name || 'Unknown') + '||' + r.venue;
      if (!byEvent[key]) byEvent[key] = [];
      byEvent[key].push(r);
    });

    var eventKeys = Object.keys(byEvent);
    eventKeys.sort(function(a,b) { return b.localeCompare(a); });

    eventKeys.forEach(function(key, i) {
      var stands = byEvent[key];
      var parts = key.split('||');
      var evtDate = parts[0];
      var evtName = parts[1];
      var evtVenue = parts[2];
      var total = stands.reduce(function(s,r) { return s+parseFloat(r.amount); }, 0);
      var dateStr = evtDate.slice(5,7) + '/' + evtDate.slice(8,10) + '/' + evtDate.slice(0,4);
      var id = 're' + i;
      var totalStaff = stands.reduce(function(s,r) { return s+(parseInt(r.staff_count)||0); }, 0);
      var eventTips = stands.reduce(function(s,r) { return s+(parseFloat(r.tip_amount)||0); }, 0);
      var hasStaff = stands.some(function(r) { return r.staff_count && r.staff_count > 0; });
      var evtPerPerson = hasStaff && totalStaff > 0 ? ' - $' + Math.round(total/totalStaff).toLocaleString() + '/person' : '';
      var staffMeta = hasStaff ? ' - ' + totalStaff + ' staff' + evtPerPerson : '';
      var tipsMeta = eventTips > 0 ? ' - Tips: $' + Math.round(eventTips).toLocaleString() : '';
      var venueLabel = VENUE_LABELS[evtVenue] || evtVenue;

      // Pull event-level info (notes + weather) for this date+venue
      var eventInfo = currentEventInfoByKey[evtDate + '||' + evtVenue];
      var weatherInline = '';
      if (eventInfo && eventInfo.weather_fetched_at && eventInfo.weather_conditions) {
        var highTxt = eventInfo.weather_high_f != null ? eventInfo.weather_high_f + '\u00b0F' : '';
        var icon = weatherIconFor(eventInfo.weather_conditions);
        weatherInline = '<span class="weather-chip-inline"><span class="weather-chip-icon">' + icon + '</span>' + highTxt + ' \u00b7 ' + eventInfo.weather_conditions + '</span>';
      }

      // Event meta line now lives BELOW the venue name+weather, not squished
      // onto the venue label line, so the new weather chip has room to breathe.
      var eventMetaParts = [];
      eventMetaParts.push(stands.length + ' stand' + (stands.length > 1 ? 's' : ''));
      if (hasStaff && totalStaff > 0) {
        eventMetaParts.push(totalStaff + ' staff');
        eventMetaParts.push('$' + Math.round(total/totalStaff).toLocaleString() + '/person');
      }
      if (eventTips > 0) {
        eventMetaParts.push('Tips: $' + Math.round(eventTips).toLocaleString());
      }
      var eventMetaStr = eventMetaParts.join(' \u00b7 ');

      html += '<div class="result-venue">';
      html += '<div class="result-venue-header" onclick="toggleResult(\'' + id + '\',\'rch' + i + '\')">';
      html += '<div style="flex:1;min-width:0;">';
      html += '<div class="result-venue-name">' + evtName + weatherInline + '</div>';
      html += '<div class="result-venue-meta">' + dateStr + ' \u00b7 ' + venueLabel + '</div>';
      html += '<div class="event-meta-line">' + eventMetaStr + '</div>';
      html += '</div>';
      html += '<div style="display:flex;align-items:center;gap:8px;">';
      html += '<div class="result-venue-total">$' + Math.round(total).toLocaleString() + '</div>';
      html += '<div class="chevron" id="rch' + i + '">&#9654;</div></div></div>';

      // Notes row — only when notes exist OR within edit window to invite add
      if (eventInfo) {
        var hasNotes = !!(eventInfo.manager_notes && eventInfo.manager_notes.trim());
        var withinWindow = canEdit(evtDate);
        if (hasNotes) {
          html += renderNotesRow(eventInfo, i, withinWindow);
        } else if (withinWindow) {
          html += '<div class="notes-add-row" onclick="openNotesEditModal(\'' + eventInfo.id + '\',\'' + evtDate + '\',\'' + evtVenue + '\')">';
          html += '<div class="notes-add-icon">+</div>Add notes for this event</div>';
        }
      }

      // Day-of-show sheet row — only when a saved sheet exists for this event
      if (eventInfo && dosSheetsByEventId[eventInfo.id]) {
        html += renderDosSheetRow(dosSheetsByEventId[eventInfo.id], eventInfo, i);
      }

      html += '<table class="result-stand-table" id="' + id + '">';
      html += '<thead><tr><th>Stand</th><th style="text-align:right;">Amount</th><th style="text-align:right;">Tips</th><th>Photos</th><th>Actions</th></tr></thead><tbody>';

      stands.sort(function(a,b) { return parseFloat(b.amount)-parseFloat(a.amount); });
      stands.forEach(function(r) {
        var perPerson = r.staff_count && r.staff_count > 0 ? '$' + Math.round(parseFloat(r.amount)/r.staff_count).toLocaleString() + '/person' : '';
        var staffLabel = r.staff_count ? (r.staff_count + ' staff' + (perPerson ? ' - ' + perPerson : '')) : '';
        var editAllowed = canEdit(r.event_date);
        html += '<tr>';
        html += '<td><strong>' + r.stand + '</strong>' + (staffLabel ? '<div style="font-size:11px;color:#888;margin-top:2px;">' + staffLabel + '</div>' : '');
        if (r.submitted_by) html += '<div style="font-size:11px;color:#bbb;margin-top:1px;">by ' + r.submitted_by + '</div>';
        html += '</td>';
        html += '<td class="amt-cell">$' + Math.round(parseFloat(r.amount)).toLocaleString() + '</td>';
        var tipVal = parseFloat(r.tip_amount) || 0;
        html += '<td class="amt-cell">' + (tipVal > 0 ? '$' + Math.round(tipVal).toLocaleString() : '<span style="color:#ddd;">--</span>') + '</td>';
        html += '<td>';
        if (r.photo_url) html += '<a href="' + r.photo_url + '" target="_blank" class="photo-link">Reg</a>';
        if (r.units_photo_url) html += '<a href="' + r.units_photo_url + '" target="_blank" class="photo-link">Units</a>';
        if (!r.photo_url && !r.units_photo_url) html += '<span class="no-photo">none</span>';
        html += '</td>';
        html += '<td>';
        if (editAllowed) {
          html += '<button class="edit-btn" onclick="openEditModal(\'' + r.id + '\')">Edit</button>';
        } else {
          html += '<button class="edit-btn locked" title="Edit window closed — contact an admin">Locked</button>';
        }
        if (pcAuth.isAdmin()) {
          html += '<button class="del-btn" onclick="triggerDelete(\'' + r.id + '\',\'' + r.stand.replace(/'/g, "\\'") + ' at ' + evtVenue + '\')">Delete</button>';
        }
        html += '</td></tr>';
      });
      html += '</tbody></table></div>';
    });

    resultsEl.innerHTML = html;
  } catch(e) {
    console.error('[sales-history] searchHistory failed:', e);
    resultsEl.innerHTML = '<div class="empty-state" style="padding:16px;">Error loading results.</div>';
  }
}

  var el = document.getElementById(id);
  var ch = document.getElementById(chId);
  var open = el.style.display === 'table';
  el.style.display = open ? 'none' : 'table';
  ch.innerHTML = open ? '&#9654;' : '&#9660;';
}

var currentEventInfoByKey = {}; // populated by searchHistory(), keyed by "date||venue"
var dosSheetsByEventId = {};    // event_id -> event_show_sheets row (frozen snapshot)
var dosPopcornBySheetId = {};   // sheet_id -> [popcorn child rows]
var venueDefaultsByCode = {};   // venue_code -> venue_show_defaults row

function dosPrettyTime(t) {
  if (!t) return '';
  var m = String(t).match(/(\d{1,2}):(\d{2})/);
  if (!m) return t;
  var h = parseInt(m[1],10), min = m[2], ap = h >= 12 ? 'PM' : 'AM';
  var h12 = h % 12; if (h12 === 0) h12 = 12;
  return h12 + ':' + min + ' ' + ap;
}

function renderDosSheetRow(sheet, ev, idx) {
  var dsExpId = 'ds-' + idx, dsChId = 'dsc-' + idx;
  var preview = (sheet.crew_note || '').replace(/\s+/g, ' ').trim();
  if (preview.length > 80) preview = preview.slice(0, 78) + '...';
  var html = '<div class="dos-sheet-row" onclick="toggleNotesRow(\'' + dsExpId + '\',\'' + dsChId + '\')">';
  html += '<div class="notes-row-top">';
  html += '<div class="dos-sheet-row-label">\ud83d\udccb Day-of-show sheet</div>';
  html += '<div class="notes-row-preview">' + escapeHtml(preview) + '</div>';
  html += '<div class="notes-row-chev" id="' + dsChId + '">&#9654;</div>';
  html += '</div></div>';
  html += '<div class="dos-sheet-expanded" id="' + dsExpId + '" onclick="event.stopPropagation()">';
  html += renderDosSheetContent(sheet, ev);
  html += '</div>';
  return html;
}

function renderDosSheetContent(sheet, ev) {
  var vd = venueDefaultsByCode[ev.venue] || {};
  var report = sheet.report_time || dosPrettyTime(ev.report_time) || dosPrettyTime(ev.gates_open) || '';
  var doors = sheet.doors || dosPrettyTime(ev.gates_open) || vd.doors_default || '';
  var cutoff = sheet.alcohol_cutoff || vd.alcohol_cutoff_default || '10:15 PM';
  var attendance = (sheet.expected_attendance != null) ? sheet.expected_attendance
    : (ev.expected_attendance != null ? ev.expected_attendance : null);

  var h = '<div class="dos-sh">';
  var logi = [];
  logi.push('Doors <b>' + escapeHtml(doors || '\u2014') + '</b>');
  logi.push('Cut-off <b>' + escapeHtml(cutoff || '\u2014') + '</b>');
  logi.push('Expected <b>' + (attendance != null ? escapeHtml(String(attendance)) : '\u2014') + '</b>');
  if (report) logi.push('Report <b>' + escapeHtml(report) + '</b>');
  h += '<div class="dos-sh-logi">' + logi.join(' \u00b7 ') + '</div>';

  h += '<div class="dos-sh-sec"><div class="dos-sh-label">Crew note</div><div class="dos-sh-crew">' + escapeHtml(sheet.crew_note || '') + '</div></div>';

  if (sheet.run_of_show_text || sheet.run_of_show_image_path) {
    h += '<div class="dos-sh-sec"><div class="dos-sh-label">Run of show</div>';
    if (sheet.run_of_show_text) h += '<div class="dos-sh-text">' + escapeHtml(sheet.run_of_show_text) + '</div>';
    if (sheet.run_of_show_image_path) {
      var imgUrl = SUPA_URL + '/storage/v1/object/public/show-sheet-images/' + sheet.run_of_show_image_path;
      h += '<a href="' + imgUrl + '" target="_blank" class="dos-sh-imglink">View run-of-show image</a>';
    }
    h += '</div>';
  }

  var pc = dosPopcornBySheetId[sheet.id] || [];
  h += '<div class="dos-sh-sec"><div class="dos-sh-label">Popcorn to pop</div>';
  if (pc.length) {
    var items = pc.map(function (p) {
      var nm = (p.stands && p.stands.stand_name) || 'Stand';
      var b = (p.boxes == null || p.boxes === '') ? '\u2014' : p.boxes;
      return escapeHtml(nm) + ' <b>' + escapeHtml(String(b)) + '</b>';
    });
    h += '<div class="dos-sh-pop">' + items.join(' \u00b7 ') + '</div>';
  } else {
    h += '<div class="dos-sh-noplan">\u26a0 Your manager did not create a popcorn plan for this event.</div>';
  }
  h += '</div>';

  if (sheet.managers_override) {
    h += '<div class="dos-sh-sec"><div class="dos-sh-label">On-site managers</div><div class="dos-sh-text">' + escapeHtml(sheet.managers_override) + '</div></div>';
  }

  var hu = (sheet.heads_up_text || '').split('\n').map(function (x) { return x.trim(); }).filter(function (x) { return x; });
  if (hu.length) {
    h += '<div class="dos-sh-sec"><div class="dos-sh-label">Heads-up</div><ul class="dos-sh-list">';
    hu.forEach(function (x) { h += '<li>' + escapeHtml(x) + '</li>'; });
    h += '</ul></div>';
  }

  var st = [];
  if (vd.arrival_note) st.push(['Where to report', vd.arrival_note]);
  if (vd.parking_note) st.push(['Parking', vd.parking_note]);
  if (vd.dress_note) st.push(['Dress', vd.dress_note]);
  if (vd.shelter_in_place_note) st.push(['Shelter-in-place', vd.shelter_in_place_note]);
  if (st.length) {
    h += '<div class="dos-sh-sec"><div class="dos-sh-label">Good to know</div>';
    st.forEach(function (pair) {
      h += '<div class="dos-sh-kv"><span class="k">' + escapeHtml(pair[0]) + ':</span> ' + escapeHtml(pair[1]) + '</div>';
    });
    h += '</div>';
  }

  var who = sheet.last_saved_by || 'someone';
  var when = sheet.last_saved_at ? new Date(sheet.last_saved_at) : null;
  var whenStr = when ? when.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '';
  h += '<div class="dos-sh-meta">Sheet saved by ' + escapeHtml(who) + (whenStr ? ' \u00b7 ' + whenStr : '') + '</div>';

  h += '</div>';
  return h;
}

function weatherIconFor(cond) {
  if (!cond) return '\u2601\ufe0f';
  var c = cond.toLowerCase();
  if (c.indexOf('mostly clear') !== -1) return '\u26c5';
  if (c.indexOf('clear') !== -1) return '\u2600\ufe0f';
  if (c.indexOf('cloudy') !== -1) return '\u2601\ufe0f';
  if (c.indexOf('fog') !== -1) return '\ud83c\udf2b\ufe0f';
  if (c.indexOf('drizzle') !== -1) return '\ud83c\udf26\ufe0f';
  if (c.indexOf('rain') !== -1) return '\ud83c\udf27\ufe0f';
  if (c.indexOf('snow') !== -1) return '\ud83c\udf28\ufe0f';
  if (c.indexOf('thunder') !== -1) return '\u26c8\ufe0f';
  return '\u2601\ufe0f';
}

function renderNotesRow(eventInfo, eventIdx, withinWindow) {
  var notesText = eventInfo.manager_notes || '';
  var preview = notesText.replace(/\s+/g, ' ').trim();
  if (preview.length > 80) preview = preview.slice(0, 78) + '...';
  var nrId = 'nr-' + eventIdx;
  var nrExpId = 'nrx-' + eventIdx;
  var nrChId = 'nrc-' + eventIdx;

  var html = '<div class="notes-row" onclick="toggleNotesRow(\'' + nrExpId + '\',\'' + nrChId + '\')">';
  html += '<div class="notes-row-top">';
  html += '<div class="notes-row-label">\ud83d\udcdd Notes from this event</div>';
  html += '<div class="notes-row-preview">' + escapeHtml(preview) + '</div>';
  html += '<div class="notes-row-chev" id="' + nrChId + '">&#9654;</div>';
  html += '</div></div>';

  html += '<div class="notes-row-expanded" id="' + nrExpId + '" onclick="event.stopPropagation()">';
  html += '<div class="notes-text">' + escapeHtml(notesText) + '</div>';

  // Weather detail (full range, not just high)
  if (eventInfo.weather_fetched_at && eventInfo.weather_conditions) {
    var icon = weatherIconFor(eventInfo.weather_conditions);
    var high = eventInfo.weather_high_f != null ? eventInfo.weather_high_f + '\u00b0F' : '';
    var low = eventInfo.weather_low_f != null ? eventInfo.weather_low_f + '\u00b0F' : '';
    var range = high && low ? (high + ' / ' + low) : (high || low);
    html += '<div class="notes-weather-detail">' + icon + ' ' + range + ' \u00b7 ' + eventInfo.weather_conditions + '</div>';
  }

  html += '<div class="notes-meta">';
  var who = eventInfo.manager_notes_updated_by || 'someone';
  var when = eventInfo.manager_notes_updated_at ? new Date(eventInfo.manager_notes_updated_at) : null;
  var whenStr = when ? when.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '';
  html += '<span>Last updated by ' + escapeHtml(who) + (whenStr ? ' \u00b7 ' + whenStr : '') + '</span>';
  if (withinWindow) {
    html += '<button class="notes-edit-btn" onclick="event.stopPropagation();openNotesEditModal(\'' + eventInfo.id + '\',\'' + eventInfo.event_date + '\',\'' + eventInfo.venue + '\')">Edit notes</button>';
  } else {
    html += '<button class="notes-edit-btn locked" title="Edit window closed">Locked</button>';
  }
  html += '</div></div>';

  return html;
}

function toggleNotesRow(expId, chId) {
  var el = document.getElementById(expId);
  var ch = document.getElementById(chId);
  if (!el || !ch) return;
  var open = el.classList.contains('open');
  if (open) {
    el.classList.remove('open');
    ch.innerHTML = '&#9654;';
  } else {
    el.classList.add('open');
    ch.innerHTML = '&#9660;';
  }
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function openNotesEditModal(eventId, evtDate, evtVenue) {
  var info = currentEventInfoByKey[evtDate + '||' + evtVenue];
  if (!info) return;

  document.getElementById('notes-edit-event-id').value = eventId;
  document.getElementById('notes-edit-textarea').value = info.manager_notes || '';

  var withinWindow = isWithinEditWindow(evtDate);
  var isAdmin = pcAuth.isAdmin();
  var dateStr = evtDate.slice(5,7) + '/' + evtDate.slice(8,10) + '/' + evtDate.slice(0,4);
  var venueLabel = VENUE_LABELS[evtVenue] || evtVenue;
  document.getElementById('notes-edit-context').innerHTML = '<strong>' + venueLabel + '</strong> \u00b7 ' + dateStr;

  var noticeEl = document.getElementById('notes-edit-window-notice');
  if (isAdmin && !withinWindow) {
    noticeEl.textContent = 'Edit window closed for managers \u2014 you have admin access.';
    noticeEl.style.display = 'block';
  } else {
    noticeEl.style.display = 'none';
  }

  document.getElementById('notes-edit-error').style.display = 'none';
  document.getElementById('notes-edit-save-btn').disabled = false;
  document.getElementById('notes-edit-save-btn').textContent = 'Save changes';
  document.getElementById('notes-edit-modal').classList.add('open');
}

function closeNotesEditModal() {
  document.getElementById('notes-edit-modal').classList.remove('open');
}

async function saveNotesEdit() {
  var eventId = document.getElementById('notes-edit-event-id').value;
  var newText = document.getElementById('notes-edit-textarea').value.trim();
  var errEl = document.getElementById('notes-edit-error');
  var btn = document.getElementById('notes-edit-save-btn');
  errEl.style.display = 'none';

  if (!eventId) return;

  btn.disabled = true;
  btn.textContent = 'Saving...';

  var nowIso = new Date().toISOString();
  var who = pcAuth.getUser() ? pcAuth.getUser().display_name : null;

  try {
    var hdrs = apiHeaders();
    hdrs['Content-Type'] = 'application/json';
    hdrs['Prefer'] = 'return=minimal';
    var res = await fetch(SUPA_URL + '/rest/v1/events?id=eq.' + eventId, {
      method: 'PATCH',
      headers: hdrs,
      body: JSON.stringify({
        manager_notes: newText || null,
        manager_notes_updated_by: who,
        manager_notes_updated_at: nowIso
      })
    });
    if (!res.ok) throw new Error(await res.text());

    closeNotesEditModal();
    searchHistory(); // re-render to pick up the updated notes
  } catch(e) {
    errEl.textContent = 'Could not save: ' + (e.message || String(e));
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Save changes';
  }
}

function openEditModal(id) {
  var row = null;
  for (var i = 0; i < currentSearchData.length; i++) {
    if (currentSearchData[i].id === id) { row = currentSearchData[i]; break; }
  }
  if (!row) return;

  var isAdmin = pcAuth.isAdmin();
  var withinWindow = isWithinEditWindow(row.event_date);
  var readOnly = !isAdmin && !withinWindow;

  document.getElementById('edit-id').value = id;
  document.getElementById('edit-date').value = row.event_date;
  document.getElementById('edit-amount').value = row.amount;
  document.getElementById('edit-venue').value = row.venue;
  document.getElementById('edit-staff').value = row.staff_count || '';
  document.getElementById('edit-tip').value = row.tip_amount !== null && row.tip_amount !== undefined ? row.tip_amount : '';
  document.getElementById('edit-submitted-by').value = row.submitted_by || '—';
  document.getElementById('edit-date').dataset.origDate = row.event_date;
  document.getElementById('edit-venue').dataset.origVenue = row.venue;
  updateEditStands(row.stand);
  reloadEditEvents(row.event_name || '');

  var noticeEl = document.getElementById('edit-window-notice');
  if (isAdmin && !withinWindow) {
    noticeEl.textContent = 'Edit window closed for managers — you have admin access to edit.';
    noticeEl.style.display = 'block';
  } else {
    noticeEl.style.display = 'none';
  }

  var saveBtn = document.getElementById('edit-save-btn');
  var fields = ['edit-date','edit-amount','edit-event','edit-venue','edit-stand','edit-staff','edit-tip'];
  fields.forEach(function(fid) {
    var el = document.getElementById(fid);
    if (el) el.disabled = readOnly;
  });
  document.getElementById('edit-venue').disabled = readOnly;
  saveBtn.disabled = readOnly;
  saveBtn.style.background = readOnly ? '#ccc' : '';

  editRegisterFile = null; editUnitsFile = null; editRegClear = false; editUnitsClear = false;
  document.getElementById('edit-reg-file').value = '';
  document.getElementById('edit-units-file').value = '';

  var regLabel = document.getElementById('edit-reg-label');
  var regClear = document.getElementById('edit-reg-clear');
  if (row.photo_url) {
    regLabel.innerHTML = '<a href="' + row.photo_url + '" target="_blank">View current photo</a>';
    regClear.style.display = readOnly ? 'none' : 'inline-block';
  } else { regLabel.textContent = 'No photo'; regClear.style.display = 'none'; }

  var unitsLabel = document.getElementById('edit-units-label');
  var unitsClear = document.getElementById('edit-units-clear');
  if (row.units_photo_url) {
    unitsLabel.innerHTML = '<a href="' + row.units_photo_url + '" target="_blank">View current photo</a>';
    unitsClear.style.display = readOnly ? 'none' : 'inline-block';
  } else { unitsLabel.textContent = 'No photo'; unitsClear.style.display = 'none'; }

  document.getElementById('edit-error').style.display = 'none';
  document.getElementById('edit-modal').classList.add('open');
}

// Option B: a sale must belong to a real scheduled event, so the Event name
// dropdown is driven entirely by events on the selected date+venue. No free
// text. Empty list = no event here = Save is blocked (see saveEdit).
async function reloadEditEvents(selectName) {
  var date = document.getElementById('edit-date').value;
  var venue = document.getElementById('edit-venue').value;
  var sel = document.getElementById('edit-event');
  var note = document.getElementById('edit-event-note');
  if (selectName === undefined) selectName = sel.value; // keep selection if caller didn't override

  sel.innerHTML = '<option value="">Select event...</option>';
  note.style.display = 'none';
  if (!date || !venue) return;

  try {
    var url = SUPA_URL + '/rest/v1/events?event_date=eq.' + encodeURIComponent(date) +
              '&venue=eq.' + encodeURIComponent(venue) +
              '&cancelled_at=is.null&select=event_name&order=event_name.asc&limit=20';
    var res = await fetch(url, { headers: apiHeaders() });
    var rows = await res.json();
    var names = [];
    if (Array.isArray(rows)) {
      rows.forEach(function(r) {
        var n = (r.event_name || '').trim();
        if (n && names.indexOf(n) === -1) names.push(n);
      });
    }
    names.forEach(function(n) {
      var o = document.createElement('option');
      o.value = n; o.textContent = n;
      if (n === selectName) o.selected = true;
      sel.appendChild(o);
    });

    var date0 = document.getElementById('edit-date').dataset.origDate || '';
    var venue0 = document.getElementById('edit-venue').dataset.origVenue || '';
    var onOriginal = (date === date0 && venue === venue0);

    if (names.length === 0) {
      note.textContent = 'No scheduled event at this venue on this date. A sale must belong to an event \u2014 add it in Events Admin first, or pick a different date/venue.';
      note.style.display = 'block';
    } else if (onOriginal && selectName && names.indexOf(selectName) === -1) {
      // Mismatch on the sale's own date/venue — worth naming, it's a wrong-log signal.
      note.textContent = 'This sale\u2019s saved name (\u201c' + selectName + '\u201d) isn\u2019t scheduled here. Pick the correct event.';
      note.style.display = 'block';
    } else if (!sel.value) {
      // Moved to a new date/venue (or just nothing chosen yet) — neutral prompt.
      note.textContent = 'Pick the scheduled event for this date and venue.';
      note.style.display = 'block';
    }
  } catch (e) {
    note.textContent = 'Could not load events for this date/venue. Try again.';
    note.style.display = 'block';
  }
}

function updateEditStands(selectedStand) {
  var venue = document.getElementById('edit-venue').value;
  var standSel = document.getElementById('edit-stand');
  standSel.innerHTML = '';
  if (STANDS[venue]) {
    STANDS[venue].forEach(function(s) {
      var o = document.createElement('option');
      o.textContent = s;
      if (s === selectedStand) o.selected = true;
      standSel.appendChild(o);
    });
  }
}

function handleEditFile(input, type) {
  if (input.files && input.files[0]) {
    var file = input.files[0];
    var ext = file.name.toLowerCase().split('.').pop();
    var mime = (file.type || '').toLowerCase();
    if (ext === 'heic' || ext === 'heif' || mime.indexOf('heic') !== -1 || mime.indexOf('heif') !== -1) {
      alert('HEIC files are not supported — please use JPG or PNG.');
      input.value = '';
      return;
    }
    if (type === 'register') {
      editRegisterFile = input.files[0];
      document.getElementById('edit-reg-label').textContent = 'New: ' + editRegisterFile.name;
      editRegClear = false;
    } else {
      editUnitsFile = input.files[0];
      document.getElementById('edit-units-label').textContent = 'New: ' + editUnitsFile.name;
      editUnitsClear = false;
    }
  }
}

function clearPhoto(type) {
  if (type === 'register') {
    editRegClear = true; editRegisterFile = null;
    document.getElementById('edit-reg-label').textContent = 'Will be removed on save';
    document.getElementById('edit-reg-clear').style.display = 'none';
  } else {
    editUnitsClear = true; editUnitsFile = null;
    document.getElementById('edit-units-label').textContent = 'Will be removed on save';
    document.getElementById('edit-units-clear').style.display = 'none';
  }
}

function closeEditModal() { document.getElementById('edit-modal').classList.remove('open'); }

async function uploadPhoto(file, path) {
  var hdrs = apiHeaders();
  hdrs['Content-Type'] = file.type;
  var res = await fetch(SUPA_URL + '/storage/v1/object/sale-photos/' + path, {
    method: 'POST',
    headers: hdrs,
    body: file
  });
  if (!res.ok) return null;
  return SUPA_URL + '/storage/v1/object/public/sale-photos/' + path;
}

async function saveEdit() {
  var id = document.getElementById('edit-id').value;
  var date = document.getElementById('edit-date').value;
  var amount = parseFloat(document.getElementById('edit-amount').value);
  var evtName = document.getElementById('edit-event').value.trim();
  var venue = document.getElementById('edit-venue').value;
  var stand = document.getElementById('edit-stand').value;
  var staffVal = parseInt(document.getElementById('edit-staff').value) || null;
  var tipRaw = document.getElementById('edit-tip').value;
  var tipVal = tipRaw === '' ? null : parseFloat(tipRaw);
  var errEl = document.getElementById('edit-error');
  errEl.style.display = 'none';

  if (!date || !venue || !stand || !amount || isNaN(amount)) {
    errEl.textContent = 'Please fill in all required fields.';
    errEl.style.display = 'block';
    return;
  }
  if (!evtName) {
    errEl.textContent = 'Pick a scheduled event for this date and venue. A sale must belong to an event.';
    errEl.style.display = 'block';
    return;
  }

  var original = null;
  for (var i = 0; i < currentSearchData.length; i++) {
    if (currentSearchData[i].id === id) { original = currentSearchData[i]; break; }
  }

  var photoUrl = original ? (original.photo_url || null) : null;
  var unitsUrl = original ? (original.units_photo_url || null) : null;
  if (editRegClear) photoUrl = null;
  if (editUnitsClear) unitsUrl = null;
  if (editRegisterFile) photoUrl = await uploadPhoto(editRegisterFile, id + '-register.' + editRegisterFile.name.split('.').pop());
  if (editUnitsFile) unitsUrl = await uploadPhoto(editUnitsFile, id + '-units.' + editUnitsFile.name.split('.').pop());

  try {
    var hdrs = apiHeaders();
    hdrs['Content-Type'] = 'application/json';
    hdrs['Prefer'] = 'return=minimal';
    var res = await fetch(SUPA_URL + '/rest/v1/sales?id=eq.' + id, {
      method: 'PATCH',
      headers: hdrs,
      body: JSON.stringify({
        event_date: date, amount: amount, event_name: evtName || null,
        venue: venue, stand: stand, staff_count: staffVal,
        tip_amount: tipVal, photo_url: photoUrl, units_photo_url: unitsUrl
      })
    });
    if (!res.ok) throw new Error(await res.text());
    closeEditModal();
    searchHistory();
  } catch(e) {
    errEl.textContent = 'Save failed. Try again.';
    errEl.style.display = 'block';
  }
}

function triggerDelete(id, label) {
  if (!pcAuth.isAdmin()) { alert('Only admins can delete records.'); return; }
  confirmDelete(id, label);
}

async function confirmDelete(id, label) {
  if (!confirm('Delete this entry?\n\n' + label + '\n\nThis cannot be undone.')) return;
  try {
    var hdrs = apiHeaders();
    hdrs['Prefer'] = 'return=minimal';
    var res = await fetch(SUPA_URL + '/rest/v1/sales?id=eq.' + id, {
      method: 'DELETE',
      headers: hdrs
    });
    if (!res.ok) throw new Error();
    searchHistory();
  } catch(e) {
    alert('Delete failed. Try again.');
  }
}

function exportCSV() {
  if (!currentSearchData.length) return;
  var headers = ['Date','Event','Venue','Stand','Amount','Tips','Staff Count','Submitted By','Register Photo','Units Photo','Submitted At'];
  var csvRows = currentSearchData.map(function(r) {
    return [
      r.event_date, r.event_name || '', r.venue, r.stand, r.amount,
      r.tip_amount !== null && r.tip_amount !== undefined ? r.tip_amount : '',
      r.staff_count || '', r.submitted_by || '',
      r.photo_url ? 'Yes' : 'No', r.units_photo_url ? 'Yes' : 'No', r.submitted_at
    ];
  });
  var csv = [headers].concat(csvRows).map(function(r) {
    return r.map(function(v) { return '"' + (v || '') + '"'; }).join(',');
  }).join('\n');
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = 'sales-history-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
}

function populateVenueDropdowns() {
  var sVenue = document.getElementById('s-venue');
  var eVenue = document.getElementById('edit-venue');
  // Sorted by catalog display order; falls back to Object.keys for the fallback path.
  var venueCodes = Object.keys(VENUE_LABELS);
  if (typeof pcCatalog !== 'undefined' && pcCatalog && pcCatalog.getActiveVenues) {
    try {
      var active = pcCatalog.getActiveVenues();
      if (active && active.length) venueCodes = active.map(function(v) { return v.code; });
    } catch (e) { /* fall through to Object.keys */ }
  }
  venueCodes.forEach(function(code) {
    var label = VENUE_LABELS[code] || code;
    var o1 = document.createElement('option');
    o1.value = code; o1.textContent = label;
    sVenue.appendChild(o1);
    var o2 = document.createElement('option');
    o2.value = code; o2.textContent = label;
    eVenue.appendChild(o2);
  });
}

pcAuth.require({
  pageSlug: 'sales-history',
  onReady: function(user) {
    pcActivity.init('sales-history');
    updateFiscalChipAvailability();

    // Load catalog → populate dropdowns → kick off default search.
    // Fallback path used only if catalog fails to load.
    var initSearch = function() {
      populateVenueDropdowns();
      applyQuickRange('last-event');
    };

    if (typeof pcCatalog !== 'undefined' && pcCatalog && pcCatalog.ready) {
      pcCatalog.ready().then(function() {
        try {
          pcCatalog.getActiveVenues().forEach(function(v) {
            VENUE_LABELS[v.code] = v.full_name;
            // getAllStandsForVenue: historical reports need retired stands too,
            // so old edit-modal selections survive a save round-trip.
            var stands = pcCatalog.getAllStandsForVenue(v.code) || [];
            STANDS[v.code] = stands.map(function(s) { return s.stand_name; });
          });
        } catch (e) {
          console.warn('[sales-history] catalog populate failed, using fallbacks:', e);
          VENUE_LABELS = _FALLBACK_VENUE_LABELS;
          STANDS = _FALLBACK_STANDS;
        }
        initSearch();
      }).catch(function(e) {
        console.warn('[sales-history] pcCatalog.ready failed, using fallbacks:', e);
        VENUE_LABELS = _FALLBACK_VENUE_LABELS;
        STANDS = _FALLBACK_STANDS;
        initSearch();
      });
    } else {
      console.warn('[sales-history] pcCatalog not available, using fallbacks');
      VENUE_LABELS = _FALLBACK_VENUE_LABELS;
      STANDS = _FALLBACK_STANDS;
      initSearch();
    }
  }
});
</script>
