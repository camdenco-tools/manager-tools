<style>

.employer-code-box .ec-num { font-size: 20px; font-weight: 700; color: #1b5e20; font-family: monospace; letter-spacing: 0.15em; }

.check-icon svg { width: 10px; height: 10px; }
.profile-auto { display: flex; align-items: center; gap: 6px; }
.interview-info { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; }
.interview-info .ii-label { font-size: 11px; color: #92400e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.interview-info .ii-time { font-size: 16px; font-weight: 700; color: #78350f; }
.interview-info .ii-status { font-size: 12px; color: #92400e; margin-top: 4px; }
.email-sent-banner { background: #e3f2fd; border: 1px solid #90caf9; border-radius: 6px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #0d47a1; }
.email-btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

.edit-phone-btn { background: none; border: none; cursor: pointer; padding: 2px 4px; color: #999; display: inline-flex; align-items: center; transition: color 0.15s; vertical-align: middle; margin-left: 4px; }

.phone-edit-inline input[type=tel]:focus { outline: none; box-shadow: 0 0 0 2px rgba(45,125,210,0.2); }

<header>
  <div class="header-left">
    <a href="/" class="back-link">&#8592; Toolkit</a>
    <div class="hdivider"></div>
    <span class="header-title">Candidate Pipeline</span>

  </div>

<div class="page-body">

  <div id="pcpipe-main"></div>

<script src="/pc-auth.js"></script>
<script>
var SUPABASE_URL='https://aoazlttdjowhlfcksoyl.supabase.co';
var NJ_EMPLOYER_CODE='00283683';
var ALCOHOL_ROLES=['Bartender','Beer Tender'];
var EMAIL_INFO=[{num:1,title:'Email 1',desc:'Thanks for applying',field:'email1_sent_at'},{num:2,title:'Email 2',desc:'Welcome / onboarding',field:'email2_sent_at'},{num:3,title:'Email 3',desc:'Final steps / apps',field:'email3_sent_at'}];
var VENUE_STATE={FMP:'NJ',BWH:'NJ',ACCC:'NJ',Cure:'NJ',Mann:'PA',Subaru:'PA',Montage:'PA',Villanova:'PA',DE:'DE',SATB:'DE',Kirkwood:'DE'};
var VENUE_LABELS={FMP:'Freedom Mortgage Pavilion',Mann:'Mann Music Center',BWH:'Boardwalk Hall',ACCC:'AC Convention Center',Cure:'Cure Insurance Arena',Subaru:'Subaru Park',DE:'DE Chase Field House',Montage:'Montage Mountain',SATB:'Sports at the Beach',Villanova:'Villanova',Kirkwood:'Kirkwood'};
var VENUE_CODES=['FMP','Mann','BWH','ACCC','Cure','Subaru','DE','Montage','SATB','Villanova','Kirkwood'];
var STAGE_LABELS={applied:'Applied',contacted:'Contacted',interview_scheduled:'Interview Scheduled',hired:'Hired',onboarding:'Onboarding',active:'Active',inactive:'Inactive',rejected:'Rejected'};
var ARCHIVE_DAYS={applied:30,contacted:30,interview_scheduled:0,hired:7,onboarding:35,active:14,inactive:14,rejected:7};
var pcCandidates=[],pcPayRates=[],pcRoles=[],pcBookings=[],pcSelected=null,pcFilter='all',pcSearch='',pcLoading=true;
var pcEditingPhone=false;
var pcEditingEmail=false;
var pcEditingPunchId=false;

function apiHeaders() {
  return pcAuth.headers();
}
function apiHeadersJson() {
  return Object.assign({}, apiHeaders(), {'Content-Type':'application/json'});
}

function daysSince(ts){if(!ts)return 9999;var then=new Date(ts).getTime();var now=Date.now();return Math.floor((now-then)/(1000*60*60*24));}
function isArchived(c){var limit=ARCHIVE_DAYS[c.pipeline_stage];if(!limit)return false;var ref=c.stage_updated_at||c.applied_at;return daysSince(ref)>limit;}

/* sbFetch wraps fetch and THROWS on non-2xx responses so callers' .catch() actually fires.
   Before this fix, a 4xx (RLS denied, missing column, bad filter) still resolved the promise
   and chained .then() blocks ran as if the write succeeded -- which is why hires
   appeared to save but didn't. Any HTTP error now produces a visible failure. */
function sbFetch(path,opts){
  var method=opts&&opts.method?opts.method:'GET';
  var headers=apiHeadersJson();
  if(opts&&opts.prefer)headers['Prefer']=opts.prefer;
  var cfg={method:method,headers:headers};
  if(opts&&opts.body)cfg.body=JSON.stringify(opts.body);
  return fetch(SUPABASE_URL+path,cfg).then(function(r){
    if(!r.ok){
      return r.text().then(function(t){
        var msg='HTTP '+r.status+' on '+method+' '+path;
        if(t)msg+=' -- '+t.slice(0,300);
        var err=new Error(msg);
        err.status=r.status;
        err.body=t;
        throw err;
      });
    }
    return r;
  });
}

function loadAll(){pcLoading=true;render();var p1=sbFetch('/rest/v1/candidates?select=*&order=applied_at.desc').then(function(r){return r.json();}).catch(function(){return[];});var p2=sbFetch('/rest/v1/pay_rates?select=*&order=state.asc,role.asc').then(function(r){return r.json();}).catch(function(){return[];});var p3=sbFetch('/rest/v1/interview_bookings?select=*,interview_slots(*)&order=booked_at.desc').then(function(r){return r.json();}).catch(function(){return[];});Promise.all([p1,p2,p3]).then(function(res){pcCandidates=res[0]||[];pcPayRates=res[1]||[];pcBookings=res[2]||[];var roleSet={};pcPayRates.forEach(function(r){roleSet[r.role]=true;});pcRoles=Object.keys(roleSet).sort();pcLoading=false;if(pcSelected){for(var i=0;i<pcCandidates.length;i++){if(pcCandidates[i].id===pcSelected.id){pcSelected=pcCandidates[i];break;}}}render();});}

function getBookingForCandidate(cid){for(var i=0;i<pcBookings.length;i++){if(pcBookings[i].candidate_id===cid&&pcBookings[i].status==='scheduled')return pcBookings[i];}return null;}
function getInitials(f,l){return((f?f[0]:'?')+(l?l[0]:'?')).toUpperCase();}
function formatDate(ts){if(!ts)return'--';var d=new Date(ts);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function formatDateShort(ts){if(!ts)return'--';var d=new Date(ts);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function formatSlotDateTime(booking){if(!booking)return'--';var slot=booking.interview_slots;if(!slot)return booking.interview_slot_time||'--';var d=new Date(slot.slot_date+'T00:00:00');var dateStr=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});var tp=slot.start_time.split(':');var h=parseInt(tp[0]);var m=tp[1];var ampm=h>=12?'PM':'AM';if(h>12)h=h-12;if(h===0)h=12;return dateStr+' at '+h+':'+m+' '+ampm;}
function stageBadge(stage){var cls='badge-'+(stage?stage.replace(/_/g,'-'):'applied');return'<span class="badge '+cls+'">'+(STAGE_LABELS[stage]||stage)+'</span>';}
function getFiltered(){var out=[];for(var i=0;i<pcCandidates.length;i++){var c=pcCandidates[i];var archived=isArchived(c);if(pcFilter==='archive'){if(!archived)continue;}else{if(archived)continue;var mf=pcFilter==='all'||c.pipeline_stage===pcFilter;if(!mf)continue;}var s=pcSearch.toLowerCase();var fn=(c.first_name+' '+c.last_name).toLowerCase();var ms=!pcSearch||fn.indexOf(s)>-1;if(ms)out.push(c);}return out;}
function countStage(stage){var n=0;for(var i=0;i<pcCandidates.length;i++){if(pcCandidates[i].pipeline_stage===stage)n++;}return n;}
function countHiredThisMonth(){var n=0,now=new Date();for(var i=0;i<pcCandidates.length;i++){var c=pcCandidates[i];if(!c.hired_at)continue;var d=new Date(c.hired_at);if(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear())n++;}return n;}
function getPunchId(phone){if(!phone)return'';var d=phone.replace(/\D/g,'');return d.length>=4?d.slice(-4):d;}
function formatPhoneDisplay(phone){if(!phone)return'--';var d=phone.replace(/\D/g,'');if(d.length===10)return'('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6);if(d.length===11&&d[0]==='1')return'('+d.slice(1,4)+') '+d.slice(4,7)+'-'+d.slice(7);return phone;}
function getVenueStates(venues){if(!venues||venues.length===0)return[];var s={};for(var i=0;i<venues.length;i++){var st=VENUE_STATE[venues[i]];if(st)s[st]=true;}return Object.keys(s);}
function getPayRateByState(state,role){for(var i=0;i<pcPayRates.length;i++){var pr=pcPayRates[i];if(pr.state===state&&pr.role===role)return pr.base_rate;}return null;}
function getHireChecked(prefix,items){var out=[];for(var i=0;i<items.length;i++){var el=document.getElementById(prefix+items[i]);if(el&&el.checked)out.push(items[i]);}return out;}
function getEmailAvailability(c){
  var stage=c.pipeline_stage;
  // Email 1: Thanks for applying. Available from application through interview.
  var e1=stage==='applied'||stage==='contacted'||stage==='interview_scheduled';
  // Email 2: Welcome / onboarding paperwork. Available once the person has been hired.
  var e2=stage==='onboarding'||stage==='active'||stage==='inactive';
  // Email 3: Final steps / app downloads. Same stage gating as Email 2.
  // Previously gated on (W-4 done AND I-9 done) but that broke whenever the W-4 flag
  // didn't get set due to bugs on the WordPress side. The manager should decide when
  // someone is ready for app downloads regardless of paperwork flag state.
  var e3=stage==='onboarding'||stage==='active'||stage==='inactive';
  return{e1:e1,e2:e2,e3:e3};
}

  } else {

  }

function updatePayLookup(){var venues=getHireChecked('hvenue_',VENUE_CODES);var roles=[];for(var i=0;i<pcRoles.length;i++){var el=document.getElementById('hrole_'+i);if(el&&el.checked)roles.push(pcRoles[i]);}var el=document.getElementById('hire-pay-lookup');if(!el)return;if(venues.length===0||roles.length===0){el.classList.remove('visible');return;}var sv={};for(var v=0;v<venues.length;v++){var st=VENUE_STATE[venues[v]];if(st)sv[st]=true;}var states=Object.keys(sv).sort();var html='';for(var s=0;s<states.length;s++){var state=states[s];html+='<div style="'+(s>0?'margin-top:8px;padding-top:8px;border-top:1px solid #b8dfc8;':'')+'"><div style="font-weight:600;font-size:12px;color:#1e6b2e;margin-bottom:4px;">'+state+' rates</div>';for(var r=0;r<roles.length;r++){var role=roles[r];var rate=getPayRateByState(state,role);if(rate!==null&&rate>0)html+='<div style="font-size:13px;padding:2px 0;">'+role+': <strong>$'+parseFloat(rate).toFixed(2)+' / hr</strong></div>';else if(rate!==null&&rate===0)html+='<div style="font-size:13px;padding:2px 0;">'+role+': <em>commission-based</em></div>';else html+='<div style="font-size:13px;padding:2px 0;color:#888;">'+role+': <em>no rate set</em></div>';}html+='</div>';}el.innerHTML=html;el.classList.add('visible');}
function pcPipeConfirmHire(){
  if(!pcSelected)return;
  var venues=getHireChecked('hvenue_',VENUE_CODES);
  var roles=[];
  for(var i=0;i<pcRoles.length;i++){var el=document.getElementById('hrole_'+i);if(el&&el.checked)roles.push(pcRoles[i]);}
  var hiredBy=document.getElementById('hire-by-name').value.trim();
  var errEl=document.getElementById('hire-err');
  var btn=document.getElementById('hire-confirm-btn');
  if(venues.length===0){errEl.innerHTML='Please select at least one venue.';return;}
  if(roles.length===0){errEl.innerHTML='Please select at least one role.';return;}
  if(!hiredBy){errEl.innerHTML='Please enter your name.';return;}
  // Home-component gate (May 3, 2026): every new hire must have a home component decided at hire time.
  // Picking 'NA' ("Doesn't apply") is acceptable; leaving it blank is not.
  var homeVenueEl=document.getElementById('hire-home-venue');
  var homeVenue=homeVenueEl?homeVenueEl.value:'';
  if(!homeVenue){errEl.innerHTML='Please select a home component (or "Doesn\'t apply") for this employee.';return;}
  // Determine punch ID -- either the override from the collision input, or default last-4-of-phone
  var punchInput=document.getElementById('hire-punch-input');
  var punch=punchInput?punchInput.value.replace(/\D/g,''):getPunchId(pcSelected.phone);
  if(!/^\d{4}$/.test(punch)){
    errEl.innerHTML='Punch ID must be exactly 4 digits.';
    if(punchInput)punchInput.focus();
    return;
  }
  errEl.innerHTML='';
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Checking...';}

  // Pre-flight: check if punch_id is already used in the employees table
  sbFetch('/rest/v1/employees?punch_id=eq.'+punch+'&select=first_name,last_name,is_active')
    .then(function(r){return r.json();})
    .then(function(rows){
      if(rows&&rows.length>0){
        // Collision -- re-render the modal in collision mode, preserving everything else
        var existing=rows[0];
        var msg='Punch ID '+punch+' is already used by '+existing.first_name+' '+existing.last_name;
        if(!existing.is_active)msg+=' (inactive)';
        msg+='. Pick a different 4-digit ID.';
        pcPipeRenderHireModal({
          selectedVenues:venues,
          selectedRoles:roles,
          hiredBy:hiredBy,
          punchOverride:punch,
          collisionMsg:msg,
          homeVenue:homeVenue
        });
        // Focus the new punch input so user can immediately type
        setTimeout(function(){var ni=document.getElementById('hire-punch-input');if(ni){ni.focus();ni.select();}},30);
        return null;
      }
      // No collision -- proceed with hire
      return doHireWrite(punch,venues,roles,hiredBy,homeVenue);
    })
    .catch(function(err){
      console.error('Hire failed:',err);
      var e=document.getElementById('hire-err');
      var msg='';
      if(err&&err.status===401)msg='Your login session may have expired -- please sign out and back in.';
      else if(err&&err.status===403)msg='Permission denied by the database. Send Claude this message and the browser console error.';
      else if(err&&err.status===400)msg='The database rejected the data. Send Claude this message and the browser console error.';
      else msg='Save failed. Please try again. If it keeps failing, send Claude the browser console error.';
      if(e)e.innerHTML=msg;
      var b=document.getElementById('hire-confirm-btn');
      if(b){b.disabled=false;b.innerHTML='Confirm hire';}
    });
}

function doHireWrite(punch,venues,roles,hiredBy,homeVenue){
  // Build the candidates update + employees insert. Returns a promise.
  var sv={};
  for(var v=0;v<venues.length;v++){var st=VENUE_STATE[venues[v]];if(st)sv[st]=true;}
  var states=Object.keys(sv);
  var rateObj={};
  for(var r=0;r<roles.length;r++){
    var role=roles[r];var rr={};
    for(var s=0;s<states.length;s++){var rt=getPayRateByState(states[s],role);if(rt!==null)rr[states[s]]=rt;}
    rateObj[role]=rr;
  }
  var cu={pipeline_stage:'onboarding',hired:true,hired_at:new Date().toISOString(),hired_by:hiredBy,punch_id:punch,assigned_venues:venues,assigned_roles:roles,starting_pay_rate:JSON.stringify(rateObj),stage_updated_at:new Date().toISOString(),updated_at:new Date().toISOString()};
  var er={first_name:pcSelected.first_name,last_name:pcSelected.last_name,punch_id:punch,is_active:true,phone:pcSelected.phone,home_venue:homeVenue};
  cancelBookingForCandidate(pcSelected.id);
  var failStep='candidates update';
  return sbFetch('/rest/v1/candidates?id=eq.'+pcSelected.id,{method:'PATCH',prefer:'return=minimal',body:cu})
    .then(function(){
      failStep='employees insert';
      return sbFetch('/rest/v1/employees',{method:'POST',prefer:'return=minimal',body:er});
    })
    .then(function(){pcPipeCloseModal(null);loadAll();})
    .catch(function(err){
      err.failStep=failStep;
      throw err;
    });
}

/* ── Signed URL fix: handles both signedURL/signedUrl response keys
   and ensures /storage/v1 prefix is present in the returned path ── */
function getSignedUrl(storagePath,callback){
  var h=apiHeadersJson();
  fetch(SUPABASE_URL+'/storage/v1/object/sign/candidate-files/'+storagePath,{
    method:'POST',
    headers:h,
    body:JSON.stringify({expiresIn:3600})
  }).then(function(r){
    if(!r.ok){
      return r.text().then(function(t){throw new Error('Sign failed ('+r.status+'): '+t);});
    }
    return r.json();
  }).then(function(data){
    var signedPath=data.signedURL||data.signedUrl;
    if(signedPath){
      // Supabase returns the path without /storage/v1 prefix; add it if missing
      if(signedPath.indexOf('/storage/v1')!==0){
        signedPath='/storage/v1'+signedPath;
      }
      callback(SUPABASE_URL+signedPath);
    } else {
      console.error('Signing returned no URL:',data);
      callback(null);
    }
  }).catch(function(err){
    console.error('Signed URL error:',err);
    callback(null);
  });
}

function pcPipeOpenFile(cid,fk){
  var c=null;
  for(var i=0;i<pcCandidates.length;i++){if(pcCandidates[i].id===cid){c=pcCandidates[i];break;}}
  if(!c)return;
  var rawUrl=null;
  if(fk==='resume')rawUrl=c.resume_url;
  else if(fk==='working-papers')rawUrl=c.working_papers_url;
  else rawUrl=c[fk]||null;
  if(!rawUrl)return;
  var sp=null;
  if(rawUrl.indexOf('/candidate-files/')>-1){
    sp=rawUrl.split('/candidate-files/')[1];
    if(sp&&sp.indexOf('?')>-1)sp=sp.split('?')[0];
  } else if(rawUrl.indexOf('://')===-1){
    sp=rawUrl;
  }
  if(!sp){alert('Could not open file. Please try again.');return;}
  getSignedUrl(sp,function(url){
    if(url)window.open(url,'_blank');
    else alert('Could not open file. Please try again.');
  });
}

/* -- Punch ID Edit Feature (on candidate card) -- */
function pcPipeEditPunchId(){pcEditingPunchId=true;render();}
function pcPipeCancelPunchEdit(){pcEditingPunchId=false;render();}
function pcPipePunchEditChanged(){
  var inp=document.getElementById('punch-edit-input');
  var status=document.getElementById('punch-edit-status');
  if(!inp||!status)return;
  // Strip non-digits, cap at 4
  var digits=inp.value.replace(/\D/g,'').slice(0,4);
  if(inp.value!==digits)inp.value=digits;
  if(digits.length===0){status.innerHTML='';return;}
  if(digits.length<4){
    status.innerHTML='<span style="color:#888;">Need 4 digits</span>';
    return;
  }
  if(digits===pcSelected.punch_id){
    status.innerHTML='<span style="color:#888;">No change -- this is the current ID</span>';
    return;
  }
  // Check availability via employees lookup
  status.innerHTML='<span style="color:#888;">Checking...</span>';
  sbFetch('/rest/v1/employees?punch_id=eq.'+digits+'&select=first_name,last_name,is_active')
    .then(function(r){return r.json();})
    .then(function(rows){
      // Race protection: make sure the input value hasn't changed since we fired
      var currentInp=document.getElementById('punch-edit-input');
      if(!currentInp||currentInp.value!==digits)return;
      var s=document.getElementById('punch-edit-status');
      if(!s)return;
      if(rows&&rows.length>0){
        var existing=rows[0];
        var inactiveTag=existing.is_active?'':' (inactive)';
        s.innerHTML='<span style="color:#c0392b;">&#10007; Already used by '+existing.first_name+' '+existing.last_name+inactiveTag+'</span>';
      } else {
        s.innerHTML='<span style="color:#1D9E75;">&#10003; Available</span>';
      }
    })
    .catch(function(err){
      console.error('Punch availability check failed:',err);
      var s=document.getElementById('punch-edit-status');
      if(s)s.innerHTML='<span style="color:#c0392b;">Could not check availability -- try again</span>';
    });
}

function pcPipeSavePunchId(){
  if(!pcSelected)return;
  var inp=document.getElementById('punch-edit-input');
  var status=document.getElementById('punch-edit-status');
  var btn=document.getElementById('punch-save-btn');
  if(!inp)return;
  var newPunch=inp.value.replace(/\D/g,'');
  if(!/^\d{4}$/.test(newPunch)){
    if(status)status.innerHTML='<span style="color:#c0392b;">Punch ID must be exactly 4 digits</span>';
    return;
  }
  if(newPunch===pcSelected.punch_id){
    pcEditingPunchId=false;
    render();
    return;
  }
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Saving';}
  var oldPunch=pcSelected.punch_id;
  var now=new Date().toISOString();
  // Re-check availability one more time on save (in case someone took it between typing and clicking)
  sbFetch('/rest/v1/employees?punch_id=eq.'+newPunch+'&select=first_name,last_name')
    .then(function(r){return r.json();})
    .then(function(rows){
      if(rows&&rows.length>0){
        var existing=rows[0];
        throw new Error('Punch ID '+newPunch+' was just taken by '+existing.first_name+' '+existing.last_name+'. Pick another.');
      }
      // Update candidates row
      return sbFetch('/rest/v1/candidates?id=eq.'+pcSelected.id,{method:'PATCH',prefer:'return=minimal',body:{punch_id:newPunch,updated_at:now}});
    })
    .then(function(){
      // Update matching employees row (if it exists)
      if(!oldPunch)return null;
      return sbFetch('/rest/v1/employees?punch_id=eq.'+oldPunch+'&first_name=eq.'+encodeURIComponent(pcSelected.first_name)+'&last_name=eq.'+encodeURIComponent(pcSelected.last_name),{method:'PATCH',prefer:'return=minimal',body:{punch_id:newPunch,updated_at:now}});
    })
    .then(function(){
      pcSelected.punch_id=newPunch;
      pcEditingPunchId=false;
      loadAll();
    })
    .catch(function(err){
      console.error('Punch ID save failed:',err);
      var s=document.getElementById('punch-edit-status');
      if(s)s.innerHTML='<span style="color:#c0392b;">'+(err.message||'Save failed -- try again')+'</span>';
      var b=document.getElementById('punch-save-btn');
      if(b){b.disabled=false;b.innerHTML='Save';}
    });
}
