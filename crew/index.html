  // Renders a "Certifications" detail-item that holds the read-only cert
  // list + a deep link into /certifications/. Editing happens there, not here.
  function renderCertsCell(emp) {
    var certs = certsForEmployee(emp.id);
    var manageLink = '<a class="cert-manage-link" href="/certifications/?employee=' +
      encodeURIComponent(emp.id) + '">Manage in Certifications &rarr;</a>';

    if (certs.length === 0) {
      return '<div class="detail-item">' +
        '<div class="detail-label">Certifications</div>' +
        '<div class="cert-empty">None on file</div>' +
        manageLink +
      '</div>';
    }

    // Sort: expired/expiring first, then valid, then unknown. Soonest first within group.
    var order = { expired: 0, expiring: 1, valid: 2, unknown: 3 };
    certs.sort(function(a, b) {
      var sa = certStatusFromExpires(a.expires_at).kind;
      var sb = certStatusFromExpires(b.expires_at).kind;
      if (order[sa] !== order[sb]) return order[sa] - order[sb];
      var ea = a.expires_at || '9999-12-31';
      var eb = b.expires_at || '9999-12-31';
      return ea < eb ? -1 : (ea > eb ? 1 : 0);
    });

    var rowsHtml = certs.map(function(c) {
      var t = state.certTypesById[c.cert_type];
      var typeLabel = t ? t.display_name : c.cert_type;
      var stateTag = t && t.state ? ' (' + escapeHtml(t.state) + ')' : '';
      var st = certStatusFromExpires(c.expires_at);
      return '<div class="cert-row">' +
        '<span class="cert-name">' + escapeHtml(typeLabel) + stateTag + '</span>' +
        '<span class="cert-status ' + st.kind + '">' + escapeHtml(st.label) + '</span>' +
      '</div>';
    }).join('');

    return '<div class="detail-item">' +
      '<div class="detail-label">Certifications</div>' +
      '<div>' + rowsHtml + '</div>' +
      manageLink +
    '</div>';
  }

  function renderEditField(name, label, val, type, maxlen) {
    var maxAttr = maxlen ? ' maxlength="' + maxlen + '"' : '';
    return '<div class="detail-item">' +
      '<div class="detail-label">' + label + '</div>' +
      '<input type="' + type + '" class="detail-input" data-edit-field="' + name + '" value="' + escapeHtml(val) + '"' + maxAttr + ' />' +
    '</div>';
  }

  function renderDisplayField(label, valHtml, dim) {
    // Empty case: render the label and "not on file" inline on a single
    // line, muted, so the field doesn't take up two stacked rows of
    // visual space. Cleaner than label-above-italic-empty-value when
    // many fields on the card are unset (legacy employees, etc.).
    if (!valHtml) {
      return '<div class="detail-item detail-item-empty">' +
        '<span class="detail-label-inline">' + label + '</span>' +
        '<span class="detail-value-empty-inline">not on file</span>' +
      '</div>';
    }
    // Populated case: same as before — label above, value below.
    var cls = dim ? 'detail-value' : 'detail-value';
    return '<div class="detail-item">' +
      '<div class="detail-label">' + label + '</div>' +
      '<div class="' + cls + '">' + valHtml + '</div>' +
    '</div>';
  }

  // ---- Roles & venues ----

  // Group an employee's ACTIVE venue-role rows (from the loaded
  // employee_venue_roles cache) into { venueCode: [ row, row, ... ] }.
  // Rows carry role_name + effective_rate (override-aware) from pc-roles.js.
  function evrByVenue(empId) {
    var rows = state.evrByEmpId[empId] || [];
    var byVenue = {};
    rows.forEach(function(r) {
      if (!r.is_active) return;
      if (!r.venue_code || !r.role_name) return;
      if (!byVenue[r.venue_code]) byVenue[r.venue_code] = [];
      byVenue[r.venue_code].push(r);
    });
    return byVenue;
  }

  function renderRolesSection(emp, cand) {
    var inEdit = state.modalSection === 'roles';
    var c = cand || {};
    if (inEdit) {
      return renderRolesSectionEdit(emp, c);
    }

    // Display mode reads the per-venue assignments cache. Three states:
    //   not-loaded  -> brief loading line (the lazy fetch will re-render)
    //   loaded+empty -> worklist prompt
    //   loaded+rows  -> per-venue columns with inherited pay
    var loaded = state.evrByEmpId.hasOwnProperty(emp.id);
    var bodyHtml;
    if (!loaded) {
      bodyHtml = '<div class="card-subcard"><div class="card-subcard-empty">Loading role assignments…</div></div>';
    } else {
      var byVenue = evrByVenue(emp.id);
      if (Object.keys(byVenue).length === 0) {
        bodyHtml = '<div class="rv-prompt">' +
          '<div class="rv-prompt-icon">!</div>' +
          '<div class="rv-prompt-text">' +
            '<strong>No roles assigned yet.</strong> ' +
            'Click <strong>Edit</strong> above to assign which venues this employee works and what roles they perform there.' +
          '</div>' +
        '</div>';
      } else {
        bodyHtml = renderRolesVenuesColumns(byVenue);
      }
    }

    return '<div class="card-section">' +
      '<div class="card-section-head">' +
        '<span class="section-title">Roles &amp; venues</span>' +
        '<button class="section-edit-btn" data-section-edit="roles">Edit</button>' +
      '</div>' +
      bodyHtml +
    '</div>';
  }

  // Column layout for per-venue assignments. Each venue is a column headed
  // by its label in the venue's strong color; under it, only the roles this
  // employee actually holds AT THAT VENUE, each with its inherited rate
  // (effective_rate from pc-roles.js — override if set, else venue default).
  // Takes the { venueCode: [rows] } map from evrByVenue().
  function renderRolesVenuesColumns(byVenue) {
    var sorted = Object.keys(byVenue).sort(function(a, b) {
      var la = VENUE_LABELS[a] || a;
      var lb = VENUE_LABELS[b] || b;
      return la.localeCompare(lb);
    });
    var cols = sorted.map(function(code) {
      var color = VENUE_COLORS[code] || '#666';
      var bg = hexToRgba(color, 0.12);
      var roles = byVenue[code].slice().sort(function(a, b) {
        return (a.role_name || '').localeCompare(b.role_name || '');
      });
      var rolesHtml = roles.length > 0
        ? roles.map(function(r) {
            var rate = r.effective_rate;
            var isOverride = r.pay_rate_override != null;
            var rateLabel;
            if (rate == null) {
              rateLabel = '';
            } else if (rate === 0) {
              rateLabel = ' <span style="color:var(--muted);">comm.</span>';
            } else if (isOverride) {
              rateLabel = ' <span class="rv-rate-override" title="Custom rate — overrides the venue default">' +
                '<span class="rv-set-dot"></span>$' + Number(rate).toFixed(2) + '</span>';
            } else {
              rateLabel = ' <span style="color:var(--muted);">$' + Number(rate).toFixed(2) + '</span>';
            }
            return '<span class="rv-role">' + escapeHtml(r.role_name) + rateLabel + '</span>';
          }).join('')
        : '<span class="rv-empty-roles">no roles</span>';
      return '<div class="rv-column">' +
        '<div class="rv-column-head" style="background:' + bg + ';color:' + color + ';">' +
          escapeHtml(VENUE_LABELS[code] || code) +
        '</div>' +
        '<div class="rv-column-body">' + rolesHtml + '</div>' +
      '</div>';
    }).join('');
    return '<div class="rv-columns">' + cols + '</div>';
  }

  // Per-venue role editor (two-pane). Left: every venue with a count badge
  // of selected roles. Right: the selected venue's legal roles (from
  // pcRoles.getRolesForVenue) as toggle pills with inherited pay. Minors
  // can't tick alcohol-handling roles. Draft shape:
  //   { selectedVenue: <code|null>, pairs: { 'FMP||Cashier': true, ... } }
  // The modal re-renders on every venue switch / role toggle (scroll is
  // preserved by renderCardModal), keeping the handlers trivial.
  function renderRolesSectionEdit(emp, c) {
    var draft = state.modalEditDraft || { selectedVenue: null, pairs: {} };
    var isMinor = c.is_minor === true;

    // Count selected roles per venue for the left-column badges.
    var counts = {};
    Object.keys(draft.pairs).forEach(function(key) {
      if (!draft.pairs[key]) return;
      var vc = key.split('||')[0];
      counts[vc] = (counts[vc] || 0) + 1;
    });

    // Left column — all venues.
    var venuesHtml = '';
    for (var i = 0; i < VENUE_ORDER.length; i++) {
      var code = VENUE_ORDER[i];
      var isSel = draft.selectedVenue === code;
      var n = counts[code] || 0;
      var badge = n > 0
        ? '<span class="evr-venue-badge">' + n + '</span>'
        : '<span class="evr-venue-badge zero">&mdash;</span>';
      venuesHtml += '<button type="button" class="evr-venue-row' + (isSel ? ' sel' : '') + '" data-evr-venue="' + code + '">' +
        '<span class="evr-venue-label">' + escapeHtml(VENUE_LABELS[code] || code) + '</span>' +
        badge +
      '</button>';
    }

    // Right pane — roles for the selected venue.
    var rightHtml;
    if (!draft.selectedVenue) {
      rightHtml = '<div class="evr-rolepane-empty">Select a venue on the left to choose roles.</div>';
    } else {
      var vcode = draft.selectedVenue;
      var legal = [];
      try { legal = pcRoles.getRolesForVenue(vcode) || []; } catch (e) { legal = []; }
      if (legal.length === 0) {
        rightHtml = '<div class="evr-rolepane-empty">No roles are configured for ' +
          escapeHtml(VENUE_LABELS[vcode] || vcode) + ' yet.</div>';
      } else {
        var pillsHtml = legal.map(function(vr) {
          var key = vcode + '||' + vr.role_name;
          var on = !!draft.pairs[key];
          var disabled = isMinor && ALCOHOL_ROLES.indexOf(vr.role_name) !== -1;
          var rate = vr.pay_rate;
          var isCommission = rate === 0;
          var rateLabel = (rate == null) ? ''
            : (isCommission
                ? ' <span class="evr-rate">comm.</span>'
                : ' <span class="evr-rate">$' + Number(rate).toFixed(2) + '</span>');
          var pillBtn = '<button type="button" class="evr-role-pill' + (on ? ' on' : '') + (disabled ? ' disabled-role' : '') + '"' +
            (disabled ? ' disabled' : ' data-evr-role="' + escapeHtml(vr.role_name) + '"') + '>' +
            '<span class="evr-role-check">' + (on ? '&#10003;' : '+') + '</span>' +
            escapeHtml(vr.role_name) + rateLabel +
            (disabled ? ' <span class="evr-rate">(minor)</span>' : '') +
          '</button>';

          // Per-person rate — only when the role is on and not minor-blocked.
          // Blank input = inherit the venue default (shown as placeholder).
          var rateField = '';
          if (on && !disabled) {
            if (isCommission) {
              rateField = '<span class="evr-rate-input commission" title="Commission role — no hourly rate">commission</span>';
            } else {
              var ov = (draft.overrides && draft.overrides[key] != null) ? draft.overrides[key] : '';
              var ph = (rate == null) ? 'rate' : Number(rate).toFixed(2);
              rateField = '<span class="evr-rate-wrap">$<input type="number" inputmode="decimal" step="0.25" min="0" ' +
                'class="evr-rate-input" data-evr-rate="' + escapeHtml(key) + '" ' +
                'value="' + escapeHtml(ov) + '" placeholder="' + escapeHtml(ph) + '" ' +
                'title="Blank inherits the venue default ($' + (rate == null ? '\u2014' : Number(rate).toFixed(2)) + ')" /></span>';
            }
          }
          return '<span class="evr-role-unit">' + pillBtn + rateField + '</span>';
        }).join('');
        rightHtml = '<div class="evr-rolepane-head">Roles at ' + escapeHtml(VENUE_LABELS[vcode] || vcode) + '</div>' +
          '<div class="evr-role-pills">' + pillsHtml + '</div>';
      }
    }

    return '<div class="card-section">' +
      '<div class="card-section-head">' +
        '<span class="section-title">Roles &amp; venues</span>' +
      '</div>' +
      '<div class="evr-editor">' +
        '<div class="evr-venue-col">' + venuesHtml + '</div>' +
        '<div class="evr-role-pane">' + rightHtml + '</div>' +
      '</div>' +
      '<div class="section-action-row">' +
        '<button class="btn btn-primary" data-section-save="roles">Save roles</button>' +
        '<button class="btn" data-section-cancel="roles">Cancel</button>' +
      '</div>' +
      '<div class="deact-err" data-section-err="roles"></div>' +
    '</div>';
  }

  function renderTags(arr) {
    var h = '';
    for (var i = 0; i < arr.length; i++) {
      h += '<span class="tag">' + escapeHtml(arr[i]) + '</span>';
    }
    return h;
  }
  function renderVenueTags(arr) {
    var h = '';
    for (var i = 0; i < arr.length; i++) {
      var code = arr[i];
      var color = VENUE_COLORS[code] || '#888';
      h += '<span class="tag" style="background:' + color + '20;color:' + color + ';font-weight:600;">' +
        escapeHtml(code) +
      '</span>';
    }
    return h;
  }

  function renderStartingPayDisplay(payRateStr) {
    if (!payRateStr) return '';
    var rateObj = null;
    try { rateObj = JSON.parse(payRateStr); } catch(e) {}
    if (!rateObj || typeof rateObj !== 'object') {
      var lr = parseFloat(payRateStr);
      if (isNaN(lr)) return '';
      return '<div class="detail-item"><div class="detail-label">Starting pay rate</div><div class="detail-value" style="color:#1D9E75;">$' + lr.toFixed(2) + ' / hr</div></div>';
    }
    var stateRoles = {};
    var rk = Object.keys(rateObj);
    for (var ri = 0; ri < rk.length; ri++) {
      var rn = rk[ri], sm = rateObj[rn];
      if (!sm || typeof sm !== 'object') continue;
      var sk = Object.keys(sm);
      for (var si = 0; si < sk.length; si++) {
        var sc = sk[si];
        if (!stateRoles[sc]) stateRoles[sc] = [];
        stateRoles[sc].push({ role: rn, rate: sm[sc] });
      }
    }
    var sl = Object.keys(stateRoles).sort();
    if (sl.length === 0) return '';
    var html = '<div class="detail-item"><div class="detail-label">Starting pay rates</div>';
    for (var sli = 0; sli < sl.length; sli++) {
      var stl = sl[sli], its = stateRoles[stl];
      html += '<div style="' + (sli > 0 ? 'margin-top:6px;' : '') + '">' +
        '<div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:2px;">' + stl + '</div>';
      for (var iti = 0; iti < its.length; iti++) {
        var it = its[iti];
        var rate = parseFloat(it.rate);
        if (rate === 0) {
          html += '<div style="font-size:12px;color:#555;">' + escapeHtml(it.role) + ': <em>commission-based</em></div>';
        } else {
          html += '<div style="font-size:12px;color:#1D9E75;font-weight:500;">' + escapeHtml(it.role) + ': $' + rate.toFixed(2) + ' / hr</div>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  // Live pay-rate lookup while editing roles/venues. Recomputes whenever
  // the pill set changes. Same logic as the pipeline hire modal.
  function updateRolesPayLookup() {
    var el = document.getElementById('rolesPayLookup');
    if (!el || !state.modalEditDraft) return;
    var venues = state.modalEditDraft.venues || [];
    var roles = state.modalEditDraft.roles || [];
    if (venues.length === 0 || roles.length === 0) { el.innerHTML = ''; return; }
    var statesSet = {};
    for (var v = 0; v < venues.length; v++) {
      var st = VENUE_STATE[venues[v]];
      if (st) statesSet[st] = true;
    }
    var statesList = Object.keys(statesSet).sort();
    var html = '<div class="pay-lookup">';
    for (var s = 0; s < statesList.length; s++) {
      var stt = statesList[s];
      html += '<div style="' + (s > 0 ? 'margin-top:6px;padding-top:6px;border-top:1px solid #b8dfc8;' : '') + '">' +
        '<div style="font-weight:600;font-size:11px;color:var(--green-800);">' + stt + ' rates</div>';
      for (var r = 0; r < roles.length; r++) {
        var role = roles[r];
        var rate = getPayRateByState(stt, role);
        if (rate !== null && rate > 0) {
          html += '<div style="font-size:12px;">' + escapeHtml(role) + ': <strong>$' + parseFloat(rate).toFixed(2) + ' / hr</strong></div>';
        } else if (rate !== null && rate === 0) {
          html += '<div style="font-size:12px;">' + escapeHtml(role) + ': <em>commission-based</em></div>';
        } else {
          html += '<div style="font-size:12px;color:var(--muted);">' + escapeHtml(role) + ': <em>no rate set</em></div>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
    el.innerHTML = html;
  }

  function getPayRateByState(state2, role) {
    for (var i = 0; i < state.payRates.length; i++) {
      var pr = state.payRates[i];
      if (pr.state === state2 && pr.role === role) return pr.base_rate;
    }
    return null;
  }

  // ============================================================
  // ALCOHOL TRAINING SECTION
  //
  // Hidden entirely unless the employee row has at least one flag
  // set on either TEAM or RAMP. Visibility is decided from columns
  // already on the employee row — no extra fetches at boot. Cert
  // URLs are loaded on demand when "View cert" is clicked.
  //
  // States per cert:
  //   - requested (no contact yet): amber pill + "Mark contacted" btn
  //   - contacted: blue pill with who/when + notes inline
  //   - self_reported with cert upload: green pill + View + Verify links
  //   - want_when_18 (minor): amber pill with eligibility date
  //   - declined / no submission yet: muted italic line, only shown
  //     if the OTHER cert has signal (mixed-state cards)
  // ============================================================
  function renderAlcoholTrainingSection(emp) {
    // Decide visibility purely from employee-row columns.
    var teamSignal = hasAlcoholSignal(emp, 'team');
    var rampSignal = hasAlcoholSignal(emp, 'ramp');
    if (!teamSignal && !rampSignal) return '';  // hidden entirely

    var rows = '';
    rows += renderAlcoholRow(emp, 'team');
    rows += renderAlcoholRow(emp, 'ramp');

    return '<div class="card-section">' +
      '<div class="card-section-head">' +
        '<span class="section-title">Alcohol training</span>' +
      '</div>' +
      '<div class="alcohol-rows">' + rows + '</div>' +
    '</div>';
  }

  // Returns true if this cert kind has any state worth showing for this emp.
  function hasAlcoholSignal(emp, kind) {
    var p = kind + '_';  // 'team_' or 'ramp_'
    return !!(
      emp[p + 'training_requested'] ||
      emp[p + 'training_contacted'] ||
      emp[p + 'self_reported_cert'] ||
      emp[p + 'eligible_at']
    );
  }

  // Render one row (TEAM or RAMP). kind = 'team' or 'ramp'.
  function renderAlcoholRow(emp, kind) {
    var p = kind + '_';
    var label = kind === 'team' ? 'TEAM' : 'RAMP';
    var stateTag = kind === 'team' ? 'NJ' : 'PA';

    var requested    = !!emp[p + 'training_requested'];
    var contacted    = !!emp[p + 'training_contacted'];
    var selfReported = !!emp[p + 'self_reported_cert'];
    var eligibleAt   = emp[p + 'eligible_at'];
    var hasSignal    = requested || contacted || selfReported || !!eligibleAt;

    if (!hasSignal) {
      // No signal — render a muted line so the row still appears in the
      // pair, matching the layout. Better than uneven rows.
      return '<div class="alcohol-row alcohol-row-muted">' +
        '<span class="alc-name">' + label + ' <span class="alc-state-tag">' + stateTag + '</span></span>' +
        '<span class="alc-empty">No submission on file</span>' +
      '</div>';
    }

    // Priority order for what pill to show:
    //   1. contacted     -> "Contacted M/D by X"
    //   2. self-reported -> "Self-reported · cert uploaded"
    //   3. eligible_at   -> "Eligible after 18 · M/D YYYY"
    //   4. requested     -> "Requested M/D" + Mark contacted button
    var rightHtml = '';
    if (contacted) {
      var contactedDate = emp[p + 'training_contacted_at']
        ? formatDate(emp[p + 'training_contacted_at']) : '';
      var contactedBy = emp[p + 'training_contacted_by'] || 'manager';
      var notes = emp[p + 'training_notes'];
      rightHtml = '<span class="alc-pill alc-pill-blue">Contacted ' + escapeHtml(contactedDate) +
        ' by ' + escapeHtml(contactedBy) + '</span>';
      if (notes) {
        rightHtml += '<div class="alc-note">' + escapeHtml(notes) + '</div>';
      }
    } else if (selfReported) {
      // Self-reported cert with upload. View + verify links.
      rightHtml = '<span class="alc-pill alc-pill-green">Self-reported · cert uploaded</span>' +
        '<a href="#" class="alc-link" data-view-cert="' + kind + '" data-emp-id="' + emp.id + '">View cert &#8599;</a>' +
        '<a href="/certifications/?employee=' + encodeURIComponent(emp.id) + '" class="alc-link">Verify in Certifications &rarr;</a>';
    } else if (eligibleAt) {
      // Minor — eligible after 18.
      rightHtml = '<span class="alc-pill alc-pill-amber">Eligible after 18 &middot; ' +
        escapeHtml(formatDate(eligibleAt)) + '</span>';
    } else if (requested) {
      var reqDate = emp[p + 'training_requested_at']
        ? formatDate(emp[p + 'training_requested_at']) : '';
      rightHtml = '<span class="alc-pill alc-pill-amber">Requested ' + escapeHtml(reqDate) + '</span>' +
        '<button class="alc-mark-contacted-btn" data-mark-contacted="' + kind + '" data-emp-id="' + emp.id + '">Mark contacted</button>';
    }

    return '<div class="alcohol-row">' +
      '<span class="alc-name">' + label + ' <span class="alc-state-tag">' + stateTag + '</span></span>' +
      '<span class="alc-right">' + rightHtml + '</span>' +
    '</div>';
  }

  // Handler: "Mark contacted" — flip the contacted flag on the employee
  // row + stamp who/when. Mirrors the home_venue write pattern. No
  // confirmation dialog; one click writes and re-renders.
  function markAlcoholContacted(emp, kind, btnEl) {
    if (!emp || !emp.id) return;
    if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'Saving...'; }
    var actor = (pcAuth.getUser && pcAuth.getUser()) || null;
    var actorName = actor ? (actor.display_name || actor.email || 'Unknown') : 'Unknown';
    var now = new Date().toISOString();
    var body = {};
    var prefix = kind + '_';
    body[prefix + 'training_contacted'] = true;
    body[prefix + 'training_contacted_at'] = now;
    body[prefix + 'training_contacted_by'] = actorName;
    body.updated_at = now;
    patchEmployee(emp.id, body).then(function() {
      // Update local employee row so the card re-renders with the new state.
      Object.keys(body).forEach(function(k) {
        if (k === 'updated_at') return;
        emp[k] = body[k];
      });
      showToast(kind.toUpperCase() + ' marked as contacted', 'success');
      renderCardModal();
    }).catch(function(err) {
      if (err && err.authFailed) { handleAuthFailure(); return; }
      console.error('Mark contacted failed:', err);
      if (btnEl) { btnEl.disabled = false; btnEl.textContent = 'Mark contacted'; }
      showToast('Save failed — try again', 'error');
    });
  }

  // Handler: "View cert" — fetch the most-recent submission row (cached
  // after first call), then open the matching cert URL in a new tab.
  function viewAlcoholCert(emp, kind) {
    if (!emp || !emp.id) return;
    showToast('Loading cert...', null);
    loadSubmissionForEmployee(emp.id).then(function(submission) {
      if (!submission) {
        showToast('No submission record found for this employee.', 'error');
        return;
      }
      var url = kind === 'team'
        ? submission.team_cert_upload_url
        : submission.ramp_cert_upload_url;
      if (!url) {
        showToast('No cert file uploaded.', 'error');
        return;
      }
      window.open(url, '_blank', 'noopener');
    });
  }

  // ---- Internal notes ----
  function renderNotesSection(emp, cand) {
    var c = cand || {};
    var notes = c.internal_notes || '';
    // Pull the most-recent submission's questions_text, if cached.
    // The submission is lazy-loaded in openCardModal() when the employee
    // has onboarding_training_complete = true. Cache miss = render
    // nothing here; the lazy load triggers a re-render once it lands.
    var submission = state.cardSubmissionByEmpId[emp.id];
    var questionsText = (submission && submission.questions_text) || '';
    var questionsBlock = questionsText
      ? '<div class="onboarding-questions-block">' +
          '<div class="onboarding-questions-label">Questions from onboarding form</div>' +
          '<div class="onboarding-questions-text">' + escapeHtml(questionsText) + '</div>' +
        '</div>'
      : '';
    return '<div class="card-section">' +
      '<div class="card-section-head">' +
        '<span class="section-title">Internal notes</span>' +
      '</div>' +
      questionsBlock +
      '<textarea class="notes-textarea" data-notes-field placeholder="Add notes about this employee...">' + escapeHtml(notes) + '</textarea>' +
      '<div class="section-action-row">' +
        '<button class="btn btn-primary" data-notes-save>Save notes</button>' +
        '<span class="checklist-status" data-notes-feedback></span>' +
      '</div>' +
    '</div>';
  }

  // ---- Onboarding history (collapsed by default) ----
  function renderOnboardingSection(emp, cand) {
    var c = cand || {};
    var open = state.onboardingOpen;
    var w4 = (c.w4_complete && c.direct_deposit_complete) || c.w4_url;
    var i9 = c.i9_submitted || c.i9_url;
    var i9v = !!c.i9_verified;
    var hb = !!c.handbook_complete;
    var wp = !!c.working_papers_complete;
    var ob = !!c.onboarding_training_complete;
    return '<div class="card-section">' +
      '<div class="card-section-head">' +
        '<span class="section-title">Onboarding history</span>' +
        '<button class="expand-chevron' + (open ? ' open' : '') + '" data-onboarding-toggle>' +
          '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
            '<polyline points="9 18 15 12 9 6"></polyline>' +
          '</svg>' +
          (open ? 'Hide' : 'Show') +
        '</button>' +
      '</div>' +
      '<div class="onboarding-list' + (open ? ' open' : '') + '">' +
        renderChecklistRow('W-4 and Payroll', w4, c.w4_completed_at) +
        renderChecklistRow('I-9 submitted', i9, c.i9_submitted_at) +
        renderChecklistRow('I-9 verified', i9v, c.i9_verified_at) +
        renderChecklistRow('Employee handbook', hb, c.handbook_completed_at) +
        renderChecklistRow('Onboarding training', ob, c.onboarding_training_completed_at) +
        (c.is_minor ? renderChecklistRow('Working papers (minor)', wp, c.working_papers_uploaded_at) : '') +
      '</div>' +
    '</div>';
  }

  function renderChecklistRow(label, done, ts) {
    var ck = '<svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>';
    var iconClass = done ? 'check-icon' : 'check-icon empty';
    var labelClass = done ? 'checklist-label done' : 'checklist-label';
    var status = done ? (ts ? formatDate(ts) : 'Done') : 'Not on file';
    var statusClass = done ? 'checklist-status done' : 'checklist-status';
    return '<div class="checklist-row">' +
      '<div class="left">' +
        '<div class="' + iconClass + '">' + (done ? ck : '') + '</div>' +
        '<span class="' + labelClass + '">' + escapeHtml(label) + '</span>' +
      '</div>' +
      '<span class="' + statusClass + '">' + escapeHtml(status) + '</span>' +
    '</div>';
  }

  // ============================================================
  // SIGNUPS SECTION (collapsed by default)
  //
  // Reads from state.signups (loaded at boot for Performance Signals)
  // and state.eventsById, then filters to this employee's name. The
  // header shows a count of UPCOMING signups only (event_date >= today).
  // When expanded, the section also displays past signups within the
  // last 14 days as struck-through reference rows. Older past signups
  // and soft-deleted rows are hidden — they remain in the DB.
  //
  // No additional fetches happen for this section; the data is
  // already in memory from the page-boot rating-data load.
  // ============================================================

  // Match availability.staff_name (free-text from WordPress signup form)
  // against an employee's full name. Case-insensitive, trimmed. Known
  // soft gap: nicknames, typos, and name changes won't match — same
  // limitation that exists on the Schedule Assistant.
  function signupsForEmployee(emp) {
    var target = fullName(emp).trim().toLowerCase();
    if (!target) return [];
    var rows = state.signups || [];
    var out = [];
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      if (r.removed_at) continue; // soft-deleted — hide
      if (!r.staff_name) continue;
      if (r.staff_name.trim().toLowerCase() === target) out.push(r);
    }
    return out;
  }

  // Bucket signups into three groups: upcoming, recent past (within 14 days),
  // and older past (everything else). The older bucket was previously dropped
  // entirely; it's now kept so the badge-click flow can surface full history.
  function partitionSignups(signups) {
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    var todayMs = today.getTime();
    var fourteenDaysAgoMs = todayMs - 14 * 24 * 60 * 60 * 1000;

    var upcoming = [];
    var recentPast = [];
    var olderPast = [];
    for (var i = 0; i < signups.length; i++) {
      var r = signups[i];
      var ev = state.eventsById[r.event_id];
      if (!ev || !ev.event_date) continue;
      // Parse YYYY-MM-DD as local midnight for fair comparison.
      var parts = String(ev.event_date).split('-');
      if (parts.length !== 3) continue;
      var evMs = new Date(parseInt(parts[0],10), parseInt(parts[1],10) - 1, parseInt(parts[2],10)).getTime();
      if (evMs >= todayMs) {
        upcoming.push({ row: r, ev: ev, evMs: evMs });
      } else if (evMs >= fourteenDaysAgoMs) {
        recentPast.push({ row: r, ev: ev, evMs: evMs });
      } else {
        olderPast.push({ row: r, ev: ev, evMs: evMs });
      }
    }
    upcoming.sort(function(a, b) { return a.evMs - b.evMs; });
    recentPast.sort(function(a, b) { return b.evMs - a.evMs; }); // most recent past first
    olderPast.sort(function(a, b) { return b.evMs - a.evMs; });  // most recent first within older
    return { upcoming: upcoming, recentPast: recentPast, olderPast: olderPast };
  }

  function formatSignupEventDate(ev) {
    var parts = String(ev.event_date).split('-');
    if (parts.length !== 3) return ev.event_date || '';
    var d = new Date(parseInt(parts[0],10), parseInt(parts[1],10) - 1, parseInt(parts[2],10));
    if (isNaN(d.getTime())) return ev.event_date || '';
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function formatShowTime(t) {
    if (!t) return '';
    // Postgres time comes back as 'HH:MM:SS' or 'HH:MM:SS+00'. Take the first 5 chars.
    var s = String(t).substring(0, 5);
    var bits = s.split(':');
    if (bits.length < 2) return '';
    var h = parseInt(bits[0], 10);
    var m = parseInt(bits[1], 10);
    if (isNaN(h) || isNaN(m)) return '';
    var ampm = h >= 12 ? 'PM' : 'AM';
    var h12 = h % 12;
    if (h12 === 0) h12 = 12;
    var mm = m < 10 ? '0' + m : String(m);
    return h12 + ':' + mm + ' ' + ampm;
  }

  function formatSignupSubmittedAt(ts) {
    if (!ts) return '';
    var d = new Date(ts);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
      ' at ' +
      d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  // Convert a hex color (#rrggbb) to an rgba() string at the given alpha.
  // Used to derive a soft tinted background from the venue's strong color
  // so the venue tag visually matches the pv-XXX pills used elsewhere.
  function hexToRgba(hex, alpha) {
    if (!hex || hex.charAt(0) !== '#' || hex.length !== 7) return 'rgba(0,0,0,' + alpha + ')';
    var r = parseInt(hex.substring(1, 3), 16);
    var g = parseInt(hex.substring(3, 5), 16);
    var b = parseInt(hex.substring(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  function renderSignupRow(item, isPast) {
    var ev = item.ev;
    var row = item.row;
    var dateLabel = formatSignupEventDate(ev);
    var venueLabel = VENUE_LABELS[ev.venue] || ev.venue || '';
    var venueColor = VENUE_COLORS[ev.venue] || '#666';
    var venueBg = hexToRgba(venueColor, 0.12);
    var eventName = ev.event_name || '(unnamed event)';
    var showTime = formatShowTime(ev.show_time);
    var submittedAt = formatSignupSubmittedAt(row.submitted_at);
    var showTimeHtml = showTime ? '<span class="signup-show-time">' + escapeHtml(showTime) + '</span>' : '';
    var pastClass = isPast ? ' past' : '';
    var venueStyle = 'color:' + venueColor + ';background:' + venueBg + ';';
    return '<div class="signup-row' + pastClass + '">' +
      '<div class="signup-line">' +
        '<span class="signup-date">' + escapeHtml(dateLabel) + '</span>' +
        '<span class="signup-venue-tag" style="' + venueStyle + '">' + escapeHtml(venueLabel) + '</span>' +
        '<span class="signup-event-name">' + escapeHtml(eventName) + '</span>' +
        showTimeHtml +
      '</div>' +
      '<div class="signup-meta">Signed up ' + escapeHtml(submittedAt) + '</div>' +
    '</div>';
  }

  function renderSignupsSection(emp) {
    var open = state.signupsOpen;
    var rows = signupsForEmployee(emp);
    var parts = partitionSignups(rows);
    var upcomingCount = parts.upcoming.length;
    var pastCount = parts.recentPast.length;

    var bodyHtml;
    if (parts.upcoming.length === 0 && parts.recentPast.length === 0 && parts.olderPast.length === 0) {
      bodyHtml = '<div class="signups-empty">No upcoming signups, and nothing in the last 14 days.</div>';
    } else {
      var pieces = [];
      if (parts.upcoming.length > 0) {
        pieces.push('<div class="signups-group-label">Upcoming &middot; ' + parts.upcoming.length + '</div>');
        for (var i = 0; i < parts.upcoming.length; i++) {
          pieces.push(renderSignupRow(parts.upcoming[i], false));
        }
      } else {
        pieces.push('<div class="signups-group-label">Upcoming &middot; none</div>');
      }
      if (parts.recentPast.length > 0) {
        pieces.push('<div class="signups-group-label">Past 14 days &middot; ' + parts.recentPast.length + '</div>');
        for (var j = 0; j < parts.recentPast.length; j++) {
          pieces.push(renderSignupRow(parts.recentPast[j], true));
        }
      }
      if (parts.olderPast.length > 0) {
        pieces.push('<div class="signups-group-label">Older &middot; ' + parts.olderPast.length + '</div>');
        for (var k = 0; k < parts.olderPast.length; k++) {
          pieces.push(renderSignupRow(parts.olderPast[k], true));
        }
      }
      bodyHtml = pieces.join('');
    }

    // Lifetime summary line — prepended to the body when the employee
    // has any signups on record. Pulls the pre-computed aggregate from
    // state.signupCountsByName (built at boot). Venue list sorted by
    // count descending so the most-frequent venue reads first.
    var lifetime = state.signupCountsByName[fullName(emp)];
    if (lifetime && lifetime.total > 0) {
      var venueKeys = Object.keys(lifetime.byVenue).sort(function(a, b) {
        return lifetime.byVenue[b] - lifetime.byVenue[a];
      });
      var venueParts = venueKeys.map(function(v) {
        return escapeHtml(v) + ' ' + lifetime.byVenue[v];
      });
      var lifetimeHtml = '<div class="signups-lifetime">' +
        '<strong>Lifetime:</strong> ' + lifetime.total + ' signup' +
        (lifetime.total === 1 ? '' : 's') +
        ' <span class="lifetime-venues">&middot; ' + venueParts.join(' &middot; ') + '</span>' +
      '</div>';
      bodyHtml = lifetimeHtml + bodyHtml;
    }

    var countBadge = '<span class="signup-count-badge">' + upcomingCount + '</span>';

    return '<div class="card-section">' +
      '<div class="card-section-head">' +
        '<span class="section-title">Signups' + countBadge + '</span>' +
        '<button class="expand-chevron' + (open ? ' open' : '') + '" data-signups-toggle>' +
          '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
            '<polyline points="9 18 15 12 9 6"></polyline>' +
          '</svg>' +
          (open ? 'Hide' : 'Show') +
        '</button>' +
      '</div>' +
      '<div class="signups-list' + (open ? ' open' : '') + '">' +
        bodyHtml +
      '</div>' +
    '</div>';
  }

  // ---- Card change history (collapsed by default) ----
  // Renders the audit trail of changes made to this employee's card.
  // Reads from state.changeHistory[empId] which was populated at boot
  // (see loadChangeHistory). Collapsed by default to avoid pushing the
  // Onboarding history section further down.
  function renderHistorySection(emp) {
    var open = state.historyOpen;
    var rows = (state.changeHistory[emp.id] || []).slice();
    var label = 'Card change history';
    var countLabel = rows.length > 0 ? ' (' + rows.length + ')' : '';
    var bodyHtml = rows.length === 0
      ? '<div class="history-empty">No tracked changes for this employee yet.</div>'
      : rows.map(renderHistoryRow).join('');
    return '<div class="card-section">' +
      '<div class="card-section-head">' +
        '<span class="section-title">' + label + escapeHtml(countLabel) + '</span>' +
        '<button class="expand-chevron' + (open ? ' open' : '') + '" data-history-toggle>' +
          '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
            '<polyline points="9 18 15 12 9 6"></polyline>' +
          '</svg>' +
          (open ? 'Hide' : 'Show') +
        '</button>' +
      '</div>' +
      '<div class="history-list' + (open ? ' open' : '') + '">' +
        bodyHtml +
      '</div>' +
    '</div>';
  }

  // Renders a single history row. The "System import" actor is styled
  // with a small tag to distinguish baseline rows from real edits.
  function renderHistoryRow(row) {
    var isSystem = row.changed_by === 'System import';
    var fieldLabel = formatHistoryFieldLabel(row.field_name);
    var oldDisplay = formatHistoryValue(row.field_name, row.old_value);
    var newDisplay = formatHistoryValue(row.field_name, row.new_value);
    var lineHtml;
    if (row.old_value == null || row.old_value === '') {
      lineHtml = '<span class="field-name">' + escapeHtml(fieldLabel) + '</span> set to ' +
        '<span class="new-val">' + escapeHtml(newDisplay) + '</span>';
    } else if (row.new_value == null || row.new_value === '') {
      lineHtml = '<span class="field-name">' + escapeHtml(fieldLabel) + '</span> cleared ' +
        '<span class="old-val">' + escapeHtml(oldDisplay) + '</span>';
    } else {
      lineHtml = '<span class="field-name">' + escapeHtml(fieldLabel) + '</span> changed ' +
        '<span class="old-val">' + escapeHtml(oldDisplay) + '</span>&rarr; ' +
        '<span class="new-val">' + escapeHtml(newDisplay) + '</span>';
    }
    var systemTag = isSystem ? '<span class="system-tag">baseline</span>' : '';
    return '<div class="history-row">' +
      '<div class="history-line">' + lineHtml + systemTag + '</div>' +
      '<div class="history-meta">' + formatHistoryDate(row.changed_at) + ' &middot; by ' + escapeHtml(row.changed_by) + '</div>' +
    '</div>';
  }

  // Builds a readable label for a logged field. Pay overrides use a
  // dynamic 'pay::<venue>::<role>' field_name so they're unambiguous when
  // someone holds the same role at multiple venues.
  function formatHistoryFieldLabel(fieldName) {
    if (fieldName && fieldName.indexOf('pay::') === 0) {
      var bits = fieldName.split('::');
      var vcode = bits[1] || '';
      var role = bits[2] || '';
      return 'Pay \u2014 ' + (VENUE_LABELS[vcode] || vcode) + ' ' + role;
    }
    return HISTORY_FIELD_LABELS[fieldName] || fieldName;
  }

  // Field-name display labels. Add entries here as new fields get logged.
  var HISTORY_FIELD_LABELS = {
    home_venue: 'Home venue',
    shirt_size: 'Uniform shirt size',
    candidate_record: 'Candidate record'
  };

  function formatHistoryValue(fieldName, value) {
    if (fieldName && fieldName.indexOf('pay::') === 0) {
      if (value == null || value === '') return 'venue default';
      var n = Number(value);
      return isNaN(n) ? value : '$' + n.toFixed(2);
    }
    if (value == null || value === '') return '(unset)';
    if (fieldName === 'home_venue') {
      if (value === 'NA') return "Doesn't apply";
      return VENUE_LABELS[value] || value;
    }
    return value;
  }

  function formatHistoryDate(ts) {
    if (!ts) return '';
    var d = new Date(ts);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
      ' ' +
      d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  // ============================================================
  // VENUE ROSTER MODAL — opens when a scorecard card is clicked.
  // Lists all employees whose home_venue matches that card. Each
  // row has a "Card" button that closes this modal and opens the
  // employee card modal. An "Include inactive" toggle reveals
  // deactivated employees at the same venue, which can be useful
  // when reviewing rehire decisions or seasonal patterns.
  // ============================================================
  function openRosterModal(venue) {
    state.rosterModalVenue = venue;
    state.rosterModalShowInactive = false;
    state.rosterModalMode = 'venue';
    renderRosterModal();
  }

  // Opens the roster modal in low-engagement mode — shows every active
  // employee with signup count <= LOW_SIGNUP_THRESHOLD, regardless of
  // home venue. Same UI shell as the venue roster, different filter.
  function openLowEngagementModal() {
    state.rosterModalVenue = null;
    state.rosterModalShowInactive = false;
    state.rosterModalMode = 'low-engagement';
    renderRosterModal();
  }

  function closeRosterModal() {
    state.rosterModalVenue = null;
    state.rosterModalShowInactive = false;
    state.rosterModalMode = 'venue';
    document.getElementById('cardModalRoot').innerHTML = '';
  }

  function renderRosterModal() {
    // Modal is open when either a venue is selected OR we're in
    // low-engagement mode. Both reuse the same shell with different
    // filter + header logic.
    var isLowEng = state.rosterModalMode === 'low-engagement';
    if (!isLowEng && !state.rosterModalVenue) return;

    var includeInactive = state.rosterModalShowInactive;
    var matched, headerHtml, emptyMsg, inactiveCount;

    if (isLowEng) {
      // Low-engagement mode: every active non-NA employee with signup
      // count <= threshold, regardless of home venue.
      matched = state.employees.filter(function(e) {
        if (e.home_venue === 'NA') return false;
        if (!includeInactive && e.is_active !== true) return false;
        // Apply the signup threshold to active rows; if includeInactive
        // is on, inactive rows show too (managers may want to see who
        // was low-engaged before being deactivated).
        if (e.is_active === true) {
          var sc = state.signupCountsByName[fullName(e)];
          var total = sc ? sc.total : 0;
          if (total > LOW_SIGNUP_THRESHOLD) return false;
        }
        return true;
      });
      matched.sort(function(a, b) {
        // Lowest signup count first — zeros at the top, then 1s, etc.
        // Active rows first, then inactive within their own block.
        if (a.is_active !== b.is_active) return a.is_active ? -1 : 1;
        var sa = state.signupCountsByName[fullName(a)];
        var sb = state.signupCountsByName[fullName(b)];
        var ta = sa ? sa.total : 0;
        var tb = sb ? sb.total : 0;
        if (ta !== tb) return ta - tb;
        return fullName(a).localeCompare(fullName(b));
      });

      // Inactive count for the toggle, scoped to low-engagement inactives
      inactiveCount = state.employees.filter(function(e) {
        if (e.home_venue === 'NA') return false;
        if (e.is_active !== false) return false;
        return true;
      }).length;

      var totalLow = state.employees.filter(function(e) {
        if (e.is_active !== true) return false;
        if (e.home_venue === 'NA') return false;
        var sc2 = state.signupCountsByName[fullName(e)];
        var total2 = sc2 ? sc2.total : 0;
        return total2 <= LOW_SIGNUP_THRESHOLD;
      }).length;
      var zeroCount = state.employees.filter(function(e) {
        if (e.is_active !== true) return false;
        if (e.home_venue === 'NA') return false;
        var sc3 = state.signupCountsByName[fullName(e)];
        return !sc3 || sc3.total === 0;
      }).length;

      headerHtml =
        '<div class="vr-modal-header">' +
          '<span class="vr-venue-dot" style="background:var(--amber-400);"></span>' +
          '<span class="vr-venue-name">Low engagement</span>' +
          '<span class="vr-venue-count">' + totalLow + ' active' +
            (zeroCount > 0 ? ' &middot; <span style="color:var(--red-600);font-weight:700;">' + zeroCount + ' with zero signups</span>' : '') +
          '</span>' +
          '<button class="card-header-close" data-close-roster title="Close">&times;</button>' +
        '</div>';
      emptyMsg = 'No active employees below the low-engagement threshold. &#127881;';
    } else {
      // Venue mode (original behavior).
      var venue = state.rosterModalVenue;
      var color = VENUE_COLORS[venue] || '#666';
      matched = state.employees.filter(function(e) {
        if (e.home_venue !== venue) return false;
        if (!includeInactive && e.is_active !== true) return false;
        return true;
      });
      matched.sort(function(a, b) {
        if (a.is_active !== b.is_active) return a.is_active ? -1 : 1;
        return fullName(a).localeCompare(fullName(b));
      });

      var activeCount = state.employees.filter(function(e) {
        return e.home_venue === venue && e.is_active === true;
      }).length;
      inactiveCount = state.employees.filter(function(e) {
        return e.home_venue === venue && e.is_active === false;
      }).length;
      var lowCount = state.employees.filter(function(e) {
        if (e.home_venue !== venue) return false;
        if (e.is_active !== true) return false;
        var sc = state.signupCountsByName[fullName(e)];
        var total = sc ? sc.total : 0;
        return total <= LOW_SIGNUP_THRESHOLD;
      }).length;

      headerHtml =
        '<div class="vr-modal-header">' +
          '<span class="vr-venue-dot" style="background:' + color + ';"></span>' +
          '<span class="vr-venue-name">' + escapeHtml(VENUE_LABELS[venue] || venue) + '</span>' +
          '<span class="vr-venue-count">' + activeCount + ' active' +
            (lowCount > 0 ? ' &middot; <span style="color:var(--red-600);font-weight:700;">' + lowCount + ' low signups</span>' : '') +
            (includeInactive && inactiveCount > 0 ? ' &middot; ' + inactiveCount + ' inactive' : '') +
          '</span>' +
          '<button class="card-header-close" data-close-roster title="Close">&times;</button>' +
        '</div>';
      emptyMsg = 'No' + (includeInactive ? '' : ' active') + ' employees with ' + escapeHtml(venue) + ' as their home component.';
    }

    var rowsHtml = matched.length === 0
      ? '<div class="vr-empty">' + emptyMsg + '</div>'
      : matched.map(renderRosterRow).join('');

    var toggleHtml = inactiveCount > 0
      ? '<div class="vr-toggle-row">' +
          '<label>' +
            '<input type="checkbox" data-roster-toggle-inactive' + (includeInactive ? ' checked' : '') + ' />' +
            'Include inactive employees (' + inactiveCount + ')' +
          '</label>' +
        '</div>'
      : '';

    var html =
      '<div class="modal-overlay" data-roster-bg>' +
        '<div class="modal-box">' +
          headerHtml +
          toggleHtml +
          '<div class="vr-list">' + rowsHtml + '</div>' +
        '</div>' +
      '</div>';
    document.getElementById('cardModalRoot').innerHTML = html;
    wireRosterModalEvents();
  }

  function renderRosterRow(emp) {
    var statusPill = emp.is_active
      ? '<span class="status-pill active">Active</span>'
      : '<span class="status-pill inactive">Inactive</span>';
    var rowClass = 'vr-row' + (emp.is_active ? '' : ' is-inactive');

    // Signup count badge — same rule as the main row list. Hidden on
    // inactive rows (they don't sign up; would be noise). NA is already
    // filtered out at the scorecard level since a roster modal opens
    // for a specific venue, not for NA, but we keep the check for safety.
    var signupBadge = '';
    if (emp.is_active && emp.home_venue !== 'NA') {
      var sc = state.signupCountsByName[fullName(emp)];
      var total = sc ? sc.total : 0;
      var badgeClass = 'signup-count-badge-row' + (total <= LOW_SIGNUP_THRESHOLD ? ' low' : '');
      var tip = total === 0
        ? 'Never signed up'
        : total + ' lifetime signup' + (total === 1 ? '' : 's');
      if (total > 0) {
        signupBadge = '<button class="' + badgeClass + ' clickable" data-roster-signup-badge="' + emp.id + '" ' +
          'title="' + escapeHtml(tip) + ' &mdash; click to see history">' +
          total + ' signup' + (total === 1 ? '' : 's') +
        '</button>';
      } else {
        signupBadge = '<span class="' + badgeClass + '" title="' + escapeHtml(tip) + '">' +
          total + ' signup' + (total === 1 ? '' : 's') +
        '</span>';
      }
    }

    return '<div class="' + rowClass + '">' +
      '<span class="vr-row-name">' + escapeHtml(fullName(emp)) + '</span>' +
      signupBadge +
      statusPill +
      '<button class="card-btn" data-roster-card="' + emp.id + '" title="Open employee card">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<rect x="4" y="3" width="16" height="18" rx="2"></rect>' +
          '<line x1="8" y1="9" x2="16" y2="9"></line>' +
          '<line x1="8" y1="13" x2="14" y2="13"></line>' +
        '</svg>' +
        'Card' +
      '</button>' +
    '</div>';
  }

  function wireRosterModalEvents() {
    var root = document.getElementById('cardModalRoot');
    var bg = root.querySelector('[data-roster-bg]');
    if (bg) {
      bg.addEventListener('click', function(ev) {
        if (ev.target === bg) closeRosterModal();
      });
    }
    var closeBtn = root.querySelector('[data-close-roster]');
    if (closeBtn) closeBtn.addEventListener('click', closeRosterModal);
    var toggle = root.querySelector('[data-roster-toggle-inactive]');
    if (toggle) {
      toggle.addEventListener('change', function(ev) {
        state.rosterModalShowInactive = ev.target.checked;
        renderRosterModal();
      });
    }
    // Card buttons — switch from the roster modal to the employee card modal
    var cardBtns = root.querySelectorAll('[data-roster-card]');
    for (var i = 0; i < cardBtns.length; i++) {
      cardBtns[i].addEventListener('click', function(ev) {
        var empId = ev.currentTarget.getAttribute('data-roster-card');
        // Clear roster state and open the card modal in its place
        state.rosterModalVenue = null;
        state.rosterModalShowInactive = false;
        openCardModal(empId);
      });
    }
    // Signup badge clicks — same flow as card button, but also auto-expand
    // the Signups section on the way in.
    var sigBtns = root.querySelectorAll('[data-roster-signup-badge]');
    for (var sb = 0; sb < sigBtns.length; sb++) {
      sigBtns[sb].addEventListener('click', function(ev) {
        var empId = ev.currentTarget.getAttribute('data-roster-signup-badge');
        state.rosterModalVenue = null;
        state.rosterModalShowInactive = false;
        openCardModal(empId);
        state.signupsOpen = true;
        renderCardModal();
      });
    }
  }

  // ---- Footer ----
  function renderCardFooter(emp, cand) {
    if (emp.is_active) {
      return '<div class="card-footer">' +
        '<button class="btn btn-danger" data-deactivate>Deactivate employee</button>' +
        '<button class="btn" data-close-modal>Close</button>' +
      '</div>';
    }
    return '<div class="card-footer">' +
      '<button class="btn btn-green" data-reactivate>Reactivate employee</button>' +
      '<button class="btn" data-close-modal>Close</button>' +
    '</div>';
  }

  // ---- Card modal event wiring ----
  function wireCardModalEvents(emp, cand) {
    var root = document.getElementById('cardModalRoot');
    // Close buttons
    var closes = root.querySelectorAll('[data-close-modal]');
    for (var i = 0; i < closes.length; i++) {
      closes[i].addEventListener('click', closeCardModal);
    }
    // Home venue dropdown — same write as the row dropdown.
    var hv = root.querySelector('[data-card-home-venue]');
    if (hv) {
      hv.addEventListener('change', function(ev) {
        var newVal = ev.target.value || null;
        var prev = emp.home_venue;
        patchEmployee(emp.id, { home_venue: newVal }).then(function() {
          // Log the change to the audit table. Same pattern as the row dropdown.
          logCardChange(emp.id, 'home_venue', prev, newVal);
          emp.home_venue = newVal;
          showToast('Home venue saved', 'success');
          renderList();
          renderCounts();
          renderScorecard();
          // Re-render the modal so the history section picks up the new entry.
          renderCardModal();
        }).catch(function(err) {
          if (err && err.authFailed) { handleAuthFailure(); return; }
          ev.target.value = prev || '';
          showToast('Save failed', 'error');
        });
      });
    }
    // Section edit start
    var editBtns = root.querySelectorAll('[data-section-edit]');
    for (var e = 0; e < editBtns.length; e++) {
      editBtns[e].addEventListener('click', function(ev) {
        var section = ev.currentTarget.getAttribute('data-section-edit');
        beginSectionEdit(section, emp, cand);
      });
    }
    // Section save
    var saveBtns = root.querySelectorAll('[data-section-save]');
    for (var sv = 0; sv < saveBtns.length; sv++) {
      saveBtns[sv].addEventListener('click', function(ev) {
        var section = ev.currentTarget.getAttribute('data-section-save');
        saveSectionEdit(section, emp, cand);
      });
    }
    // Section cancel
    var cancelBtns = root.querySelectorAll('[data-section-cancel]');
    for (var cn = 0; cn < cancelBtns.length; cn++) {
      cancelBtns[cn].addEventListener('click', function() {
        state.modalSection = null;
        state.modalEditDraft = null;
        renderCardModal();
      });
    }
    // Edit field listeners (live-update the draft as user types)
    var editFields = root.querySelectorAll('[data-edit-field]');
    for (var ef = 0; ef < editFields.length; ef++) {
      editFields[ef].addEventListener('input', onContactDraftChange);
      editFields[ef].addEventListener('change', onContactDraftChange);
    }
    // Per-venue role editor: venue selection (left) + role toggles (right).
    // Both just mutate the draft and re-render; scroll is preserved.
    var evrVenueBtns = root.querySelectorAll('[data-evr-venue]');
    for (var vc = 0; vc < evrVenueBtns.length; vc++) {
      evrVenueBtns[vc].addEventListener('click', function(ev) {
        if (!state.modalEditDraft) return;
        state.modalEditDraft.selectedVenue = ev.currentTarget.getAttribute('data-evr-venue');
        renderCardModal();
      });
    }
    var evrRoleBtns = root.querySelectorAll('[data-evr-role]');
    for (var rc = 0; rc < evrRoleBtns.length; rc++) {
      evrRoleBtns[rc].addEventListener('click', function(ev) {
        if (!state.modalEditDraft) return;
        var roleName = ev.currentTarget.getAttribute('data-evr-role');
        var vcode = state.modalEditDraft.selectedVenue;
        if (!vcode || !roleName) return;
        var key = vcode + '||' + roleName;
        state.modalEditDraft.pairs[key] = !state.modalEditDraft.pairs[key];
        renderCardModal();
      });
    }
    // Pay-override inputs: update the draft silently on input (no re-render,
    // so the field keeps focus while typing). Parsed/validated at save time.
    var evrRateInputs = root.querySelectorAll('[data-evr-rate]');
    for (var ri2 = 0; ri2 < evrRateInputs.length; ri2++) {
      evrRateInputs[ri2].addEventListener('input', function(ev) {
        if (!state.modalEditDraft) return;
        if (!state.modalEditDraft.overrides) state.modalEditDraft.overrides = {};
        var k = ev.currentTarget.getAttribute('data-evr-rate');
        state.modalEditDraft.overrides[k] = ev.currentTarget.value;
      });
    }
    // Notes save
    var notesBtn = root.querySelector('[data-notes-save]');
    if (notesBtn) {
      notesBtn.addEventListener('click', function() {
        saveNotes(emp, cand);
      });
    }
    // Onboarding toggle
    var ob = root.querySelector('[data-onboarding-toggle]');
    if (ob) {
      ob.addEventListener('click', function() {
        state.onboardingOpen = !state.onboardingOpen;
        renderCardModal();
      });
    }
    // Card history toggle
    var ht = root.querySelector('[data-history-toggle]');
    if (ht) {
      ht.addEventListener('click', function() {
        state.historyOpen = !state.historyOpen;
        renderCardModal();
      });
    }
    // Signups section toggle
    var st = root.querySelector('[data-signups-toggle]');
    if (st) {
      st.addEventListener('click', function() {
        state.signupsOpen = !state.signupsOpen;
        renderCardModal();
      });
    }
    // Performance Signals section toggle (whole header is clickable)
    var psTog = root.querySelector('[data-ps-toggle]');
    if (psTog) {
      psTog.addEventListener('click', function() {
        state.psSignalsOpen = !state.psSignalsOpen;
        renderCardModal();
      });
    }
    // Deactivate / reactivate
    var deact = root.querySelector('[data-deactivate]');
    if (deact) {
      deact.addEventListener('click', function() {
        openDeactivateModal(emp, cand);
      });
    }
    var react = root.querySelector('[data-reactivate]');
    if (react) {
      react.addEventListener('click', function() {
        openReactivateModal(emp, cand);
      });
    }
    // Alcohol training: "Mark contacted" buttons (TEAM and RAMP)
    var markBtns = root.querySelectorAll('[data-mark-contacted]');
    for (var mb = 0; mb < markBtns.length; mb++) {
      markBtns[mb].addEventListener('click', function(ev) {
        var kind = ev.currentTarget.getAttribute('data-mark-contacted');
        markAlcoholContacted(emp, kind, ev.currentTarget);
      });
    }
    // Alcohol training: "View cert" links — lazy-fetch submission row,
    // then open the matching cert URL in a new tab.
    var viewCertLinks = root.querySelectorAll('[data-view-cert]');
    for (var vc2 = 0; vc2 < viewCertLinks.length; vc2++) {
      viewCertLinks[vc2].addEventListener('click', function(ev) {
        ev.preventDefault();
        var kind = ev.currentTarget.getAttribute('data-view-cert');
        viewAlcoholCert(emp, kind);
      });
    }
  }

  function beginSectionEdit(section, emp, cand) {
    var c = cand || {};
    if (section === 'contact') {
      // shirt_size: read from the employee row first (source of truth post-hire),
      // fall back to candidate row (covers cases where the employee row hasn't
      // been populated yet — e.g., legacy employee whose candidate row was
      // backfilled but the employee mirror hasn't run).
      state.modalEditDraft = {
        email: c.email || '',
        phone: emp.phone || '',
        punch_id: emp.punch_id || '',
        date_of_birth: c.date_of_birth || '',
        earliest_start_date: c.earliest_start_date || '',
        is_minor: c.is_minor === true,
        shirt_size: emp.shirt_size || c.shirt_size || ''
      };
    } else if (section === 'roles') {
      // Build the per-venue selection from the loaded assignments. Each
      // active (venue, role) becomes a true entry in pairs, keyed
      // 'venueCode||roleName'. Open pane defaults to the first venue the
      // person already works, else the first venue in the list.
      var pairs = {};
      var overrides = {};
      var rows = state.evrByEmpId[emp.id] || [];
      var firstVenue = null;
      rows.forEach(function(r) {
        if (!r.is_active || !r.venue_code || !r.role_name) return;
        var key = r.venue_code + '||' + r.role_name;
        pairs[key] = true;
        if (r.pay_rate_override != null) overrides[key] = String(r.pay_rate_override);
        if (!firstVenue) firstVenue = r.venue_code;
      });
      state.modalEditDraft = {
        selectedVenue: firstVenue || (VENUE_ORDER.length ? VENUE_ORDER[0] : null),
        pairs: pairs,
        overrides: overrides
      };
    }
    state.modalSection = section;
    renderCardModal();
  }

  function onContactDraftChange(ev) {
    if (!state.modalEditDraft) return;
    var name = ev.target.getAttribute('data-edit-field');
    if (!name) return;
    if (ev.target.type === 'checkbox') {
      state.modalEditDraft[name] = ev.target.checked;
    } else {
      state.modalEditDraft[name] = ev.target.value;
    }
  }

  function onRolesDraftChange(ev) {
    if (!state.modalEditDraft) return;
    var t = ev.target;
    var ven = t.getAttribute('data-edit-venue');
    var role = t.getAttribute('data-edit-role');
    if (ven) {
      var idx = state.modalEditDraft.venues.indexOf(ven);
      if (t.checked && idx === -1) state.modalEditDraft.venues.push(ven);
      else if (!t.checked && idx !== -1) state.modalEditDraft.venues.splice(idx, 1);
    } else if (role) {
      var idx2 = state.modalEditDraft.roles.indexOf(role);
      if (t.checked && idx2 === -1) state.modalEditDraft.roles.push(role);
      else if (!t.checked && idx2 !== -1) state.modalEditDraft.roles.splice(idx2, 1);
    }
    // Visual update of the pill class
    var pill = t.closest('.ms-pill');
    if (pill) pill.classList.toggle('on', t.checked);
    updateRolesPayLookup();
  }

  function saveSectionEdit(section, emp, cand) {
    var errEl = document.querySelector('[data-section-err="' + section + '"]');
    if (errEl) errEl.textContent = '';
    var draft = state.modalEditDraft || {};

    if (section === 'contact') {
      // Validate phone if provided.
      if (draft.phone) {
        var digits = draft.phone.replace(/\D/g, '');
        if (digits.length < 10) {
          if (errEl) errEl.textContent = 'Phone must be at least 10 digits.';
          return;
        }
      }
      // Validate punch_id if provided.
      if (draft.punch_id && !/^\d{4}$/.test(draft.punch_id)) {
        if (errEl) errEl.textContent = 'Punch ID must be exactly 4 digits.';
        return;
      }
      // Validate shirt_size if provided. Must be one of the allowed sizes
      // or empty (clearing). The DB CHECK constraint is the real enforcer,
      // but we validate client-side so the user gets a friendly message.
      if (draft.shirt_size) {
        var validSize = false;
        for (var ss = 0; ss < SHIRT_SIZES.length; ss++) {
          if (SHIRT_SIZES[ss] === draft.shirt_size) { validSize = true; break; }
        }
        if (!validSize) {
          if (errEl) errEl.textContent = 'Invalid shirt size.';
          return;
        }
      }
      saveContactSection(emp, cand, draft, errEl);
      return;
    }
    if (section === 'roles') {
      saveRolesSection(emp, cand, draft, errEl);
      return;
    }
  }

  // Contact section save: writes phone + punch_id + shirt_size to BOTH employees
  // and candidates (mirror pattern), writes email/dob/start_date/is_minor to
  // candidates only.
  //
  // Legacy employees may not have a candidates row. If the user filled in any
  // candidate-only field on such an employee, ensureCandidateRow auto-creates
  // the row before the writes proceed — instead of the historical silent-fail
  // where the modal closed and nothing saved.
  //
  // If after all the diffing nothing actually changed, the function now shows
  // a "No changes to save" toast instead of silently closing — protects
  // against future silent-fail bug surfaces (per fail-loud principle).
  function saveContactSection(emp, cand, draft, errEl) {
    var oldPunch = emp.punch_id;
    var newPunch = draft.punch_id || null;
    var oldShirt = emp.shirt_size || null;
    var newShirt = draft.shirt_size || null;

    // Auto-create candidate row if user filled candidate-only content and
    // no candidate exists yet. shirt_size / phone / punch_id changes alone
    // do not trigger auto-create — they save to employees, and the
    // candidate mirror is skipped quietly when no row exists (matches
    // pre-existing behavior).
    var hasCandidateOnlyContent = !!(
      draft.email ||
      draft.date_of_birth ||
      draft.earliest_start_date ||
      draft.is_minor === true
    );
    var ensurePromise = (hasCandidateOnlyContent && !(cand && cand.id))
      ? ensureCandidateRow(emp)
      : Promise.resolve(cand || null);

    ensurePromise.then(function(activeCand) {
      var empBody = {};
      var candBody = {};

      if (draft.phone !== emp.phone) empBody.phone = draft.phone || null;
      if (newPunch !== oldPunch) empBody.punch_id = newPunch;
      if (newShirt !== oldShirt) empBody.shirt_size = newShirt;

      if (activeCand && activeCand.id) {
        if (draft.email !== (activeCand.email || '')) candBody.email = draft.email || null;
        if (draft.phone !== (activeCand.phone || '')) candBody.phone = draft.phone || null;
        if (newPunch !== (activeCand.punch_id || null)) candBody.punch_id = newPunch;
        if (draft.date_of_birth !== (activeCand.date_of_birth || '')) candBody.date_of_birth = draft.date_of_birth || null;
        if (draft.earliest_start_date !== (activeCand.earliest_start_date || '')) candBody.earliest_start_date = draft.earliest_start_date || null;
        if (draft.is_minor !== (activeCand.is_minor === true)) candBody.is_minor = draft.is_minor;
        if (newShirt !== (activeCand.shirt_size || null)) candBody.shirt_size = newShirt;
      }

      var ops = [];
      if (Object.keys(empBody).length > 0) {
        empBody.updated_at = new Date().toISOString();
        ops.push(patchEmployee(emp.id, empBody));
      }
      if (activeCand && activeCand.id && Object.keys(candBody).length > 0) {
        candBody.updated_at = new Date().toISOString();
        ops.push(patchCandidate(activeCand.id, candBody));
      }
      if (ops.length === 0) {
        // Nothing changed. Fail loud rather than silently closing.
        state.modalSection = null;
        state.modalEditDraft = null;
        showToast('No changes to save', null);
        renderCardModal();
        return;
      }

      return Promise.all(ops).then(function() {
        if (Object.keys(empBody).length > 0) {
          Object.keys(empBody).forEach(function(k) {
            if (k !== 'updated_at') emp[k] = empBody[k];
          });
        }
        if (activeCand && Object.keys(candBody).length > 0) {
          Object.keys(candBody).forEach(function(k) {
            if (k !== 'updated_at') activeCand[k] = candBody[k];
          });
        }
        if (newPunch !== oldPunch && activeCand) {
          if (oldPunch && state.candidates[oldPunch] === activeCand) {
            delete state.candidates[oldPunch];
          }
          if (newPunch) state.candidates[newPunch] = activeCand;
        }
        if (newShirt !== oldShirt) {
          logCardChange(emp.id, 'shirt_size', oldShirt, newShirt);
        }
        state.modalSection = null;
        state.modalEditDraft = null;
        showToast('Saved', 'success');
        renderList();
        renderCardModal();
      });
    }).catch(function(err) {
      if (err && err.authFailed) { handleAuthFailure(); return; }
      console.error('Save failed:', err);
      if (errEl) errEl.textContent = 'Save failed. Please try again. ' + (err.message || '');
    });
  }

  // Roles section save: writes per-venue eligibility to employee_venue_roles
  // via pcRoles.setEmployeeVenueRoles (the source of truth), then mirrors the
  // flat assigned_venues / assigned_roles arrays onto candidates so the
  // pipeline and event workspace (which still read those) stay correct during
  // the transition. starting_pay_rate is intentionally NOT written — pay now
  // lives in venue_roles / pay_rate_override and nothing live reads that field.
  // Eligibility only: this never touches anyone's pay.
  //
  // Auto-creates the candidate row for legacy employees (for the mirror write).
  function saveRolesSection(emp, cand, draft, errEl) {
    draft = draft || { pairs: {}, overrides: {} };
    if (!draft.overrides) draft.overrides = {};

    // Desired (venue, role) pairs from the picker + derived flat mirrors.
    var desiredPairs = [];
    var venueSet = {};
    var roleSet = {};
    Object.keys(draft.pairs).forEach(function(key) {
      if (!draft.pairs[key]) return;
      var bits = key.split('||');
      if (bits.length !== 2) return;
      desiredPairs.push({ venueCode: bits[0], roleName: bits[1] });
      venueSet[bits[0]] = true;
      roleSet[bits[1]] = true;
    });
    var venuesMirror = Object.keys(venueSet);
    var rolesMirror = Object.keys(roleSet);

    // Validate + parse per-person pay overrides up front. Blank = inherit
    // (null); a number = an override. Commission roles (venue default 0)
    // never carry an override. High rates pass with a soft warning; only
    // non-numeric / negative aborts the save.
    var parsedOverrides = {}; // key -> number | null
    var highWarn = false;
    var invalidLabel = null;
    desiredPairs.forEach(function(p) {
      if (invalidLabel) return;
      var key = p.venueCode + '||' + p.roleName;
      var def = null;
      try { def = pcRoles.getPayRate(p.venueCode, p.roleName); } catch (e) { def = null; }
      if (def === 0) return; // commission — no override
      var raw = (draft.overrides[key] != null) ? String(draft.overrides[key]).trim() : '';
      if (raw === '') { parsedOverrides[key] = null; return; }
      var num = Number(raw);
      if (isNaN(num) || num < 0) {
        invalidLabel = (VENUE_LABELS[p.venueCode] || p.venueCode) + ' ' + p.roleName;
        return;
      }
      if (num > 100) highWarn = true;
      parsedOverrides[key] = Math.round(num * 100) / 100;
    });
    if (invalidLabel) {
      if (errEl) errEl.textContent = 'Invalid pay rate for ' + invalidLabel +
        ' — enter a number 0 or greater, or leave it blank to inherit the venue default.';
      return;
    }

    var actor = (pcAuth.getUser && pcAuth.getUser()) || null;
    var actorName = actor ? (actor.display_name || actor.email || 'Unknown') : 'Unknown';

    var saveBtn = document.querySelector('[data-section-save="roles"]');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving\u2026'; }

    function ovEqual(a, b) {
      if (a == null && b == null) return true;
      if (a == null || b == null) return false;
      return Math.abs(a - b) < 0.005;
    }

    // 1) Per-venue eligibility — the source of truth (never touches pay).
    pcRoles.setEmployeeVenueRoles(emp.id, desiredPairs, actorName)
      // 2) Refetch so every desired pair has a row id + current override.
      .then(function(eligResult) {
        return pcRoles.getEmployeeVenueRoles(emp.id).then(function(rows) {
          rows = rows || [];
          var rowByKey = {};
          rows.forEach(function(r) {
            if (r.venue_code && r.role_name) rowByKey[r.venue_code + '||' + r.role_name] = r;
          });

          // 3) Diff overrides, PATCH only changed rows, log each change.
          var ops = [];
          var payChanges = 0;
          Object.keys(parsedOverrides).forEach(function(key) {
            var row = rowByKey[key];
            if (!row || !row.id) return;
            var current = (row.pay_rate_override == null) ? null : Number(row.pay_rate_override);
            var desired = parsedOverrides[key];
            if (ovEqual(current, desired)) return;
            payChanges++;
            var bits = key.split('||');
            var fieldName = 'pay::' + bits[0] + '::' + bits[1];
            ops.push(
              patchEmployeeVenueRole(row.id, { pay_rate_override: desired }).then(function() {
                logCardChange(emp.id, fieldName, current, desired);
              })
            );
            // Mutate the fetched row so the cache we set below is correct.
            row.pay_rate_override = desired;
            row.effective_rate = (desired != null) ? desired : row.default_rate;
          });

          return Promise.all(ops).then(function() {
            state.evrByEmpId[emp.id] = rows;
            return { elig: eligResult, payChanges: payChanges };
          });
        });
      })
      // 4) Mirror the flat arrays onto candidates (transition support).
      //    Eligibility only; starting_pay_rate intentionally not written —
      //    per-person pay now lives in employee_venue_roles.pay_rate_override.
      .then(function(result) {
        return ensureCandidateRow(emp).then(function(activeCand) {
          return patchCandidate(activeCand.id, {
            assigned_venues: venuesMirror,
            assigned_roles: rolesMirror,
            updated_at: new Date().toISOString()
          }).then(function() {
            activeCand.assigned_venues = venuesMirror;
            activeCand.assigned_roles = rolesMirror;
            return result;
          });
        });
      })
      // 5) Done — combined eligibility + pay summary.
      .then(function(result) {
        state.modalSection = null;
        state.modalEditDraft = null;
        var bits = [];
        var er = result.elig;
        if (er && er.added) bits.push(er.added + ' added');
        if (er && er.reactivated) bits.push(er.reactivated + ' restored');
        if (er && er.retired) bits.push(er.retired + ' removed');
        if (result.payChanges) bits.push(result.payChanges + ' pay change' + (result.payChanges === 1 ? '' : 's'));
        showToast(bits.length ? ('Roles saved \u2014 ' + bits.join(', ')) : 'No changes', 'success');
        if (highWarn) {
          setTimeout(function() { showToast('Heads up: a rate above $100/hr was saved', null); }, 2400);
        }
        renderCardModal();
      })
      .catch(function(err) {
        if (err && err.authFailed) { handleAuthFailure(); return; }
        console.error('Roles save failed:', err);
        if (errEl) errEl.textContent = 'Save failed. Please try again. ' + (err.message || '');
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save roles'; }
      });
  }

  function saveNotes(emp, cand) {
    var ta = document.querySelector('[data-notes-field]');
    var fb = document.querySelector('[data-notes-feedback]');
    if (!ta) return;
    var notes = ta.value;
    if (fb) fb.textContent = '';

    // Notes live on candidates only. If the employee is legacy and has
    // no candidate row, auto-create it before the write so the save
    // lands instead of failing.
    ensureCandidateRow(emp).then(function(activeCand) {
      return patchCandidate(activeCand.id, {
        internal_notes: notes,
        updated_at: new Date().toISOString()
      }).then(function() {
        activeCand.internal_notes = notes;

          fb.textContent = 'Saved';
          fb.className = 'checklist-status done';
          setTimeout(function() { if (fb) fb.textContent = ''; }, 1800);
        }
      });
    }).catch(function(err) {
      if (err && err.authFailed) { handleAuthFailure(); return; }
      console.error('Notes save failed:', err);
      if (fb) {
        fb.textContent = 'Save failed';
        fb.className = 'checklist-status';
        fb.style.color = 'var(--red-600)';
      }
    });
  }
