  // DEACTIVATE SUB-MODAL
  // ============================================================

  // Local state for the deactivate modal (separate from the main page state
  // so its UI is self-contained).
  var deactState = null;

  function openDeactivateModal(emp, cand) {
    deactState = {
      emp: emp,
      cand: cand,
      category: null,
      rehire: null, // 'yes' | 'no' | null (Don't know)
      notes: '',
      confirmText: ''
    };
    renderDeactivateModal();
  }

  function closeDeactivateModal() {
    deactState = null;
    document.getElementById('deactModalRoot').innerHTML = '';
  }

  function renderDeactivateModal() {
    var root = document.getElementById('deactModalRoot');
    if (!deactState) { root.innerHTML = ''; return; }
    var emp = deactState.emp;
    var name = fullName(emp);
    var catHtml = '';
    DEACT_CATEGORIES.forEach(function(c) {
      var on = deactState.category === c.value;
      catHtml += '<label class="deact-radio-pill' + (on ? ' on' : '') + '">' +
        '<input type="radio" name="deactCat" value="' + c.value + '"' + (on ? ' checked' : '') + ' />' +
        c.label +
      '</label>';
    });
    var rehireOpts = [
      { value: 'yes', label: 'Yes' },
      { value: 'no', label: 'No' },
      { value: '', label: "Don't know" }
    ];
    var rehireHtml = '';
    rehireOpts.forEach(function(o) {
      var on = (deactState.rehire || '') === o.value;
      rehireHtml += '<label class="deact-radio-pill' + (on ? ' on' : '') + '">' +
        '<input type="radio" name="deactRehire" value="' + o.value + '"' + (on ? ' checked' : '') + ' />' +
        o.label +
      '</label>';
    });
    var canSubmit =
      !!deactState.category &&
      deactState.confirmText.trim().toUpperCase() === 'DEACTIVATE';
    var html =
      '<div class="deact-overlay" data-deact-bg>' +
        '<div class="deact-modal">' +
          '<h3>Deactivate ' + escapeHtml(name) + '</h3>' +
          '<p>This removes them from the availability sign-up list immediately. Their record is preserved.</p>' +
          '<div class="deact-field">' +
            '<label class="deact-label">Reason <span class="req">*</span></label>' +
            '<div class="deact-radio-group" data-deact-cats>' + catHtml + '</div>' +
          '</div>' +
          '<div class="deact-field">' +
            '<label class="deact-label">Notes (optional)</label>' +
            '<textarea class="notes-textarea" data-deact-notes placeholder="Specifics that don\'t fit a category...">' + escapeHtml(deactState.notes) + '</textarea>' +
          '</div>' +
          '<div class="deact-field">' +
            '<label class="deact-label">Eligible for rehire?</label>' +
            '<div class="deact-radio-group" data-deact-rehire>' + rehireHtml + '</div>' +
          '</div>' +
          '<div class="deact-field">' +
            '<label class="deact-label">Type DEACTIVATE to confirm <span class="req">*</span></label>' +
            '<input type="text" class="deact-confirm-input' + (deactState.confirmText.trim().toUpperCase() === 'DEACTIVATE' ? ' matched' : '') + '" data-deact-confirm value="' + escapeHtml(deactState.confirmText) + '" placeholder="DEACTIVATE" autocomplete="off" />' +
          '</div>' +
          '<div class="deact-err" data-deact-err></div>' +
          '<div class="deact-actions">' +
            '<button class="btn" style="flex:1;" data-deact-cancel>Cancel</button>' +
            '<button class="btn btn-danger" style="flex:1;"' + (canSubmit ? '' : ' disabled') + ' data-deact-confirm-btn>Deactivate</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    root.innerHTML = html;
    wireDeactivateModalEvents();
  }

  function wireDeactivateModalEvents() {
    var root = document.getElementById('deactModalRoot');
    var bg = root.querySelector('[data-deact-bg]');
    if (bg) {
      bg.addEventListener('click', function(ev) {
        if (ev.target === bg) closeDeactivateModal();
      });
    }
    var cancelBtn = root.querySelector('[data-deact-cancel]');
    if (cancelBtn) cancelBtn.addEventListener('click', closeDeactivateModal);

    var catRadios = root.querySelectorAll('[data-deact-cats] input[type=radio]');
    for (var i = 0; i < catRadios.length; i++) {
      catRadios[i].addEventListener('change', function(ev) {
        deactState.category = ev.target.value;
        renderDeactivateModal();
      });
    }
    var rehireRadios = root.querySelectorAll('[data-deact-rehire] input[type=radio]');
    for (var j = 0; j < rehireRadios.length; j++) {
      rehireRadios[j].addEventListener('change', function(ev) {
        deactState.rehire = ev.target.value || null;
        renderDeactivateModal();
      });
    }
    var notesTa = root.querySelector('[data-deact-notes]');
    if (notesTa) {
      notesTa.addEventListener('input', function(ev) {
        deactState.notes = ev.target.value;
      });
    }
    var conf = root.querySelector('[data-deact-confirm]');
    if (conf) {
      conf.addEventListener('input', function(ev) {
        deactState.confirmText = ev.target.value;
        renderDeactivateModal();
        // Restore focus + caret to the input after re-render.
        setTimeout(function() {
          var fresh = document.querySelector('[data-deact-confirm]');
          if (fresh) {
            fresh.focus();
            fresh.setSelectionRange(fresh.value.length, fresh.value.length);
          }
        }, 0);
      });
    }
    var submit = root.querySelector('[data-deact-confirm-btn]');
    if (submit) {
      submit.addEventListener('click', performDeactivate);
    }
  }

  function performDeactivate() {
    if (!deactState) return;
    if (!deactState.category) return;
    if (deactState.confirmText.trim().toUpperCase() !== 'DEACTIVATE') return;
    var emp = deactState.emp;
    var cand = deactState.cand;
    var errEl = document.querySelector('[data-deact-err]');
    var btn = document.querySelector('[data-deact-confirm-btn]');
    if (btn) { btn.disabled = true; btn.textContent = 'Deactivating…'; }
    if (errEl) errEl.textContent = '';

    var actor = (pcAuth.getUser && pcAuth.getUser()) || null;
    var actorName = actor ? (actor.display_name || actor.email || 'Unknown') : 'Unknown';
    var now = new Date().toISOString();

    var ops = [];
    if (cand && cand.id) {
      var candBody = {
        pipeline_stage: 'inactive',
        deactivation_category: deactState.category,
        deactivation_reason: deactState.notes ? deactState.notes.trim() : null,
        rehire_eligible: deactState.rehire || null,
        deactivated_by: actorName,
        stage_updated_at: now,
        stage_updated_by: actorName,
        updated_at: now
      };
      ops.push(patchCandidate(cand.id, candBody));
    }
    ops.push(patchEmployee(emp.id, { is_active: false, updated_at: now }));

    Promise.all(ops).then(function() {
      // Update local state
      emp.is_active = false;
      if (cand) {
        cand.pipeline_stage = 'inactive';
        cand.deactivation_category = deactState.category;
        cand.deactivation_reason = deactState.notes ? deactState.notes.trim() : null;
        cand.rehire_eligible = deactState.rehire || null;
        cand.deactivated_by = actorName;
        cand.stage_updated_at = now;
        cand.stage_updated_by = actorName;
      }
      closeDeactivateModal();
      showToast('Employee deactivated', 'success');
      // Re-render everything that reflects the new status.
      renderStatusTabs();
      renderList();
      renderCounts();
      renderScorecard();
      renderCardModal();
    }).catch(function(err) {
      if (err && err.authFailed) { handleAuthFailure(); return; }
      console.error('Deactivate failed:', err);
      if (errEl) errEl.textContent = 'Failed to deactivate. ' + (err.message || 'Try again.');
      if (btn) { btn.disabled = false; btn.textContent = 'Deactivate'; }
    });
  }

  // ============================================================
  // REACTIVATE — simple confirm dialog
  // ============================================================

  function openReactivateModal(emp, cand) {
    var name = fullName(emp);
    var html =
      '<div class="deact-overlay" data-react-bg>' +
        '<div class="deact-modal">' +
          '<h3>Reactivate ' + escapeHtml(name) + '?</h3>' +
          '<p>They will appear in the active employee list and on the availability sign-up page.</p>' +
          '<div class="deact-actions">' +
            '<button class="btn" style="flex:1;" data-react-cancel>Cancel</button>' +
            '<button class="btn btn-green" style="flex:1;" data-react-confirm>Reactivate</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    document.getElementById('deactModalRoot').innerHTML = html;
    var root = document.getElementById('deactModalRoot');
    var bg = root.querySelector('[data-react-bg]');
    if (bg) {
      bg.addEventListener('click', function(ev) {
        if (ev.target === bg) closeReactivateModal();
      });
    }
    var cancelBtn = root.querySelector('[data-react-cancel]');
    if (cancelBtn) cancelBtn.addEventListener('click', closeReactivateModal);
    var confirmBtn = root.querySelector('[data-react-confirm]');
    if (confirmBtn) {
      confirmBtn.addEventListener('click', function() {
        performReactivate(emp, cand, confirmBtn);
      });
    }
  }

  function closeReactivateModal() {
    document.getElementById('deactModalRoot').innerHTML = '';
  }

  function performReactivate(emp, cand, btn) {
    if (btn) { btn.disabled = true; btn.textContent = 'Reactivating…'; }
    var now = new Date().toISOString();
    var ops = [];
    if (cand && cand.id) {
      // Per "simple history" decision: clear deactivation_category and
      // deactivated_by on reactivate, but KEEP deactivation_reason and
      // rehire_eligible as historical record. They'll be overwritten on the
      // next deactivation if it happens.
      var candBody = {
        pipeline_stage: 'active',
        deactivation_category: null,
        deactivated_by: null,
        stage_updated_at: now,
        updated_at: now
      };
      ops.push(patchCandidate(cand.id, candBody));
    }
    ops.push(patchEmployee(emp.id, { is_active: true, updated_at: now }));

    Promise.all(ops).then(function() {
      emp.is_active = true;
      if (cand) {
        cand.pipeline_stage = 'active';
        cand.deactivation_category = null;
        cand.deactivated_by = null;
        cand.stage_updated_at = now;
      }
      closeReactivateModal();
      showToast('Employee reactivated', 'success');
      renderStatusTabs();
      renderList();
      renderCounts();
      renderScorecard();
      renderCardModal();
    }).catch(function(err) {
      if (err && err.authFailed) { handleAuthFailure(); return; }
      console.error('Reactivate failed:', err);
      showToast('Reactivate failed', 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Reactivate'; }
    });
  }

  // ============================================================
  // BOOT
  // ============================================================
  pcAuth.require({
    pageSlug: 'crew',
    onReady: function(user) {
      // Header + user pill painted by pc-nav.js — no manual setup here.
      pcActivity.init('crew');

      document.getElementById('searchInput').addEventListener('input', onSearchInput);

      // Escape key closes top-most modal.
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          if (document.getElementById('deactModalRoot').innerHTML) {
            closeDeactivateModal();
            closeReactivateModal();
          } else if (state.rosterModalVenue) {
            closeRosterModal();
          } else if (state.modalEmpId) {
            closeCardModal();
          }
        }
      });

      Promise.all([
        loadEmployees(),
        loadCandidates().catch(function(err) {
          console.warn('Candidates fetch failed (non-blocking):', err);
          return [];
        }),
        loadPayRates().catch(function(err) {
          console.warn('Pay rates fetch failed (non-blocking):', err);
          return [];
        }),
        loadParTotals().catch(function(err) {
          console.warn('Par totals fetch failed:', err);
          var fb = {};
          SCORECARD_VENUES.forEach(function(v) { fb[v] = 0; });
          return fb;
        }),
        loadRatingData().catch(function(err) {
          console.warn('Rating data fetch failed (non-blocking):', err);
          return { placements: [], signups: [], verifiedAttendance: [], eventsById: {}, eventsWithSignin: {} };
        }),
        loadChangeHistory().catch(function(err) {
          console.warn('Change history fetch failed (non-blocking):', err);
          return {};
        }),
        loadCerts().catch(function(err) {
          console.warn('Certs fetch failed (non-blocking):', err);
          return [];
        }),
        loadCertTypes().catch(function(err) {
          console.warn('Cert types fetch failed (non-blocking):', err);
          return [];
        }),
        // Role catalog (roles + venue_roles). Needed so the per-venue
        // Roles & venues editor can call pcRoles.getRolesForVenue /
        // getPayRate synchronously once a card opens. Result is ignored
        // here (results[8]) — pc-roles.js holds the cache internally.
        pcRoles.ready().catch(function(err) {
          console.warn('Role catalog fetch failed (non-blocking):', err);
          return null;
        })
      ]).then(function(results) {
        state.employees = results[0] || [];
        // Index candidates by punch_id for fast lookup. If two candidates
        // share a punch_id (data corruption) the last one wins — non-fatal,
        // user will notice when they open the card.
        var candList = results[1] || [];
        var candMap = {};
        for (var i = 0; i < candList.length; i++) {
          var c = candList[i];
          if (c.punch_id) candMap[c.punch_id] = c;
        }
        state.candidates = candMap;
        state.payRates = results[2] || [];
        // Derive role list from pay rates.
        var roleSet = {};
        state.payRates.forEach(function(r) { roleSet[r.role] = true; });
        state.pcRoles = Object.keys(roleSet).sort();
        state.parTotals = results[3] || {};

        // Performance Signals data
        var ratingData = results[4] || { placements: [], signups: [], verifiedAttendance: [], eventsById: {}, eventsWithSignin: {} };
        state.placements = ratingData.placements;
        state.signups = ratingData.signups;
        state.verifiedAttendance = ratingData.verifiedAttendance;
        state.eventsById = ratingData.eventsById;
        state.eventsWithSignin = ratingData.eventsWithSignin;

        // Build the lifetime signup count map. Uses already-loaded
        // signups + eventsById — no extra fetch. Skips soft-removed
        // signups and any signup whose event we couldn't resolve.
        // Name matching follows the same first_name + ' ' + last_name
        // against availability.staff_name pattern Performance Signals
        // uses; same known soft gap on nicknames/typos.
        state.signupCountsByName = {};
        state.signups.forEach(function(s) {
          if (s.removed_at) return;
          if (!s.staff_name) return;
          var ev = state.eventsById[s.event_id];
          if (!ev || !ev.venue) return;
          if (!state.signupCountsByName[s.staff_name]) {
            state.signupCountsByName[s.staff_name] = { total: 0, byVenue: {} };
          }
          state.signupCountsByName[s.staff_name].total++;
          state.signupCountsByName[s.staff_name].byVenue[ev.venue] =
            (state.signupCountsByName[s.staff_name].byVenue[ev.venue] || 0) + 1;
        });

        // Card change history — keyed by employee_id, sorted newest-first.
        state.changeHistory = results[5] || {};

        // Certifications (read-only on this page)
        state.certs = results[6] || [];
        var certTypesArr = results[7] || [];
        state.certTypesById = {};
        certTypesArr.forEach(function(t) { state.certTypesById[t.id] = t; });

        renderStatusTabs();
        renderCounts();
        renderScorecard();
        renderList();
      }).catch(function(err) {
        if (err && err.authFailed) { handleAuthFailure(); return; }
        console.error('Load failed:', err);
        document.getElementById('listArea').innerHTML =
          '<div class="empty">Couldn\'t load employees. ' + escapeHtml(err.message || '') + '</div>';
        document.getElementById('counts').textContent = 'Error';
      });
    }
  });
})();
</script>
</body>
</html>
