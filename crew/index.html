  // -------------------------------------------------------------
  // ensureCandidateRow — return the employee's candidates row, creating
  // one if it doesn't exist. Legacy employees who pre-date the apply-
  // online flow may not have a candidates row, which historically caused
  // silent save failures on the card editor. This function backfills the
  // row on demand so saves to candidate-only fields (email, DOB,
  // internal_notes, roles, etc.) succeed instead of failing silently.
  //
  // On create, the row is stamped with legacy_import=true and a
  // pipeline_stage matching the employee's active/inactive status. The
  // new row is mirrored into state.candidates[punch_id] so subsequent
  // saves in the same session find it. An audit entry ('candidate_record'
  // -> 'created') is appended to the card history.
  //
  // Known limitation: not atomic across concurrent managers. If two
  // managers click Save on the same legacy employee at the same instant,
  // both can INSERT a row (punch_id is not UNIQUE on candidates). Volume
  // is too low to engineer around today; revisit if duplicates appear.
  // -------------------------------------------------------------
  function ensureCandidateRow(emp) {
    if (!emp || !emp.id) return Promise.reject(new Error('No employee'));
    var existing = getCandidateForEmployee(emp);
    if (existing && existing.id) return Promise.resolve(existing);

    var now = new Date().toISOString();
    var body = {
      first_name: emp.first_name,
      last_name: emp.last_name,
      punch_id: emp.punch_id,
      phone: emp.phone || null,
      pipeline_stage: emp.is_active ? 'active' : 'inactive',
      legacy_import: true,
      applied_at: now,
      stage_updated_at: now,
      updated_at: now
    };
    var url = SUPABASE_URL + '/rest/v1/candidates';
    var headers = pcAuth.headers();
    headers['Content-Type'] = 'application/json';
    headers['Prefer'] = 'return=representation';
    return authFetch(url, {
      method: 'POST',
      headers: headers,
      body: JSON.stringify(body)
    }).then(function(rows) {
      if (!rows || rows.length === 0) {
        throw new Error('Candidate row INSERT returned no row');
      }
      var newCand = rows[0];
      // Mirror into local state so subsequent saves see it without a refetch.
      if (newCand.punch_id) state.candidates[newCand.punch_id] = newCand;
      // Audit-log the creation. Fire-and-forget.
      logCardChange(emp.id, 'candidate_record', null, 'created');
      return newCand;
    });
  }

  // -------------------------------------------------------------
  // logCardChange — write a single row to employee_card_changes and
  // mirror it into state.changeHistory so the card UI updates without
  // a refetch. Fire-and-forget: failures here shouldn't roll back the
  // underlying data write, but we surface them in the console for
  // debugging. v1 only logs home_venue changes; future code can call
  // this for any card field by passing a different fieldName.
  // -------------------------------------------------------------
  function logCardChange(empId, fieldName, oldValue, newValue) {
    if (oldValue === newValue) return Promise.resolve(); // no-op
    var actor = (pcAuth.getUser && pcAuth.getUser()) || null;
    var actorName = actor ? (actor.display_name || actor.email || 'Unknown') : 'Unknown';
    var now = new Date().toISOString();
    var body = {
      employee_id: empId,
      field_name: fieldName,
      old_value: oldValue == null ? null : String(oldValue),
      new_value: newValue == null ? null : String(newValue),
      changed_by: actorName,
      changed_at: now
    };
    var url = SUPABASE_URL + '/rest/v1/employee_card_changes';
    var headers = pcAuth.headers();
    headers['Content-Type'] = 'application/json';
    headers['Prefer'] = 'return=representation';
    return authFetch(url, {
      method: 'POST', headers: headers, body: JSON.stringify(body)
    }).then(function(rows) {
      // Mirror into local state so the history section reflects the new
      // entry immediately. The POST returns an array with the inserted row.
      var inserted = (rows && rows[0]) || body;
      if (!state.changeHistory[empId]) state.changeHistory[empId] = [];
      state.changeHistory[empId].unshift(inserted);
      return inserted;
    }).catch(function(err) {
      console.warn('logCardChange failed (non-blocking):', err);
    });
  }

  // -------------------------------------------------------------
  // HELPERS
  // -------------------------------------------------------------
  function fullName(e) {
    return ((e.first_name || '') + ' ' + (e.last_name || '')).trim();
  }
  function getInitials(f, l) {
    return ((f ? f[0] : '?') + (l ? l[0] : '?')).toUpperCase();
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function formatDate(ts) {
    if (!ts) return '';
    var d = new Date(ts);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function formatPhone(phone) {
    if (!phone) return '';
    var d = phone.replace(/\D/g, '');
    if (d.length === 10) return '(' + d.slice(0,3) + ') ' + d.slice(3,6) + '-' + d.slice(6);
    if (d.length === 11 && d[0] === '1') return '(' + d.slice(1,4) + ') ' + d.slice(4,7) + '-' + d.slice(7);
    return phone;
  }
  function getCandidateForEmployee(emp) {
    if (!emp || !emp.punch_id) return null;
    return state.candidates[emp.punch_id] || null;
  }
  function passesFilter(emp) {
    if (!state.filter) return true;
    return fullName(emp).toLowerCase().indexOf(state.filter) !== -1;
  }
  function visibleEmployees() {
    var wantActive = state.statusTab === 'active';
    return state.employees.filter(function(e) {
      return (e.is_active === true) === wantActive;
    });
  }

  // ============================================================
  // PERFORMANCE SIGNALS — COMPUTATION ENGINE
  //
  // Pure function. Takes pre-fetched data, returns a rating object.
  // Has zero awareness of:
  //   - the DOM
  //   - Supabase
  //   - whether the data is fresh, stale, or aggregated server-side
  //
  // Rating object shape:
  // {
  //   employee: { id, name, hired_at, home_venue },
  //   countablePlacements: number,
  //   coldStart: boolean,                  // true if below COLD_START_THRESHOLD
  //   shiftsNeededForRating: number,       // only meaningful if coldStart === true
  //   factors: {
  //     reliability:           { score: 0-100, weight, naReason?, raw },
  //     signupVolume:          { ... },
  //     homeVenueEngagement:   { ... },
  //     eventTier:             { ... },     // always NA in v1
  //     tenure:                { ... },
  //     lastMinuteAttendance:  { ... },
  //     signupLeadTime:        { ... }
  //   },
  //   overall: 0-100 | null,                // null if cold start
  //   stars: 0.0-5.0 | null,
  //   walkOnCount: number,                  // sign-in appearances without a placement
  //   unverifiedPlacementCount: number,     // placements at events with no sign-in sheet
  //   placementMix: { signup, manual, placeholder }
  // }
  // ============================================================
  function computeEmployeeRating(employee, candidate, ratingData) {
    var hiredAt = candidate && candidate.hired_at ? candidate.hired_at : null;
    var homeVenue = employee.home_venue || null;
    var empName = fullName(employee);
    var empId = employee.id;

    // --- Build the employee's view of each dataset -------------
    // Placements where this employee was placed (matched on staff_name).
    // staff_name is the canonical key in position_assignments — it's how
    // the page records placements. Same matching pattern as everywhere else.
    var myPlacements = ratingData.placements.filter(function(p) {
      return !p.removed_at && namesMatch(p.staff_name, empName);
    });

    // Verified attendance for this employee (matched on employee_id when
    // available, falls back to raw_name_text if AI parser produced a
    // match without a hard FK).
    var myVerifiedAttendance = ratingData.verifiedAttendance.filter(function(a) {
      if (a.employee_id && a.employee_id === empId) return true;
      if (a.raw_name_text && namesMatch(a.raw_name_text, empName)) return true;
      return false;
    });

    // Build a Set of event_ids where this employee has verified attendance.
    var attendedEventIds = {};
    myVerifiedAttendance.forEach(function(a) {
      if (a.event_id) attendedEventIds[a.event_id] = true;
    });

    // Signups (including removed — manager removal isn't the employee's fault).
    var mySignups = ratingData.signups.filter(function(s) {
      return namesMatch(s.staff_name, empName);
    });

    var now = new Date();
    var nowMs = now.getTime();

    // --- Identify past placements with usable verification data ---
    // A placement is "countable" if:
    //   - the event has happened (event_date is in the past)
    //   - the event has at least one verified sign-in row (uploaded sheet)
    var countablePlacements = [];
    var unverifiedPlacements = []; // past, but no sign-in sheet uploaded
    myPlacements.forEach(function(p) {
      var ev = ratingData.eventsById[p.event_id];
      if (!ev) return;
      var eventMs = new Date(ev.event_date + 'T23:59:59').getTime();
      if (eventMs > nowMs) return; // future event — not countable yet
      if (ratingData.eventsWithSignin[p.event_id]) {
        countablePlacements.push(p);
      } else {
        unverifiedPlacements.push(p);
      }
    });

    // --- Walk-ons: verified attendance with no matching placement ---
    var placedEventIds = {};
    myPlacements.forEach(function(p) { placedEventIds[p.event_id] = true; });
    var walkOnCount = 0;
    Object.keys(attendedEventIds).forEach(function(evId) {
      if (!placedEventIds[evId]) walkOnCount++;
    });

    // --- Placement mix (for display) -----------------------------
    var placementMix = { signup: 0, manual: 0, placeholder: 0 };
    myPlacements.forEach(function(p) {
      if (p.source === 'signup') placementMix.signup++;
      else if (p.source === 'manual') placementMix.manual++;
      else if (p.source === 'placeholder') placementMix.placeholder++;
    });

    // --- Cold start check ----------------------------------------
    var coldStart = countablePlacements.length < COLD_START_THRESHOLD;
    var shiftsNeeded = Math.max(0, COLD_START_THRESHOLD - countablePlacements.length);

    // === FACTOR 1: RELIABILITY (source-weighted, both directions) ===
    var reliability = computeReliability(countablePlacements, attendedEventIds);

    // === FACTOR 2: SIGNUP VOLUME ===
    var signupVolume = computeSignupVolume(mySignups, hiredAt, now);

    // === FACTOR 5: HOME-VENUE ENGAGEMENT ===
    var homeVenueEngagement = computeHomeVenueEngagement(
      mySignups, ratingData.eventsById, homeVenue, hiredAt, now
    );

    // === FACTOR 6: EVENT TIER (stub) ===
    var eventTier = {
      score: null,
      weight: RATING_WEIGHTS.eventTier,
      naReason: 'Event tier system not yet active',
      raw: {}
    };

    // === FACTOR 8: TENURE ===
    var tenure = computeTenure(hiredAt, myPlacements.length, now);

    // === FACTOR 9: LAST-MINUTE ATTENDANCE ===
    var lastMinute = computeLastMinuteAttendance(
      countablePlacements, attendedEventIds, ratingData.eventsById
    );

    // === FACTOR 10: SIGNUP LEAD TIME ===
    var signupLeadTime = computeSignupLeadTime(
      mySignups, ratingData.eventsById, hiredAt
    );

    // --- Weighted overall score ----------------------------------
    var factors = {
      reliability: reliability,
      signupVolume: signupVolume,
      homeVenueEngagement: homeVenueEngagement,
      eventTier: eventTier,
      tenure: tenure,
      lastMinuteAttendance: lastMinute,
      signupLeadTime: signupLeadTime
    };

    var overall = null;
    var stars = null;
    if (!coldStart) {
      // Sum (score × weight) for non-NA factors, then divide by sum of
      // applicable weights so NA factors don't drag the average down.
      var weightedSum = 0;
      var totalWeight = 0;
      Object.keys(factors).forEach(function(key) {
        var f = factors[key];
        if (f.score == null) return; // NA
        if (!f.weight) return;       // zero-weight stub
        weightedSum += f.score * f.weight;
        totalWeight += f.weight;
      });
      if (totalWeight > 0) {
        overall = Math.round((weightedSum / totalWeight) * 10) / 10;
        stars = Math.round((overall / 20) * 10) / 10; // 100 → 5.0
      }
    }

    return {
      employee: {
        id: empId, name: empName, hired_at: hiredAt, home_venue: homeVenue
      },
      countablePlacements: countablePlacements.length,
      coldStart: coldStart,
      shiftsNeededForRating: shiftsNeeded,
      factors: factors,
      overall: overall,
      stars: stars,
      walkOnCount: walkOnCount,
      unverifiedPlacementCount: unverifiedPlacements.length,
      placementMix: placementMix
    };
  }

  // --- Name matcher: forgiving, case-insensitive, whitespace-collapsed ---
  function namesMatch(a, b) {
    if (!a || !b) return false;
    var na = String(a).toLowerCase().replace(/\s+/g, ' ').trim();
    var nb = String(b).toLowerCase().replace(/\s+/g, ' ').trim();
    return na === nb;
  }

  // --- Factor 1: Reliability ---
  function computeReliability(countablePlacements, attendedEventIds) {
    if (countablePlacements.length === 0) {
      return {
        score: null, weight: RATING_WEIGHTS.reliability,
        naReason: 'No verified placements yet',
        raw: { showed: 0, noShow: 0 }
      };
    }
    var totalPoints = 0;
    var maxPossible = 0;
    var showed = 0, noShow = 0;
    var bySource = { signupShowed: 0, manualShowed: 0, signupNoShow: 0, manualNoShow: 0 };

    countablePlacements.forEach(function(p) {
      var attended = !!attendedEventIds[p.event_id];
      var isSignup = p.source === 'signup';
      var pts;
      if (attended) {
        showed++;
        if (isSignup) { pts = RELIABILITY_POINTS.signupShowed; bySource.signupShowed++; }
        else          { pts = RELIABILITY_POINTS.manualShowed; bySource.manualShowed++; }
      } else {
        noShow++;
        if (isSignup) { pts = RELIABILITY_POINTS.signupNoShow; bySource.signupNoShow++; }
        else          { pts = RELIABILITY_POINTS.manualNoShow; bySource.manualNoShow++; }
      }
      totalPoints += pts;
      // Max possible = if every placement scored signupShowed (1.0)
      maxPossible += RELIABILITY_POINTS.signupShowed;
    });

    // Normalize: scale from [-maxPossible, +maxPossible] to [0, 100].
    // (totalPoints + maxPossible) / (2 * maxPossible) × 100
    var minPossible = -maxPossible;
    var range = maxPossible - minPossible;
    var score = range > 0 ? ((totalPoints - minPossible) / range) * 100 : 0;
    score = Math.max(0, Math.min(100, score));
    score = Math.round(score * 10) / 10;

    return {
      score: score,
      weight: RATING_WEIGHTS.reliability,
      raw: {
        countable: countablePlacements.length,
        showed: showed,
        noShow: noShow,
        bySource: bySource,
        rawPoints: Math.round(totalPoints * 10) / 10,
        maxPoints: maxPossible
      }
    };
  }

  // --- Factor 2: Signup volume ---
  function computeSignupVolume(signups, hiredAt, now) {
    if (!hiredAt) {
      return {
        score: null, weight: RATING_WEIGHTS.signupVolume,
        naReason: 'No hire date on file',
        raw: { signupCount: signups.length }
      };
    }
    var startMs = Math.max(
      new Date(hiredAt).getTime(),
      new Date(SYSTEM_START_DATE).getTime()
    );
    var nowMs = now.getTime();
    var weeks = Math.max(1, (nowMs - startMs) / (1000 * 60 * 60 * 24 * 7));
    var perWeek = signups.length / weeks;
    var score = Math.min(100, (perWeek / SIGNUPS_PER_WEEK_BASELINE) * 100);
    score = Math.round(score * 10) / 10;
    return {
      score: score,
      weight: RATING_WEIGHTS.signupVolume,
      raw: {
        signupCount: signups.length,
        weeksActive: Math.round(weeks * 10) / 10,
        signupsPerWeek: Math.round(perWeek * 100) / 100
      }
    };
  }

  // --- Factor 5: Home-venue engagement ---
  function computeHomeVenueEngagement(signups, eventsById, homeVenue, hiredAt, now) {
    if (!homeVenue || homeVenue === 'NA') {
      return {
        score: null, weight: RATING_WEIGHTS.homeVenueEngagement,
        naReason: 'No home venue assigned',
        raw: {}
      };
    }
    if (!hiredAt) {
      return {
        score: null, weight: RATING_WEIGHTS.homeVenueEngagement,
        naReason: 'No hire date on file',
        raw: { homeVenue: homeVenue }
      };
    }
    var hiredMs = new Date(hiredAt).getTime();
    var systemStartMs = new Date(SYSTEM_START_DATE).getTime();
    var startMs = Math.max(hiredMs, systemStartMs);
    var nowMs = now.getTime();

    // Past events at home venue during their tenure
    var homeEvents = [];
    Object.keys(eventsById).forEach(function(id) {
      var e = eventsById[id];
      if (e.venue !== homeVenue) return;
      var eMs = new Date(e.event_date + 'T23:59:59').getTime();
      if (eMs < startMs || eMs > nowMs) return;
      homeEvents.push(e);
    });

    if (homeEvents.length < HOME_VENUE_MIN_EVENTS) {
      return {
        score: null, weight: RATING_WEIGHTS.homeVenueEngagement,
        naReason: 'Not enough home-venue events yet (' + homeEvents.length + ' of ' + HOME_VENUE_MIN_EVENTS + ' needed)',
        raw: { homeVenue: homeVenue, homeEventCount: homeEvents.length }
      };
    }

    // How many of those did they sign up for?
    var homeEventIds = {};
    homeEvents.forEach(function(e) { homeEventIds[e.id] = true; });
    var signedUpForCount = 0;
    var seenEventIds = {};
    signups.forEach(function(s) {
      if (homeEventIds[s.event_id] && !seenEventIds[s.event_id]) {
        signedUpForCount++;
        seenEventIds[s.event_id] = true;
      }
    });

    var score = Math.round((signedUpForCount / homeEvents.length) * 1000) / 10;
    return {
      score: score,
      weight: RATING_WEIGHTS.homeVenueEngagement,
      raw: {
        homeVenue: homeVenue,
        signedUp: signedUpForCount,
        totalHomeEvents: homeEvents.length
      }
    };
  }

  // --- Factor 8: Tenure ---
  // Decision (May 5): everyone starts fresh from system start. Legacy employees
  // with sentinel dates (2020-01-01) and brand-new pipeline hires both get
  // their tenure clock counted from April 30, 2026.
  function computeTenure(hiredAt, totalPlacements, now) {
    var systemStartMs = new Date(SYSTEM_START_DATE).getTime();
    var hiredMs = hiredAt ? new Date(hiredAt).getTime() : systemStartMs;
    // The effective tenure start is the LATER of hire date and system start.
    // For legacy employees with hired_at = 2020-01-01, this clamps to system start.
    // For new hires after system start, this uses their actual hire date.
    var effectiveStartMs = Math.max(hiredMs, systemStartMs);
    var daysSinceStart = (now.getTime() - effectiveStartMs) / (1000 * 60 * 60 * 24);
    if (daysSinceStart < 0) daysSinceStart = 0;
    var pts = tenurePoints(daysSinceStart, totalPlacements);
    return {
      score: Math.round(pts * 1000) / 10,
      weight: RATING_WEIGHTS.tenure,
      raw: {
        daysSinceSystemStart: Math.round(daysSinceStart),
        totalPlacements: totalPlacements,
        legacyClampApplied: !!(hiredAt && hiredMs < systemStartMs)
      }
    };
  }

  // --- Factor 9: Last-minute attendance ---
  function computeLastMinuteAttendance(countablePlacements, attendedEventIds, eventsById) {
    var lastMinutePlacements = countablePlacements.filter(function(p) {
      var ev = eventsById[p.event_id];
      if (!ev) return false;
      var assignedMs = new Date(p.assigned_at).getTime();
      var eventMs = new Date(ev.event_date + 'T23:59:59').getTime();
      var hoursBefore = (eventMs - assignedMs) / (1000 * 60 * 60);
      return hoursBefore <= LAST_MINUTE_HOURS && hoursBefore > -24; // assigned within 24h of event
    });
    if (lastMinutePlacements.length === 0) {
      return {
        score: null, weight: RATING_WEIGHTS.lastMinuteAttendance,
        naReason: 'No last-minute placements yet',
        raw: { count: 0 }
      };
    }
    var attended = 0;
    lastMinutePlacements.forEach(function(p) {
      if (attendedEventIds[p.event_id]) attended++;
    });
    var score = (attended / lastMinutePlacements.length) * 100;
    score = Math.round(score * 10) / 10;
    return {
      score: score,
      weight: RATING_WEIGHTS.lastMinuteAttendance,
      raw: {
        attended: attended,
        total: lastMinutePlacements.length
      }
    };
  }

  // --- Factor 10: Signup lead time ---
  function computeSignupLeadTime(signups, eventsById, hiredAt) {
    if (signups.length === 0) {
      return {
        score: null, weight: RATING_WEIGHTS.signupLeadTime,
        naReason: 'No signups yet',
        raw: { count: 0 }
      };
    }
    var hiredMs = hiredAt ? new Date(hiredAt).getTime() : null;
    var totalPoints = 0;
    var counted = 0;
    var distribution = { '30+': 0, '14-29': 0, '7-13': 0, '3-6': 0, '1-2': 0, '<1': 0 };

    signups.forEach(function(s) {
      var ev = eventsById[s.event_id];
      if (!ev) return;
      var submittedMs = new Date(s.submitted_at).getTime();
      var eventMs = new Date(ev.event_date).getTime();
      var calendarDays = (eventMs - submittedMs) / (1000 * 60 * 60 * 24);

      // Opportunity window — capped by tenure and event creation
      var earliestPossibleMs = ev.created_at ? new Date(ev.created_at).getTime() : 0;
      if (hiredMs) earliestPossibleMs = Math.max(earliestPossibleMs, hiredMs);
      var maxOpportunityDays = (eventMs - earliestPossibleMs) / (1000 * 60 * 60 * 24);
      var effectiveDays = Math.min(calendarDays, maxOpportunityDays);

      // Skip signups with less than 14 days of opportunity (new hire / late-added event)
      if (maxOpportunityDays < 14) return;

      var pts = leadTimePoints(effectiveDays);
      totalPoints += pts;
      counted++;

      if (effectiveDays >= 30) distribution['30+']++;
      else if (effectiveDays >= 14) distribution['14-29']++;
      else if (effectiveDays >= 7) distribution['7-13']++;
      else if (effectiveDays >= 3) distribution['3-6']++;
      else if (effectiveDays >= 1) distribution['1-2']++;
      else distribution['<1']++;
    });

    if (counted === 0) {
      return {
        score: null, weight: RATING_WEIGHTS.signupLeadTime,
        naReason: 'No signups with sufficient opportunity window yet',
        raw: { count: 0 }
      };
    }
    var score = (totalPoints / counted) * 100;
    score = Math.round(score * 10) / 10;
    return {
      score: score,
      weight: RATING_WEIGHTS.signupLeadTime,
      raw: {
        countedSignups: counted,
        skippedForOpportunity: signups.length - counted,
        distribution: distribution,
        avgPoints: Math.round((totalPoints / counted) * 100) / 100
      }
    };
  }

  // -------------------------------------------------------------
  // STATUS TABS (Active / Inactive)
  // -------------------------------------------------------------
  function renderStatusTabs() {
    var actCount = state.employees.filter(function(e) { return e.is_active === true; }).length;
    var inactCount = state.employees.filter(function(e) { return e.is_active === false; }).length;
    var html =
      '<button class="status-tab' + (state.statusTab === 'active' ? ' active' : '') + '" data-tab="active">' +
        'Active <span class="status-tab-count">' + actCount + '</span>' +
      '</button>' +
      '<button class="status-tab' + (state.statusTab === 'inactive' ? ' active' : '') + '" data-tab="inactive">' +
        'Inactive <span class="status-tab-count">' + inactCount + '</span>' +
      '</button>';
    var el = document.getElementById('statusTabGroup');
    el.innerHTML = html;
    // Wire tab clicks. Each tab swaps state.statusTab, then re-renders the
    // list, counts, and tabs themselves (to update the "active" highlight).
    var btns = el.querySelectorAll('.status-tab');
    for (var i = 0; i < btns.length; i++) {
      btns[i].addEventListener('click', function(e) {
        var tab = e.currentTarget.getAttribute('data-tab');
        if (tab === state.statusTab) return;
        state.statusTab = tab;
        renderStatusTabs();
        renderList();
        renderCounts();
      });
    }
  }

  // -------------------------------------------------------------
  // ROW LIST RENDER
  // -------------------------------------------------------------
  function buildVenueOptions(currentValue) {
    var html = '<option value="">(none)</option>';
    html += '<option value="NA"' + (currentValue === 'NA' ? ' selected' : '') + '>Doesn\'t apply</option>';
    for (var i = 0; i < VENUE_ORDER.length; i++) {
      var code = VENUE_ORDER[i];
      var label = VENUE_LABELS[code];
      var sel = (currentValue === code) ? ' selected' : '';
      html += '<option value="' + code + '"' + sel + '>' + label + '</option>';
    }
    return html;
  }

  // Builds the <option> tags for the shirt size dropdown.
  // Used in the contact section's edit mode.
  function buildShirtSizeOptions(currentValue) {
    var html = '<option value="">(not set)</option>';
    for (var i = 0; i < SHIRT_SIZES.length; i++) {
      var sz = SHIRT_SIZES[i];
      var sel = (currentValue === sz) ? ' selected' : '';
      html += '<option value="' + sz + '"' + sel + '>' + sz + '</option>';
    }
    return html;
  }

  function renderRow(emp) {
    var unset = !emp.home_venue && state.statusTab === 'active';
    var isNA = emp.home_venue === 'NA';
    var classes = 'emp-row' +
      (unset ? ' unset' : '') +
      (isNA ? ' na' : '');
    var name = fullName(emp);
    // The "Card" button uses a small file/document icon. data-emp-id lets
    // the click handler look up the employee record for the modal.
    var cardBtn =
      '<button class="card-btn" data-card-emp="' + emp.id + '" title="Open employee card">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<rect x="4" y="3" width="16" height="18" rx="2"></rect>' +
          '<line x1="8" y1="9" x2="16" y2="9"></line>' +
          '<line x1="8" y1="13" x2="14" y2="13"></line>' +
        '</svg>' +
        'Card' +
      '</button>';

    // Signup count badge — only on Active tab, only when the employee
    // has a real home venue (NA people are managers/floaters/exempt
    // and showing "0 signups" on them is just noise). Red treatment
    // when count <= LOW_SIGNUP_THRESHOLD.
    var signupBadge = '';
    if (state.statusTab === 'active' && emp.home_venue !== 'NA') {
      var sc = state.signupCountsByName[name];
      var total = sc ? sc.total : 0;
      var badgeClass = 'signup-count-badge-row' + (total <= LOW_SIGNUP_THRESHOLD ? ' low' : '');
      var tip = total === 0
        ? 'Never signed up'
        : total + ' lifetime signup' + (total === 1 ? '' : 's');
      // Clickable when there's history to show. Opens the card and
      // auto-expands the Signups section. Zero-count badges still render
      // but stay non-clickable since there's nothing to drill into.
      if (total > 0) {
        signupBadge = '<button class="' + badgeClass + ' clickable" data-signup-badge="' + emp.id + '" ' +
          'title="' + escapeHtml(tip) + ' &mdash; click to see history">' +
          total + ' signup' + (total === 1 ? '' : 's') +
        '</button>';
      } else {
        signupBadge = '<span class="' + badgeClass + '" title="' + escapeHtml(tip) + '">' +
          total + ' signup' + (total === 1 ? '' : 's') +
        '</span>';
      }
    }

    return '' +
      '<div class="' + classes + '" data-emp-id="' + emp.id + '">' +
        '<div class="emp-name">' + escapeHtml(name) + '</div>' +
        signupBadge +
        cardBtn +
        '<div class="dropdown-wrap">' +
          '<select class="venue-select" data-emp-id="' + emp.id + '">' +
            buildVenueOptions(emp.home_venue) +
          '</select>' +
          '<span class="dropdown-arrow">&#9662;</span>' +
        '</div>' +
        '<div class="row-status" data-status-for="' + emp.id + '"></div>' +
      '</div>';
  }

  function renderList() {
    var visible = visibleEmployees().filter(passesFilter);
    var area = document.getElementById('listArea');

    if (state.employees.length === 0) {
      area.innerHTML = '<div class="empty">No employees in the system yet.</div>';
      return;
    }
    if (visible.length === 0) {
      var msg = state.filter
        ? 'No ' + state.statusTab + ' employees match "' + escapeHtml(state.filter) + '".'
        : 'No ' + state.statusTab + ' employees.';
      area.innerHTML = '<div class="empty">' + msg + '</div>';
      return;
    }

    // Inactive view: don't bother grouping by unset/assigned. Inactive
    // employees don't need a home venue assigned, so the "unset worklist"
    // concept doesn't apply. Just show them all alphabetically.
    if (state.statusTab === 'inactive') {
      var html = '';
      for (var i = 0; i < visible.length; i++) html += renderRow(visible[i]);
      area.innerHTML = html;
    } else {
      // Active view: split into Unset (yellow) and Assigned, like before.
      var unset = visible.filter(function(e) { return !e.home_venue; });
      var assigned = visible.filter(function(e) { return !!e.home_venue; });
      var html2 = '';
      if (unset.length > 0) {
        html2 += '<div class="group-head unset">' +
          '<span>&#9888; Unset</span>' +
          '<span class="grp-count">' + unset.length + '</span>' +
        '</div>';
        for (var j = 0; j < unset.length; j++) html2 += renderRow(unset[j]);
      }
      if (assigned.length > 0) {
        html2 += '<div class="group-head">' +
          '<span>&#10003; Assigned</span>' +
          '<span class="grp-count">' + assigned.length + '</span>' +
        '</div>';
        for (var k = 0; k < assigned.length; k++) html2 += renderRow(assigned[k]);
      }
      area.innerHTML = html2;
    }

    // Wire dropdown change handlers on every fresh render.
    var selects = area.querySelectorAll('select.venue-select');
    for (var s = 0; s < selects.length; s++) {
      selects[s].addEventListener('change', onVenueChange);
    }
    // Wire Card button clicks.
    var cardBtns = area.querySelectorAll('button[data-card-emp]');
    for (var c = 0; c < cardBtns.length; c++) {
      cardBtns[c].addEventListener('click', function(e) {
        var empId = e.currentTarget.getAttribute('data-card-emp');
        openCardModal(empId);
      });
    }
    // Wire signup badge clicks. Opens the card with the Signups section
    // already expanded so the manager lands directly on the history view.
    var sigBtns = area.querySelectorAll('button[data-signup-badge]');
    for (var sb = 0; sb < sigBtns.length; sb++) {
      sigBtns[sb].addEventListener('click', function(e) {
        var empId = e.currentTarget.getAttribute('data-signup-badge');
        openCardModal(empId);
        // Auto-expand Signups section. openCardModal sets signupsOpen=false
        // by default, so we flip it after open and re-render.
        state.signupsOpen = true;
        renderCardModal();
      });
    }
  }

  function renderCounts() {
    var visible = visibleEmployees();
    var total = visible.length;
    var el = document.getElementById('counts');
    if (total === 0) { el.innerHTML = ''; return; }
    if (state.statusTab === 'inactive') {
      el.innerHTML = total + ' inactive';
      return;
    }
    var unset = visible.filter(function(e) { return !e.home_venue; }).length;
    var na = visible.filter(function(e) { return e.home_venue === 'NA'; }).length;
    var parts = [];
    parts.push('<span class="unset-num">' + unset + '</span> unset');
    if (na > 0) parts.push(na + ' n/a');
    parts.push(total + ' total');
    el.innerHTML = parts.join(' &middot; ');
  }

  function renderScorecard() {
    var strip = document.getElementById('scorecardStrip');
    if (!strip) return;
    var html = '';
    SCORECARD_VENUES.forEach(function(venue) {
      var color = VENUE_COLORS[venue] || '#666';
      var par = state.parTotals[venue] || 0;
      // Scorecard counts only ACTIVE employees with this home venue.
      // Inactive folks shouldn't pad the count.
      var count = state.employees.filter(function(e) {
        return e.home_venue === venue && e.is_active === true;
      }).length;
      var pct = par > 0 ? Math.round((count / par) * 100) : 0;
      var pctCapped = Math.min(100, pct);
      var parLabel = par > 0
        ? 'par ' + par + ' &middot; full tier'
        : 'no par configured';
      var pctLabel = par > 0
        ? pct + '% of par from home staff'
        : '&mdash;';
      html += '<div class="scorecard-card" data-roster-venue="' + venue + '" style="border-left-color:' + color + ';">' +
        '<div class="scorecard-head">' +
          '<span class="scorecard-venue">' + escapeHtml(venue) + '</span>' +
          '<span class="scorecard-par">' + parLabel + '</span>' +
        '</div>' +
        '<div class="scorecard-num' + (count === 0 ? ' is-zero' : '') + '">' + count + '</div>' +
        '<div class="scorecard-label">home component employees</div>' +
        '<div class="scorecard-bar">' +
          '<div class="scorecard-bar-fill" style="width:' + pctCapped + '%;background:' + color + ';"></div>' +
        '</div>' +
        '<div class="scorecard-pct">' + pctLabel + '</div>' +
      '</div>';
    });

    // Fourth tile — low engagement. Counts all active employees with
    // signup_count <= LOW_SIGNUP_THRESHOLD, regardless of home venue,
    // excluding NA (managers/floaters who don't sign up anyway).
    var lowCount = state.employees.filter(function(e) {
      if (e.is_active !== true) return false;
      if (e.home_venue === 'NA') return false;
      var sc = state.signupCountsByName[fullName(e)];
      var total = sc ? sc.total : 0;
      return total <= LOW_SIGNUP_THRESHOLD;
    }).length;
    html += '<div class="scorecard-card low-engagement" data-roster-low-engagement="1">' +
      '<div class="scorecard-head">' +
        '<span class="scorecard-venue">Low engagement</span>' +
        '<span class="scorecard-par">&le; ' + LOW_SIGNUP_THRESHOLD + ' signups</span>' +
      '</div>' +
      '<div class="scorecard-num' + (lowCount === 0 ? ' is-zero' : '') + '">' + lowCount + '</div>' +
      '<div class="scorecard-label">need attention</div>' +
      '<div class="scorecard-bar">' +
        '<div class="scorecard-bar-fill" style="width:100%;background:var(--amber-400);"></div>' +
      '</div>' +
      '<div class="scorecard-pct">includes unset home venues</div>' +
    '</div>';

    strip.innerHTML = html;
    // Wire click handlers — venue tiles open the venue roster, low-engagement
    // tile opens the same roster modal in low-engagement mode.
    var venueCards = strip.querySelectorAll('[data-roster-venue]');
    for (var i = 0; i < venueCards.length; i++) {
      venueCards[i].addEventListener('click', function(ev) {
        var v = ev.currentTarget.getAttribute('data-roster-venue');
        if (v) openRosterModal(v);
      });
    }
    var lowCard = strip.querySelector('[data-roster-low-engagement]');
    if (lowCard) {
      lowCard.addEventListener('click', function() {
        openLowEngagementModal();
      });
    }
  }

  // -------------------------------------------------------------
  // ROW EVENT HANDLERS
  // -------------------------------------------------------------
  function onVenueChange(e) {
    var select = e.currentTarget;
    var empId = select.getAttribute('data-emp-id');
    var newValue = select.value || null;
    var statusEl = document.querySelector('[data-status-for="' + empId + '"]');

    var emp = state.employees.find(function(x) { return x.id === empId; });
    if (!emp) return;
    var previousValue = emp.home_venue;

    if (statusEl) {
      statusEl.textContent = 'Saving…';
      statusEl.className = 'row-status saving';
    }

    patchEmployee(empId, { home_venue: newValue }).then(function() {
      // Log the change to the audit table. Fire-and-forget — even if
      // logging fails, the underlying save already succeeded.
      logCardChange(empId, 'home_venue', previousValue, newValue);
      emp.home_venue = newValue;
      if (statusEl) {
        statusEl.textContent = 'Saved';
        statusEl.className = 'row-status saved';
        setTimeout(function() {
          if (statusEl) {
            statusEl.textContent = '';
            statusEl.className = 'row-status';
          }
        }, 1400);
      }
      showToast('Saved', 'success');
      setTimeout(function() {
        renderList();
        renderCounts();
        renderScorecard();
      }, 600);
    }).catch(function(err) {
      if (err && err.authFailed) { handleAuthFailure(); return; }
      console.error('Save failed:', err);
      select.value = previousValue || '';
      if (statusEl) {
        statusEl.textContent = 'Failed';
        statusEl.className = 'row-status error';
        setTimeout(function() {
          if (statusEl) {
            statusEl.textContent = '';
            statusEl.className = 'row-status';
          }
        }, 2200);
      }
      showToast('Save failed — try again', 'error');
    });
  }

  function onSearchInput(e) {
    state.filter = (e.target.value || '').toLowerCase().trim();
    renderList();
    renderCounts();
  }

  // ============================================================
  // CARD MODAL
  // ============================================================

  function openCardModal(empId) {
    state.modalEmpId = empId;
    state.modalSection = null;
    state.modalEditDraft = null;
    state.onboardingOpen = false;
    state.historyOpen = false;
    state.signupsOpen = false;
    // Performance Signals defaults: open for cold-start (so the manager
    // sees rating progress immediately), closed otherwise (rating is in
    // the header — breakdown is on demand).
    state.psSignalsOpen = false;
    var emp = state.employees.find(function(x) { return x.id === empId; });
    if (emp) {
      var cand = getCandidateForEmployee(emp);
      try {
        var r = computeEmployeeRating(emp, cand, {
          placements: state.placements,
          signups: state.signups,
          verifiedAttendance: state.verifiedAttendance,
          eventsById: state.eventsById,
          eventsWithSignin: state.eventsWithSignin
        });
        if (r && r.coldStart) state.psSignalsOpen = true;
      } catch (e) { /* leave default */ }

      // If this employee completed the onboarding form, lazy-load their
      // submission row so the questions_text can render and cert URLs
      // are ready when a manager clicks "View cert". Fires once per card
      // open (cache prevents repeat fetches). Triggered only when the
      // employee actually has a submission to fetch — i.e., their
      // candidate row shows onboarding_training_complete = true.
      var hasSubmission = cand && cand.onboarding_training_complete === true;
      if (hasSubmission && !state.cardSubmissionByEmpId.hasOwnProperty(empId)) {
        loadSubmissionForEmployee(empId).then(function() {
          // Re-render so the questions_text block shows up. If the modal
          // was closed before the fetch resolved (unlikely but possible),
          // this is a no-op.
          if (state.modalEmpId === empId) renderCardModal();
        });
      }

      // Lazy-load this employee's per-venue role assignments
      // (employee_venue_roles) so the Roles & venues section renders real
      // per-venue data. Cached in state.evrByEmpId; fetched once per
      // employee per session. Re-renders when it lands.
      if (!state.evrByEmpId.hasOwnProperty(empId)) {
        pcRoles.getEmployeeVenueRoles(empId).then(function(rows) {
          state.evrByEmpId[empId] = rows || [];
          if (state.modalEmpId === empId) renderCardModal();
        }).catch(function(err) {
          if (err && err.authFailed) { handleAuthFailure(); return; }
          console.warn('Employee venue roles fetch failed (non-blocking):', err);
          state.evrByEmpId[empId] = [];
          if (state.modalEmpId === empId) renderCardModal();
        });
      }
    }
    renderCardModal();
  }

  function closeCardModal() {
    state.modalEmpId = null;
    state.modalSection = null;
    state.modalEditDraft = null;
    document.getElementById('cardModalRoot').innerHTML = '';
  }

  function renderCardModal() {
    var root = document.getElementById('cardModalRoot');
    // Preserve the modal's internal scroll across re-renders. Without this,
    // toggling any collapsible (Performance Signals, Signups, history,
    // onboarding) snaps the viewport to the top of the card. The actual
    // scrolling container is .modal-overlay (modal-box has overflow:hidden).
    var prevOverlay = root.querySelector('.modal-overlay');
    var prevScroll = prevOverlay ? prevOverlay.scrollTop : 0;
    if (!state.modalEmpId) { root.innerHTML = ''; return; }
    var emp = state.employees.find(function(x) { return x.id === state.modalEmpId; });
    if (!emp) { closeCardModal(); return; }
    var cand = getCandidateForEmployee(emp);

    var html =
      '<div class="modal-overlay" data-modal-bg>' +
        '<div class="modal-box">' +
          renderCardHeader(emp, cand) +
          renderContactSection(emp, cand) +
          renderPerformanceSignalsSection(emp, cand) +
          renderHomeVenueSection(emp) +
          renderSignupsSection(emp) +
          renderRolesSection(emp, cand) +
          renderAlcoholTrainingSection(emp) +
          renderNotesSection(emp, cand) +
          renderHistorySection(emp) +
          renderOnboardingSection(emp, cand) +
          renderCardFooter(emp, cand) +
        '</div>' +
      '</div>';
    root.innerHTML = html;

    // Restore scroll position on the freshly-built modal-overlay.
    var newOverlay = root.querySelector('.modal-overlay');
    if (newOverlay && prevScroll > 0) {
      newOverlay.scrollTop = prevScroll;
    }

    // Close handlers — backdrop click, X button, escape key.
    var bg = root.querySelector('[data-modal-bg]');
    if (bg) {
      bg.addEventListener('click', function(ev) {
        if (ev.target === bg) closeCardModal();
      });
    }
    wireCardModalEvents(emp, cand);
  }

  function renderCardHeader(emp, cand) {
    var name = fullName(emp);
    var initials = getInitials(emp.first_name, emp.last_name);
    var isLegacy = cand && cand.legacy_import === true;
    var isMinor = cand && cand.is_minor === true;
    var statusPill = emp.is_active
      ? '<span class="status-pill active">Active</span>'
      : '<span class="status-pill inactive">Inactive</span>';
    var minorPill = isMinor ? '<span class="status-pill minor">Minor</span>' : '';
    var legacyPill = isLegacy ? '<span class="status-pill legacy">Legacy</span>' : '';

    // Sub-line: prefer hire date if known, otherwise applied date, otherwise nothing.
    var sub = '';
    if (cand) {
      if (cand.hired_at && !isLegacy) {
        sub = 'Hired ' + formatDate(cand.hired_at);
      } else if (cand.applied_at && !isLegacy) {
        sub = 'Applied ' + formatDate(cand.applied_at);
      } else if (isLegacy) {
        sub = 'Legacy employee';
      }
    }
    var subPill = sub ? '<span class="status-pill" style="background:#fff;color:var(--muted);">' + escapeHtml(sub) + '</span>' : '';

    // Determine venue tint. homeVenueOf normalizes 'NA' to null, but for the
    // hero we look at the raw value too: 'NA' and null both fall into the
    // neutral "no venue" treatment. Only a real venue code drives tint.
    var hv = emp.home_venue;
    var hasVenue = !!(hv && hv !== 'NA');
    var venueColor = hasVenue ? (VENUE_COLORS[hv] || '#666') : null;
    var venueLabel = hasVenue ? (VENUE_LABELS[hv] || hv) : null;
    var heroBg = hasVenue ? hexToRgba(venueColor, 0.12) : null;
    var heroClass = hasVenue ? 'card-header-hero' : 'card-header-hero no-venue';
    var heroStyle = hasVenue ? ' style="background:' + heroBg + ';"' : '';

    // Avatar inherits the venue color when present.
    var avatarStyle = hasVenue
      ? ' style="color:' + venueColor + ';border:1px solid ' + hexToRgba(venueColor, 0.4) + ';"'
      : ' style="color:var(--muted);border:1px solid var(--border);"';

    // Venue line under the name. "FMP — home component" for the venue case;
    // "Home component not set" for null; "Home component: doesn't apply" for NA.
    var venueLineHtml = '';
    if (hasVenue) {
      venueLineHtml = '<div class="card-hero-venue-line" style="color:' + venueColor + ';">' +
        escapeHtml(venueLabel) +
        ' &middot; home component</div>';
    } else if (hv === 'NA') {
      venueLineHtml = '<div class="card-hero-venue-line no-venue">Home component: doesn\'t apply</div>';
    } else {
      venueLineHtml = '<div class="card-hero-venue-line no-venue">Home component not set</div>';
    }

    // Rating box. NR for cold-start or no rating data; numeric otherwise.
    var ratingHtml = renderHeroRating(emp, cand, hasVenue, venueColor);

    return '<div class="' + heroClass + '"' + heroStyle + '>' +
      '<div class="avatar"' + avatarStyle + '>' + initials + '</div>' +
      '<div class="card-header-info">' +
        '<div class="card-header-name">' + escapeHtml(name) + minorPill + legacyPill + '</div>' +
        venueLineHtml +
        '<div class="card-hero-pills">' + statusPill + subPill + '</div>' +
      '</div>' +
      ratingHtml +
      '<button class="card-header-close" data-close-modal title="Close">&times;</button>' +
    '</div>';
  }

  // Renders the small rating tile in the top-right of the hero. Uses the
  // existing computeEmployeeRating engine so values match the
  // Performance Signals section verbatim. Returns "NR" for cold-start.
  function renderHeroRating(emp, cand, hasVenue, venueColor) {
    var ratingData = {
      placements: state.placements,
      signups: state.signups,
      verifiedAttendance: state.verifiedAttendance,
      eventsById: state.eventsById,
      eventsWithSignin: state.eventsWithSignin
    };
    var rating;
    try {
      rating = computeEmployeeRating(emp, cand, ratingData);
    } catch (e) {
      // Defensive: never block the card header on a rating-engine error.
      rating = { coldStart: true };
    }
    var isNR = rating.coldStart || rating.stars == null;
    var labelColor, numColor, borderColor;
    if (hasVenue) {
      borderColor = hexToRgba(venueColor, 0.4);
      labelColor = venueColor;
      numColor = isNR ? null : venueColor;
    } else {
      borderColor = null;
      labelColor = null;
      numColor = null;
    }
    var boxStyle = borderColor ? ' style="border-color:' + borderColor + ';"' : '';
    var labelClass = hasVenue ? 'card-hero-rating-label' : 'card-hero-rating-label no-venue';
    var labelStyle = labelColor ? ' style="color:' + labelColor + ';"' : '';
    var numClass = isNR ? 'card-hero-rating-num is-nr' : 'card-hero-rating-num';
    var numStyle = numColor ? ' style="color:' + numColor + ';"' : '';
    var numText = isNR ? 'NR' : rating.stars.toFixed(1);
    return '<div class="card-hero-rating"' + boxStyle + '>' +
      '<div class="' + labelClass + '"' + labelStyle + '>Rating</div>' +
      '<div class="' + numClass + '"' + numStyle + '>' + numText + '</div>' +
    '</div>';
  }

  // ---- Performance Signals (open-by-default, internal-only) ----
  // The page is gated by manager auth (pageSlug: 'crew'), so any
  // viewer here is permitted to see this. No additional gating in-card.
  function renderPerformanceSignalsSection(emp, cand) {
    // Compute the rating fresh on every render. The engine is fast (pure
    // function over already-loaded arrays) so the cost is negligible vs. the
    // simplicity of always-fresh data.
    var ratingData = {
      placements: state.placements,
      signups: state.signups,
      verifiedAttendance: state.verifiedAttendance,
      eventsById: state.eventsById,
      eventsWithSignin: state.eventsWithSignin
    };
    var rating;
    try {
      rating = computeEmployeeRating(emp, cand, ratingData);
    } catch (e) {
      rating = { coldStart: true, countablePlacements: 0, shiftsNeededForRating: COLD_START_THRESHOLD };
    }

    var open = state.psSignalsOpen;
    var isCold = !!rating.coldStart;

    // Section header label tracks the rating state.
    //   Established → "Why N.N?" (refers back to the header rating box)
    //   Cold-start  → "Rating progress" (shows the progress bar / new-hire line)
    var label = isCold
      ? 'Rating progress'
      : 'Why ' + rating.stars.toFixed(1) + '?';

    var bodyHtml = isCold
      ? renderPSColdStartBody(rating)
      : renderPSEstablishedBody(rating);

    return '<div class="card-section">' +
      '<div class="card-section-head collapsible" data-ps-toggle>' +
        '<span class="section-title">' + escapeHtml(label) + '</span>' +
        '<button class="expand-chevron' + (open ? ' open' : '') + '" type="button" tabindex="-1">' +
          '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
            '<polyline points="9 18 15 12 9 6"></polyline>' +
          '</svg>' +
          (open ? 'Hide' : 'Show') +
        '</button>' +
      '</div>' +
      (open ? bodyHtml : '') +
    '</div>';
  }

  // Established body: keep the existing factor breakdown + summary line,
  // but skip the big star headline since the header already shows the rating.
  function renderPSEstablishedBody(rating) {
    var summaryHtml = '<div class="card-subcard" style="margin-bottom:10px;">' +
      '<div style="font-size:12px;color:var(--text);line-height:1.5;">' +
        renderPSSummaryLine(rating) +
      '</div>' +
    '</div>';
    var factorTableHtml = renderPSFactorTable(rating);
    var supplementaryHtml = renderPSSupplementary(rating);
    return summaryHtml + factorTableHtml + supplementaryHtml;
  }

  // Cold-start body: progress bar (or new-hire line if zero shifts logged)
  // plus a short explainer. Replaces the legacy ColdStartHeadline + factor
  // table treatment for the redesigned card.
  function renderPSColdStartBody(rating) {
    var have = rating.countablePlacements || 0;
    var need = rating.shiftsNeededForRating != null
      ? rating.shiftsNeededForRating
      : COLD_START_THRESHOLD;
    if (have <= 0) {
      // Brand new — softer treatment, no progress bar.
      return '<div class="card-subcard">' +
        '<div class="ps-newhire-line">' +
          '<div class="ps-newhire-icon">' +
            '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
          '</div>' +
          '<div>' +
            '<div class="ps-newhire-strong">Building rating</div>' +
            '<div class="ps-newhire-sub">Needs ' + COLD_START_THRESHOLD + ' countable shifts to unlock.</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }
    // Has some shifts but under threshold.
    var pct = Math.min(100, Math.round((have / COLD_START_THRESHOLD) * 100));
    return '<div class="card-subcard">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;">' +
        '<span style="color:var(--muted);">' + have + ' of ' + COLD_START_THRESHOLD + ' shifts toward rating</span>' +
        '<span style="font-weight:600;color:var(--muted);">' + pct + '%</span>' +
      '</div>' +
      '<div class="ps-progress-track">' +
        '<div class="ps-progress-fill" style="width:' + pct + '%;background:var(--green-600,#1D9E75);"></div>' +
      '</div>' +
      '<div class="ps-progress-meta">' +
        need + ' more shift' + (need === 1 ? '' : 's') + ' until the full rating unlocks. ' +
        'Until then, the breakdown is held back to avoid early outliers.' +
      '</div>' +
    '</div>';
  }

  // Score headline (full rating available — 8+ countable placements).
  function renderPSScoreHeadline(rating) {
    var stars = renderPSStars(rating.stars);
    // Build a one-liner summary that highlights what's driving the score.
    var summaryHtml = renderPSSummaryLine(rating);
    return '<div class="ps-headline">' +
      '<div class="ps-stars-block">' +
        '<div class="ps-stars">' + stars + '</div>' +
        '<div class="ps-score-num">' + rating.stars.toFixed(1) +
          '<span class="ps-score-out-of">/ 5.0 &middot; ' + rating.overall + '/100</span>' +
        '</div>' +
      '</div>' +
      '<div class="ps-summary">' + summaryHtml + '</div>' +
    '</div>';
  }

  // Cold-start headline — shown when an employee has fewer than
  // COLD_START_THRESHOLD countable placements. Communicates "we don't
  // have enough data yet" without scoring them as a 0.
  function renderPSColdStartHeadline(rating) {
    var have = rating.countablePlacements;
    var need = rating.shiftsNeededForRating;
    return '<div class="ps-headline is-coldstart">' +
      '<div class="ps-coldstart-icon">!</div>' +
      '<div class="ps-coldstart-text">' +
        '<strong>Insufficient data — ' + need + ' more shift' + (need === 1 ? '' : 's') + ' needed</strong>' +
        'Verified placement count: ' + have + ' of ' + COLD_START_THRESHOLD + '. ' +
        'Factor data accumulates below as shifts are worked and sign-in sheets are uploaded.' +
      '</div>' +
    '</div>';
  }

  // Render N stars where N is 0.0–5.0 with one decimal of precision.
  function renderPSStars(stars) {
    if (stars == null) return '';
    var full = Math.floor(stars);
    var frac = stars - full;
    var html = '';
    for (var i = 0; i < 5; i++) {
      if (i < full) {
        html += '<span>&#9733;</span>'; // ★
      } else if (i === full && frac >= 0.25 && frac < 0.75) {
        html += '<span class="ps-star-half">&#9733;</span>';
      } else if (i === full && frac >= 0.75) {
        html += '<span>&#9733;</span>';
      } else {
        html += '<span class="ps-star-empty">&#9733;</span>';
      }
    }
    return html;
  }

  // One-liner summary highlighting top contributors up and down.
  // Picks the highest- and lowest-scoring active factors (ignores NA).
  function renderPSSummaryLine(rating) {
    var factors = rating.factors;
    var active = [];
    Object.keys(factors).forEach(function(key) {
      var f = factors[key];
      if (f.score == null) return;
      if (!f.weight) return;
      active.push({ key: key, score: f.score, label: PS_FACTOR_LABELS[key] });
    });
    if (active.length === 0) {
      return '<strong>Rating computed from limited data.</strong> Most factors are still accumulating.';
    }
    active.sort(function(a, b) { return b.score - a.score; });
    var top = active[0];
    var bottom = active[active.length - 1];
    if (top === bottom || active.length === 1) {
      return 'Driven by <strong>' + escapeHtml(top.label) + '</strong> (' + top.score + '/100). ' +
        'Other factors below have insufficient data to score.';
    }
    return 'Strongest: <strong>' + escapeHtml(top.label) + '</strong> (' + top.score + '/100). ' +
      'Weakest: <strong>' + escapeHtml(bottom.label) + '</strong> (' + bottom.score + '/100).';
  }

  // Display labels for each factor key. Kept short so they fit comfortably
  // in the factor table even on mobile.
  var PS_FACTOR_LABELS = {
    reliability: 'Reliability',
    signupVolume: 'Signup volume',
    homeVenueEngagement: 'Home-venue engagement',
    eventTier: 'Event tier weighting',
    tenure: 'Tenure',
    lastMinuteAttendance: 'Last-minute attendance',
    signupLeadTime: 'Signup lead time'
  };

  // Order factors from most to least influential by weight, putting
  // zero-weight stubs (event tier) last so they don't visually dominate.
  var PS_FACTOR_ORDER = [
    'reliability',
    'signupLeadTime',
    'homeVenueEngagement',
    'signupVolume',
    'lastMinuteAttendance',
    'tenure',
    'eventTier'
  ];

  // Build the factor breakdown table. Each row shows the factor name, a
  // short raw-data description ("28 of 30 verified", "5 of 25 home events"),
  // the score, and a colored bar.
  function renderPSFactorTable(rating) {
    // Identify top contributors up and down so we can highlight them.
    var topUp = null, topDown = null;
    var active = [];
    PS_FACTOR_ORDER.forEach(function(key) {
      var f = rating.factors[key];
      if (f.score != null && f.weight > 0) active.push({ key: key, score: f.score });
    });
    if (active.length >= 2) {
      var sorted = active.slice().sort(function(a, b) { return b.score - a.score; });
      topUp = sorted[0].key;
      topDown = sorted[sorted.length - 1].key;
    }

    var rows = '';
    PS_FACTOR_ORDER.forEach(function(key) {
      rows += renderPSFactorRow(key, rating.factors[key], rating, topUp, topDown);
    });
    return '<div class="ps-factor-table">' + rows + '</div>';
  }

  // Single factor row.
  function renderPSFactorRow(key, factor, rating, topUp, topDown) {
    var label = PS_FACTOR_LABELS[key];
    var detail = renderPSFactorDetail(key, factor, rating);
    var isNA = factor.score == null;
    var rowClass = 'ps-factor-row';
    var tagHtml = '';
    if (isNA) {
      rowClass += ' is-na';
    } else if (key === topUp && factor.weight > 0) {
      rowClass += ' is-top-up';
      tagHtml = '<span class="ps-factor-tag up">Strongest</span>';
    } else if (key === topDown && factor.weight > 0) {
      rowClass += ' is-top-down';
      tagHtml = '<span class="ps-factor-tag down">Weakest</span>';
    }

    var scoreCellHtml;
    if (isNA) {
      scoreCellHtml = '<div class="ps-factor-score is-na">NA</div>';
    } else {
      var weightLabel = factor.weight === 0
        ? '<span class="ps-weight">stub &middot; 0% weight</span>'
        : '<span class="ps-weight">' + factor.weight + '% weight</span>';
      scoreCellHtml = '<div class="ps-factor-score">' +
        factor.score + '<span style="font-size:11px;color:var(--muted);font-weight:500;"> / 100</span>' +
        weightLabel +
      '</div>';
    }

    var barHtml = '';
    if (!isNA && factor.weight > 0) {
      var fillClass = factor.score >= 70 ? 'high' : (factor.score >= 40 ? 'mid' : 'low');
      var pct = Math.max(0, Math.min(100, factor.score));
      barHtml = '<div class="ps-factor-bar"><div class="ps-factor-bar-fill ' + fillClass + '" style="width:' + pct + '%;"></div></div>';
    }

    return '<div class="' + rowClass + '">' +
      '<div class="ps-factor-main">' +
        '<div class="ps-factor-name">' + escapeHtml(label) + tagHtml + '</div>' +
        '<div class="ps-factor-detail' + (isNA ? ' na-text' : '') + '">' + detail + '</div>' +
        barHtml +
      '</div>' +
      scoreCellHtml +
    '</div>';
  }

  // Per-factor raw-data line. Reads from factor.raw and renders a short,
  // readable description of what's driving the score.
  function renderPSFactorDetail(key, factor, rating) {
    if (factor.naReason) {
      return escapeHtml(factor.naReason);
    }
    var r = factor.raw || {};
    if (key === 'reliability') {
      var bs = r.bySource || {};
      return r.showed + ' of ' + r.countable + ' verified shifts attended. ' +
        '<span style="color:var(--muted);">' +
          (bs.signupShowed || 0) + ' signup&rarr;showed, ' +
          (bs.manualShowed || 0) + ' manual&rarr;showed, ' +
          (bs.signupNoShow || 0) + ' signup no-show, ' +
          (bs.manualNoShow || 0) + ' manual no-show' +
        '</span>';
    }
    if (key === 'signupVolume') {
      return r.signupCount + ' signups across ' + r.weeksActive + ' weeks ' +
        '(' + r.signupsPerWeek + '/wk &middot; baseline ' + SIGNUPS_PER_WEEK_BASELINE + '/wk)';
    }
    if (key === 'homeVenueEngagement') {
      return 'Signed up for <strong>' + r.signedUp + ' of ' + r.totalHomeEvents + '</strong> ' +
        escapeHtml(r.homeVenue) + ' events since system start';
    }
    if (key === 'eventTier') {
      return 'Will activate when event tiering is configured';
    }
    if (key === 'tenure') {
      var lc = r.legacyClampApplied
        ? ' <span style="color:var(--muted);">(legacy clamp &mdash; tenure starts at system start)</span>'
        : '';
      return r.daysSinceSystemStart + ' days active &middot; ' + r.totalPlacements + ' total placements' + lc;
    }
    if (key === 'lastMinuteAttendance') {
      return r.attended + ' of ' + r.total + ' last-minute (T&minus;24h) placements attended';
    }
    if (key === 'signupLeadTime') {
      var d = r.distribution || {};
      var dist = '30+: ' + (d['30+']||0) + ' &middot; 14&ndash;29: ' + (d['14-29']||0) +
        ' &middot; 7&ndash;13: ' + (d['7-13']||0) +
        ' &middot; 3&ndash;6: ' + (d['3-6']||0) +
        ' &middot; <3: ' + ((d['1-2']||0) + (d['<1']||0));
      var skipped = r.skippedForOpportunity > 0
        ? ' <span style="color:var(--muted);">(' + r.skippedForOpportunity + ' skipped for short opportunity window)</span>'
        : '';
      return r.countedSignups + ' signups counted &middot; <span style="color:var(--muted);">' + dist + ' days ahead</span>' + skipped;
    }
    return '';
  }

  // Supplementary lines: placement mix, unverified placement warning, walk-on warning.
  function renderPSSupplementary(rating) {
    var lines = [];
    var mix = rating.placementMix;
    var totalPlacements = mix.signup + mix.manual + mix.placeholder;
    if (totalPlacements > 0) {
      var parts = [];
      parts.push('<strong>' + mix.signup + '</strong> from signups');
      parts.push('<strong>' + mix.manual + '</strong> manager-added');
      if (mix.placeholder > 0) parts.push('<strong>' + mix.placeholder + '</strong> placeholders');
      lines.push('<div class="ps-supp-row">' +
        '<svg class="ps-supp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>' +
        'Placement mix: ' + parts.join(' &middot; ') +
      '</div>');
    }
    if (rating.unverifiedPlacementCount > 0) {
      var n = rating.unverifiedPlacementCount;
      lines.push('<div class="ps-supp-row warn">' +
        '<svg class="ps-supp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>' +
        '<span><strong>' + n + ' placement' + (n === 1 ? '' : 's') + '</strong> at past events with no sign-in sheet uploaded &mdash; reliability not yet computable for those</span>' +
      '</div>');
    }
    if (rating.walkOnCount > 0) {
      var w = rating.walkOnCount;
      lines.push('<div class="ps-supp-row warn">' +
        '<svg class="ps-supp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>' +
        '<span><strong>' + w + ' sign-in appearance' + (w === 1 ? '' : 's') + '</strong> with no matching placement &mdash; flag for manager review</span>' +
      '</div>');
    }
    if (lines.length === 0) return '';
    return '<div class="ps-supplementary">' + lines.join('') + '</div>';
  }
