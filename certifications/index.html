<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certifications — Popcorn Chez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F3EF;
  --surface: #FFFFFF;
  --text: #1a1a1a;
  --muted: #888;
  --light: #bbb;
  --border: #E8E8E4;
  --border-lt: #F0F0EC;
  --green-50: #EAF3DE;
  --green-100: #d8eac0;
  --green-600: #3B6D11;
  --green-800: #27500A;
  --amber-50: #fffbeb;
  --amber-100: #fef3c7;
  --amber-400: #BA7517;
  --amber-600: #854F0B;
  --amber-700: #92400e;
  --amber-800: #633806;
  --red-50: #fef2f2;
  --red-100: #fee2e2;
  --red-600: #c0392b;
  --red-700: #991b1b;
  --blue-600: #185fa5;
  --blue-50: #e6f1fb;
  --blue-100: #b5d4f4;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Top bar — sticky, matches home-components */
.top-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.top-bar .back-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  text-decoration: none;
  padding: 4px 8px;
  border-radius: 6px;
}
.top-bar .back-link:hover { color: var(--text); background: var(--bg); }
.top-bar .vdivider { width: 1px; height: 18px; background: var(--border); }
.brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
.brand-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; background: var(--text); color: white;
  padding: 3px 8px; border-radius: 20px;
}
.topbar-spacer { flex: 1; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-user { font-size: 12px; color: #999; font-weight: 500; }
.sign-out-btn {
  font-size: 11px; color: var(--red-600); background: none;
  border: 1px solid #f0c0c0; padding: 4px 10px; border-radius: 6px;
  cursor: pointer; font-weight: 600;
}
.sign-out-btn:hover { background: var(--red-50); }

/* Page shell */
.page { max-width: 1240px; margin: 0 auto; padding: 28px 24px 60px; }
.page-head { margin-bottom: 18px; display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.page-head .title-block h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
.page-head .title-block p { font-size: 13px; color: var(--muted); margin-top: 4px; }
.page-head .head-actions { display: flex; gap: 8px; }

.btn {
  font-family: inherit; font-size: 13px; font-weight: 600;
  padding: 8px 14px; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background 0.12s, border-color 0.12s;
}
.btn:hover { background: var(--bg); }
.btn-primary {
  background: var(--green-600); color: white; border-color: var(--green-600);
}
.btn-primary:hover { background: var(--green-800); border-color: var(--green-800); }
.btn-sm { font-size: 12px; padding: 5px 10px; border-radius: 6px; }
.btn-link {
  background: none; border: none; color: var(--blue-600); font-weight: 600;
  font-size: 12px; cursor: pointer; padding: 0;
}
.btn-link:hover { text-decoration: underline; }
.btn-danger { color: var(--red-600); border-color: #f0c0c0; }
.btn-danger:hover { background: var(--red-50); }

/* Stats strip */
.stats-strip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 28px;
  flex-wrap: wrap;
}
.stat-item { display: flex; align-items: baseline; gap: 6px; }
.stat-num { font-size: 20px; font-weight: 700; }
.stat-num.green { color: var(--green-600); }
.stat-num.amber { color: var(--amber-600); }
.stat-num.red { color: var(--red-600); }
.stat-label { font-size: 12px; color: var(--muted); font-weight: 500; }
.stat-divider { width: 1px; height: 22px; background: var(--border); }

/* Filter bar */
.filter-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 14px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-bar select, .filter-bar input[type="text"] {
  font-family: inherit; font-size: 13px;
  padding: 7px 10px; border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  outline: none;
}
.filter-bar select { cursor: pointer; }
.filter-bar input[type="text"]:focus, .filter-bar select:focus {
  border-color: var(--green-600);
}
.filter-bar .toggle-group {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted); font-weight: 500;
}
.filter-bar .toggle-group input[type="checkbox"] { cursor: pointer; }
.filter-bar .filter-spacer { flex: 1; }
.filter-bar .clear-btn {
  font-size: 11px; color: var(--muted); background: none;
  border: none; cursor: pointer; padding: 4px 8px; font-weight: 600;
}
.filter-bar .clear-btn:hover { color: var(--text); }

/* Table */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
table.certs-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.certs-table thead th {
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 12px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.certs-table tbody tr { border-bottom: 1px solid var(--border-lt); }
.certs-table tbody tr:last-child { border-bottom: none; }
.certs-table tbody tr:hover { background: #fbfaf6; }
.certs-table td { padding: 12px 14px; vertical-align: middle; }
.certs-table .col-emp { font-weight: 600; }
.certs-table .col-emp .inactive-tag {
  font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--muted); background: var(--bg); border: 1px solid var(--border);
  padding: 2px 6px; border-radius: 4px; text-transform: uppercase;
  margin-left: 6px;
}
.certs-table .col-type { font-weight: 600; }
.certs-table .col-state {
  display: inline-block;
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--muted);
  padding: 2px 6px; border-radius: 4px; margin-left: 6px;
}
.certs-table .col-actions { white-space: nowrap; text-align: right; }
.certs-table .col-actions button { margin-left: 4px; }

/* Status pill */
.status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700;
  padding: 3px 9px; border-radius: 999px;
  letter-spacing: 0.04em;
}
.status-pill.valid    { background: var(--green-100); color: var(--green-800); }
.status-pill.expiring { background: var(--amber-100); color: var(--amber-800); }
.status-pill.expired  { background: var(--red-100);   color: var(--red-700); }
.status-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* Empty + loading */
.empty, .loading {
  text-align: center; padding: 60px 20px; color: var(--muted);
}
.empty .empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.empty .empty-msg { font-size: 13px; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  padding: 20px;
}
.modal {
  background: var(--surface);
  border-radius: 12px;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.modal-head {
  padding: 18px 22px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.modal-head h2 { font-size: 17px; font-weight: 700; }
.modal-close {
  background: none; border: none; font-size: 22px; line-height: 1;
  color: var(--muted); cursor: pointer; padding: 0 4px;
}
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px 22px; }
.modal-foot {
  padding: 14px 22px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px;
}
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 5px;
}
.field label .req { color: var(--red-600); }
.field input, .field select, .field textarea {
  width: 100%; font-family: inherit; font-size: 14px;
  padding: 8px 10px; border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  outline: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--green-600);
}
.field textarea { resize: vertical; min-height: 60px; }
.field-help { font-size: 11px; color: var(--muted); margin-top: 4px; }
.field-error {
  font-size: 12px; color: var(--red-600); margin-top: 6px;
  display: none;
}
.field-error.show { display: block; }

/* Employee typeahead */
.typeahead { position: relative; }
.typeahead-results {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 7px;
  margin-top: 4px;
  max-height: 220px;
  overflow-y: auto;
  z-index: 10;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  display: none;
}
.typeahead-results.show { display: block; }
.typeahead-item {
  padding: 8px 10px; cursor: pointer;
  font-size: 13px;
  border-bottom: 1px solid var(--border-lt);
}
.typeahead-item:last-child { border-bottom: none; }
.typeahead-item:hover, .typeahead-item.active { background: var(--bg); }
.typeahead-item .ta-sub { font-size: 11px; color: var(--muted); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: white;
  padding: 10px 18px; border-radius: 8px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: opacity 0.2s;
  z-index: 300;
  pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.error { background: var(--red-600); }
.toast.success { background: var(--green-600); }

/* Confirm modal */
.confirm-text { font-size: 14px; line-height: 1.5; }
.confirm-text strong { font-weight: 700; }

@media (max-width: 720px) {
  .certs-table thead th.col-issued, .certs-table tbody td.col-issued { display: none; }
  .certs-table thead th.col-state-col, .certs-table tbody td.col-state-col { display: none; }
}
</style>
</head>
<body>

<!-- Header + ribbon + back-to-top injected by pc-nav.js -->
<!-- Activity tracking (page_load / heartbeat / page_unload) handled by pc-activity.js -->

<div class="page">
  <div class="page-head">
    <div class="title-block">
      <h1>Certifications</h1>
      <p>Track who has what certification and when it expires.</p>
    </div>
    <div class="head-actions">
      <button class="btn" id="exportBtn">Export CSV</button>
      <button class="btn btn-primary" id="addBtn">+ Add certification</button>
    </div>
  </div>

  <div class="stats-strip" id="statsStrip"></div>

  <div class="filter-bar">
    <select id="filterCategory">
      <option value="">All categories</option>
    </select>
    <select id="filterType">
      <option value="">All types</option>
    </select>
    <select id="filterStatus">
      <option value="">All statuses</option>
      <option value="valid">Valid</option>
      <option value="expiring">Expiring soon (≤30d)</option>
      <option value="expired">Expired</option>
    </select>
    <input type="text" id="filterSearch" placeholder="Search employee name..." />
    <label class="toggle-group">
      <input type="checkbox" id="filterActiveOnly" checked />
      Active employees only
    </label>
    <span class="filter-spacer"></span>
    <button class="clear-btn" id="clearFilters">Clear filters</button>
  </div>

  <div class="table-wrap" id="tableWrap">
    <div class="loading">Loading certifications…</div>
  </div>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script src="/pc-auth.js"></script>
<script src="/pc-nav.js"></script>
<script src="/pc-activity.js"></script>
<script>
(function() {
  'use strict';

  // -------------------------------------------------------------
  // CONFIG
  // -------------------------------------------------------------
  var SUPABASE_URL = 'https://aoazlttdjowhlfcksoyl.supabase.co';

  // Map of cert state codes → display label.
  var STATE_LABEL = { PA: 'PA', NJ: 'NJ', DE: 'DE' };

  // Threshold for "Expiring soon" status, in days.
  var EXPIRING_SOON_DAYS = 30;

  // -------------------------------------------------------------
  // STATE
  // -------------------------------------------------------------
  var state = {
    employees: [],          // all employees, active + inactive
    employeesById: {},      // lookup by id
    certTypes: [],          // active cert types from cert_types table
    certTypesById: {},      // lookup by id
    certs: [],              // employee_certifications rows (not removed)
    user: null,
    filters: {
      category: '',
      type: '',
      status: '',
      search: '',
      activeOnly: true
    },
    modal: null,            // { kind, data }
    typeaheadActive: -1     // index of highlighted typeahead result
  };

  // -------------------------------------------------------------
  // UTILS
  // -------------------------------------------------------------
  function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function todayISO() {
    var d = new Date();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + m + '-' + day;
  }

  // Returns whole days from today to date (negative = past)
  function daysFromToday(isoDate) {
    if (!isoDate) return null;
    var t = new Date(todayISO() + 'T00:00:00');
    var d = new Date(isoDate + 'T00:00:00');
    return Math.round((d - t) / 86400000);
  }

  function formatDate(iso) {
    if (!iso) return '';
    var d = new Date(iso + 'T00:00:00');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function statusFromExpires(isoDate) {
    if (!isoDate) return { kind: 'unknown', label: 'No expiration', sub: '' };
    var diff = daysFromToday(isoDate);
    if (diff < 0) {
      return {
        kind: 'expired',
        label: 'Expired',
        sub: 'Expired ' + Math.abs(diff) + (Math.abs(diff) === 1 ? ' day ago' : ' days ago')
      };
    }
    if (diff <= EXPIRING_SOON_DAYS) {
      return {
        kind: 'expiring',
        label: 'Expiring soon',
        sub: diff === 0 ? 'Expires today' : 'Expires in ' + diff + (diff === 1 ? ' day' : ' days')
      };
    }
    return { kind: 'valid', label: 'Valid', sub: '' };
  }

  // 401-aware fetch wrapper, mirrors the home-components pattern.
  function authFetch(url, options) {
    return fetch(url, options).then(function(r) {
      if (r.status === 401) {
        var err = new Error('Unauthorized');
        err.authFailed = true;
        throw err;
      }
      if (!r.ok) {
        return r.text().then(function(t) {
          if (t && t.indexOf('JWT expired') !== -1) {
            var err = new Error('JWT expired');
            err.authFailed = true;
            throw err;
          }
          throw new Error(t || ('HTTP ' + r.status));
        });
      }
      return r.text().then(function(t) {
        if (!t) return [];
        try { return JSON.parse(t); } catch(e) { return []; }
      });
    });
  }

  // -------------------------------------------------------------
  // TOAST
  // -------------------------------------------------------------
  var toastTimer = null;
  function showToast(msg, kind) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (kind ? ' ' + kind : '');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
      el.className = el.className.replace(' show', '');
    }, 2200);
  }

  // -------------------------------------------------------------
  // LOAD
  // -------------------------------------------------------------
  function loadEmployees() {
    var url = SUPABASE_URL +
      '/rest/v1/employees' +
      '?select=id,first_name,last_name,punch_id,is_active,home_venue' +
      '&order=last_name.asc,first_name.asc';
    return authFetch(url, { method: 'GET', headers: pcAuth.headers() });
  }

  function loadCertTypes() {
    var url = SUPABASE_URL +
      '/rest/v1/cert_types' +
      '?select=*&active=eq.true&order=sort_order.asc';
    return authFetch(url, { method: 'GET', headers: pcAuth.headers() });
  }

  function loadCerts() {
    var url = SUPABASE_URL +
      '/rest/v1/employee_certifications' +
      '?select=*&removed_at=is.null&order=expires_at.asc.nullslast';
    return authFetch(url, { method: 'GET', headers: pcAuth.headers() });
  }

  // -------------------------------------------------------------
  // FILTERING + DERIVED LIST
  // -------------------------------------------------------------
  // Returns array of decorated cert rows with employee + cert_type joined,
  // status computed, sorted, and filters applied.
  function decoratedRows() {
    var rows = state.certs.map(function(c) {
      var emp = state.employeesById[c.employee_id] || null;
      var type = state.certTypesById[c.cert_type] || null;
      var status = statusFromExpires(c.expires_at);
      return { cert: c, emp: emp, type: type, status: status };
    });

    // Filters
    var f = state.filters;
    rows = rows.filter(function(r) {
      if (!r.emp) return false; // orphan cert (employee deleted) — skip
      if (f.activeOnly && !r.emp.is_active) return false;
      if (f.category && r.type && r.type.category !== f.category) return false;
      if (f.type && r.cert.cert_type !== f.type) return false;
      if (f.status && r.status.kind !== f.status) return false;
      if (f.search) {
        var name = ((r.emp.first_name || '') + ' ' + (r.emp.last_name || '')).toLowerCase();
        if (name.indexOf(f.search.toLowerCase()) === -1) return false;
      }
      return true;
    });

    return rows;
  }

  // -------------------------------------------------------------
  // RENDER
  // -------------------------------------------------------------
  function render() {
    renderStats();
    renderFilterDropdowns();
    renderTable();
  }

  function renderStats() {
    var rows = decoratedRows();
    var total = rows.length;
    var valid = 0, expiring = 0, expired = 0;
    rows.forEach(function(r) {
      if (r.status.kind === 'valid') valid++;
      else if (r.status.kind === 'expiring') expiring++;
      else if (r.status.kind === 'expired') expired++;
    });

    var html =
      '<div class="stat-item"><span class="stat-num">' + total + '</span>' +
      '<span class="stat-label">total</span></div>' +
      '<span class="stat-divider"></span>' +
      '<div class="stat-item"><span class="stat-num green">' + valid + '</span>' +
      '<span class="stat-label">valid</span></div>' +
      '<div class="stat-item"><span class="stat-num amber">' + expiring + '</span>' +
      '<span class="stat-label">expiring soon</span></div>' +
      '<div class="stat-item"><span class="stat-num red">' + expired + '</span>' +
      '<span class="stat-label">expired</span></div>';
    document.getElementById('statsStrip').innerHTML = html;
  }

  function renderFilterDropdowns() {
    // Category — derive from active cert types
    var catSet = {};
    state.certTypes.forEach(function(t) { catSet[t.category] = true; });
    var cats = Object.keys(catSet).sort();
    var catEl = document.getElementById('filterCategory');
    var catVal = catEl.value;
    catEl.innerHTML = '<option value="">All categories</option>' +
      cats.map(function(c) {
        var label = c.charAt(0).toUpperCase() + c.slice(1).replace(/_/g, ' ');
        return '<option value="' + escapeHtml(c) + '"' +
          (catVal === c ? ' selected' : '') + '>' + escapeHtml(label) + '</option>';
      }).join('');

    // Type — filter by selected category
    var typeEl = document.getElementById('filterType');
    var typeVal = typeEl.value;
    var visibleTypes = state.certTypes.filter(function(t) {
      return !state.filters.category || t.category === state.filters.category;
    });
    typeEl.innerHTML = '<option value="">All types</option>' +
      visibleTypes.map(function(t) {
        var label = t.display_name + (t.state ? ' (' + t.state + ')' : '');
        return '<option value="' + escapeHtml(t.id) + '"' +
          (typeVal === t.id ? ' selected' : '') + '>' + escapeHtml(label) + '</option>';
      }).join('');
  }

  function renderTable() {
    var rows = decoratedRows();
    var wrap = document.getElementById('tableWrap');

    if (rows.length === 0) {
      var anyCerts = state.certs.length > 0;
      wrap.innerHTML = '<div class="empty">' +
        '<div class="empty-title">' +
          (anyCerts ? 'No certifications match these filters' : 'No certifications yet') +
        '</div>' +
        '<div class="empty-msg">' +
          (anyCerts
            ? 'Try clearing filters or widening your search.'
            : 'Click "+ Add certification" to record one.') +
        '</div>' +
      '</div>';
      return;
    }

    // Sort: expired first (oldest expiry first), then expiring soon, then valid alphabetical by name
    rows.sort(function(a, b) {
      var order = { expired: 0, expiring: 1, valid: 2, unknown: 3 };
      var ka = order[a.status.kind], kb = order[b.status.kind];
      if (ka !== kb) return ka - kb;
      // Within same status: sort by expires_at ascending (soonest first)
      var ea = a.cert.expires_at || '9999-12-31';
      var eb = b.cert.expires_at || '9999-12-31';
      if (ea !== eb) return ea < eb ? -1 : 1;
      // Tie-break by name
      var na = ((a.emp.last_name || '') + (a.emp.first_name || '')).toLowerCase();
      var nb = ((b.emp.last_name || '') + (b.emp.first_name || '')).toLowerCase();
      return na < nb ? -1 : (na > nb ? 1 : 0);
    });

    var html = '<table class="certs-table">' +
      '<thead><tr>' +
        '<th class="col-emp">Employee</th>' +
        '<th class="col-type">Cert</th>' +
        '<th class="col-issued">Issued</th>' +
        '<th>Expires</th>' +
        '<th>Status</th>' +
        '<th></th>' +
      '</tr></thead><tbody>';

    rows.forEach(function(r) {
      var name = (r.emp.first_name || '') + ' ' + (r.emp.last_name || '');
      var stateLabel = r.type && r.type.state ? STATE_LABEL[r.type.state] || r.type.state : '';
      var typeLabel = r.type ? r.type.display_name : r.cert.cert_type;
      var expDate = r.cert.expires_at ? formatDate(r.cert.expires_at) : '—';
      var pillCls = r.status.kind === 'unknown' ? 'valid' : r.status.kind;
      var canRenew = r.status.kind === 'expired' || r.status.kind === 'expiring';

      html += '<tr data-cert-id="' + escapeHtml(r.cert.id) + '">' +
        '<td class="col-emp">' + escapeHtml(name) +
          (r.emp.is_active ? '' : '<span class="inactive-tag">Inactive</span>') +
        '</td>' +
        '<td class="col-type">' + escapeHtml(typeLabel) +
          (stateLabel ? '<span class="col-state">' + escapeHtml(stateLabel) + '</span>' : '') +
        '</td>' +
        '<td class="col-issued">' + (r.cert.issued_at ? escapeHtml(formatDate(r.cert.issued_at)) : '<span style="color:var(--muted);">—</span>') + '</td>' +
        '<td>' + escapeHtml(expDate) + '</td>' +
        '<td>' +
          '<span class="status-pill ' + pillCls + '">' + escapeHtml(r.status.label) + '</span>' +
          (r.status.sub ? '<div class="status-sub">' + escapeHtml(r.status.sub) + '</div>' : '') +
        '</td>' +
        '<td class="col-actions">' +
          (canRenew ? '<button class="btn btn-sm" data-action="renew" data-cert-id="' + escapeHtml(r.cert.id) + '">Renew</button>' : '') +
          '<button class="btn btn-sm" data-action="edit" data-cert-id="' + escapeHtml(r.cert.id) + '">Edit</button>' +
          '<button class="btn btn-sm btn-danger" data-action="remove" data-cert-id="' + escapeHtml(r.cert.id) + '">Remove</button>' +
        '</td>' +
      '</tr>';
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;

    // Wire row actions
    var btns = wrap.querySelectorAll('button[data-action]');
    for (var i = 0; i < btns.length; i++) {
      btns[i].addEventListener('click', onRowActionClick);
    }
  }

  function onRowActionClick(e) {
    var btn = e.currentTarget;
    var action = btn.getAttribute('data-action');
    var certId = btn.getAttribute('data-cert-id');
    var cert = state.certs.find(function(c) { return c.id === certId; });
    if (!cert) return;
    if (action === 'edit')   openCertModal('edit', cert);
    if (action === 'renew')  openCertModal('renew', cert);
    if (action === 'remove') openRemoveConfirm(cert);
  }

  // -------------------------------------------------------------
  // CERT MODAL (add / edit / renew)
  // -------------------------------------------------------------
  function openCertModal(kind, sourceCert) {
    var data;
    if (kind === 'add') {
      data = {
        id: null,
        employee_id: '',
        employee_name: '',  // typeahead display
        cert_type: '',
        issued_at: '',
        expires_at: '',
        cert_number: '',
        notes: ''
      };
    } else if (kind === 'edit') {
      data = {
        id: sourceCert.id,
        employee_id: sourceCert.employee_id,
        employee_name: empDisplayName(sourceCert.employee_id),
        cert_type: sourceCert.cert_type,
        issued_at: sourceCert.issued_at || '',
        expires_at: sourceCert.expires_at || '',
        cert_number: sourceCert.cert_number || '',
        notes: sourceCert.notes || ''
      };
    } else if (kind === 'renew') {
      // Renew = create new row, prefilled with same emp + type, blank dates
      data = {
        id: null,
        employee_id: sourceCert.employee_id,
        employee_name: empDisplayName(sourceCert.employee_id),
        cert_type: sourceCert.cert_type,
        issued_at: '',
        expires_at: '',
        cert_number: '',
        notes: ''
      };
    }
    state.modal = { kind: kind, data: data };
    renderCertModal();
  }

  function closeModal() {
    state.modal = null;
    document.getElementById('modalRoot').innerHTML = '';
  }

  function empDisplayName(empId) {
    var e = state.employeesById[empId];
    if (!e) return '';
    return (e.first_name || '') + ' ' + (e.last_name || '');
  }

  function renderCertModal() {
    var m = state.modal;
    var d = m.data;
    var titleMap = { add: 'Add certification', edit: 'Edit certification', renew: 'Renew certification' };
    var saveLabel = m.kind === 'add' ? 'Add' : (m.kind === 'renew' ? 'Renew' : 'Save');

    // Build cert-type options grouped/sorted by sort_order
    var typeOpts = '<option value="">Select cert type…</option>' +
      state.certTypes.map(function(t) {
        var label = t.display_name + (t.state ? ' (' + t.state + ')' : '');
        return '<option value="' + escapeHtml(t.id) + '"' +
          (d.cert_type === t.id ? ' selected' : '') + '>' + escapeHtml(label) + '</option>';
      }).join('');

    // Lock employee picker if editing or renewing (employee can't change)
    var empLocked = m.kind === 'edit' || m.kind === 'renew';
    var empField = empLocked
      ? '<input type="text" value="' + escapeHtml(d.employee_name) + '" disabled />'
      : '<div class="typeahead">' +
          '<input type="text" id="empSearchInput" placeholder="Type employee name…" autocomplete="off" value="' + escapeHtml(d.employee_name) + '" />' +
          '<div class="typeahead-results" id="empSearchResults"></div>' +
        '</div>';

    // Determine if expiration is required for the chosen type
    var expRequired = false;
    if (d.cert_type && state.certTypesById[d.cert_type]) {
      expRequired = state.certTypesById[d.cert_type].requires_expiration;
    }

    var html = '<div class="modal-overlay" id="modalOverlay">' +
      '<div class="modal" role="dialog">' +
        '<div class="modal-head">' +
          '<h2>' + titleMap[m.kind] + '</h2>' +
          '<button class="modal-close" id="modalCloseBtn" aria-label="Close">&times;</button>' +
        '</div>' +
        '<div class="modal-body">' +
          '<div class="field">' +
            '<label>Employee <span class="req">*</span></label>' +
            empField +
            '<div class="field-error" id="err-employee">Pick an employee from the list.</div>' +
          '</div>' +
          '<div class="field">' +
            '<label>Cert type <span class="req">*</span></label>' +
            '<select id="certTypeSelect">' + typeOpts + '</select>' +
            '<div class="field-error" id="err-cert-type">Pick a cert type.</div>' +
          '</div>' +
          '<div class="field">' +
            '<label>Issued date</label>' +
            '<input type="date" id="issuedAtInput" value="' + escapeHtml(d.issued_at) + '" />' +
            '<div class="field-help">Optional.</div>' +
          '</div>' +
          '<div class="field">' +
            '<label>Expires date' + (expRequired ? ' <span class="req">*</span>' : '') + '</label>' +
            '<input type="date" id="expiresAtInput" value="' + escapeHtml(d.expires_at) + '" />' +
            '<div class="field-help" id="expHelp">' +
              (expRequired ? 'Required for this cert type.' : 'Optional.') +
            '</div>' +
            '<div class="field-error" id="err-expires-at">Expiration date is required for this cert type.</div>' +
          '</div>' +
          '<div class="field">' +
            '<label>Cert number</label>' +
            '<input type="text" id="certNumberInput" value="' + escapeHtml(d.cert_number) + '" placeholder="Optional" />' +
          '</div>' +
          '<div class="field">' +
            '<label>Notes</label>' +
            '<textarea id="notesInput" placeholder="Optional">' + escapeHtml(d.notes) + '</textarea>' +
          '</div>' +
        '</div>' +
        '<div class="modal-foot">' +
          '<button class="btn" id="modalCancelBtn">Cancel</button>' +
          '<button class="btn btn-primary" id="modalSaveBtn">' + saveLabel + '</button>' +
        '</div>' +
      '</div>' +
    '</div>';

    document.getElementById('modalRoot').innerHTML = html;
    wireCertModal();
  }

  function wireCertModal() {
    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target.id === 'modalOverlay') closeModal();
    });
    document.getElementById('modalSaveBtn').addEventListener('click', saveCert);

    // Cert-type change updates expiration-required state
    document.getElementById('certTypeSelect').addEventListener('change', function(e) {
      state.modal.data.cert_type = e.target.value;
      // Re-render to update the "required" indicator on Expires
      var d = state.modal.data;
      d.issued_at   = document.getElementById('issuedAtInput').value;
      d.expires_at  = document.getElementById('expiresAtInput').value;
      d.cert_number = document.getElementById('certNumberInput').value;
      d.notes       = document.getElementById('notesInput').value;
      renderCertModal();
    });

    // Employee typeahead (only when add mode — locked otherwise)
    var searchInput = document.getElementById('empSearchInput');
    if (searchInput) {
      searchInput.addEventListener('input', onEmpSearchInput);
      searchInput.addEventListener('keydown', onEmpSearchKey);
      searchInput.addEventListener('blur', function() {
        // Delay so click on result lands first
        setTimeout(function() {
          var box = document.getElementById('empSearchResults');
          if (box) box.classList.remove('show');
        }, 150);
      });
      searchInput.focus();
    }
  }

  function onEmpSearchInput(e) {
    var q = e.target.value.toLowerCase().trim();
    state.modal.data.employee_name = e.target.value;
    state.modal.data.employee_id = '';  // clear until they pick
    state.typeaheadActive = -1;

    var box = document.getElementById('empSearchResults');
    if (!q) { box.classList.remove('show'); box.innerHTML = ''; return; }

    var matches = state.employees.filter(function(emp) {
      if (!emp.is_active) return false;
      var name = ((emp.first_name || '') + ' ' + (emp.last_name || '')).toLowerCase();
      return name.indexOf(q) !== -1;
    }).slice(0, 8);

    if (matches.length === 0) {
      box.innerHTML = '<div class="typeahead-item" style="color:var(--muted);">No active employees match.</div>';
      box.classList.add('show');
      return;
    }

    box.innerHTML = matches.map(function(emp, idx) {
      var name = (emp.first_name || '') + ' ' + (emp.last_name || '');
      var sub = emp.home_venue && emp.home_venue !== 'NA'
        ? 'Home: ' + emp.home_venue
        : (emp.punch_id ? 'Punch ' + emp.punch_id : '');
      return '<div class="typeahead-item" data-emp-id="' + escapeHtml(emp.id) + '" data-idx="' + idx + '">' +
        escapeHtml(name) +
        (sub ? '<div class="ta-sub">' + escapeHtml(sub) + '</div>' : '') +
      '</div>';
    }).join('');
    box.classList.add('show');

    var items = box.querySelectorAll('.typeahead-item[data-emp-id]');
    for (var i = 0; i < items.length; i++) {
      items[i].addEventListener('mousedown', function(ev) {
        // mousedown fires before blur — pick before the box closes
        var empId = ev.currentTarget.getAttribute('data-emp-id');
        pickEmployee(empId);
      });
    }
  }

  function onEmpSearchKey(e) {
    var box = document.getElementById('empSearchResults');
    var items = box.querySelectorAll('.typeahead-item[data-emp-id]');
    if (items.length === 0) return;

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      state.typeaheadActive = Math.min(state.typeaheadActive + 1, items.length - 1);
      highlightTypeahead(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      state.typeaheadActive = Math.max(state.typeaheadActive - 1, 0);
      highlightTypeahead(items);
    } else if (e.key === 'Enter') {
      if (state.typeaheadActive >= 0) {
        e.preventDefault();
        var empId = items[state.typeaheadActive].getAttribute('data-emp-id');
        pickEmployee(empId);
      }
    } else if (e.key === 'Escape') {
      box.classList.remove('show');
    }
  }

  function highlightTypeahead(items) {
    for (var i = 0; i < items.length; i++) {
      if (i === state.typeaheadActive) items[i].classList.add('active');
      else items[i].classList.remove('active');
    }
  }

  function pickEmployee(empId) {
    var emp = state.employeesById[empId];
    if (!emp) return;
    state.modal.data.employee_id = empId;
    state.modal.data.employee_name = (emp.first_name || '') + ' ' + (emp.last_name || '');

    // Snapshot any other field values before re-render
    var d = state.modal.data;
    var ct = document.getElementById('certTypeSelect');
    var ia = document.getElementById('issuedAtInput');
    var ea = document.getElementById('expiresAtInput');
    var cn = document.getElementById('certNumberInput');
    var nt = document.getElementById('notesInput');
    if (ct) d.cert_type   = ct.value;
    if (ia) d.issued_at   = ia.value;
    if (ea) d.expires_at  = ea.value;
    if (cn) d.cert_number = cn.value;
    if (nt) d.notes       = nt.value;

    renderCertModal();
  }

  function saveCert() {
    var m = state.modal;
    var d = m.data;

    // Pull current input values into the data object
    d.cert_type   = document.getElementById('certTypeSelect').value;
    d.issued_at   = document.getElementById('issuedAtInput').value;
    d.expires_at  = document.getElementById('expiresAtInput').value;
    d.cert_number = document.getElementById('certNumberInput').value.trim();
    d.notes       = document.getElementById('notesInput').value.trim();

    // Validate
    var ok = true;
    document.querySelectorAll('.field-error').forEach(function(e) { e.classList.remove('show'); });

    if (!d.employee_id) {
      document.getElementById('err-employee').classList.add('show');
      ok = false;
    }
    if (!d.cert_type) {
      document.getElementById('err-cert-type').classList.add('show');
      ok = false;
    }
    if (d.cert_type && state.certTypesById[d.cert_type] && state.certTypesById[d.cert_type].requires_expiration && !d.expires_at) {
      document.getElementById('err-expires-at').classList.add('show');
      ok = false;
    }
    if (!ok) return;

    var saveBtn = document.getElementById('modalSaveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';

    var who = (state.user && state.user.display_name) || (state.user && state.user.email) || 'unknown';
    var body = {
      employee_id: d.employee_id,
      cert_type: d.cert_type,
      issued_at: d.issued_at || null,
      expires_at: d.expires_at || null,
      cert_number: d.cert_number || null,
      notes: d.notes || null
    };

    var url, method;
    if (m.kind === 'edit') {
      body.updated_at = new Date().toISOString();
      body.updated_by = who;
      url = SUPABASE_URL + '/rest/v1/employee_certifications?id=eq.' + encodeURIComponent(d.id);
      method = 'PATCH';
    } else {
      // add or renew — both create a new row
      body.created_by = who;
      body.file_source = 'manual';
      url = SUPABASE_URL + '/rest/v1/employee_certifications';
      method = 'POST';
    }

    var headers = pcAuth.headers();
    headers['Content-Type'] = 'application/json';
    headers['Prefer'] = 'return=representation';

    authFetch(url, { method: method, headers: headers, body: JSON.stringify(body) })
      .then(function(rows) {
        if (m.kind === 'edit') {
          var idx = state.certs.findIndex(function(c) { return c.id === d.id; });
          if (idx !== -1 && rows[0]) state.certs[idx] = rows[0];
          showToast('Certification updated', 'success');
        } else {
          if (rows[0]) state.certs.push(rows[0]);
          showToast(m.kind === 'renew' ? 'Renewal recorded' : 'Certification added', 'success');
        }
        closeModal();
        render();
      })
      .catch(function(err) {
        console.error('Save cert failed:', err);
        showToast('Save failed: ' + (err.message || 'unknown error'), 'error');
        saveBtn.disabled = false;
        saveBtn.textContent = m.kind === 'add' ? 'Add' : (m.kind === 'renew' ? 'Renew' : 'Save');
      });
  }

  // -------------------------------------------------------------
  // REMOVE CONFIRM
  // -------------------------------------------------------------
  function openRemoveConfirm(cert) {
    var emp = state.employeesById[cert.employee_id];
    var type = state.certTypesById[cert.cert_type];
    var name = emp ? (emp.first_name || '') + ' ' + (emp.last_name || '') : 'this employee';
    var typeLabel = type ? type.display_name : cert.cert_type;

    var html = '<div class="modal-overlay" id="modalOverlay">' +
      '<div class="modal" role="dialog" style="max-width:420px;">' +
        '<div class="modal-head">' +
          '<h2>Remove certification?</h2>' +
          '<button class="modal-close" id="modalCloseBtn" aria-label="Close">&times;</button>' +
        '</div>' +
        '<div class="modal-body">' +
          '<div class="confirm-text">' +
            'Remove <strong>' + escapeHtml(typeLabel) + '</strong> for <strong>' + escapeHtml(name) + '</strong>?' +
            '<br><br>' +
            '<span style="color:var(--muted);font-size:12px;">' +
            'This is a soft delete — the row stays in the database for history but is hidden from the page.' +
            '</span>' +
          '</div>' +
        '</div>' +
        '<div class="modal-foot">' +
          '<button class="btn" id="modalCancelBtn">Cancel</button>' +
          '<button class="btn btn-danger" id="modalConfirmBtn" data-cert-id="' + escapeHtml(cert.id) + '">Remove</button>' +
        '</div>' +
      '</div>' +
    '</div>';

    document.getElementById('modalRoot').innerHTML = html;
    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target.id === 'modalOverlay') closeModal();
    });
    document.getElementById('modalConfirmBtn').addEventListener('click', function() {
      doRemoveCert(cert.id);
    });
  }

  function doRemoveCert(certId) {
    var btn = document.getElementById('modalConfirmBtn');
    btn.disabled = true;
    btn.textContent = 'Removing…';

    var who = (state.user && state.user.display_name) || (state.user && state.user.email) || 'unknown';
    var url = SUPABASE_URL + '/rest/v1/employee_certifications?id=eq.' + encodeURIComponent(certId);
    var headers = pcAuth.headers();
    headers['Content-Type'] = 'application/json';
    headers['Prefer'] = 'return=representation';

    authFetch(url, {
      method: 'PATCH',
      headers: headers,
      body: JSON.stringify({
        removed_at: new Date().toISOString(),
        removed_by: who
      })
    })
    .then(function() {
      state.certs = state.certs.filter(function(c) { return c.id !== certId; });
      closeModal();
      render();
      showToast('Certification removed', 'success');
    })
    .catch(function(err) {
      console.error('Remove failed:', err);
      showToast('Remove failed: ' + (err.message || 'unknown error'), 'error');
      btn.disabled = false;
      btn.textContent = 'Remove';
    });
  }

  // -------------------------------------------------------------
  // EXPORT CSV
  // -------------------------------------------------------------
  function exportCsv() {
    var rows = decoratedRows();
    if (rows.length === 0) {
      showToast('No rows to export with current filters', 'error');
      return;
    }
    var headers = ['Employee', 'Punch ID', 'Active', 'Cert Type', 'Cert State', 'Issued', 'Expires', 'Status', 'Cert Number', 'Notes'];
    var lines = [headers.join(',')];
    rows.forEach(function(r) {
      var name = (r.emp.first_name || '') + ' ' + (r.emp.last_name || '');
      var cells = [
        name,
        r.emp.punch_id || '',
        r.emp.is_active ? 'Yes' : 'No',
        r.type ? r.type.display_name : r.cert.cert_type,
        r.type && r.type.state ? r.type.state : '',
        r.cert.issued_at || '',
        r.cert.expires_at || '',
        r.status.label,
        r.cert.cert_number || '',
        (r.cert.notes || '').replace(/\r?\n/g, ' ')
      ];
      lines.push(cells.map(csvEscape).join(','));
    });
    var blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'certifications-' + todayISO() + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function csvEscape(v) {
    var s = String(v == null ? '' : v);
    if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  // -------------------------------------------------------------
  // FILTER WIRING
  // -------------------------------------------------------------
  function wireFilters() {
    document.getElementById('filterCategory').addEventListener('change', function(e) {
      state.filters.category = e.target.value;
      // Reset type filter if it's no longer in the visible list
      if (state.filters.type) {
        var t = state.certTypesById[state.filters.type];
        if (t && state.filters.category && t.category !== state.filters.category) {
          state.filters.type = '';
        }
      }
      render();
    });
    document.getElementById('filterType').addEventListener('change', function(e) {
      state.filters.type = e.target.value;
      render();
    });
    document.getElementById('filterStatus').addEventListener('change', function(e) {
      state.filters.status = e.target.value;
      render();
    });
    document.getElementById('filterSearch').addEventListener('input', function(e) {
      state.filters.search = e.target.value;
      render();
    });
    document.getElementById('filterActiveOnly').addEventListener('change', function(e) {
      state.filters.activeOnly = e.target.checked;
      render();
    });
    document.getElementById('clearFilters').addEventListener('click', function() {
      state.filters = { category: '', type: '', status: '', search: '', activeOnly: true };
      document.getElementById('filterCategory').value = '';
      document.getElementById('filterType').value = '';
      document.getElementById('filterStatus').value = '';
      document.getElementById('filterSearch').value = '';
      document.getElementById('filterActiveOnly').checked = true;
      render();
    });

    // Honor ?employee=<id> deep link from card
    var params = new URLSearchParams(window.location.search);
    var deepLinkEmpId = params.get('employee');
    if (deepLinkEmpId) {
      var emp = state.employeesById[deepLinkEmpId];
      if (emp) {
        var name = (emp.first_name || '') + ' ' + (emp.last_name || '');
        state.filters.search = name;
        document.getElementById('filterSearch').value = name;
        // If the linked employee is inactive, surface them
        if (!emp.is_active) {
          state.filters.activeOnly = false;
          document.getElementById('filterActiveOnly').checked = false;
        }
      }
    }
  }

  // -------------------------------------------------------------
  // BOOT
  // -------------------------------------------------------------
  pcAuth.require({
    pageSlug: 'certifications',
    onReady: function(user) {
      state.user = user;
      // Header + user pill painted by pc-nav.js — no manual setup here.
      pcActivity.init('certifications');

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && state.modal) closeModal();
      });

      document.getElementById('addBtn').addEventListener('click', function() {
        openCertModal('add');
      });
      document.getElementById('exportBtn').addEventListener('click', exportCsv);

      Promise.all([
        loadEmployees(),
        loadCertTypes(),
        loadCerts()
      ]).then(function(results) {
        state.employees = results[0] || [];
        state.employeesById = {};
        state.employees.forEach(function(e) { state.employeesById[e.id] = e; });

        state.certTypes = results[1] || [];
        state.certTypesById = {};
        state.certTypes.forEach(function(t) { state.certTypesById[t.id] = t; });

        state.certs = results[2] || [];

        wireFilters();
        render();
      }).catch(function(err) {
        console.error('Load failed:', err);
        if (err && err.authFailed) {
          showToast('Session expired. Reloading…', 'error');
          setTimeout(function() { window.location.reload(); }, 1800);
          return;
        }
        document.getElementById('tableWrap').innerHTML =
          '<div class="empty">' +
          '<div class="empty-title">Couldn\'t load certifications</div>' +
          '<div class="empty-msg">' + escapeHtml(err.message || 'Unknown error') + '</div>' +
          '</div>';
      });
    }
  });
})();
</script>

</body>
</html>
