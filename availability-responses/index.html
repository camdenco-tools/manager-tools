<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popcorn Chez — Availability Responses</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f0ec; --card: #ffffff; --primary: #1a1a1a;
    --green: #1D9E75; --green-light: #e8f7f2; --green-tint: #f5fdf9;
    --label: #999;
    --border: #e8e8e4; --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 16px; --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --blue: #378ADD; --blue-light: #E6F1FB; --blue-dark: #0C447C;
    --red: #c0392b; --red-light: #fde8e8;
    --amber: #d97706; --amber-light: #fff3cd; --amber-dark: #856404;
    --orange: #ea580c; --orange-light: #fff0e6;
  }
  body { background: var(--bg); font-family: var(--font); color: var(--primary); min-height: 100vh; }
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 50; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .back-link { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--label); text-decoration: none; transition: color 0.15s; }
  .back-link:hover { color: var(--primary); }
  .hdivider { width: 1px; height: 20px; background: var(--border); }
  .header-title { font-size: 15px; font-weight: 700; }
  .header-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: #607d8b; color: white; padding: 3px 8px; border-radius: 20px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-user { font-size: 12px; color: var(--label); font-weight: 600; }
  .sign-out-btn { font-size: 11px; font-weight: 700; color: var(--label); background: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 8px; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
  .sign-out-btn:hover { color: var(--primary); border-color: var(--primary); }

  .main { max-width: 960px; margin: 0 auto; padding: 24px 24px 80px; }
  .loading-msg { text-align: center; padding: 40px; font-size: 14px; color: var(--label); }

  .info-banner { background: var(--blue-light); border: 1px solid #c7dffb; border-radius: 10px; padding: 11px 16px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 10px; }
  .info-banner-icon { font-size: 14px; flex-shrink: 0; color: var(--blue-dark); }
  .info-banner-text { font-size: 12px; color: var(--blue-dark); line-height: 1.5; }

  .filter-section { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 14px 18px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .filter-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--label); margin-bottom: 10px; }
  .venue-pills { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 8px; }
  .venue-pill { padding: 6px 14px; border-radius: 18px; font-size: 12px; font-weight: 700; cursor: pointer; border: 2px solid var(--blue); background: var(--blue); color: white; font-family: var(--font); transition: all 0.12s; }
  .venue-pill.off { background: var(--card); color: var(--label); border-color: var(--border); }
  .filter-actions { display: flex; justify-content: flex-end; }
  .toggle-all-btn { font-size: 12px; color: var(--blue); background: none; border: none; cursor: pointer; font-family: var(--font); font-weight: 600; padding: 0; }
  .toggle-all-btn:hover { text-decoration: underline; }

  .event-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; box-shadow: var(--shadow); overflow: hidden; }
  .event-card.is-staffed { opacity: 0.6; }
  .event-card.is-staffed .evt-name { text-decoration: line-through; text-decoration-color: var(--green); }
  .event-card.is-staffed:hover { opacity: 0.85; }

  .event-card-header { padding: 13px 18px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.12s; flex-wrap: wrap; }
  .event-card-header:hover { background: #fafaf8; }
  .event-card-header.open { border-bottom: 1px solid var(--border); }
  .evt-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; flex-wrap: wrap; }
  .evt-date { font-size: 11px; font-weight: 700; color: var(--label); white-space: nowrap; min-width: 60px; }
  .vbadge { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  .evt-name { font-size: 14px; font-weight: 700; color: var(--primary); }
  .evt-time { font-size: 12px; color: var(--label); white-space: nowrap; }
  .staffed-badge { font-size: 9px; font-weight: 800; background: var(--green); color: #fff; border-radius: 4px; padding: 2px 6px; letter-spacing: 0.04em; text-transform: uppercase; }
  .evt-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .coverage-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .coverage-counts { font-size: 13px; font-weight: 800; white-space: nowrap; }
  .coverage-bar-wrap { width: 80px; height: 4px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .coverage-bar { height: 100%; }
  .cov-green { color: var(--green); } .bar-green { background: var(--green); }
  .cov-amber { color: var(--amber-dark); } .bar-amber { background: #e8c94e; }
  .cov-red { color: var(--red); } .bar-red { background: var(--red); }
  .chevron { font-size: 12px; color: var(--label); }

  .event-card-body { display: none; }
  .event-card-body.open { display: block; }

  .panel-section { padding: 14px 18px 0; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .panel-title { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
  .panel-title-signed { color: var(--green); }
  .panel-title-not { color: var(--amber-dark); }
  .display-btn { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 18px; border: 1.5px solid var(--border); background: var(--card); color: var(--primary); cursor: pointer; font-family: var(--font); }
  .display-btn:hover { background: var(--bg); }

  .names-grid { display: flex; flex-wrap: wrap; gap: 7px; padding-bottom: 14px; }
  .name-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--card); border-radius: 18px; padding: 4px 10px 4px 6px; border: 1.5px solid var(--border); }
  .name-chip.has-multiple { border-color: var(--orange); background: var(--orange-light); }
  .name-chip.assigned-here { border-color: var(--green); background: var(--green-light); }
  .name-chip.assigned-elsewhere { opacity: 0.5; background: var(--bg); border-color: var(--border); border-style: dashed; }
  .name-chip.assigned-elsewhere .name-text { text-decoration: line-through; color: var(--label); }
  .name-avatar { width: 22px; height: 22px; border-radius: 50%; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .name-text { font-size: 12px; font-weight: 600; color: var(--primary); }
  .name-tag { font-size: 10px; color: var(--label); font-style: italic; }
  .name-tag.assigned-here { color: var(--green); font-weight: 700; font-style: normal; }
  .name-note { font-size: 10px; color: var(--blue-dark); font-style: italic; }
  .multi-badge { font-size: 9px; font-weight: 800; background: var(--orange); color: #fff; border-radius: 8px; padding: 1px 5px; }
  .no-signups-msg { font-size: 12px; color: var(--label); font-style: italic; padding: 4px 0 14px; }

  .not-panel-toggle { display: flex; align-items: center; justify-content: space-between; padding: 11px 18px; cursor: pointer; border-top: 1px solid var(--border); transition: background 0.12s; }
  .not-panel-toggle:hover { background: #fafaf8; }
  .not-panel-toggle-label { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--amber-dark); }
  .not-panel-toggle-right { display: flex; align-items: center; gap: 10px; }
  .not-panel-body { display: none; padding: 0 18px 14px; border-top: 1px solid var(--border); }
  .not-panel-body.open { display: block; }
  .not-name-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .not-name-row:last-child { border-bottom: none; }
  .not-name-left { display: flex; align-items: center; gap: 8px; }
  .not-rank { font-size: 11px; font-weight: 700; color: var(--label); min-width: 18px; text-align: right; }
  .not-name-text { font-size: 13px; font-weight: 600; color: var(--primary); }
  .not-phone { font-size: 12px; color: var(--label); }
  .not-count-badge { font-size: 10px; color: var(--label); background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1px 7px; white-space: nowrap; }
  .show-more-not { font-size: 12px; font-weight: 700; color: var(--blue); background: none; border: none; cursor: pointer; font-family: var(--font); padding: 8px 0 0; display: block; }
  .show-more-not:hover { opacity: 0.75; }

  .print-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 400; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
  .print-overlay.open { display: flex; }
  .print-panel { background: #fff; border-radius: 12px; max-width: 580px; width: 100%; padding: 32px; position: relative; }
  .print-close-x { position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 22px; color: var(--label); cursor: pointer; line-height: 1; padding: 4px 10px; font-family: var(--font); border-radius: 6px; }
  .print-close-x:hover { background: var(--bg); color: var(--primary); }
  .print-panel-type { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .print-panel-type.signed { color: var(--green); }
  .print-panel-type.not-signed { color: var(--amber-dark); }
  .print-panel-title { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
  .print-panel-meta { font-size: 12px; color: var(--label); margin-bottom: 4px; }
  .print-panel-stamp { font-size: 11px; color: var(--label); margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid var(--primary); }
  .print-name-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
  .print-name-row:last-child { border-bottom: none; }
  .print-name-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .print-num { font-size: 12px; color: #999; min-width: 20px; text-align: right; }
  .print-name { font-weight: 600; color: var(--primary); }
  .print-name.struck { text-decoration: line-through; color: #999; }
  .print-tag { font-size: 11px; color: var(--label); font-style: italic; }
  .print-tag.green { color: var(--green); font-weight: 700; font-style: normal; }
  .print-note { font-size: 12px; color: var(--blue-dark); font-style: italic; }
  .print-phone { font-size: 13px; color: #666; }
  .print-actions { display: flex; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
  .btn-print { padding: 9px 20px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font); }
  .btn-close-print { padding: 9px 20px; background: var(--bg); color: var(--primary); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font); }
  .empty-print { font-size: 13px; color: var(--label); font-style: italic; padding: 12px 0; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--primary); color: white; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.25s ease; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media print {
    header, .filter-section, .info-banner, .toast { display: none !important; }
    body { background: white; }
    .main { padding: 0; max-width: 100%; }
    .print-overlay { position: static; background: none; padding: 0; display: block; }
    .print-panel { box-shadow: none; max-width: 100%; padding: 20px; }
    .print-actions { display: none; }
  }
  @media (max-width: 600px) {
    header { padding: 0 14px; flex-wrap: wrap; height: auto; padding-top: 10px; padding-bottom: 10px; gap: 8px; }
    .main { padding: 14px 12px 60px; }
    .evt-time { display: none; }
    .coverage-bar-wrap { width: 60px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="/" class="back-link">&#8592; Toolkit</a>
    <div class="hdivider"></div>
    <span class="header-title">Availability Responses</span>
    <span class="header-badge">Read Only</span>
  </div>
  <div class="header-right" id="header-right"></div>
</header>

<div class="main">

  <div class="info-banner">
    <span class="info-banner-icon">&#9432;</span>
    <span class="info-banner-text">This is a read-only view that mirrors the staffing manager's working list. To remove signups, assign people across multiple events, or mark events as staffed, the staffing manager uses the Schedule Assistant.</span>
  </div>

  <div class="filter-section" id="filter-section" style="display:none;">
    <div class="filter-label">Filter by venue</div>
    <div class="venue-pills" id="venue-pills"></div>
    <div class="filter-actions">
      <button class="toggle-all-btn" id="toggle-all-btn">Deselect all</button>
    </div>
  </div>

  <div id="events-container"><div class="loading-msg">Loading...</div></div>
</div>

<div class="print-overlay" id="print-overlay">
  <div class="print-panel">
    <button class="print-close-x" id="print-close-x" aria-label="Close">&times;</button>
    <div class="print-panel-type" id="print-type"></div>
    <div class="print-panel-title" id="print-evt-name"></div>
    <div class="print-panel-meta" id="print-evt-meta"></div>
    <div class="print-panel-stamp" id="print-stamp"></div>
    <div id="print-list"></div>
    <div class="print-actions">
      <button class="btn-print" id="do-print-btn">Print</button>
      <button class="btn-close-print" id="close-print-btn">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/pc-auth.js"></script>
<script>
(function() {

var SB_URL = 'https://aoazlttdjowhlfcksoyl.supabase.co';

var VENUE_LABELS = {FMP:'Freedom Mortgage Pavilion',Mann:'Mann Music Center',BWH:'Boardwalk Hall',ACCC:'AC Convention Center',Cure:'Cure Insurance Arena',Subaru:'Subaru Park',DE:'DE Chase Field House',Montage:'Montage Mountain',SATB:'Sports at the Beach',Villanova:'Villanova',Kirkwood:'Kirkwood'};
var VENUE_BADGE_STYLES = {FMP:'background:#fde8e6;color:#7a1a12;',Mann:'background:#e8f5d8;color:#2d5a08;',Cure:'background:#deeef9;color:#0e3f6a;',Subaru:'background:#f0e8fa;color:#4a1a7a;',Villanova:'background:#e8eaf6;color:#0d1257;',Montage:'background:#eceff1;color:#2c3e47;',DE:'background:#e0f2f0;color:#004d40;',BWH:'background:#fdeede;color:#8a3e00;',ACCC:'background:#fde4cc;color:#7a3200;',SATB:'background:#f4f4f2;color:#444441;',Kirkwood:'background:#fde8e8;color:#7a1212;'};
var AVATAR_COLORS = [['#E6F1FB','#0C447C'],['#EAF3DE','#27500A'],['#FAEEDA','#633806'],['#EEEDFE','#3C3489'],['#FBEAF0','#72243E'],['#E1F5EE','#085041'],['#FCEBEB','#501313'],['#eceff1','#2c3e47']];
var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var DAYS_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

var SUPPORT_STAND = 'Support Staff';
var NOT_SHOW_INITIAL = 4;

var pcEvents = [];
var pcEmployees = [];
var pcAvailability = {};         // event_id -> active rows only (filters out removed_at)
var pcStaffingRequests = {};     // event_id||venue -> rows
var pcParLevels = {};            // venue||stand||role||tier -> par_levels row
var pcStaffingStatus = {};       // event_id||venue -> status
var pcAssignments = {};          // staff_name||event_date -> assignment row
var pcHistoryCounts = {};        // staff_name -> total signups historically (active or not)

var selectedVenues = {};

function apiHeaders() { return pcAuth.headers(); }
function sbFetch(path) {
  return fetch(SB_URL + '/rest/v1/' + path, {headers: apiHeaders()}).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
    return r.json();
  });
}

function init() {
  var today = new Date();
  var ds = today.getFullYear() + '-' + pad(today.getMonth() + 1) + '-' + pad(today.getDate());
  var amp = String.fromCharCode(38);

  Promise.all([
    sbFetch('events?event_date=gte.' + ds + amp + 'event_type=neq.adhoc' + amp + 'order=event_date.asc'),
    sbFetch('availability?select=id,staff_name,event_id,note,submitted_at,removed_at'),
    sbFetch('employees?is_active=eq.true' + amp + 'order=last_name.asc'),
    sbFetch('staffing_requests?select=event_id,venue,stand,role,headcount'),
    sbFetch('par_levels?select=venue,stand,role,default_count,excluded_from_total,tier'),
    sbFetch('event_staffing_status?select=event_id,venue,is_confirmed'),
    sbFetch('availability_assignments?select=staff_name,event_date,assigned_event_id')
  ]).then(function(res) {
    pcEvents = res[0] || [];
    var availAll = res[1] || [];
    pcEmployees = res[2] || [];
    var subs = res[3] || [];
    var pars = res[4] || [];
    var statuses = res[5] || [];
    var assignments = res[6] || [];

    // Active availability only — filter out removed_at rows
    pcAvailability = {};
    availAll.forEach(function(r) {
      if (r.removed_at) return;
      if (!pcAvailability[r.event_id]) pcAvailability[r.event_id] = [];
      pcAvailability[r.event_id].push(r);
    });

    // History counts use ALL availability (including removed) since past activity is past activity
    pcHistoryCounts = {};
    availAll.forEach(function(r) {
      pcHistoryCounts[r.staff_name] = (pcHistoryCounts[r.staff_name] || 0) + 1;
    });

    pcStaffingRequests = {};
    subs.forEach(function(r) {
      var k = r.event_id + '||' + r.venue;
      if (!pcStaffingRequests[k]) pcStaffingRequests[k] = [];
      pcStaffingRequests[k].push(r);
    });

    pcParLevels = {};
    pars.forEach(function(r) {
      var tier = r.tier || 'full';
      pcParLevels[r.venue + '||' + r.stand + '||' + r.role + '||' + tier] = r;
    });

    pcStaffingStatus = {};
    statuses.forEach(function(r) { pcStaffingStatus[r.event_id + '||' + r.venue] = r; });

    pcAssignments = {};
    assignments.forEach(function(r) { pcAssignments[r.staff_name + '||' + r.event_date] = r; });

    var venuesInEvents = [];
    pcEvents.forEach(function(e) { if (venuesInEvents.indexOf(e.venue) === -1) venuesInEvents.push(e.venue); });
    venuesInEvents.forEach(function(v) { selectedVenues[v] = true; });
    buildVenuePills(venuesInEvents);

    render();
  }).catch(function(e) {
    console.error(e);
    document.getElementById('events-container').innerHTML = '<div class="loading-msg">Error loading data. Please refresh.</div>';
  });
}

function buildVenuePills(venues) {
  var section = document.getElementById('filter-section');
  var container = document.getElementById('venue-pills');
  if (venues.length === 0) { section.style.display = 'none'; return; }
  section.style.display = '';
  container.innerHTML = '';
  venues.forEach(function(v) {
    var btn = document.createElement('button');
    btn.className = 'venue-pill';
    btn.id = 'pill-' + v;
    btn.textContent = VENUE_LABELS[v] || v;
    btn.setAttribute('data-venue', v);
    btn.addEventListener('click', function() {
      selectedVenues[v] = !selectedVenues[v];
      btn.className = 'venue-pill' + (selectedVenues[v] ? '' : ' off');
      updateToggleAllBtn();
      render();
    });
    container.appendChild(btn);
  });
  updateToggleAllBtn();
}

function updateToggleAllBtn() {
  var allOn = Object.keys(selectedVenues).every(function(v) { return selectedVenues[v]; });
  document.getElementById('toggle-all-btn').textContent = allOn ? 'Deselect all' : 'Select all';
}

document.getElementById('toggle-all-btn').addEventListener('click', function() {
  var allOn = Object.keys(selectedVenues).every(function(v) { return selectedVenues[v]; });
  Object.keys(selectedVenues).forEach(function(v) {
    selectedVenues[v] = !allOn;
    var pill = document.getElementById('pill-' + v);
    if (pill) pill.className = 'venue-pill' + (selectedVenues[v] ? '' : ' off');
  });
  updateToggleAllBtn();
  render();
});

// ============ COMPUTATION HELPERS ============

var SUPPORT_STAND_NAME = 'Support Staff';

function isStaffed(evtId, venue) {
  var s = pcStaffingStatus[evtId + '||' + venue];
  return s && s.is_confirmed;
}

function getRequestedCount(evt) {
  var key = evt.id + '||' + evt.venue;
  var rows = pcStaffingRequests[key];
  if (rows && rows.length >= 1) {
    var total = 0;
    rows.forEach(function(r) {
      if (r.stand !== SUPPORT_STAND_NAME) total += (r.headcount || 0);
    });
    return total;
  }
  // Fall back to par
  var tier = evt.staffing_tier || 'full';
  var total = 0;
  Object.keys(pcParLevels).forEach(function(k) {
    var parts = k.split('||');
    if (parts[0] === evt.venue && parts[3] === tier && parts[1] !== SUPPORT_STAND_NAME) {
      var row = pcParLevels[k];
      if (!row.excluded_from_total) total += (row.default_count || 0);
    }
  });
  return total;
}

function getDayMultiSignups(dateStr) {
  var dayEvts = pcEvents.filter(function(e) { return e.event_date === dateStr; });
  var nameMap = {};
  dayEvts.forEach(function(evt) {
    var avs = pcAvailability[evt.id] || [];
    avs.forEach(function(av) {
      if (!nameMap[av.staff_name]) nameMap[av.staff_name] = [];
      nameMap[av.staff_name].push(evt.id);
    });
  });
  return nameMap;
}

function getAssignment(staffName, dateStr) {
  var rec = pcAssignments[staffName + '||' + dateStr];
  return rec ? rec.assigned_event_id : null;
}

function getEffectiveSignedUpCount(evt) {
  var avs = pcAvailability[evt.id] || [];
  var count = 0;
  avs.forEach(function(av) {
    var assignedTo = getAssignment(av.staff_name, evt.event_date);
    if (assignedTo && assignedTo !== evt.id) return;
    count++;
  });
  return count;
}

// People who don't have any active availability row on this date
function getNotSignedUp(dateStr) {
  var signedOnDate = {};
  pcEvents.forEach(function(e) {
    if (e.event_date !== dateStr) return;
    (pcAvailability[e.id] || []).forEach(function(r) { signedOnDate[r.staff_name] = true; });
  });
  var notList = pcEmployees.filter(function(e) {
    return !signedOnDate[e.first_name + ' ' + e.last_name];
  });
  notList.sort(function(a, b) {
    var ca = pcHistoryCounts[a.first_name + ' ' + a.last_name] || 0;
    var cb = pcHistoryCounts[b.first_name + ' ' + b.last_name] || 0;
    if (cb !== ca) return cb - ca;
    return a.first_name.localeCompare(b.first_name);
  });
  return notList;
}

// Returns the call time used for "report time" — gates_open minus 1 hr, or report_time directly
function getCallTime(evt) {
  if (evt.report_time) return evt.report_time;
  if (evt.gates_open) {
    var parts = evt.gates_open.split(':');
    var h = parseInt(parts[0]) - 1;
    if (h < 0) h = 0;
    return pad(h) + ':' + parts[1] + ':' + (parts[2] || '00');
  }
  return null;
}

function formatShiftRange(evt) {
  var callTime = getCallTime(evt);
  var endTime = evt.estimated_end_time || null;
  if (callTime && endTime) return fmtTime(callTime) + ' - ' + fmtTime(endTime);
  if (callTime) return fmtTime(callTime);
  if (evt.gates_open && endTime) return fmtTime(evt.gates_open) + ' - ' + fmtTime(endTime);
  if (evt.gates_open) return 'Gates ' + fmtTime(evt.gates_open);
  if (evt.show_time) return 'Show ' + fmtTime(evt.show_time);
  return '--';
}

function fmtTime(t) {
  if (!t) return '--';
  var parts = t.split(':');
  var h = parseInt(parts[0]);
  return (h % 12 || 12) + ':' + parts[1] + ' ' + (h >= 12 ? 'PM' : 'AM');
}

function pad(n) { return n <= 9 ? '0' + n : '' + n; }

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function findEventById(id) {
  for (var i = 0; i < pcEvents.length; i++) if (pcEvents[i].id === id) return pcEvents[i];
  return null;
}

function getEmployeePhone(name) {
  for (var i = 0; i < pcEmployees.length; i++) {
    if ((pcEmployees[i].first_name + ' ' + pcEmployees[i].last_name) === name) {
      return pcEmployees[i].phone || '';
    }
  }
  return '';
}

// ============ RENDER ============

function render() {
  var container = document.getElementById('events-container');
  var visible = pcEvents.filter(function(e) { return selectedVenues[e.venue]; });
  if (visible.length === 0) {
    container.innerHTML = '<div class="loading-msg">No events match your venue selection.</div>';
    return;
  }
  container.innerHTML = '';
  visible.forEach(function(evt) { container.appendChild(buildEventCard(evt)); });
}

function buildEventCard(evt) {
  var avList = pcAvailability[evt.id] || [];
  var effective = getEffectiveSignedUpCount(evt);
  var requested = getRequestedCount(evt);
  var dateObj = new Date(evt.event_date + 'T12:00:00');
  var dateStr = DAYS[dateObj.getDay()] + ' ' + (dateObj.getMonth() + 1) + '/' + dateObj.getDate();
  var timeStr = formatShiftRange(evt);
  var badgeStyle = VENUE_BADGE_STYLES[evt.venue] || '';
  var staffed = isStaffed(evt.id, evt.venue);

  var pct = requested >= 1 ? Math.round((effective / requested) * 100) : (effective >= 1 ? 100 : 0);
  var barPct = pct >= 100 ? 100 : pct;
  var covClass, barClass;
  if (effective >= requested && requested >= 1) { covClass = 'cov-green'; barClass = 'bar-green'; }
  else if (pct >= 30) { covClass = 'cov-amber'; barClass = 'bar-amber'; }
  else { covClass = 'cov-red'; barClass = 'bar-red'; }
  if (requested === 0) { covClass = ''; barClass = 'bar-green'; barPct = 0; }

  var countLabel = effective + ' signed up';
  if (requested >= 1) countLabel += ' / ' + requested + ' needed';

  var card = document.createElement('div');
  card.className = 'event-card' + (staffed ? ' is-staffed' : '');
  card.id = 'card-' + evt.id;

  var hdr = document.createElement('div');
  hdr.className = 'event-card-header';
  hdr.setAttribute('data-evtid', evt.id);
  hdr.addEventListener('click', function() { toggleCard(evt.id); });

  hdr.innerHTML = '<div class="evt-left">' +
    '<span class="evt-date">' + dateStr + '</span>' +
    '<span class="vbadge" style="' + badgeStyle + '">' + evt.venue + '</span>' +
    '<span class="evt-name">' + escapeHtml(evt.event_name) + '</span>' +
    '<span class="evt-time">' + timeStr + '</span>' +
    (staffed ? '<span class="staffed-badge">Staffed</span>' : '') +
    '</div>' +
    '<div class="evt-right">' +
    '<div class="coverage-wrap"><span class="coverage-counts ' + covClass + '">' + countLabel + '</span>' +
    (requested >= 1 ? '<div class="coverage-bar-wrap"><div class="coverage-bar ' + barClass + '" style="width:' + barPct + '%;"></div></div>' : '') +
    '</div><span class="chevron" id="chev-' + evt.id + '">v</span></div>';

  var body = document.createElement('div');
  body.className = 'event-card-body';
  body.id = 'body-' + evt.id;

  // Signed-up section
  var signedSec = document.createElement('div');
  signedSec.className = 'panel-section';
  signedSec.innerHTML = '<div class="panel-header">' +
    '<span class="panel-title panel-title-signed">Signed up (' + effective + ')</span>' +
    '<button class="display-btn" data-evtid="' + evt.id + '" data-type="signed">Display / Print</button>' +
    '</div>';

  if (avList.length === 0) {
    var em = document.createElement('div');
    em.className = 'no-signups-msg';
    em.textContent = 'Nobody signed up yet.';
    signedSec.appendChild(em);
  } else {
    var grid = document.createElement('div');
    grid.className = 'names-grid';
    var nameMap = getDayMultiSignups(evt.event_date);
    avList.forEach(function(av, i) {
      grid.appendChild(buildNameChip(av, evt, nameMap, i));
    });
    signedSec.appendChild(grid);
  }
  body.appendChild(signedSec);

  // Not-signed-up toggle
  var notList = getNotSignedUp(evt.event_date);
  var notToggle = document.createElement('div');
  notToggle.className = 'not-panel-toggle';
  notToggle.setAttribute('data-evtid', evt.id);
  notToggle.innerHTML = '<span class="not-panel-toggle-label panel-title-not">Not signed up for this date (' + notList.length + ')</span>' +
    '<div class="not-panel-toggle-right">' +
    '<button class="display-btn" data-evtid="' + evt.id + '" data-type="not">Display / Print</button>' +
    '<span class="chevron" id="notchev-' + evt.id + '">v</span></div>';
  notToggle.addEventListener('click', function(e) {
    if (e.target.closest('.display-btn')) return;
    toggleNotPanel(evt.id);
  });
  body.appendChild(notToggle);

  var notBody = document.createElement('div');
  notBody.className = 'not-panel-body';
  notBody.id = 'notbody-' + evt.id;
  buildNotList(notBody, notList, evt, false);
  body.appendChild(notBody);

  card.appendChild(hdr);
  card.appendChild(body);

  // Wire up the display/print buttons
  signedSec.querySelector('.display-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    openPrintPanel(evt.id, 'signed');
  });
  notToggle.querySelector('.display-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    openPrintPanel(evt.id, 'not');
  });

  return card;
}

function buildNameChip(av, evt, nameMap, i) {
  var multiList = nameMap[av.staff_name] || [];
  var hasMulti = multiList.length > 1;
  var assignedTo = getAssignment(av.staff_name, evt.event_date);
  var col = AVATAR_COLORS[i % AVATAR_COLORS.length];
  var initials = av.staff_name.split(' ').map(function(p) { return p[0] || ''; }).join('').toUpperCase().slice(0, 2);

  var chip = document.createElement('div');
  var classes = ['name-chip'];
  if (hasMulti && !assignedTo) classes.push('has-multiple');
  else if (assignedTo === evt.id) classes.push('assigned-here');
  else if (assignedTo && assignedTo !== evt.id) classes.push('assigned-elsewhere');
  chip.className = classes.join(' ');

  var avatarHtml = '<div class="name-avatar" style="background:' + col[0] + ';color:' + col[1] + ';">' + initials + '</div>';
  var nameHtml = '<span class="name-text">' + escapeHtml(av.staff_name) + '</span>';
  var noteHtml = av.note ? '<span class="name-note">' + escapeHtml(av.note) + '</span>' : '';
  var extraHtml = '';
  if (hasMulti && !assignedTo) {
    extraHtml = '<span class="multi-badge">' + multiList.length + 'x</span>';
  } else if (assignedTo === evt.id) {
    extraHtml = '<span class="name-tag assigned-here">\u2713 here</span>';
  } else if (assignedTo && assignedTo !== evt.id) {
    var otherEvt = findEventById(assignedTo);
    var otherLabel = otherEvt ? otherEvt.venue : '';
    extraHtml = '<span class="name-tag">\u2197 ' + escapeHtml(otherLabel) + '</span>';
  }

  chip.innerHTML = avatarHtml + nameHtml + noteHtml + extraHtml;
  return chip;
}

function buildNotList(container, notList, evt, showAll) {
  container.innerHTML = '';
  var toShow = showAll ? notList : notList.slice(0, NOT_SHOW_INITIAL);
  toShow.forEach(function(emp, i) {
    var fullName = emp.first_name + ' ' + emp.last_name;
    var histCount = pcHistoryCounts[fullName] || 0;
    var row = document.createElement('div');
    row.className = 'not-name-row';
    row.innerHTML = '<div class="not-name-left">' +
      '<span class="not-rank">' + (i + 1) + '</span>' +
      '<span class="not-name-text">' + escapeHtml(fullName) + '</span>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:8px;">' +
      (emp.phone ? '<span class="not-phone">' + escapeHtml(emp.phone) + '</span>' : '') +
      (histCount >= 1 ? '<span class="not-count-badge">' + histCount + ' past</span>' : '') +
      '</div>';
    container.appendChild(row);
  });
  if (!showAll && notList.length >= NOT_SHOW_INITIAL + 1) {
    var moreBtn = document.createElement('button');
    moreBtn.className = 'show-more-not';
    moreBtn.textContent = '+ Show ' + (notList.length - NOT_SHOW_INITIAL) + ' more';
    moreBtn.addEventListener('click', function() {
      buildNotList(container, notList, evt, true);
    });
    container.appendChild(moreBtn);
  }
}

function toggleCard(evtId) {
  var body = document.getElementById('body-' + evtId);
  var hdr = document.querySelector('#card-' + evtId + ' .event-card-header');
  var chev = document.getElementById('chev-' + evtId);
  var open = body.classList.contains('open');
  body.classList.toggle('open', !open);
  hdr.classList.toggle('open', !open);
  if (chev) chev.textContent = open ? 'v' : '^';
}

function toggleNotPanel(evtId) {
  var body = document.getElementById('notbody-' + evtId);
  var chev = document.getElementById('notchev-' + evtId);
  var open = body.classList.contains('open');
  body.classList.toggle('open', !open);
  if (chev) chev.textContent = open ? 'v' : '^';
}

// ============ PRINT OVERLAY ============

function openPrintPanel(evtId, type) {
  var evt = findEventById(evtId);
  if (!evt) return;

  var dateObj = new Date(evt.event_date + 'T12:00:00');
  var dateStr = DAYS_LONG[dateObj.getDay()] + ', ' + MONTHS[dateObj.getMonth()] + ' ' + dateObj.getDate() + ', ' + dateObj.getFullYear();
  var shiftStr = formatShiftRange(evt);
  var metaStr = (VENUE_LABELS[evt.venue] || evt.venue) + (shiftStr && shiftStr !== '--' ? '  ' + String.fromCharCode(8226) + '  ' + shiftStr : '');
  var metaWithDate = dateStr + '  ' + String.fromCharCode(8226) + '  ' + metaStr;

  var now = new Date();
  var stamp = 'Printed ' + now.toLocaleDateString('en-US', {weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'}) + ' at ' + now.toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit'});

  document.getElementById('print-evt-name').textContent = evt.event_name;
  document.getElementById('print-evt-meta').textContent = metaWithDate;
  document.getElementById('print-stamp').textContent = stamp;

  var typeEl = document.getElementById('print-type');
  var listEl = document.getElementById('print-list');
  listEl.innerHTML = '';

  if (type === 'signed') {
    typeEl.className = 'print-panel-type signed';
    typeEl.textContent = 'Signed Up';
    var avList = pcAvailability[evtId] || [];
    if (avList.length === 0) {
      listEl.innerHTML = '<div class="empty-print">Nobody signed up yet.</div>';
    } else {
      var nameMap = getDayMultiSignups(evt.event_date);
      var rendered = 0;
      avList.forEach(function(av, i) {
        rendered++;
        var phone = getEmployeePhone(av.staff_name);
        var multiList = nameMap[av.staff_name] || [];
        var hasMulti = multiList.length > 1;
        var assignedTo = getAssignment(av.staff_name, evt.event_date);
        var nameClass = 'print-name';
        var tagHtml = '';
        if (assignedTo === evt.id) {
          tagHtml = ' <span class="print-tag green">\u2713 assigned here</span>';
        } else if (assignedTo && assignedTo !== evt.id) {
          var other = findEventById(assignedTo);
          nameClass = 'print-name struck';
          tagHtml = ' <span class="print-tag">\u2197 working ' + escapeHtml(other ? other.venue : '') + '</span>';
        } else if (hasMulti) {
          tagHtml = ' <span class="print-tag">also on ' + multiList.length + ' events</span>';
        }
        var noteHtml = av.note ? ' <span class="print-note">' + escapeHtml(av.note) + '</span>' : '';
        var row = document.createElement('div');
        row.className = 'print-name-row';
        row.innerHTML = '<div class="print-name-left">' +
          '<span class="print-num">' + rendered + '</span>' +
          '<span class="' + nameClass + '">' + escapeHtml(av.staff_name) + '</span>' +
          tagHtml + noteHtml +
          '</div>' +
          '<span class="print-phone">' + escapeHtml(phone) + '</span>';
        listEl.appendChild(row);
      });
    }
  } else {
    typeEl.className = 'print-panel-type not-signed';
    typeEl.textContent = 'Not Signed Up  ' + String.fromCharCode(8212) + '  Available to Call';
    var notList = getNotSignedUp(evt.event_date);
    if (notList.length === 0) {
      listEl.innerHTML = '<div class="empty-print">Everyone has signed up!</div>';
    } else {
      notList.forEach(function(emp, i) {
        var fullName = emp.first_name + ' ' + emp.last_name;
        var histCount = pcHistoryCounts[fullName] || 0;
        var row = document.createElement('div');
        row.className = 'print-name-row';
        row.innerHTML = '<div class="print-name-left">' +
          '<span class="print-num">' + (i + 1) + '</span>' +
          '<span class="print-name">' + escapeHtml(fullName) + '</span>' +
          (histCount >= 1 ? '<span class="not-count-badge" style="margin-left:6px;">' + histCount + ' past</span>' : '') +
          '</div>' +
          '<span class="print-phone">' + escapeHtml(emp.phone || '') + '</span>';
        listEl.appendChild(row);
      });
    }
  }

  document.getElementById('print-overlay').classList.add('open');
}

document.getElementById('do-print-btn').addEventListener('click', function() { window.print(); });
document.getElementById('close-print-btn').addEventListener('click', function() {
  document.getElementById('print-overlay').classList.remove('open');
});
document.getElementById('print-close-x').addEventListener('click', function() {
  document.getElementById('print-overlay').classList.remove('open');
});
// Click outside the panel (on the dark backdrop) closes it
document.getElementById('print-overlay').addEventListener('click', function(e) {
  if (e.target === this) {
    this.classList.remove('open');
  }
});

// Escape closes print overlay
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' || e.keyCode === 27) {
    document.getElementById('print-overlay').classList.remove('open');
  }
});

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3500);
}

pcAuth.require({
  pageSlug: 'availability-responses',
  onReady: function(user) {
    var el = document.getElementById('header-right');
    if (el && user) {
      el.innerHTML = '<span class="header-user">' + escapeHtml(user.display_name || user.email) + '</span>' +
        '<button class="sign-out-btn" onclick="pcAuth.signOut()">Sign out</button>';
    }
    init();
  }
});

})();
</script>
