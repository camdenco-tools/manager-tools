<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receive Payment — Admin · Popcorn Chez</title>

<!-- DM Sans — matches the rest of the toolkit -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">

<!-- Auth must load BEFORE pc-nav (pc-nav reads pcAuth.getUser()) -->
<script src="/pc-auth.js"></script>
<script src="/pc-nav.js"></script>
<script src="/pc-activity.js"></script>

<style>
  /* ========================================================================
     RESET / BASE
     ======================================================================== */
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #faf9f6;
    color: #1a1a1a;
    font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ========================================================================
     PAGE-TITLE ROW
     ======================================================================== */
  .page-title-row {
    background: #faf9f6;
    border-bottom: 1px solid #e8e8e4;
    padding: 18px 22px 16px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .page-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .page-title-meta {
    font-size: 12px;
    color: #888;
    font-weight: 500;
  }

  /* ========================================================================
     CONTENT WRAPPER
     ======================================================================== */
  .page-body {
    max-width: 1240px;
    margin: 0 auto;
    padding: 18px 22px 80px;
  }

  /* ========================================================================
     VIEW TOGGLE  (link-based; mirrors index.html exactly)
     ======================================================================== */
  .view-toggle-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 22px;
  }
  .view-toggle-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
  }
  .view-toggle {
    display: inline-flex;
    background: #f1f0eb;
    border: 1px solid #e0dfd8;
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .view-toggle a {
    background: transparent;
    border: 0;
    color: #555;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .view-toggle a:hover { color: #1a1a1a; }
  .view-toggle a.is-active {
    background: #fff;
    color: #1a1a1a;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }

  /* ========================================================================
     ACTION ROW
     ======================================================================== */
  .ar-actions-row {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 12px;
  }
  .btn-primary {
    background: #1a1a1a;
    color: #fff;
    border: 0;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s ease;
  }
  .btn-primary:hover { background: #2c2c2a; }
  .btn-primary:disabled {
    background: #b4b2a9;
    cursor: not-allowed;
  }

  /* ========================================================================
     FILTER ROW
     ======================================================================== */
  .ar-filter-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .ar-filter-row select,
  .ar-filter-row input[type="text"] {
    font-family: inherit;
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid #e0dfd8;
    border-radius: 6px;
    background: #fff;
    color: #1a1a1a;
  }
  .ar-filter-row select:focus,
  .ar-filter-row input[type="text"]:focus {
    outline: none;
    border-color: #1a1a1a;
  }
  .ar-filter-row input[type="text"] {
    flex: 1;
    min-width: 220px;
  }

  /* ========================================================================
     BATCHES LIST
     ======================================================================== */
  .batches-list-wrap {
    background: #fff;
    border: 0.5px solid #e0dfd8;
    border-radius: 10px;
    overflow: hidden;
  }
  .batches-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .batches-table thead tr {
    background: #f6f6f3;
    border-bottom: 1px solid #e0dfd8;
  }
  .batches-table th {
    text-align: left;
    padding: 10px 12px;
    font-weight: 500;
    color: #555;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .batches-table th[data-sort] .sort-arrow {
    opacity: 0;
    margin-left: 4px;
    font-size: 10px;
  }
  .batches-table th.is-sorted .sort-arrow { opacity: 1; }
  .batches-table th.is-amount { text-align: right; }
  .batches-table tbody tr {
    border-bottom: 1px solid #f0efe8;
    cursor: pointer;
    transition: background 0.08s ease;
  }
  .batches-table tbody tr:hover { background: #fafaf6; }
  .batches-table tbody tr:last-child { border-bottom: 0; }
  .batches-table td {
    padding: 11px 12px;
    vertical-align: middle;
  }
  .batches-table td.col-advice {
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .batches-table td.col-advice.is-blank { color: #aaa; font-style: italic; font-weight: 400; }
  .batches-table td.col-date { font-variant-numeric: tabular-nums; }
  .batches-table td.col-amount,
  .batches-table td.col-allocated {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .batches-table td.col-allocated {
    color: #555;
    font-weight: 400;
  }
  .batches-table td.col-remaining {
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: #555;
  }
  .batches-table td.col-remaining.has-remaining {
    color: #854F0B;
    font-weight: 500;
  }
  .batches-table td.col-remaining.is-fully {
    color: #c8c6bd;
  }
  .batches-table td.col-age { color: #555; font-variant-numeric: tabular-nums; }

  /* Status badges — mirrored from invoice list with payment-specific keys */
  .status-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: capitalize;
  }
  .status-badge.is-unallocated         { background: #fceaea; color: #791F1F; }
  .status-badge.is-partially-allocated { background: #fef6ec; color: #854F0B; }
  .status-badge.is-fully-allocated     { background: #eaf3de; color: #27500A; }

  /* Empty + show-older states */
  .list-empty {
    padding: 50px 20px;
    text-align: center;
    color: #888;
    font-size: 13px;
  }
  .list-loading {
    padding: 50px 20px;
    text-align: center;
    color: #aaa;
    font-size: 13px;
  }
  .show-older-wrap {
    text-align: center;
    padding: 12px;
    border-top: 1px solid #f0efe8;
    background: #fafaf6;
  }
  .btn-link {
    background: transparent;
    border: 0;
    color: #555;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .btn-link:hover { color: #1a1a1a; text-decoration: underline; }

  /* ========================================================================
     SUMMARY STRIP (above the table — small at-a-glance for batches)
     ======================================================================== */
  .summary-strip {
    background: #fff;
    border: 0.5px solid #e0dfd8;
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 14px;
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    align-items: baseline;
  }
  .summary-cell-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 2px;
    display: block;
  }
  .summary-cell-value {
    font-size: 16px;
    font-weight: 600;
    color: #1a1a1a;
    font-variant-numeric: tabular-nums;
  }
  .summary-cell-value.is-warning { color: #854F0B; }
  .summary-cell-value.is-success { color: #27500A; }
  .summary-cell-value.is-muted { color: #888; }

  /* ========================================================================
     TOAST
     ======================================================================== */
  .pc-toast-host {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2000;
    pointer-events: none;
  }
  .pc-toast {
    background: #1a1a1a;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 11px 18px;
    border-radius: 24px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .pc-toast.is-shown { opacity: 1; transform: translateY(0); }

  /* ========================================================================
     MODAL SCAFFOLDING
     ======================================================================== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.36);
    z-index: 1500;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 16px;
    overflow-y: auto;
  }
  .modal-backdrop.is-open { display: flex; }

  /* ========================================================================
     RECORD PAYMENT MODAL  (Stage 3.2 — UI only, save lands in 3.3)
     ======================================================================== */
  .pm-modal-card {
    background: #fff;
    border-radius: 14px;
    max-width: 820px;
    width: 100%;
    padding: 0;
    box-shadow: 0 10px 40px rgba(0,0,0,0.18);
    color: #1a1a1a;
    overflow: hidden;
    position: relative;
  }
  .pm-modal-head {
    padding: 18px 22px 14px;
    border-bottom: 1px solid #f0efe8;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .pm-modal-title { font-size: 17px; font-weight: 600; }
  .pm-modal-subtitle {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }
  .pm-modal-close {
    background: transparent;
    border: 0;
    font-size: 22px;
    color: #888;
    cursor: pointer;
    line-height: 1;
    padding: 4px 8px;
  }
  .pm-modal-close:hover { color: #1a1a1a; }
  .pm-modal-body { padding: 18px 22px; }
  .pm-modal-footer {
    padding: 14px 22px;
    border-top: 1px solid #f0efe8;
    background: #fafaf6;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .pm-modal-footer-left  { display: flex; gap: 10px; align-items: center; }
  .pm-modal-footer-right { display: flex; gap: 10px; align-items: center; }

  /* Header field grid */
  .pm-field-grid {
    display: grid;
    grid-template-columns: 1.2fr 0.9fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .pm-field label.pm-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 5px;
  }
  .pm-label .req { color: #c33; }
  .pm-field select,
  .pm-field input[type="text"],
  .pm-field input[type="date"],
  .pm-field textarea {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    border: 1px solid #e0dfd8;
    border-radius: 6px;
    background: #fff;
    color: #1a1a1a;
  }
  .pm-field select:focus,
  .pm-field input:focus,
  .pm-field textarea:focus {
    outline: none;
    border-color: #1a1a1a;
  }
  .pm-field textarea { resize: vertical; }

  /* Total + allocation strip */
  .pm-total-block {
    background: #f6f6f3;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 14px;
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 14px;
    align-items: center;
  }
  .pm-total-block .pm-total-label,
  .pm-total-block .pm-alloc-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 4px;
    display: block;
  }
  .pm-total-block input.pm-total-input {
    width: 100%;
    font-family: inherit;
    font-size: 17px;
    font-weight: 500;
    padding: 6px 10px;
    border: 1px solid #e0dfd8;
    border-radius: 6px;
    background: #fff;
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: #1a1a1a;
  }
  .pm-total-block input.pm-total-input:focus { outline: none; border-color: #1a1a1a; }
  .pm-alloc-strip {
    text-align: right;
    padding: 6px 10px;
    border-radius: 6px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .pm-alloc-strip.is-idle    { background: transparent; }
  .pm-alloc-strip.is-balanced{ background: #eaf3de; color: #27500A; }
  .pm-alloc-strip.is-remaining { background: #fef6ec; color: #854F0B; }
  .pm-alloc-strip.is-over    { background: #fceaea; color: #791F1F; }
  .pm-alloc-text {
    font-size: 14px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .pm-alloc-strip.is-idle .pm-alloc-text { color: #888; }

  /* Picker top row — search + sort hint */
  .pm-picker-toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
  }
  .pm-picker-toolbar input[type="text"] {
    flex: 1;
    font-family: inherit;
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid #e0dfd8;
    border-radius: 6px;
    background: #fff;
  }
  .pm-picker-toolbar input[type="text"]:focus { outline: none; border-color: #1a1a1a; }
  .pm-picker-hint {
    font-size: 11px;
    color: #888;
    white-space: nowrap;
  }

  /* Picker table */
  .pm-picker-wrap {
    border: 0.5px solid #e0dfd8;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
  }
  .pm-picker-scroll {
    max-height: 380px;
    overflow-y: auto;
  }
  .pm-picker-header,
  .pm-picker-row {
    display: grid;
    grid-template-columns: 28px 110px 80px 1.3fr 80px 70px 100px 110px;
    gap: 8px;
    align-items: center;
    padding: 0 12px;
  }
  .pm-picker-header {
    background: #f6f6f3;
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #888;
    border-bottom: 0.5px solid #e0dfd8;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .pm-picker-header .col-open,
  .pm-picker-header .col-apply { text-align: right; }
  .pm-picker-row {
    padding: 9px 12px;
    font-size: 13px;
    border-bottom: 0.5px solid #f0efe8;
    transition: background 0.08s ease;
  }
  .pm-picker-row:last-child { border-bottom: 0; }
  .pm-picker-row.is-checked { background: #eef5fc; }
  .pm-picker-row:hover:not(.is-checked) { background: #fafaf6; }
  .pm-picker-row .pm-cell-internal {
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .pm-picker-row .pm-cell-venue { font-size: 12px; color: #555; }
  .pm-picker-row .pm-cell-stand { line-height: 1.3; }
  .pm-picker-row .pm-cell-stand .pm-cell-ref {
    font-size: 11px;
    color: #888;
  }
  .pm-picker-row .pm-cell-date { font-variant-numeric: tabular-nums; font-size: 12px; }
  .pm-picker-row .pm-cell-open {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .pm-picker-row .pm-cell-apply-wrap { text-align: right; }
  .pm-picker-row input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
  }
  .pm-picker-row .pm-apply-input {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    padding: 5px 8px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    border: 1px solid #e0dfd8;
    border-radius: 4px;
    background: #fff;
  }
  .pm-picker-row .pm-apply-input:focus { outline: none; border-color: #1a1a1a; }
  .pm-picker-row .pm-apply-input:disabled {
    background: transparent;
    color: #c8c6bd;
    border-color: transparent;
  }
  .pm-picker-row .pm-apply-input.is-partial {
    border-color: #f3d9a8;
    background: #fef6ec;
  }
  .pm-picker-row .pm-apply-input.is-error {
    border-color: #791F1F;
    background: #fceaea;
  }

  /* Mini status pill in the picker (matches Receivables list) */
  .pm-status-pill {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: capitalize;
  }
  .pm-status-pill.is-open     { background: #e6f1fb; color: #0C447C; }
  .pm-status-pill.is-partial  { background: #fef6ec; color: #854F0B; }
  .pm-status-pill.is-disputed { background: #fceaea; color: #791F1F; }

  /* Empty / loading states inside the picker */
  .pm-picker-empty {
    padding: 40px 20px;
    text-align: center;
    color: #888;
    font-size: 13px;
  }
  .pm-picker-loading {
    padding: 40px 20px;
    text-align: center;
    color: #aaa;
    font-size: 13px;
  }

  /* Notes textarea row — full-width field below its own label.
     Without display: block on the label, label + textarea try to share a row. */
  .pm-notes-row { margin-top: 14px; }
  .pm-notes-row label.pm-label { display: block; margin-bottom: 5px; }
  .pm-notes-row textarea {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    border: 1px solid #e0dfd8;
    border-radius: 6px;
    background: #fff;
    color: #1a1a1a;
    resize: vertical;
  }
  .pm-notes-row textarea:focus { outline: none; border-color: #1a1a1a; }

  /* ====================================================================
     REMITTANCE ATTACHMENT
     Drop-zone style picker below Notes. Pattern modeled on w4_payroll_v5
     bank-statement upload, simplified for desktop-first usage.
     ==================================================================== */
  .pm-attach-row { margin-top: 14px; }
  .pm-attach-row label.pm-label { display: block; margin-bottom: 5px; }

  /* iPhone HEIC warning strip — always visible above the dropzone so the
     user has the workaround instructions before they hit the iOS picker. */
  .pm-attach-warn {
    background: #fef6ec;
    border: 1px solid #f3d9a8;
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 8px;
    font-size: 12px;
    color: #633806;
    line-height: 1.45;
  }
  .pm-attach-warn strong { font-weight: 600; }

  .pm-attach-zone {
    border: 1.5px dashed #c8c6bd;
    border-radius: 8px;
    padding: 22px 16px;
    text-align: center;
    background: #fafaf6;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .pm-attach-zone:hover {
    background: #f1f0eb;
    border-color: #888;
  }
  .pm-attach-zone-icon {
    font-size: 22px;
    margin-bottom: 4px;
    line-height: 1;
  }
  .pm-attach-zone-text {
    font-size: 13px;
    color: #555;
    font-weight: 500;
  }
  .pm-attach-zone-hint {
    font-size: 11px;
    color: #888;
    margin-top: 3px;
  }

  /* Selected-file display state — shown after a file is picked. */
  .pm-attach-done {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 14px;
    background: #eaf3de;
    border: 1px solid #c7d9a7;
    border-radius: 8px;
  }
  .pm-attach-done-info {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .pm-attach-done-icon {
    font-size: 18px;
    flex-shrink: 0;
  }
  .pm-attach-done-name {
    font-size: 13px;
    font-weight: 500;
    color: #1a1a1a;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pm-attach-done-size {
    font-size: 11px;
    color: #555;
    margin-left: 6px;
  }
  .pm-attach-remove {
    background: transparent;
    border: 0;
    color: #791F1F;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .pm-attach-remove:hover {
    background: #fceaea;
  }

  /* ====================================================================
     PAPERCLIP ICON IN BATCHES LIST
     Inline with the Advice # cell. Only shown when raw_document_url
     is non-null. Click opens the signed URL in a new tab.
     ==================================================================== */
  .pm-clip-btn {
    background: transparent;
    border: 0;
    color: #555;
    font-size: 14px;
    cursor: pointer;
    padding: 2px 6px;
    margin-left: 4px;
    border-radius: 4px;
    line-height: 1;
    vertical-align: middle;
    transition: background 0.1s ease, color 0.1s ease;
  }
  .pm-clip-btn:hover {

  </main>

  <!-- Toast host -->

  <!-- Modal backdrop (used by Stage 3.2) -->

<script>
(function () {
  'use strict';

  // =====================================================================
  // CONFIG
  // =====================================================================
  var SB_URL  = 'https://aoazlttdjowhlfcksoyl.supabase.co';
  var SB_REST = SB_URL + '/rest/v1/';

  // =====================================================================
  // PAGE STATE  (module-private)
  //
  // Mirrors the shape of /accounts-receivable/index.html's `state` object so
  // patterns transfer cleanly. Filters are server-applied where possible
  // (client_id, status, date bound); search is client-side over the loaded
  // window.
  // =====================================================================
  var state = {
    batches: [],          // currently loaded payment batches (denormalized)
    clients: [],          // active ar_clients rows for filter dropdown

    filters: {
      client: 'all',      // 'all' | <client_id uuid>
      status: 'all',      // 'all' | 'unallocated' | 'partially_allocated' | 'fully_allocated'
      search: ''          // free-text, client-side filter only
    },

    sortBy:  'payment_date',
    sortDir: 'desc',

    dateBoundActive: true, // 12-month window unless "Show older" clicked
    initialFetchDone: false
  };

  // =====================================================================
  // UTILITIES
  // =====================================================================

  function pad2(n) { n = String(n); return n.length < 2 ? '0' + n : n; }

  function todayIso() {
    var d = new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }

  function monthsAgoIso(months) {
    var d = new Date();
    d.setMonth(d.getMonth() - months);
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }

  function daysBetween(aIso, bIso) {
    if (!aIso || !bIso) return 0;
    var a = new Date(aIso + 'T00:00:00');
    var b = new Date(bIso + 'T00:00:00');
    return Math.round((b - a) / 86400000);
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    var parts = iso.split('-');
    if (parts.length !== 3) return iso;
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var m = months[parseInt(parts[1], 10) - 1] || '';
    return m + ' ' + parseInt(parts[2], 10) + ', ' + parts[0];
  }

  function fmtMoney(n) {
    if (n == null || isNaN(n)) n = 0;
    var sign = n < 0 ? '-' : '';
    var abs = Math.abs(n);
    return sign + '$' + abs.toLocaleString('en-US', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function pluralBatch(n) { return n === 1 ? '1 batch' : (n + ' batches'); }

  // =====================================================================
  // MATH EVALUATOR
  //
  // Accepts simple arithmetic expressions: + - * / and parentheses.
  // Returns a Number (rounded to 2 decimal places) or NaN on failure.
  // Hand-rolled shunting-yard so we never call eval(). Identical to the
  // implementation in /accounts-receivable/index.html (Stage 2.2). Both
  // pages need it; eventually this lives in a shared helper.
  // =====================================================================
  function evalMath(expr) {
    if (expr == null) return NaN;
    var s = String(expr).trim();
    if (!s) return NaN;
    s = s.replace(/[\$,\s]/g, '');
    if (!/^[0-9.+\-*/()]+$/.test(s)) return NaN;
    if (/^-?\d+(\.\d+)?$/.test(s)) {
      var n = Number(s);
      return isFinite(n) ? Math.round(n * 100) / 100 : NaN;
    }
    var tokens = [];
    var i = 0;
    while (i < s.length) {
      var ch = s[i];
      if (ch === '(' || ch === ')') {
        tokens.push(ch);
        i++;
      } else if ('+-*/'.indexOf(ch) !== -1) {
        var prev = tokens.length ? tokens[tokens.length - 1] : null;
        var isUnary = (ch === '-' || ch === '+') && (
          prev === null || prev === '(' ||
          (typeof prev === 'string' && '+-*/'.indexOf(prev) !== -1)
        );
        if (isUnary) {
          var sign = ch === '-' ? -1 : 1;
          i++;
          var startN = i;
          while (i < s.length && /[0-9.]/.test(s[i])) i++;
          if (startN === i) return NaN;
          var nv = Number(s.substring(startN, i));
          if (!isFinite(nv)) return NaN;
          tokens.push(sign * nv);
        } else {
          tokens.push(ch);
          i++;
        }
      } else if (/[0-9.]/.test(ch)) {
        var start = i;
        while (i < s.length && /[0-9.]/.test(s[i])) i++;
        var num = Number(s.substring(start, i));
        if (!isFinite(num)) return NaN;
        tokens.push(num);
      } else {
        return NaN;
      }
    }
    if (tokens.length === 0) return NaN;
    var prec = { '+': 1, '-': 1, '*': 2, '/': 2 };
    var output = [];
    var ops = [];
    for (var t = 0; t < tokens.length; t++) {
      var tok = tokens[t];
      if (typeof tok === 'number') {
        output.push(tok);
      } else if (tok === '(') {
        ops.push(tok);
      } else if (tok === ')') {
        while (ops.length && ops[ops.length - 1] !== '(') output.push(ops.pop());
        if (!ops.length) return NaN;
        ops.pop();
      } else if (prec[tok]) {
        while (ops.length && ops[ops.length - 1] !== '(' && prec[ops[ops.length - 1]] >= prec[tok]) {
          output.push(ops.pop());
        }
        ops.push(tok);
      } else {
        return NaN;
      }
    }
    while (ops.length) {
      var o = ops.pop();
      if (o === '(' || o === ')') return NaN;
      output.push(o);
    }
    var stack = [];
    for (var k = 0; k < output.length; k++) {
      var x = output[k];
      if (typeof x === 'number') {
        stack.push(x);
      } else {
        if (stack.length < 2) return NaN;
        var b = stack.pop();
        var a = stack.pop();
        var r;
        switch (x) {
          case '+': r = a + b; break;
          case '-': r = a - b; break;
          case '*': r = a * b; break;
          case '/': r = b === 0 ? NaN : a / b; break;
          default: return NaN;
        }
        if (!isFinite(r)) return NaN;
        stack.push(r);
      }
    }
    if (stack.length !== 1) return NaN;
    return Math.round(stack[0] * 100) / 100;
  }

  // =====================================================================
  // TOAST
  // =====================================================================
  function showToast(msg, ms) {
    ms = ms || 2400;
    var host = document.getElementById('pcToastHost');
    if (!host) return;
    var el = document.createElement('div');
    el.className = 'pc-toast';
    el.textContent = msg;
    host.appendChild(el);
    requestAnimationFrame(function () { el.classList.add('is-shown'); });
    setTimeout(function () {
      el.classList.remove('is-shown');
      setTimeout(function () { el.remove(); }, 260);
    }, ms);
  }

  // =====================================================================
  // JWT EXPIRY PATTERN  (mirrored from index.html)
  // =====================================================================
  function handleAuthFailure() {
    try {
      localStorage.removeItem('sb_access_token');
      localStorage.removeItem('sb_refresh_token');
    } catch (e) { /* ignore */ }
    showToast('Session expired. Reloading to sign in again…', 1800);
    setTimeout(function () { window.location.reload(); }, 1800);
  }

  function checkAuthError(res, text) {
    if (res.status === 401 || (text && text.indexOf('JWT expired') !== -1)) {
      var err = new Error('JWT expired');
      err.authFailed = true;
      return err;
    }
    return null;
  }

  function authFetch(url, options) {
    return fetch(url, options).then(function (r) {
      if (!r.ok) {
        return r.text().then(function (t) {
          var ae = checkAuthError(r, t);
          if (ae) throw ae;
          throw new Error(t || ('HTTP ' + r.status));
        });
      }
      return r.text().then(function (t) {
        if (!t) return [];
        try { return JSON.parse(t); } catch (e) { return []; }
      });
    });
  }

  // Expose for Stages 3.2 / 3.3.
  window.ARP = {
    SB_URL: SB_URL,
    SB_REST: SB_REST,
    showToast: showToast,
    authFetch: authFetch,
    handleAuthFailure: handleAuthFailure
  };

  // =====================================================================
  // FETCHES
  //
  // Lazy contract: only what the default list needs is fetched on page-open.
  // Allocations, invoices, audit log — all deferred until Stage 3.2 / 3.3.
  // =====================================================================

  function fetchClients() {
    return ARP.authFetch(
      SB_REST + 'ar_clients?select=id,name,is_active' +
      '&is_active=eq.true&order=name.asc',
      { headers: pcAuth.headers() }
    );
  }

  function fetchPaymentBatches() {
    var f = state.filters;

    var statusClause;
    switch (f.status) {
      case 'open':
        statusClause = 'status=in.(unallocated,partially_allocated)';
        break;
      case 'unallocated':
        statusClause = 'status=eq.unallocated';
        break;
      case 'partially_allocated':
        statusClause = 'status=eq.partially_allocated';
        break;
      case 'fully_allocated':
        statusClause = 'status=eq.fully_allocated';
        break;
      case 'all':
      default:
        statusClause = '';
        break;
    }

    var clientClause = (f.client && f.client !== 'all')
      ? 'client_id=eq.' + encodeURIComponent(f.client)
      : '';

    var dateClause = state.dateBoundActive
      ? 'payment_date=gte.' + monthsAgoIso(12)
      : '';

    var selectClause = 'select=' + [
      'id',
      'client_id',
      'advice_number',
      'payment_date',
      'payment_amount',
      'allocated_amount',
      'status',
      'notes',
      'raw_document_url',
      'file_name',
      'created_at',
      'created_by',
      'ar_clients(name)'
    ].join(',');

    var parts = [selectClause];
    if (statusClause) parts.push(statusClause);
    if (clientClause) parts.push(clientClause);
    if (dateClause)   parts.push(dateClause);
    parts.push('order=payment_date.desc');

    var url = SB_REST + 'ar_payment_batches?' + parts.join('&');
    return ARP.authFetch(url, { headers: pcAuth.headers() });
  }

  // =====================================================================
  // DERIVED VALUES
  // =====================================================================

  function denormalize(batch) {
    var today = todayIso();
    batch._client_name = batch.ar_clients && batch.ar_clients.name ? batch.ar_clients.name : '';
    batch._age_days    = daysBetween(batch.payment_date, today);
    var paid = Number(batch.payment_amount || 0);
    var alloc = Number(batch.allocated_amount || 0);
    batch._remaining = Math.round((paid - alloc) * 100) / 100;
    return batch;
  }

  function batchSortKey(b, sortBy) {
    switch (sortBy) {
      case 'client_name':      return (b._client_name || '').toLowerCase();
      case 'advice_number':    return (b.advice_number || '').toLowerCase();
      case 'payment_date':     return b.payment_date || '';
      case 'payment_amount':   return Number(b.payment_amount || 0);
      case 'allocated_amount': return Number(b.allocated_amount || 0);
      case 'remaining':        return b._remaining || 0;
      case 'age':              return b._age_days || 0;
      case 'status':           return b.status || '';
      default:                 return b.payment_date || '';
    }
  }

  function visibleBatches() {
    var q = (state.filters.search || '').trim().toLowerCase();
    var arr = state.batches.filter(function (b) {
      if (!q) return true;
      var hay = [
        b.advice_number,
        b._client_name,
        String(b.payment_amount || ''),
        b.notes
      ].join(' ').toLowerCase();
      return hay.indexOf(q) !== -1;
    });

    var sb = state.sortBy;
    var dir = state.sortDir === 'asc' ? 1 : -1;
    arr.sort(function (a, b) {
      var ka = batchSortKey(a, sb);
      var kb = batchSortKey(b, sb);
      if (ka < kb) return -1 * dir;
      if (ka > kb) return  1 * dir;
      return 0;
    });
    return arr;
  }

  // =====================================================================
  // RENDER
  // =====================================================================

  function renderFilterDropdowns() {
    var cSel = document.getElementById('filterClient');
    if (!cSel) return;
    cSel.innerHTML = '<option value="all">All clients</option>' +
      state.clients.map(function (c) {
        return '<option value="' + esc(c.id) + '">' + esc(c.name) + '</option>';
      }).join('');
    cSel.value = state.filters.client;
  }

  function renderSummaryStrip() {
    var rows = state.batches; // strip reflects everything loaded (pre-search filter)
    var totalReceived = 0, totalAllocated = 0, totalRemaining = 0;
    rows.forEach(function (b) {
      totalReceived  += Number(b.payment_amount || 0);
      totalAllocated += Number(b.allocated_amount || 0);
      totalRemaining += Number(b._remaining || 0);
    });
    var countEl  = document.getElementById('summaryCount');
    var recvEl   = document.getElementById('summaryReceived');
    var allocEl  = document.getElementById('summaryAllocated');
    var remainEl = document.getElementById('summaryRemaining');
    if (countEl)  countEl.textContent  = String(rows.length);
    if (recvEl)   recvEl.textContent   = fmtMoney(totalReceived);
    if (allocEl)  allocEl.textContent  = fmtMoney(totalAllocated);
    if (remainEl) {
      remainEl.textContent = fmtMoney(totalRemaining);
      // Muted when remaining is zero (everything reconciled).
      if (Math.abs(totalRemaining) < 0.005) {
        remainEl.classList.remove('is-warning');
        remainEl.classList.add('is-muted');
      } else {
        remainEl.classList.add('is-warning');
        remainEl.classList.remove('is-muted');
      }
    }
  }

  function renderBatchesTable() {
    var tbody   = document.getElementById('batchesTableBody');
    var emptyEl = document.getElementById('batchesListEmpty');
    var olderEl = document.getElementById('showOlderWrap');
    if (!tbody) return;

    var rows = visibleBatches();

    if (rows.length === 0) {
      tbody.innerHTML = '';
      if (emptyEl) {
        emptyEl.hidden = false;
        emptyEl.textContent = state.dateBoundActive
          ? 'No payments match these filters in the last 12 months.'
          : 'No payments match these filters.';
      }
    } else {
      if (emptyEl) emptyEl.hidden = true;

      tbody.innerHTML = rows.map(function (b) {
        var statusKey, statusLabel;
        switch (b.status) {
          case 'unallocated':         statusKey = 'is-unallocated';         statusLabel = 'unallocated'; break;
          case 'partially_allocated': statusKey = 'is-partially-allocated'; statusLabel = 'partial'; break;
          case 'fully_allocated':     statusKey = 'is-fully-allocated';     statusLabel = 'allocated'; break;
          default:                    statusKey = 'is-unallocated';         statusLabel = b.status || 'unallocated';
        }

        // Advice cell — includes the 📎 icon when the batch has an attachment.
        // The icon is interactive (button), the cell + everything else is
        // still the row-click target. Stop-propagation lives in the click
        // handler so clicking the clip doesn't also open the row.
        var clipBtn = b.raw_document_url
          ? ' <button type="button" class="pm-clip-btn" data-action="open-attachment" ' +
              'data-storage-path="' + esc(b.raw_document_url) + '" ' +
              'data-file-name="' + esc(b.file_name || 'attachment') + '" ' +
              'title="View remittance attachment" aria-label="View remittance attachment">📎</button>'
          : '';
        var adviceCell = b.advice_number
          ? '<td class="col-advice">' + esc(b.advice_number) + clipBtn + '</td>'
          : '<td class="col-advice is-blank">—' + clipBtn + '</td>';

        var remClass = 'col-remaining';
        if (b._remaining > 0.005) remClass += ' has-remaining';
        else if (Math.abs(b._remaining) < 0.005 && b.status === 'fully_allocated') remClass += ' is-fully';

        return '<tr data-batch-id="' + esc(b.id) + '">' +
          '<td>' + esc(b._client_name) + '</td>' +
          adviceCell +
          '<td class="col-date">' + esc(fmtDate(b.payment_date)) + '</td>' +
          '<td class="col-amount">' + esc(fmtMoney(Number(b.payment_amount || 0))) + '</td>' +
          '<td class="col-allocated">' + esc(fmtMoney(Number(b.allocated_amount || 0))) + '</td>' +
          '<td class="' + remClass + '">' + esc(fmtMoney(Number(b._remaining || 0))) + '</td>' +
          '<td class="col-age">' + b._age_days + 'd</td>' +
          '<td><span class="status-badge ' + statusKey + '">' + esc(statusLabel) + '</span></td>' +
        '</tr>';
      }).join('');
    }

    if (olderEl) olderEl.hidden = !state.dateBoundActive;
  }

  function renderSortHeaders() {
    var ths = document.querySelectorAll('.batches-table th[data-sort]');
    ths.forEach(function (th) {
      var key = th.getAttribute('data-sort');
      var arrow = th.querySelector('.sort-arrow');
      if (key === state.sortBy) {
        th.classList.add('is-sorted');
        if (arrow) arrow.textContent = state.sortDir === 'asc' ? '↑' : '↓';
      } else {
        th.classList.remove('is-sorted');
        if (arrow) arrow.textContent = '';
      }
    });
  }

  function setLoading(on) {
    var l = document.getElementById('batchesListLoading');
    var tbody = document.getElementById('batchesTableBody');
    var emptyEl = document.getElementById('batchesListEmpty');
    var olderEl = document.getElementById('showOlderWrap');
    if (l) l.hidden = !on;
    if (on) {
      if (tbody) tbody.innerHTML = '';
      if (emptyEl) emptyEl.hidden = true;
      if (olderEl) olderEl.hidden = true;
    }
  }

  // =====================================================================
  // WIRING
  // =====================================================================

  function reloadBatches() {
    setLoading(true);
    return fetchPaymentBatches()
      .then(function (rows) {
        state.batches = (rows || []).map(denormalize);
        renderSummaryStrip();
        renderBatchesTable();
      })
      .catch(function (e) {
        if (e && e.authFailed) { handleAuthFailure(); return; }
        showToast('Could not load payments');
        console.error('[ARP] fetchPaymentBatches failed:', e);
        state.batches = [];
        renderSummaryStrip();
        renderBatchesTable();
      })
      .then(function () { setLoading(false); });
  }

  function wireFilters() {
    var cSel = document.getElementById('filterClient');
    var sSel = document.getElementById('filterStatus');
    var srch = document.getElementById('filterSearch');

    if (cSel) cSel.addEventListener('change', function () {
      state.filters.client = cSel.value;
      state.dateBoundActive = true;
      reloadBatches();
    });
    if (sSel) sSel.addEventListener('change', function () {
      state.filters.status = sSel.value;
      state.dateBoundActive = true;
      reloadBatches();
    });
    if (srch) srch.addEventListener('input', function () {
      state.filters.search = srch.value || '';
      renderBatchesTable();

  function wireSorting() {
    var ths = document.querySelectorAll('.batches-table th[data-sort]');
    ths.forEach(function (th) {
      th.addEventListener('click', function () {
        var key = th.getAttribute('data-sort');
        if (!key) return;
        if (state.sortBy === key) {
          state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          state.sortBy = key;
          state.sortDir = (key === 'payment_date' ||
                           key === 'payment_amount' ||
                           key === 'allocated_amount' ||
                           key === 'remaining' ||
                           key === 'age') ? 'desc' : 'asc';
        }
        renderSortHeaders();
        renderBatchesTable();
      });
    });
  }

  function wireShowOlder() {
    var btn = document.getElementById('btnShowOlder');

      btn.addEventListener('click', function () {
        state.dateBoundActive = false;
        reloadBatches();

  // Row-click → Stage 3.2 will wire this to open the edit/view modal.
  // For now, the row click toasts a placeholder. The 📎 icon click is
  // handled separately (and intercepted before the row handler runs)
  // so attachment views work even before the edit modal exists.
  function wireRowClicks() {
    var tbody = document.getElementById('batchesTableBody');
    if (!tbody) return;
    tbody.addEventListener('click', function (ev) {
      var t = ev.target;
      if (!t || !t.closest) return;

      // Intercept 📎 clicks first — open the attachment, don't fall
      // through to row-click behavior.
      var clipBtn = t.closest('[data-action="open-attachment"]');
      if (clipBtn) {
        ev.stopPropagation();
        var storagePath = clipBtn.getAttribute('data-storage-path');
        if (!storagePath) return;
        clipBtn.disabled = true;  // prevent double-clicks while signing
        ARP.getSignedUrl(storagePath)
          .then(function (url) {
            window.open(url, '_blank');
          })
          .catch(function (e) {
            if (e && e.authFailed) { handleAuthFailure(); return; }
            console.error('[ARP] signed URL failed:', e);
            showToast('Could not open attachment', 3000);
          })
          .then(function () {
            clipBtn.disabled = false;
          });
        return;
      }

      // Regular row click — placeholder until edit modal lands.
      var row = t.closest('tr[data-batch-id]');
      if (!row) return;
      showToast('Edit / view payment lands in Stage 3.2', 1800);
    });
  }

  // =====================================================================
  // STAGE 3.2 — RECORD PAYMENT MODAL
  //
  // UI only. Save logic (POST batch, POST allocations, recompute invoice
  // statuses, audit log) lands in Stage 3.3. The "Record payment" button
  // in the footer is disabled with a [TODO 3.3] marker until then.
  //
  // Two interaction modes (both always available — the user picks which
  // gesture to start with; the form responds to either):
  //
  //   REVERSE (default): tick invoice rows → "Apply" auto-fills with the
  //   open amount → "Total received" auto-tallies the sum. Editing an
  //   "Apply" input keeps the checkbox checked but adjusts the partial
  //   payment for that row.
  //
  //   FORWARD: type a value into "Total received" → "Allocation strip"
  //   shows how much remains to allocate. User then ticks rows / edits
  //   apply amounts until the strip turns green.
  //
  // Shift-click on a row checkbox toggles every row between the last-
  // clicked and the current click, like file managers do.
  //
  // Eligible invoices: status in (open, partially_paid, disputed) for the
  // currently picked client. Disputed is allowed by spec — dispute is
  // metadata, not a behavioral lock — but visually flagged in the picker.
  // =====================================================================

  // ---------------------------------------------------------------------
  // Modal-scoped state. Rebuilt each time the modal opens, cleared on close.
  // ---------------------------------------------------------------------
  var pmState = null;
  var pmCache = {
    invoicesByClient: {}  // clientId -> [invoice rows]; cached per session
  };

  function newPmState() {
    return {
      client_id:       '',
      payment_date:    todayIso(),
      advice_number:   '',
      notes:           '',
      // Total received uses TWO fields to avoid string/number ambiguity:
      //   totalTyped:  the raw user input string (for re-displaying in focus)
      //   totalNumber: the parsed numeric value, or null when nothing typed
      // pmGetEffectiveTotal reads totalNumber only.
      totalTyped:      null,
      totalNumber:     null,
      rows:            {},
      lastClickedIdx:  -1,
      search:          '',
      invoices:        [],
      _loading:        false,
      // Remittance attachment — the File object the user picked, or null.
      // Uploaded to ar-remittances Storage bucket after batch insert (Step
      // 1.5 in the save flow). Cleared when user clicks Remove.
      attachedFile:    null
    };
  }

  // ---------------------------------------------------------------------
  // Fetch eligible invoices for a given client. Cached per client per
  // session — the picker is a one-time snapshot of "what's open right
  // now," and re-opening the modal for the same client doesn't need
  // another round-trip unless the user has explicitly refreshed.
  //
  // Eligible = status in (open, partially_paid, disputed).
  // Sort: period_start asc (oldest event date first), per locked design.
  // ---------------------------------------------------------------------
  function fetchInvoicesForClient(clientId) {
    if (!clientId) return Promise.resolve([]);
    if (pmCache.invoicesByClient[clientId]) {
      return Promise.resolve(pmCache.invoicesByClient[clientId]);
    }
    var selectClause = 'select=' + [
      'id',
      'internal_invoice_number',
      'client_reference',
      'client_id',
      'venue_code',
      'stand_id',
      'period_start',
      'net_amount_due',
      'status',
      'stands(stand_name)'
    ].join(',');
    var url = SB_REST + 'ar_invoices?' + selectClause +
      '&client_id=eq.' + encodeURIComponent(clientId) +
      '&status=in.(open,partially_paid,disputed)' +
      '&order=period_start.asc';
    return ARP.authFetch(url, { headers: pcAuth.headers() }).then(function (rows) {
      rows = (rows || []).map(function (r) {
        r._stand_name = r.stands && r.stands.stand_name ? r.stands.stand_name : '';
        // open amount = net_amount_due for now (Session 3.3 will subtract
        // existing allocations once allocations exist on the invoice).
        // Until then, every eligible invoice shows full net as open.
        r._open_amount = Number(r.net_amount_due || 0);
        return r;
      });
      pmCache.invoicesByClient[clientId] = rows;
      return rows;
    });
  }
