  // ---------------------------------------------------------------------
  // Populate the client dropdown from already-loaded state.clients.
  // ---------------------------------------------------------------------
  function pmPopulateClientDropdown() {
    var cSel = document.getElementById('pmClient');
    if (!cSel) return;
    cSel.innerHTML = '<option value="">Select client…</option>' +
      state.clients.map(function (c) {
        return '<option value="' + esc(c.id) + '">' + esc(c.name) + '</option>';
      }).join('');
    cSel.value = pmState.client_id || '';
  }

  // ---------------------------------------------------------------------
  // Render the visible picker rows. Filtered by search, sorted by oldest
  // first (already sorted by the fetch). Each row reflects pmState.rows[id].
  // ---------------------------------------------------------------------
  function pmFilteredInvoices() {
    var q = (pmState.search || '').trim().toLowerCase();
    if (!q) return pmState.invoices;
    return pmState.invoices.filter(function (inv) {
      var hay = [
        inv.internal_invoice_number,
        inv.client_reference,
        inv._stand_name,
        inv.venue_code,
        String(inv.net_amount_due || '')
      ].join(' ').toLowerCase();
      return hay.indexOf(q) !== -1;
    });
  }

  function pmRenderPicker() {
    var body    = document.getElementById('pmPickerBody');
    var emptyEl = document.getElementById('pmPickerEmpty');
    var loadEl  = document.getElementById('pmPickerLoading');
    if (!body) return;

    if (pmState._loading) {
      body.innerHTML = '';
      if (loadEl) loadEl.hidden = false;
      if (emptyEl) emptyEl.hidden = true;
      return;
    }
    if (loadEl) loadEl.hidden = true;

    if (!pmState.client_id) {
      body.innerHTML = '';
      if (emptyEl) {
        emptyEl.hidden = false;
        emptyEl.textContent = 'Pick a client to see eligible invoices.';
      }
      return;
    }

    var rows = pmFilteredInvoices();
    if (rows.length === 0) {
      body.innerHTML = '';
      if (emptyEl) {
        emptyEl.hidden = false;
        emptyEl.textContent = pmState.search
          ? 'No invoices match this search.'
          : 'No open, partial, or disputed invoices for this client.';
      }
      return;
    }
    if (emptyEl) emptyEl.hidden = true;

    body.innerHTML = rows.map(function (inv, idx) {
      var rowSt = pmState.rows[inv.id] || { checked: false, apply: 0, applyTyped: null };
      var checked = rowSt.checked;
      var openAmt = inv._open_amount;
      // Apply field display:
      //   - Unchecked: empty
      //   - Checked + user actively editing (applyTyped !== null): raw value, no formatting
      //   - Checked + idle: formatted as $X,XXX.XX (matches the Open column)
      var applyVal;
      if (!checked) {
        applyVal = '';
      } else if (rowSt.applyTyped != null) {
        applyVal = rowSt.applyTyped;
      } else {
        applyVal = fmtMoney(Math.round(rowSt.apply * 100) / 100);
      }
      var isPartial = checked && Math.abs(rowSt.apply - openAmt) > 0.005;
      var statusKey = inv.status === 'partially_paid' ? 'is-partial'
                    : inv.status === 'disputed'        ? 'is-disputed'
                    : 'is-open';
      var statusLabel = inv.status === 'partially_paid' ? 'partial' : inv.status;
      return '<div class="pm-picker-row' + (checked ? ' is-checked' : '') + '" ' +
             'data-invoice-id="' + esc(inv.id) + '" data-idx="' + idx + '">' +
        '<div><input type="checkbox" class="pm-row-check" ' +
              'data-invoice-id="' + esc(inv.id) + '" data-idx="' + idx + '" ' +
              (checked ? 'checked' : '') + '></div>' +
        '<div class="pm-cell-internal">' + esc(inv.internal_invoice_number) + '</div>' +
        '<div class="pm-cell-venue">' + esc(inv.venue_code || '') + '</div>' +
        '<div class="pm-cell-stand">' +
          esc(inv._stand_name || '—') +
          (inv.client_reference
            ? '<div class="pm-cell-ref">' + esc(inv.client_reference) + '</div>'
            : '') +
        '</div>' +
        '<div class="pm-cell-date">' + esc(fmtDate(inv.period_start)) + '</div>' +
        '<div><span class="pm-status-pill ' + statusKey + '">' + esc(statusLabel) + '</span></div>' +
        '<div class="pm-cell-open">' + esc(fmtMoney(openAmt)) + '</div>' +
        '<div class="pm-cell-apply-wrap">' +
          '<input type="text" class="pm-apply-input' + (isPartial ? ' is-partial' : '') + '" ' +
            'data-invoice-id="' + esc(inv.id) + '" ' +
            (checked ? '' : 'disabled ') +
            'value="' + esc(applyVal) + '">' +
        '</div>' +
      '</div>';
    }).join('');
  }

  // ---------------------------------------------------------------------
  // Compute the allocation total (sum of apply across checked rows),
  // update the strip + the total input if user hasn't typed a value.
  // ---------------------------------------------------------------------
  function pmAllocatedSum() {
    var sum = 0;
    Object.keys(pmState.rows).forEach(function (id) {
      var r = pmState.rows[id];
      if (r && r.checked) sum += Number(r.apply || 0);
    });
    return Math.round(sum * 100) / 100;
  }

  function pmGetEffectiveTotal() {
    // When the user has actively typed in Total Received, that takes
    // precedence over the auto-tally. We store the cleaned numeric value
    // directly (not the raw string) to remove ambiguity.
    if (pmState.totalNumber !== null && pmState.totalNumber !== undefined) {
      return pmState.totalNumber;
    }
    return pmAllocatedSum();
  }

  function pmRefreshTotals() {
    var totalEl = document.getElementById('pmTotal');
    var stripEl = document.getElementById('pmAllocStrip');
    var textEl  = document.getElementById('pmAllocText');
    if (!totalEl || !stripEl || !textEl) return;

    var alloc = pmAllocatedSum();
    var total = pmGetEffectiveTotal();
    var diff = Math.round((total - alloc) * 100) / 100;

    // Update the Total input display:
    //   - If the field has focus, leave it alone (user is mid-typing).
    //   - If totalTyped is null, display the allocation sum (auto-tally).
    //   - Otherwise display the parsed totalTyped, formatted.
    var hasFocus = document.activeElement === totalEl;
    if (!hasFocus) {
      if (pmState.totalTyped === null) {
        totalEl.value = fmtMoney(alloc);
      } else {
        var parsed = evalMath(pmState.totalTyped);
        totalEl.value = isNaN(parsed) ? pmState.totalTyped : fmtMoney(parsed);
      }
    }

    stripEl.classList.remove('is-idle', 'is-balanced', 'is-remaining', 'is-over');

    if (alloc === 0 && total === 0) {
      stripEl.classList.add('is-idle');
      textEl.textContent = 'Tick invoices to allocate';
    } else if (Math.abs(diff) < 0.005) {
      stripEl.classList.add('is-balanced');
      textEl.textContent = '✓ ' + fmtMoney(alloc) + ' of ' + fmtMoney(total) + ' allocated · balanced';
    } else if (diff > 0) {
      stripEl.classList.add('is-remaining');
      textEl.textContent = fmtMoney(alloc) + ' of ' + fmtMoney(total) +
        ' allocated · ' + fmtMoney(diff) + ' remaining';
    } else {
      stripEl.classList.add('is-over');
      textEl.textContent = '⚠ ' + fmtMoney(alloc) + ' allocated · exceeds ' +
        fmtMoney(total) + ' received by ' + fmtMoney(Math.abs(diff));
    }
  }

  // ---------------------------------------------------------------------
  // Toggle a single row's checked state. Used by both single-click and
  // the shift-click range expander.
  // ---------------------------------------------------------------------
  function pmSetRowChecked(invoiceId, checked) {
    var inv = null;
    for (var i = 0; i < pmState.invoices.length; i++) {
      if (pmState.invoices[i].id === invoiceId) { inv = pmState.invoices[i]; break; }
    }
    if (!inv) return;
    if (!pmState.rows[invoiceId]) {
      pmState.rows[invoiceId] = { checked: false, apply: 0, applyTyped: null };
    }
    var r = pmState.rows[invoiceId];
    if (checked) {
      r.checked = true;
      r.apply = inv._open_amount;
      r.applyTyped = null;
    } else {
      r.checked = false;
      r.apply = 0;
      r.applyTyped = null;
    }
  }

  // ---------------------------------------------------------------------
  // Event wiring inside the modal. Called once, right after the markup
  // is injected into the backdrop.
  // ---------------------------------------------------------------------
  function pmWireModalEvents() {
    var cSel    = document.getElementById('pmClient');
    var dateEl  = document.getElementById('pmPaymentDate');
    var adviceEl= document.getElementById('pmAdviceNumber');
    var notesEl = document.getElementById('pmNotes');
    var totalEl = document.getElementById('pmTotal');
    var searchEl= document.getElementById('pmSearch');
    var bodyEl  = document.getElementById('pmPickerBody');

    if (dateEl) dateEl.value = pmState.payment_date;

    // Client change — fetch invoices, reset rows, re-render picker.
    if (cSel) cSel.addEventListener('change', function () {
      pmState.client_id = cSel.value;
      pmState.rows = {};                  // clear all per-row state
      pmState.totalTyped = null;          // reset typed total
      pmState.search = '';
      if (searchEl) searchEl.value = '';
      pmState.lastClickedIdx = -1;
      if (!pmState.client_id) {
        pmState.invoices = [];
        pmRenderPicker();
        pmRefreshTotals();
        return;
      }
      pmState._loading = true;
      pmRenderPicker();
      fetchInvoicesForClient(pmState.client_id)
        .then(function (rows) {
          pmState.invoices = rows;
          pmState._loading = false;
          pmRenderPicker();
          pmRefreshTotals();
        })
        .catch(function (e) {
          pmState._loading = false;
          if (e && e.authFailed) { handleAuthFailure(); return; }
          showToast('Could not load invoices for this client');
          console.error('[ARP] fetchInvoicesForClient failed:', e);
          pmState.invoices = [];
          pmRenderPicker();
        });
    });

    if (dateEl) dateEl.addEventListener('change', function () {
      pmState.payment_date = dateEl.value;
    });
    if (adviceEl) adviceEl.addEventListener('input', function () {
      pmState.advice_number = adviceEl.value;
    });
    if (notesEl) notesEl.addEventListener('input', function () {
      pmState.notes = notesEl.value;
    });

    // Total received — two-way binding. Typing here disconnects from
    // auto-tally; clearing the field re-connects (totalTyped = null).
    //
    // Focus shows the editable raw value; blur normalizes and re-renders
    // the formatted display via pmRefreshTotals's hasFocus check.
    if (totalEl) {
      totalEl.addEventListener('focus', function () {
        totalEl.value = pmState.totalTyped !== null ? pmState.totalTyped : '';
        totalEl.select();
      });
      totalEl.addEventListener('input', function () {
        // Mid-typing: store both the raw string AND the parsed number.
        // The number is what the strip math uses; the string is what
        // we redisplay if the user re-focuses the field.
        pmState.totalTyped = totalEl.value;
        var n = evalMath(totalEl.value);
        pmState.totalNumber = isNaN(n) ? null : Math.round(n * 100) / 100;
        pmRefreshTotals();
      });
      totalEl.addEventListener('blur', function () {
        var raw = (totalEl.value || '').trim();
        if (raw === '') {
          // Empty field → reconnect to auto-tally.
          pmState.totalTyped = null;
          pmState.totalNumber = null;
        } else {
          // Re-parse on blur to normalize; if parse succeeds, snap to clean number.
          var n = evalMath(totalEl.value);
          if (!isNaN(n)) {
            pmState.totalNumber = Math.round(n * 100) / 100;
            pmState.totalTyped = String(pmState.totalNumber.toFixed(2));
          }
        }
        pmRefreshTotals();
      });
      totalEl.addEventListener('keydown', function (ev) {
        if (ev.key === 'Enter') { ev.preventDefault(); totalEl.blur(); }
      });
    }

    // Search — client-side filter.
    if (searchEl) searchEl.addEventListener('input', function () {
      pmState.search = searchEl.value || '';
      pmRenderPicker();
    });

    // Delegated handler for row interactions: checkbox, apply input,
    // shift-click range, label clicks.
    if (bodyEl) {
      bodyEl.addEventListener('click', function (ev) {
        var t = ev.target;
        if (!t || !t.matches) return;
        if (!t.matches('.pm-row-check')) return;
        var idx = parseInt(t.getAttribute('data-idx'), 10);
        var invoiceId = t.getAttribute('data-invoice-id');
        if (isNaN(idx) || !invoiceId) return;

        // Shift-click range fill. Always FILLS — set every row between
        // last-clicked and current to the same state as the just-clicked.
        if (ev.shiftKey && pmState.lastClickedIdx >= 0 && pmState.lastClickedIdx !== idx) {
          var rows = pmFilteredInvoices();
          var lo = Math.min(pmState.lastClickedIdx, idx);
          var hi = Math.max(pmState.lastClickedIdx, idx);
          var targetState = t.checked;
          for (var i = lo; i <= hi; i++) {
            if (rows[i]) pmSetRowChecked(rows[i].id, targetState);
          }
          pmState.lastClickedIdx = idx;
          pmRenderPicker();
          pmRefreshTotals();
          return;
        }

        // Single click.
        pmSetRowChecked(invoiceId, t.checked);
        pmState.lastClickedIdx = idx;
        pmRenderPicker();
        pmRefreshTotals();
      });

      // Per-row apply-amount editing.
      //
      // On focus: strip the $ formatting so user is editing the raw number.
      // On input: keep the raw value in applyTyped, recompute totals.
      // On blur: clear applyTyped so the row re-formats to $X,XXX.XX.
      bodyEl.addEventListener('focusin', function (ev) {
        var t = ev.target;
        if (!t || !t.matches) return;
        if (!t.matches('.pm-apply-input')) return;
        var invoiceId = t.getAttribute('data-invoice-id');
        var r = pmState.rows[invoiceId];
        if (!r || !r.checked) return;
        // Show the bare number for editing.
        t.value = (Math.round((r.apply || 0) * 100) / 100).toFixed(2);
        t.select();
      });
      bodyEl.addEventListener('input', function (ev) {
        var t = ev.target;
        if (!t || !t.matches) return;
        if (!t.matches('.pm-apply-input')) return;
        var invoiceId = t.getAttribute('data-invoice-id');
        var r = pmState.rows[invoiceId];
        if (!r || !r.checked) return;
        r.applyTyped = t.value;
        var n = evalMath(t.value);
        if (!isNaN(n)) {
          r.apply = Math.round(Math.abs(n) * 100) / 100;
        } else if ((t.value || '').trim() === '') {
          r.apply = 0;
        }
        if (isNaN(n) && (t.value || '').trim() !== '') {
          t.classList.add('is-error');
        } else {
          t.classList.remove('is-error');
        }
        pmRefreshTotals();
      });

      bodyEl.addEventListener('blur', function (ev) {
        var t = ev.target;
        if (!t || !t.matches) return;
        if (!t.matches('.pm-apply-input')) return;
        var invoiceId = t.getAttribute('data-invoice-id');
        var r = pmState.rows[invoiceId];
        if (!r) return;
        // Normalize: clear typed value, re-render row so display matches model.
        r.applyTyped = null;
        pmRenderPicker();
        pmRefreshTotals();
      }, true);

      bodyEl.addEventListener('keydown', function (ev) {
        if (ev.key !== 'Enter') return;
        var t = ev.target;
        if (!t || !t.matches) return;
        if (t.matches('.pm-apply-input')) { ev.preventDefault(); t.blur(); }
      });
    }

    // -------------------------------------------------------------------
    // Remittance attachment wiring.
    //
    // Click the dropzone OR press Enter/Space on it (it's role=button)
    // to open the file picker. On file pick:
    //   1. Validate type — reject HEIC explicitly, reject anything outside
    //      our accept list, with a clear toast for each.
    //   2. Validate size — 10 MB max.
    //   3. Stash the File object in pmState.attachedFile.
    //   4. Swap UI from dropzone → "done" pill with filename + Remove.
    // Remove button clears pmState.attachedFile and swaps back to dropzone.
    // -------------------------------------------------------------------
    var attachZone   = document.getElementById('pmAttachZone');
    var attachInput  = document.getElementById('pmAttachFile');
    var attachDone   = document.getElementById('pmAttachDone');
    var attachName   = document.getElementById('pmAttachName');
    var attachSize   = document.getElementById('pmAttachSize');
    var attachRemove = document.getElementById('pmAttachRemove');

    function fmtFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function showAttachedFile() {
      var f = pmState.attachedFile;
      if (!f) return;
      if (attachName) attachName.textContent = f.name;
      if (attachSize) attachSize.textContent = '· ' + fmtFileSize(f.size);
      if (attachZone) attachZone.hidden = true;
      if (attachDone) attachDone.hidden = false;
    }

    function clearAttachedFile() {
      pmState.attachedFile = null;
      if (attachInput) attachInput.value = '';
      if (attachZone) attachZone.hidden = false;
      if (attachDone) attachDone.hidden = true;
    }

    if (attachZone) {
      attachZone.addEventListener('click', function () {
        if (attachInput) attachInput.click();
      });
      attachZone.addEventListener('keydown', function (ev) {
        if (ev.key === 'Enter' || ev.key === ' ') {
          ev.preventDefault();
          if (attachInput) attachInput.click();
        }
      });
    }

    if (attachInput) {
      attachInput.addEventListener('change', function () {
        var f = attachInput.files && attachInput.files[0];
        if (!f) return;

        // Reject HEIC/HEIF explicitly — project-wide rule.
        // The accept attribute filters most of this, but iOS Safari ignores
        // accept for HEIC in some cases, so we double-check by name and MIME.
        var nameLower = (f.name || '').toLowerCase();
        var typeLower = (f.type || '').toLowerCase();
        if (nameLower.endsWith('.heic') || nameLower.endsWith('.heif') ||
            typeLower === 'image/heic' || typeLower === 'image/heif') {
          showToast('HEIC photos aren\'t supported. See the iPhone workaround above the picker.', 4500);
          attachInput.value = '';
          return;
        }

        // Allowed: PDF, JPG, PNG.
        var allowed = ['application/pdf', 'image/jpeg', 'image/png'];
        var allowedExt = nameLower.endsWith('.pdf') ||
                         nameLower.endsWith('.jpg') ||
                         nameLower.endsWith('.jpeg') ||
                         nameLower.endsWith('.png');
        // Trust EITHER MIME match OR extension match — some browsers report
        // empty MIME for PDFs picked from certain file managers.
        var mimeOk = typeLower === '' ? allowedExt : allowed.indexOf(typeLower) !== -1;
        if (!mimeOk) {
          showToast('Only PDF, JPG, or PNG files can be attached', 3200);
          attachInput.value = '';
          return;
        }

        // 10 MB size cap.
        var TEN_MB = 10 * 1024 * 1024;
        if (f.size > TEN_MB) {
          showToast('File is too large · max 10 MB', 3200);
          attachInput.value = '';
          return;
        }

        // Passed all checks — stash it.
        pmState.attachedFile = f;
        showAttachedFile();
      });
    }

    if (attachRemove) {
      attachRemove.addEventListener('click', clearAttachedFile);
    }
  }

  // ---------------------------------------------------------------------
  // Open the modal. Reset state, build markup, populate dropdown, wire.
  // ---------------------------------------------------------------------
  function openRecordPaymentModal() {
    var bd = document.getElementById('modalBackdrop');
    if (!bd) return;
    pmState = newPmState();
    bd.innerHTML = pmModalMarkup();
    bd.classList.add('is-open');
    pmPopulateClientDropdown();
    pmWireModalEvents();
    pmWireSaveButton();
    pmRenderPicker();
    pmRefreshTotals();
    var cSel = document.getElementById('pmClient');
    if (cSel) cSel.focus();
  }

  // ---------------------------------------------------------------------
  // Dirty check: any user input means the user has unsaved work.
  // We measure dirty as "anything other than the initial empty state."
  // ---------------------------------------------------------------------
  function pmIsDirty() {
    if (!pmState) return false;
    if (pmState.client_id)        return true;
    if (pmState.advice_number)    return true;
    if (pmState.notes)            return true;
    if (pmState.totalTyped != null) return true;
    // Any row checked?
    var ids = Object.keys(pmState.rows || {});
    for (var i = 0; i < ids.length; i++) {
      if (pmState.rows[ids[i]] && pmState.rows[ids[i]].checked) return true;
    }
    return false;
  }

  // ---------------------------------------------------------------------
  // Close handling.
  //   - Backdrop click: blocked while modal has dirty data (form is
  //     too valuable to lose to a stray click).
  //   - Esc: blocked while modal has dirty data.
  //   - Cancel / ×: ask for confirmation when dirty, otherwise close.
  // ---------------------------------------------------------------------
  function closePmModal() {
    var bd = document.getElementById('modalBackdrop');
    if (bd) {
      bd.classList.remove('is-open');
      bd.innerHTML = '';
    }
    pmState = null;
  }

  function closePmModalWithConfirm() {
    if (pmIsDirty()) {
      var ok = window.confirm('Discard this payment? Unsaved entries will be lost.');
      if (!ok) return;
    }
    closePmModal();
  }

  function wireModalClose() {
    document.addEventListener('click', function (ev) {
      var target = ev.target;
      if (!target || !target.closest) return;
      var trigger = target.closest('[data-close-modal]');
      if (!trigger) return;
      var closeType = trigger.getAttribute('data-close-modal');
      // Only operate on this page's modal (the payment one).
      var bd = document.getElementById('modalBackdrop');
      if (!bd || !bd.classList.contains('is-open')) return;
      var hasPmCard = bd.querySelector('.pm-modal-card');
      if (!hasPmCard) return;

      if (closeType === 'backdrop') {
        // Backdrop clicks on a dirty form are a no-op. Clean form clicks close.
        if (trigger !== target) return;       // only direct backdrop hits
        if (pmIsDirty()) return;              // protect dirty form
        closePmModal();
      } else if (closeType === 'modal') {
        closePmModalWithConfirm();
      }
    });
    document.addEventListener('keydown', function (ev) {
      if (ev.key !== 'Escape') return;
      var bd = document.getElementById('modalBackdrop');
      if (!bd || !bd.classList.contains('is-open')) return;
      var hasPmCard = bd.querySelector('.pm-modal-card');
      if (!hasPmCard) return;
      if (pmIsDirty()) return;                // protect dirty form
      closePmModal();
    });
  }

  function wireRecordPaymentButton() {
    var btn = document.getElementById('btnRecordPayment');
    if (btn) btn.addEventListener('click', openRecordPaymentModal);
  }

  // =====================================================================
  // STAGE 3.3 — AUDIT LOG HELPER
  //
  // Identical pattern to the AR Invoices page (Stage 2.3). Writes one row
  // to ar_audit_log. The caller decides shape (composite for creates,
  // per-field for edits, single for status changes).
  // =====================================================================
  function pmWriteAuditLog(entry) {
    var actor = '';
    try {
      if (typeof pcAuth !== 'undefined' && pcAuth.getUser) {
        var u = pcAuth.getUser();
        actor = (u && u.display_name) || (u && u.email) || 'unknown';
      }
    } catch (e) { actor = 'unknown'; }

    var row = {
      table_name:   entry.table_name,
      record_id:    entry.record_id,
      action:       entry.action,
      field_name:   entry.field_name || null,
      old_value:    entry.old_value != null ? String(entry.old_value) : null,
      new_value:    entry.new_value != null ? String(entry.new_value) : null,
      performed_by: actor,
      context:      entry.context || null
    };

    var hdrs = Object.assign({}, pcAuth.headers(), {
      'Content-Type': 'application/json',
      'Prefer':       'return=minimal'
    });

    return ARP.authFetch(SB_REST + 'ar_audit_log', {
      method:  'POST',
      headers: hdrs,
      body:    JSON.stringify(row)
    });
  }

  // =====================================================================
  // STAGE 3.3 — SAVE FLOW
  //
  // Strategy: four-step sequential write, mirroring the Stage 2.3 pattern
  // (which is proven to be robust against PostgREST embedded-insert flake).
  //
  //   Step 1: POST ar_payment_batches (single row) → capture batch_id.
  //   Step 2: POST ar_payment_allocations (bulk, one row per ticked invoice)
  //           with batch_id stamped on each.
  //           ↳ Step 2 fail → DELETE the orphan batch + re-throw.
  //   Step 3: For each touched invoice, compute new status (paid /
  //           partially_paid) by fetching its current allocations + adding
  //           this batch's contribution. PATCH only invoices whose status
  //           actually changed.
  //   Step 4: PATCH ar_payment_batches.allocated_amount + status with the
  //           reconciled totals.
  //
  //   Step 5 (fire-and-forget): audit log writes — one composite create
  //   row for the batch, one status_change row per invoice that transitioned.
  //
  // After success: toast, refresh batches list, close modal, clear state.
  // =====================================================================

  // ---------------------------------------------------------------------
  // Validate the form. Returns { valid, errors, batch, allocations,
  // totalReceived, totalAllocated }.
  // ---------------------------------------------------------------------
  function pmValidate() {
    var errors = [];

    if (!pmState.client_id) errors.push('Pick a client');
    if (!pmState.payment_date) errors.push('Set the payment date');

    // Collect every checked row with a positive apply amount.
    var allocations = [];
    Object.keys(pmState.rows).forEach(function (invoiceId) {
      var r = pmState.rows[invoiceId];
      if (!r || !r.checked) return;
      var amt = Math.round(Number(r.apply || 0) * 100) / 100;
      if (amt <= 0) return;
      // Find the original invoice (for the open amount + sanity check).
      var inv = null;
      for (var i = 0; i < pmState.invoices.length; i++) {
        if (pmState.invoices[i].id === invoiceId) { inv = pmState.invoices[i]; break; }
      }
      if (!inv) return;
      // Sanity: cannot allocate more than the invoice's open amount.
      // We allow exactly open + a tiny epsilon for float math.
      if (amt > inv._open_amount + 0.005) {
        errors.push('Cannot apply ' + fmtMoney(amt) + ' to invoice ' +
          inv.internal_invoice_number + ' — open is only ' + fmtMoney(inv._open_amount));
        return;
      }
      allocations.push({
        invoice_id: invoiceId,
        amount:     amt,
        invoice:    inv      // kept for status-recompute step
      });
    });

    if (allocations.length === 0) {
      errors.push('Tick at least one invoice to allocate against');
    }

    var totalAllocated = 0;
    allocations.forEach(function (a) { totalAllocated += a.amount; });
    totalAllocated = Math.round(totalAllocated * 100) / 100;

    // Effective Total Received: typed value if present, else the allocation sum.
    var totalReceived;
    if (pmState.totalNumber != null) {
      totalReceived = pmState.totalNumber;
    } else {
      totalReceived = totalAllocated;
    }

    // The user is allowed to record a payment where allocations exceed
    // received OR fall short of received. The system tracks both; the
    // batch is flagged partially_allocated when there's any remainder.
    // We DO NOT block on mismatch — that's a deliberate design choice.

    return {
      valid:          errors.length === 0,
      errors:         errors,
      allocations:    allocations,
      totalReceived:  totalReceived,
      totalAllocated: totalAllocated
    };
  }

  // ---------------------------------------------------------------------
  // Compute the post-save status for one invoice given the new allocation
  // being applied. Reads the invoice's CURRENT total allocated from the
  // DB and adds the new contribution.
  //
  // Returns a Promise resolving to { oldStatus, newStatus, changed }.
  // ---------------------------------------------------------------------
  function pmComputeNewInvoiceStatus(invoiceId, newAllocAmount) {
    // Fetch existing allocations for this invoice + the invoice's net.
    // Two parallel reads.
    var p1 = ARP.authFetch(
      SB_REST + 'ar_payment_allocations?select=amount&invoice_id=eq.' +
        encodeURIComponent(invoiceId),
      { headers: pcAuth.headers() }
    );
    var p2 = ARP.authFetch(
      SB_REST + 'ar_invoices?select=id,status,net_amount_due&id=eq.' +
        encodeURIComponent(invoiceId),
      { headers: pcAuth.headers() }
    );
    return Promise.all([p1, p2]).then(function (results) {
      var existingAllocs = results[0] || [];
      var invRows = results[1] || [];
      var inv = invRows[0];
      if (!inv) {
        // Shouldn't happen — invoice was visible in the picker moments ago.
        return { oldStatus: 'unknown', newStatus: 'unknown', changed: false };
      }
      var existingSum = 0;
      existingAllocs.forEach(function (a) { existingSum += Number(a.amount || 0); });
      // The fetch returns allocations including the one we JUST POSTed in
      // step 2, so we already have the new contribution. No need to add.
      var totalAllocated = Math.round(existingSum * 100) / 100;
      var net = Math.round(Number(inv.net_amount_due || 0) * 100) / 100;
      var newStatus;
      if (Math.abs(totalAllocated - net) < 0.005) {
        newStatus = 'paid';
      } else if (totalAllocated > 0 && totalAllocated < net) {
        newStatus = 'partially_paid';
      } else if (totalAllocated > net) {
        // Overpaid is in the long-term spec but not the v1 status enum on the
        // partial side. For now, we mark fully paid; the difference shows in
        // ar_payment_batches.allocated_amount > payment_amount on the batch.
        newStatus = 'paid';
      } else {
        // No allocations at all — keep current.
        newStatus = inv.status || 'open';
      }
      // Disputed never auto-transitions. The spec is explicit: dispute is
      // metadata, not a behavioral lock — but it also doesn't get cleared
      // by a payment. The admin makes that call manually.
      if (inv.status === 'disputed') {
        return { oldStatus: 'disputed', newStatus: 'disputed', changed: false };
      }
      return {
        oldStatus: inv.status || 'open',
        newStatus: newStatus,
        changed:   inv.status !== newStatus
      };
      void newAllocAmount;  // kept in signature for clarity; unused
    });
  }

  // ---------------------------------------------------------------------
  // The save handler. Wired to the Record payment button.
  // ---------------------------------------------------------------------
  var pmSubmitting = false;

  function pmHandleSave() {
    if (pmSubmitting) return;
    if (!pmState) return;

    var validated = pmValidate();
    if (!validated.valid) {
      showToast(validated.errors[0], 2800);
      return;
    }

    pmSubmitting = true;
    var saveBtn = document.getElementById('pmSave');
    if (saveBtn) {
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';
    }

    var actor = '';
    try {
      if (typeof pcAuth !== 'undefined' && pcAuth.getUser) {
        var u = pcAuth.getUser();
        actor = (u && u.display_name) || (u && u.email) || 'unknown';
      }
    } catch (e) { actor = 'unknown'; }

    var hdrsRepr = Object.assign({}, pcAuth.headers(), {
      'Content-Type': 'application/json',
      'Prefer':       'return=representation'
    });
    var hdrsMin = Object.assign({}, pcAuth.headers(), {
      'Content-Type': 'application/json',
      'Prefer':       'return=minimal'
    });

    // Compute the batch's status based on the relationship between
    // payment_amount (what came in) and allocated_amount (what we just
    // assigned to invoices).
    function computeBatchStatus(received, allocated) {
      // received is what the user typed (or the auto-tally if they didn't).
      // allocated is the sum of allocations they explicitly applied.
      if (Math.abs(received - allocated) < 0.005) return 'fully_allocated';
      if (allocated > 0) return 'partially_allocated';
      return 'unallocated';
    }

    // ----- Step 1: insert the batch header -----
    var batchPayload = {
      client_id:        pmState.client_id,
      advice_number:    pmState.advice_number || null,
      payment_date:     pmState.payment_date,
      payment_amount:   validated.totalReceived,
      allocated_amount: validated.totalAllocated,
      status:           computeBatchStatus(validated.totalReceived, validated.totalAllocated),
      notes:            pmState.notes || null,
      created_by:       actor
    };

    var savedBatch = null;
    var touchedInvoiceTransitions = [];   // [{invoice_id, oldStatus, newStatus}]

    ARP.authFetch(SB_REST + 'ar_payment_batches', {
      method:  'POST',
      headers: hdrsRepr,
      body:    JSON.stringify(batchPayload)
    })
    .then(function (rows) {
      var batch = (rows && rows[0]) || null;
      if (!batch || !batch.id) {
        throw new Error('Batch insert returned no row');
      }
      savedBatch = batch;

      // ----- Step 1.5: upload the attachment (if any) -----
      // Happens AFTER batch insert so we have batch.id for the file path,
      // and BEFORE allocations so the file is uploaded ASAP.
      //
      // Failure mode: if upload fails, we don't fail the whole save —
      // the batch + allocations are too important to lose to a Storage
      // flake. User sees a non-blocking warning toast; the attachment
      // can be re-attached later when the edit-batch modal exists.
      // The payment record itself is correct in the DB.
      var uploadPromise;
      if (pmState.attachedFile) {
        uploadPromise = pmUploadAttachment(savedBatch.id, pmState.attachedFile)
          .then(function (result) {
            // PATCH the batch with the storage path + filename.
            return ARP.authFetch(
              SB_REST + 'ar_payment_batches?id=eq.' + encodeURIComponent(savedBatch.id),
              {
                method:  'PATCH',
                headers: hdrsMin,
                body:    JSON.stringify({
                  raw_document_url: result.path,
                  file_name:        result.fileName
                })
              }
            );
          })
          .catch(function (uploadErr) {
            // Non-fatal — log and warn, continue with allocations.
            console.error('[ARP] attachment upload failed for batch ' +
              savedBatch.id + ':', uploadErr);
            showToast('Payment saved · attachment upload failed (you can try again later)', 4500);
          });
      } else {
        uploadPromise = Promise.resolve();
      }

      // ----- Step 2: insert allocations with batch_id stamped -----
      var allocPayload = validated.allocations.map(function (a) {
        return {
          payment_batch_id: savedBatch.id,
          invoice_id:       a.invoice_id,
          amount:           a.amount,
          created_by:       actor
        };
      });

      return uploadPromise.then(function () {
        return ARP.authFetch(SB_REST + 'ar_payment_allocations', {
          method:  'POST',
          headers: hdrsMin,
          body:    JSON.stringify(allocPayload)
        });
      })
      .catch(function (allocErr) {
        // ----- Compensating delete: allocations failed, drop the orphan batch -----
        console.error('[ARP] allocation insert failed for batch ' +
          savedBatch.id + ' — attempting compensating delete:', allocErr);

        return ARP.authFetch(
          SB_REST + 'ar_payment_batches?id=eq.' + encodeURIComponent(savedBatch.id),
          { method: 'DELETE', headers: hdrsMin }
        )
        .then(function () { throw allocErr; })
        .catch(function (compErr) {
          if (compErr === allocErr) throw allocErr;
          console.error('[ARP] CRITICAL — orphan payment batch not cleaned up. ' +
            'Batch ID: ' + savedBatch.id + ' (no allocations, manual cleanup required):',
            compErr);
          throw allocErr;
        });
      });
    })
    .then(function () {
      // ----- Step 3: recompute + PATCH invoice statuses for touched invoices -----
      // For each allocation, fetch the invoice's full allocation history
      // (now including the row we just inserted) and recompute the status.
      var statusPromises = validated.allocations.map(function (a) {
        return pmComputeNewInvoiceStatus(a.invoice_id, a.amount).then(function (result) {
          if (!result.changed) return null;
          touchedInvoiceTransitions.push({
            invoice_id: a.invoice_id,
            internal_invoice_number: a.invoice.internal_invoice_number,
            oldStatus:  result.oldStatus,
            newStatus:  result.newStatus
          });
          return ARP.authFetch(
            SB_REST + 'ar_invoices?id=eq.' + encodeURIComponent(a.invoice_id),
            {
              method:  'PATCH',
              headers: hdrsMin,
              body:    JSON.stringify({ status: result.newStatus })
            }
          );
        });
      });
      return Promise.all(statusPromises);
    })
    .then(function () {
      // ----- Step 4: audit log writes (fire-and-forget) -----
      var auditPromises = [];

      // Composite create row for the batch, with the full allocation payload.
      auditPromises.push(pmWriteAuditLog({
        table_name: 'ar_payment_batches',
        record_id:  savedBatch.id,
        action:     'create',
        context: {
          client_id:        savedBatch.client_id,
          advice_number:    savedBatch.advice_number,
          payment_date:     savedBatch.payment_date,
          payment_amount:   savedBatch.payment_amount,
          allocated_amount: savedBatch.allocated_amount,
          status:           savedBatch.status,
          notes:            savedBatch.notes,
          allocation_count: validated.allocations.length,
          allocations:      validated.allocations.map(function (a) {
            return {
              invoice_id:              a.invoice_id,
              internal_invoice_number: a.invoice.internal_invoice_number,
              amount:                  a.amount
            };
          })
        }
      }).catch(function (e) {
        console.error('[ARP] audit write failed for batch ' + savedBatch.id + ':', e);
      }));

      // One status_change row per invoice that transitioned.
      touchedInvoiceTransitions.forEach(function (t) {
        auditPromises.push(pmWriteAuditLog({
          table_name: 'ar_invoices',
          record_id:  t.invoice_id,
          action:     'status_change',
          field_name: 'status',
          old_value:  t.oldStatus,
          new_value:  t.newStatus,
          context: {
            triggered_by:            'payment_allocation',
            payment_batch_id:        savedBatch.id,
            internal_invoice_number: t.internal_invoice_number
          }
        }).catch(function (e) {
          console.error('[ARP] audit write failed for invoice transition ' +
            t.invoice_id + ':', e);
        }));
      });

      return Promise.all(auditPromises);
    })
    .then(function () {
      // ----- Done: toast, refresh, close -----
      var transitionCount = touchedInvoiceTransitions.length;
      var msg = 'Recorded ' + fmtMoney(validated.totalReceived) +
        ' across ' + validated.allocations.length +
        ' invoice' + (validated.allocations.length === 1 ? '' : 's');
      if (transitionCount > 0) {
        msg += ' · ' + transitionCount + ' status change' + (transitionCount === 1 ? '' : 's');
      }
      showToast(msg, 3200);

      // Bust the per-client invoice cache so the next modal open sees fresh data
      // (the open amounts for the invoices we just paid have changed).
      if (pmCache.invoicesByClient[pmState.client_id]) {
        delete pmCache.invoicesByClient[pmState.client_id];
      }

      // Close the modal and refresh the underlying batches list.
      closePmModal();
      reloadBatches();
    })
    .catch(function (e) {
      if (e && e.authFailed) { handleAuthFailure(); return; }
      console.error('[ARP] save failed:', e);
      var msg = (e && e.message) ? e.message : 'Save failed';
      if (msg.length > 140) msg = msg.substring(0, 140) + '…';
      showToast('Save failed · ' + msg, 4500);
    })
    .then(function () {
      pmSubmitting = false;
      var btn = document.getElementById('pmSave');
      if (btn) {
        btn.disabled = false;
        btn.textContent = 'Record payment';
      }
    });
  }

  // =====================================================================
  // ATTACHMENT — UPLOAD + SIGNED URL HELPERS
  //
  // Uploads to Supabase Storage bucket "ar-remittances" using the REST
  // API directly (we don't bundle the supabase-js SDK on this page).
  //
  // Path convention: {batch_id}/{sanitized_filename}
  // We sanitize the filename to strip characters that confuse URL routing,
  // but otherwise preserve the original so users see something familiar
  // when they download later.
  // =====================================================================

  function pmSanitizeFilename(name) {
    if (!name) return 'remittance';
    // Replace anything that isn't alphanumeric, dot, dash, or underscore.
    // Collapse spaces to underscores first so we keep readable filenames.
    return name
      .replace(/\s+/g, '_')
      .replace(/[^a-zA-Z0-9._-]/g, '_')
      .substring(0, 200);  // keep total path under reasonable length
  }

  /**
   * Upload a File object to the ar-remittances bucket.
   * Returns { path, fileName } on success.
   *   path = the storage path (e.g. "abc123/remittance_advice.pdf")
   *          This is what we store in ar_payment_batches.raw_document_url.
   *   fileName = the sanitized filename (stored in ar_payment_batches.file_name)
   */
  function pmUploadAttachment(batchId, file) {
    var fileName = pmSanitizeFilename(file.name);
    var path = batchId + '/' + fileName;
    var uploadUrl = SB_URL + '/storage/v1/object/ar-remittances/' +
      encodeURIComponent(batchId) + '/' + encodeURIComponent(fileName);

    var hdrs = Object.assign({}, pcAuth.headers());
    // Storage REST wants the file body raw, not as multipart. Content-Type
    // should match the file's MIME so the bucket serves it correctly.
    hdrs['Content-Type'] = file.type || 'application/octet-stream';
    // Storage API also expects this header to enable upsert behavior or
    // reject conflicts — we want conflict-reject (set-once semantics).
    hdrs['x-upsert'] = 'false';

    return fetch(uploadUrl, {
      method:  'POST',
      headers: hdrs,
      body:    file
    }).then(function (r) {
      if (!r.ok) {
        return r.text().then(function (t) {
          throw new Error('Storage upload failed: ' + (t || ('HTTP ' + r.status)));
        });
      }
      return { path: path, fileName: fileName };
    });
  }

  /**
   * Create a signed URL for a stored file. Expires in 5 minutes — long
   * enough to open in a new tab and view, short enough that a leaked URL
   * has minimal blast radius.
   */
  function pmGetSignedUrl(path) {
    var url = SB_URL + '/storage/v1/object/sign/ar-remittances/' +
      path.split('/').map(encodeURIComponent).join('/');
    var hdrs = Object.assign({}, pcAuth.headers(), {
      'Content-Type': 'application/json'
    });
    return fetch(url, {
      method:  'POST',
      headers: hdrs,
      body:    JSON.stringify({ expiresIn: 300 })  // 5 minutes
    }).then(function (r) {
      if (!r.ok) {
        return r.text().then(function (t) {
          throw new Error('Signed URL failed: ' + (t || ('HTTP ' + r.status)));
        });
      }
      return r.json();
    }).then(function (data) {
      // The signedURL field is relative; prefix with SB_URL for a full URL.
      var signed = data.signedURL || data.signedUrl;  // API has used both casings
      if (!signed) throw new Error('No signed URL in response');
      // The path starts with /storage/v1/... — combine with base.
      return SB_URL + signed;
    });
  }

  // Expose to the rest of the file scope.
  window.ARP.uploadAttachment = pmUploadAttachment;
  window.ARP.getSignedUrl     = pmGetSignedUrl;

  function pmWireSaveButton() {
    var btn = document.getElementById('pmSave');
    if (btn) btn.addEventListener('click', pmHandleSave);
  }

  // =====================================================================
  // BOOT — gated by pcAuth.require()
  // =====================================================================
  function onAuthReady(user) {
    pcActivity.init('accounts-receivable');
    document.body.classList.remove('pre-auth');

    wireFilters();
    wireSorting();
    wireShowOlder();
    wireRowClicks();
    wireRecordPaymentButton();
    wireModalClose();
    renderSortHeaders();

    setLoading(true);
    Promise.all([fetchClients()])
      .then(function (results) {
        state.clients = results[0] || [];
        renderFilterDropdowns();
        return reloadBatches();
      })
      .catch(function (e) {
        if (e && e.authFailed) { handleAuthFailure(); return; }
        showToast('Could not load page data');
        console.error('[ARP] initial load failed:', e);
        setLoading(false);
      })
      .then(function () { state.initialFetchDone = true; });

    void user;
  }

  if (typeof pcAuth === 'undefined' || !pcAuth.require) {
    document.body.innerHTML =
      '<div style="padding:60px 22px;font-family:DM Sans,sans-serif;">' +
      '<h1>Authentication unavailable</h1>' +
      '<p>pc-auth.js failed to load.</p>' +
      '</div>';
  } else {
    pcAuth.require({
      pageSlug: 'accounts-receivable',
      onReady:  onAuthReady
    });
  }

})();
</script>
