<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Deposit Receipts — Popcorn Chez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F3EF;
  --surface: #FFFFFF;
  --text: #1a1a1a;
  --muted: #888;
  --light: #bbb;
  --border: #E8E8E4;
  --border-lt: #F0F0EC;
  --green-50: #EAF3DE;
  --green-600: #3B6D11;
  --green-800: #27500A;
  --green-900: #173404;
  --blue-50: #E6F1FB;
  --blue-600: #185FA5;
  --blue-800: #0C447C;
  --red: #c0392b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
.brand-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; background: var(--text); color: white;
  padding: 3px 8px; border-radius: 20px;
}
.back-link {
  font-size: 12px; color: var(--muted); text-decoration: none;
  margin-right: 4px; font-weight: 500;
}
.back-link:hover { color: var(--text); }
.spacer { flex: 1; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-user { font-size: 12px; color: #999; font-weight: 500; }
.sign-out-btn { font-size: 11px; color: #c0392b; background: none; border: 1px solid #f0c0c0; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-weight: 600; }
.sign-out-btn:hover { background: #fdf0ee; }

.canvas { max-width: 880px; margin: 0 auto; padding: 24px 20px 60px; }

.page-head { margin-bottom: 18px; }
.page-eyebrow {
  font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
}
.page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

/* New deposit form */
.new-deposit {
  padding: 18px;
  border-bottom: 1px solid var(--border);
  background: #fafaf8;
}
.new-deposit-head {
  font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 12px;
}
.field-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.field { display: flex; flex-direction: column; }
.field label {
  font-size: 12px; color: var(--muted);
  margin-bottom: 4px; font-weight: 500;
}
.field input, .field select {
  padding: 9px 10px;
  font-size: 14px;
  font-family: inherit;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: white;
  color: var(--text);
}
.field input:focus, .field select:focus {
  outline: none; border-color: var(--blue-600);
  box-shadow: 0 0 0 3px rgba(24,95,165,0.12);
}
.field-amount-wrap { position: relative; }
.field-amount-wrap input {
  width: 100%; padding-left: 24px;
}
.field-amount-wrap .dollar {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); font-size: 14px;
  color: var(--muted); pointer-events: none;
}

.upload-zone {
  border: 1.5px dashed var(--border);
  border-radius: 10px;
  padding: 20px 16px;
  text-align: center;
  background: white;
  cursor: pointer;
  transition: all 0.15s;
}
.upload-zone:hover {
  border-color: var(--blue-600);
  background: var(--blue-50);
}
.upload-icon {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--bg);
  margin: 0 auto 8px;
  display: flex; align-items: center; justify-content: center;
}
.upload-text { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.upload-hint { font-size: 11px; color: var(--muted); }
.upload-zone.has-files { padding: 14px; text-align: left; }

.thumb-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.thumb {
  position: relative;
  width: 80px; height: 80px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  overflow: hidden;
}
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.thumb-x {
  position: absolute; top: 2px; right: 2px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: rgba(0,0,0,0.65);
  color: white;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  line-height: 1;
}
.thumb-x:hover { background: rgba(0,0,0,0.85); }
.add-more-btn {
  background: white;
  border: 1px dashed var(--border);
  border-radius: 8px;
  width: 80px; height: 80px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  color: var(--muted);
  cursor: pointer;
}
.add-more-btn:hover { border-color: var(--blue-600); color: var(--blue-600); }

.form-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 14px;
}
.form-msg {
  flex: 1;
  font-size: 12px;
  font-weight: 500;
}
.form-msg.error { color: var(--red); }
.form-msg.success { color: var(--green-800); }

.btn-primary {
  background: var(--text);
  color: white;
  border: none;
  padding: 9px 20px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  border-radius: 8px;
  cursor: pointer;
}
.btn-primary:hover { background: #000; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

/* Recent section */
.recent-wrap { padding: 18px; }
.recent-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 12px;
}
.recent-head-label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--muted);
}
.filter-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.filter-row select, .filter-row input {
  font-size: 12px;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: white;
  font-family: inherit;
  color: var(--text);
}
.filter-row .sep { font-size: 12px; color: var(--muted); }

.totals-bar {
  background: var(--green-50);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.totals-bar-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--green-800);
}
.totals-bar-sub {
  font-size: 12px; color: var(--green-800);
  margin-top: 2px; font-weight: 500;
}
.totals-bar-amount {
  font-size: 22px; font-weight: 700;
  color: var(--green-900);
}

.deposit-row {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.deposit-row.expanded { border-color: var(--border); }
.deposit-row-head {
  display: grid;
  grid-template-columns: 18px 1fr auto auto;
  gap: 14px;
  align-items: center;
  padding: 12px 14px;
  cursor: pointer;
}
.deposit-row-head:hover { background: #fafaf8; }
.chevron {
  width: 12px; height: 12px;
  color: var(--muted);
  transition: transform 0.15s;
}
.deposit-row.expanded .chevron { transform: rotate(90deg); }
.deposit-meta-main { font-size: 14px; font-weight: 600; }
.deposit-meta-sub {
  font-size: 12px; color: var(--muted);
  margin-top: 2px;
}
.deposit-amount { font-size: 15px; font-weight: 700; }
.view-tag {
  font-size: 11px; color: var(--muted);
  padding: 3px 8px; background: var(--bg);
  border-radius: 4px; font-weight: 500;
}

.deposit-detail {
  display: none;
  border-top: 1px solid var(--border);
  padding: 14px;
}
.deposit-row.expanded .deposit-detail { display: block; }
.detail-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 16px;
  align-items: start;
}
.detail-thumbs {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.detail-thumb {
  width: 110px; height: 140px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.1s;
}
.detail-thumb:hover { transform: scale(1.02); }
.detail-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.detail-info {
  font-size: 12px; color: var(--muted);
  line-height: 1.7;
}
.detail-info strong {
  color: var(--text); font-weight: 600;
  margin-right: 4px;
}
.detail-actions {
  margin-top: 12px;
  display: flex; gap: 8px;
  flex-wrap: wrap;
}
.btn-secondary {
  font-size: 12px;
  padding: 6px 12px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
}
.btn-secondary:hover { background: var(--bg); }
.btn-danger {
  font-size: 12px;
  padding: 6px 12px;
  background: white;
  border: 1px solid #f0c0c0;
  border-radius: 6px;
  font-family: inherit;
  font-weight: 500;
  color: var(--red);
  cursor: pointer;
}
.btn-danger:hover { background: #fdf0ee; }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 13px;
}

/* Lightbox */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 8px;
}
.lightbox-close {
  position: absolute;
  top: 16px; right: 20px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: white;
  border: none;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.toast {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: white;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  z-index: 2000;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

@media (max-width: 640px) {
  .canvas { padding: 16px 12px 40px; }
  .field-grid { grid-template-columns: 1fr; }
  .deposit-row-head { grid-template-columns: 14px 1fr auto; }
  .deposit-row-head .view-tag { display: none; }
  .detail-grid { grid-template-columns: 1fr; }
  .filter-row { width: 100%; }
}
</style>
</head>
<body>

<header>
  <a href="/" class="back-link">&larr;</a>
  <span class="brand-name">Popcorn Chez</span>
  <span class="brand-badge">Cash Deposits</span>
  <div class="spacer"></div>
  <div class="header-right" id="header-right"></div>
</header>

<div class="canvas">

  <div class="page-head">
    <div class="page-eyebrow">Operations</div>
    <div class="page-title">Cash deposit receipts</div>
  </div>

  <div class="card">

    <!-- New deposit form -->
    <div class="new-deposit">
      <div class="new-deposit-head">New deposit</div>

      <div class="field-grid">
        <div class="field">
          <label for="venueSelect">Venue</label>
          <select id="venueSelect">
            <option value="">-- choose venue --</option>
          </select>
        </div>
        <div class="field">
          <label for="amountInput">Deposit amount</label>
          <div class="field-amount-wrap">
            <span class="dollar">$</span>
            <input type="text" id="amountInput" inputmode="decimal" placeholder="0.00" />
          </div>
        </div>
        <div class="field">
          <label for="dateInput">Deposit date</label>
          <input type="date" id="dateInput" />
        </div>
      </div>

      <div id="uploadZone" class="upload-zone">
        <div class="upload-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
        <div class="upload-text">Take photo or upload receipt</div>
        <div class="upload-hint">JPEG or PNG only &mdash; HEIC files blocked</div>
      </div>
      <input type="file" id="fileInput" accept="image/jpeg,image/png" multiple style="display:none;" />

      <div class="form-actions">
        <div class="form-msg" id="formMsg"></div>
        <button class="btn-primary" id="saveBtn">Save deposit</button>
      </div>
    </div>

    <!-- Recent deposits -->
    <div class="recent-wrap">
      <div class="recent-head">
        <div class="recent-head-label">Recent deposits</div>
        <div class="filter-row">
          <select id="filterVenue">
            <option value="">All venues</option>
          </select>
          <input type="date" id="filterFrom" />
          <span class="sep">to</span>
          <input type="date" id="filterTo" />
        </div>
      </div>

      <div class="totals-bar" id="totalsBar">
        <div>
          <div class="totals-bar-label" id="totalsLabel">Loading&hellip;</div>
          <div class="totals-bar-sub" id="totalsSub">&nbsp;</div>
        </div>
        <div class="totals-bar-amount" id="totalsAmount">$0.00</div>
      </div>

      <div id="depositsList">
        <div class="empty-state">Loading deposits&hellip;</div>
      </div>
    </div>

  </div>
</div>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
  <img id="lightboxImg" src="" alt="Deposit receipt" />
</div>

<div class="toast" id="toast"></div>

<script src="/pc-auth.js"></script>
<script>
(function() {
  var SUPABASE_URL = 'https://aoazlttdjowhlfcksoyl.supabase.co';
  var BUCKET = 'cash-deposits';

  var VENUE_LABELS = {
    FMP: 'FMP — Freedom Mortgage Pavilion',
    Mann: 'Mann — Mann Music Center',
    BWH: 'BWH — Boardwalk Hall',
    ACCC: 'ACCC — AC Convention Center',
    Cure: 'Cure — Cure Insurance Arena',
    Subaru: 'Subaru — Subaru Park',
    DE: 'DE — Chase Field House',
    Montage: 'Montage — Montage Mountain',
    SATB: 'SATB — Sports at the Beach',
    Villanova: 'Villanova',
    Kirkwood: 'Kirkwood'
  };
  var VENUE_ORDER = ['FMP','Mann','BWH','ACCC','Cure','Subaru','DE','Montage','SATB','Villanova','Kirkwood'];

  var pendingFiles = [];
  var allDeposits = [];
  var currentUser = null;

  function apiHeaders() { return pcAuth.headers(); }
  function apiHeadersJson() {
    return Object.assign({}, apiHeaders(), {
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    });
  }

  function $(id) { return document.getElementById(id); }

  function fmt$(n) {
    var v = parseFloat(n) || 0;
    return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtDate(s) {
    if (!s) return '';
    var parts = s.split('-');
    if (parts.length !== 3) return s;
    var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function fmtDateTime(s) {
    if (!s) return '';
    var d = new Date(s);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
      ' at ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function todayStr() {
    var d = new Date();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + m + '-' + day;
  }

  function firstOfMonthStr() {
    var d = new Date();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    return d.getFullYear() + '-' + m + '-01';
  }

  function lastOfMonthStr() {
    var d = new Date();
    var last = new Date(d.getFullYear(), d.getMonth() + 1, 0);
    var m = String(last.getMonth() + 1).padStart(2, '0');
    var day = String(last.getDate()).padStart(2, '0');
    return last.getFullYear() + '-' + m + '-' + day;
  }

  function showToast(msg) {
    var t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2400);
  }

  function setMsg(text, kind) {
    var m = $('formMsg');
    m.textContent = text || '';
    m.className = 'form-msg' + (kind ? ' ' + kind : '');
  }

  function populateVenues() {
    var sel = $('venueSelect');
    var filt = $('filterVenue');
    for (var i = 0; i < VENUE_ORDER.length; i++) {
      var code = VENUE_ORDER[i];
      var label = VENUE_LABELS[code] || code;
      var o1 = document.createElement('option');
      o1.value = code; o1.textContent = label;
      sel.appendChild(o1);
      var o2 = document.createElement('option');
      o2.value = code; o2.textContent = label;
      filt.appendChild(o2);
    }
  }

  // File handling
  function isAllowedFile(file) {
    var t = (file.type || '').toLowerCase();
    var name = (file.name || '').toLowerCase();
    if (t === 'image/jpeg' || t === 'image/png') return true;
    // Some browsers/devices report empty type for HEIC; block by extension too
    if (name.endsWith('.jpg') || name.endsWith('.jpeg') || name.endsWith('.png')) {
      // Still require recognized type if browser reports one
      if (!t || t === 'image/jpeg' || t === 'image/png') return true;
    }
    return false;
  }

  function isHeic(file) {
    var t = (file.type || '').toLowerCase();
    var name = (file.name || '').toLowerCase();
    if (t === 'image/heic' || t === 'image/heif') return true;
    if (name.endsWith('.heic') || name.endsWith('.heif')) return true;
    return false;
  }

  function addFiles(files) {
    var rejected = 0;
    var heic = 0;
    for (var i = 0; i < files.length; i++) {
      var f = files[i];
      if (isHeic(f)) { heic++; continue; }
      if (!isAllowedFile(f)) { rejected++; continue; }
      pendingFiles.push(f);
    }
    if (heic > 0) {
      setMsg('HEIC files are not supported. On iPhone: Settings > Camera > Formats > Most Compatible, then re-take the photo.', 'error');
    } else if (rejected > 0) {
      setMsg('Only JPEG and PNG images are allowed.', 'error');
    } else {
      setMsg('');
    }
    renderPendingThumbs();
  }

  function renderPendingThumbs() {
    var zone = $('uploadZone');
    if (pendingFiles.length === 0) {
      zone.classList.remove('has-files');
      zone.innerHTML =
        '<div class="upload-icon">' +
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>' +
        '</div>' +
        '<div class="upload-text">Take photo or upload receipt</div>' +
        '<div class="upload-hint">JPEG or PNG only &mdash; HEIC files blocked</div>';
      return;
    }
    zone.classList.add('has-files');
    var html = '<div style="font-size:12px;font-weight:600;color:#444;margin-bottom:4px;">' +
      pendingFiles.length + ' file' + (pendingFiles.length === 1 ? '' : 's') + ' ready</div>' +
      '<div class="thumb-row" id="pendingThumbs"></div>';
    zone.innerHTML = html;

    var row = document.getElementById('pendingThumbs');
    for (var i = 0; i < pendingFiles.length; i++) {
      (function(idx) {
        var f = pendingFiles[idx];
        var div = document.createElement('div');
        div.className = 'thumb';
        var img = document.createElement('img');
        var reader = new FileReader();
        reader.onload = function(e) { img.src = e.target.result; };
        reader.readAsDataURL(f);
        div.appendChild(img);
        var x = document.createElement('button');
        x.className = 'thumb-x';
        x.innerHTML = '&times;';
        x.type = 'button';
        x.addEventListener('click', function(ev) {
          ev.stopPropagation();
          pendingFiles.splice(idx, 1);
          renderPendingThumbs();
        });
        div.appendChild(x);
        row.appendChild(div);
      })(i);
    }
    var addBtn = document.createElement('button');
    addBtn.className = 'add-more-btn';
    addBtn.type = 'button';
    addBtn.innerHTML = '+';
    addBtn.title = 'Add another image';
    addBtn.addEventListener('click', function(ev) {
      ev.stopPropagation();
      $('fileInput').click();
    });
    row.appendChild(addBtn);
  }

  // Save deposit
  function saveDeposit() {
    var venue = $('venueSelect').value;
    var amount = parseFloat($('amountInput').value);
    var date = $('dateInput').value;

    if (!venue) { setMsg('Choose a venue.', 'error'); return; }
    if (isNaN(amount) || amount <= 0) { setMsg('Enter a deposit amount greater than zero.', 'error'); return; }
    if (!date) { setMsg('Choose a deposit date.', 'error'); return; }
    if (pendingFiles.length === 0) { setMsg('Attach at least one receipt photo.', 'error'); return; }

    var btn = $('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    setMsg('Uploading…');

    // Insert deposit row first
    var displayName = (currentUser && (currentUser.display_name || currentUser.email)) || 'Unknown';
    var payload = {
      venue: venue,
      amount: amount,
      deposit_date: date,
      submitted_by: displayName
    };

    fetch(SUPABASE_URL + '/rest/v1/cash_deposits', {
      method: 'POST',
      headers: apiHeadersJson(),
      body: JSON.stringify(payload)
    }).then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error('Insert failed (' + r.status + '): ' + t); });
      return r.json();
    }).then(function(rows) {
      var deposit = rows[0];
      return uploadAllPhotos(deposit);
    }).then(function() {
      pendingFiles = [];
      $('venueSelect').value = '';
      $('amountInput').value = '';
      $('dateInput').value = todayStr();
      $('fileInput').value = '';
      renderPendingThumbs();
      setMsg('Deposit saved.', 'success');
      showToast('Deposit saved');
      btn.disabled = false;
      btn.textContent = 'Save deposit';
      loadDeposits();
    }).catch(function(err) {
      console.error(err);
      setMsg(err.message || 'Save failed.', 'error');
      btn.disabled = false;
      btn.textContent = 'Save deposit';
    });
  }

  function uploadAllPhotos(deposit) {
    var promises = [];
    for (var i = 0; i < pendingFiles.length; i++) {
      promises.push(uploadOnePhoto(deposit.id, pendingFiles[i], i));
    }
    return Promise.all(promises);
  }

  function uploadOnePhoto(depositId, file, index) {
    var ext = '';
    var t = (file.type || '').toLowerCase();
    if (t === 'image/png') ext = '.png';
    else ext = '.jpg';
    var ts = Date.now();
    var path = depositId + '/receipt_' + ts + '_' + index + ext;
    var uploadUrl = SUPABASE_URL + '/storage/v1/object/' + BUCKET + '/' + path;

    var h = Object.assign({}, apiHeaders(), {
      'Content-Type': file.type || 'image/jpeg',
      'x-upsert': 'true'
    });

    return fetch(uploadUrl, {
      method: 'POST',
      headers: h,
      body: file
    }).then(function(r) {
      if (!r.ok) return r.text().then(function(tx) { throw new Error('Upload failed (' + r.status + '): ' + tx); });
      // Insert photo row
      return fetch(SUPABASE_URL + '/rest/v1/cash_deposit_photos', {
        method: 'POST',
        headers: apiHeadersJson(),
        body: JSON.stringify({
          deposit_id: depositId,
          storage_path: path,
          sort_order: index
        })
      });
    }).then(function(r) {
      if (!r.ok) return r.text().then(function(tx) { throw new Error('Photo record failed (' + r.status + '): ' + tx); });
    });
  }

  // Public URL for sale-photos style bucket
  function publicUrl(path) {
    return SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + path;
  }

  // Load deposits
  function loadDeposits() {
    var from = $('filterFrom').value || firstOfMonthStr();
    var to = $('filterTo').value || lastOfMonthStr();
    var venue = $('filterVenue').value;

    var url = SUPABASE_URL + '/rest/v1/cash_deposits?select=*,cash_deposit_photos(id,storage_path,sort_order)' +
      '&deposit_date=gte.' + from +
      '&deposit_date=lte.' + to +
      '&order=deposit_date.desc,submitted_at.desc';
    if (venue) url += '&venue=eq.' + encodeURIComponent(venue);

    $('depositsList').innerHTML = '<div class="empty-state">Loading deposits…</div>';

    fetch(url, { headers: apiHeaders() })
      .then(function(r) {
        if (!r.ok) return r.text().then(function(t) { throw new Error('Load failed: ' + t); });
        return r.json();
      })
      .then(function(rows) {
        allDeposits = rows;
        renderDeposits();
      })
      .catch(function(err) {
        console.error(err);
        $('depositsList').innerHTML = '<div class="empty-state">Could not load deposits.</div>';
      });
  }

  function renderDeposits() {
    var list = $('depositsList');
    var totalEl = $('totalsAmount');
    var totalLabel = $('totalsLabel');
    var totalSub = $('totalsSub');

    var from = $('filterFrom').value || firstOfMonthStr();
    var to = $('filterTo').value || lastOfMonthStr();
    var venue = $('filterVenue').value;

    var sum = 0;
    for (var i = 0; i < allDeposits.length; i++) sum += parseFloat(allDeposits[i].amount) || 0;
    totalEl.textContent = fmt$(sum);

    // Build label
    var label;
    var fromD = new Date(from + 'T00:00:00');
    var toD = new Date(to + 'T00:00:00');
    var sameMonth = fromD.getMonth() === toD.getMonth() && fromD.getFullYear() === toD.getFullYear();
    var firstOfMonth = fromD.getDate() === 1;
    var lastOfMonth = toD.getDate() === new Date(toD.getFullYear(), toD.getMonth() + 1, 0).getDate();
    if (sameMonth && firstOfMonth && lastOfMonth) {
      label = 'Total — ' + fromD.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    } else {
      label = 'Total — ' + fmtDate(from) + ' to ' + fmtDate(to);
    }
    totalLabel.textContent = label;

    var venueText = venue ? (VENUE_LABELS[venue] || venue) : 'All venues';
    var countText = allDeposits.length + ' deposit' + (allDeposits.length === 1 ? '' : 's');
    totalSub.textContent = venueText + ' · ' + countText;

    if (allDeposits.length === 0) {
      list.innerHTML = '<div class="empty-state">No deposits in this range.</div>';
      return;
    }

    var html = '';
    for (var j = 0; j < allDeposits.length; j++) {
      html += rowHtml(allDeposits[j]);
    }
    list.innerHTML = html;
    attachRowHandlers();
  }

  function rowHtml(d) {
    var photos = (d.cash_deposit_photos || []).slice().sort(function(a,b) { return (a.sort_order||0) - (b.sort_order||0); });
    var photoCount = photos.length;
    var photoLabel = photoCount === 1 ? '1 photo' : (photoCount + ' photos');

    var thumbs = '';
    for (var i = 0; i < photos.length; i++) {
      var url = publicUrl(photos[i].storage_path);
      thumbs += '<div class="detail-thumb" data-img="' + url + '">' +
        '<img src="' + url + '" alt="Receipt ' + (i+1) + '" loading="lazy" />' +
        '</div>';
    }

    var deleteBtn = '';
    if (pcAuth.isAdmin()) {
      deleteBtn = '<button class="btn-danger" data-delete="' + d.id + '">Delete deposit</button>';
    }

    return '' +
      '<div class="deposit-row" data-id="' + d.id + '">' +
        '<div class="deposit-row-head" data-toggle="' + d.id + '">' +
          '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>' +
          '<div>' +
            '<div class="deposit-meta-main">' + (VENUE_LABELS[d.venue] || d.venue) + '</div>' +
            '<div class="deposit-meta-sub">' + fmtDate(d.deposit_date) + ' · ' + escapeHtml(d.submitted_by || '') + ' · ' + photoLabel + '</div>' +
          '</div>' +
          '<div class="deposit-amount">' + fmt$(d.amount) + '</div>' +
          '<div class="view-tag">view</div>' +
        '</div>' +
        '<div class="deposit-detail">' +
          '<div class="detail-grid">' +
            '<div class="detail-thumbs">' + thumbs + '</div>' +
            '<div class="detail-info">' +
              '<div><strong>Submitted:</strong> ' + fmtDateTime(d.submitted_at) + '</div>' +
              '<div><strong>Submitted by:</strong> ' + escapeHtml(d.submitted_by || '') + '</div>' +
              '<div><strong>Venue:</strong> ' + (VENUE_LABELS[d.venue] || d.venue) + '</div>' +
              '<div><strong>Deposit date:</strong> ' + fmtDate(d.deposit_date) + '</div>' +
              '<div><strong>Amount:</strong> ' + fmt$(d.amount) + '</div>' +
              '<div class="detail-actions">' + deleteBtn + '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, function(c) {
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }

  function attachRowHandlers() {
    var heads = document.querySelectorAll('[data-toggle]');
    for (var i = 0; i < heads.length; i++) {
      heads[i].addEventListener('click', function(e) {
        var row = this.parentElement;
        row.classList.toggle('expanded');
        var tag = row.querySelector('.view-tag');
        if (tag) tag.textContent = row.classList.contains('expanded') ? 'hide' : 'view';
      });
    }
    var thumbs = document.querySelectorAll('[data-img]');
    for (var j = 0; j < thumbs.length; j++) {
      thumbs[j].addEventListener('click', function(e) {
        e.stopPropagation();
        openLightbox(this.getAttribute('data-img'));
      });
    }
    var dels = document.querySelectorAll('[data-delete]');
    for (var k = 0; k < dels.length; k++) {
      dels[k].addEventListener('click', function(e) {
        e.stopPropagation();
        deleteDeposit(this.getAttribute('data-delete'));
      });
    }
  }

  function deleteDeposit(id) {
    if (!pcAuth.isAdmin()) {
      alert('Admin access required to delete deposits.');
      return;
    }
    var d = null;
    for (var i = 0; i < allDeposits.length; i++) {
      if (allDeposits[i].id === id) { d = allDeposits[i]; break; }
    }
    if (!d) return;
    if (!confirm('Delete this ' + fmt$(d.amount) + ' deposit for ' + (VENUE_LABELS[d.venue] || d.venue) + '?\n\nThis cannot be undone.')) return;

    // Delete photo rows + storage objects, then deposit row
    var photos = d.cash_deposit_photos || [];
    var storageDeletes = photos.map(function(p) {
      return fetch(SUPABASE_URL + '/storage/v1/object/' + BUCKET + '/' + p.storage_path, {
        method: 'DELETE',
        headers: apiHeaders()
      });
    });

    Promise.all(storageDeletes).then(function() {
      // CASCADE on deposit row will remove photo rows automatically, but be explicit just in case
      return fetch(SUPABASE_URL + '/rest/v1/cash_deposits?id=eq.' + id, {
        method: 'DELETE',
        headers: apiHeaders()
      });
    }).then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error('Delete failed: ' + t); });
      showToast('Deposit deleted');
      loadDeposits();
    }).catch(function(err) {
      console.error(err);
      alert('Delete failed: ' + err.message);
    });
  }

  // Lightbox
  function openLightbox(url) {
    $('lightboxImg').src = url;
    $('lightbox').classList.add('open');
  }
  function closeLightbox() {
    $('lightbox').classList.remove('open');
    $('lightboxImg').src = '';
  }

  // Wiring
  function startApp(user) {
    currentUser = user;
    var hr = $('header-right');
    if (hr && user) {
      hr.innerHTML = '<span class="header-user">' + escapeHtml(user.display_name || user.email) + '</span>' +
        '<button class="sign-out-btn" onclick="pcAuth.signOut()">Sign out</button>';
    }

    populateVenues();
    $('dateInput').value = todayStr();
    $('filterFrom').value = firstOfMonthStr();
    $('filterTo').value = lastOfMonthStr();

    $('uploadZone').addEventListener('click', function() { $('fileInput').click(); });
    $('fileInput').addEventListener('change', function(e) {
      if (e.target.files && e.target.files.length > 0) addFiles(e.target.files);
      e.target.value = '';
    });
    $('saveBtn').addEventListener('click', saveDeposit);

    $('filterVenue').addEventListener('change', loadDeposits);
    $('filterFrom').addEventListener('change', loadDeposits);
    $('filterTo').addEventListener('change', loadDeposits);

    $('lightboxClose').addEventListener('click', closeLightbox);
    $('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && $('lightbox').classList.contains('open')) closeLightbox();
    });

    loadDeposits();
  }

  pcAuth.require({
    pageSlug: 'cash-deposits',
    onReady: startApp
  });
})();
</script>
</body>
</html>
